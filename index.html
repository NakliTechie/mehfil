  // Written out rather than as a ternary: the previous form parsed correctly
  // but read as though it excluded private non-DM channels, which it doesn't.
  // Restricted-and-ours is the rule; `sk:` entries only exist for group DMs
  // today, so the private ones simply match nothing.
  const sendableChannelIds = new Set(
    current.channels.filter(ch => (ch.private || ch.dm) && isMemberOf(ch)).map(ch => ch.id)
  );
  const senderKeys = await new Promise((res, rej) => {
    const tx  = current.wsDB.transaction("keys", "readonly");
    const req = tx.objectStore("keys").getAllKeys();
    req.onsuccess = async () => {
      const out = [];
      for (const k of (req.result || [])) {
        if (!String(k).startsWith("sk:")) continue;
        const parts = String(k).split(":");
        if (parts.length < 3) continue;
        const channelId = parts[1];
        const senderId  = parts.slice(2).join(":");
        if (!sendableChannelIds.has(channelId)) continue;   // not their DM
        if (!targetKek) continue;                            // can't seal it
        const raw = await idbGet(current.wsDB, "keys", k);
        if (raw) out.push({ channelId, senderId, wrapped: await wrapForTarget(raw) });
      }
      res(out);
    };
    req.onerror = rej;
  });

  const snapshot = {
    channels: snapshotChannels,
    senderKeys,
    members: current.members.map(m => ({
      id: m.id, name: m.name, color: m.color, role: m.role,
      devices: m.devices, joined_at: m.joined_at,
      x25519_pub: m.x25519_pub || null      // Slice 3b
    }))
  };
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  const userId = bytesToB64Url(State.identity.pubkey);
  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: null,                 // workspace-level envelope
    channelKey: current.rootKey,     // encrypted under root key
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "member.welcome",
    // C2: echo the joiner's nonce so they can tell our answer apart from an
    // unsolicited snapshot. Omitted only if the joiner never sent one, in
    // which case the joiner will reject this — which is the intended
    // outcome for a client that predates the nonce.
    inner: { target: targetUserId, join_nonce: joinNonce, snapshot },
    vectorClock: [[userId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  await idbPut(current.wsDB, "envelopes", env);
  await PeerMgr.sendEnvelope(meta.id, env);
}

async function replayHistory(current, targetUserId) {
  // Send every stored envelope except the ones that were just generated
  // as part of this handshake (member.join from target, member.welcome
  // we just emitted). The remote side will dedupe by id anyway.
  const all = await idbGetAll(current.wsDB, "envelopes");
  for (const env of all) {
    // Skip envelopes that originated from the target (they already have
    // them) and workspace-level handshake envelopes.
    if (env.from === targetUserId) continue;
    if (env.type === "member.welcome" && env.ts > Date.now() - 10000) continue;
    await PeerMgr.sendEnvelope(current.meta.id, env);
  }
}

/* ------------------------------------------------------------
 *  §25  Slice 3a envelope emitters — channel.create, message.edit,
 *       message.delete. Each builds a signed+encrypted envelope,
 *       persists it locally, applies the projection update, and
 *       broadcasts to any connected peer.
 * ------------------------------------------------------------ */
/**
 * Create a new channel.
 *
 * Public channels (`isPrivate=false`): the raw 32-byte channel key rides
 * in the envelope's inner payload as `key`. The envelope itself is
 * encrypted under the workspace root key, so all workspace members can
 * unwrap it automatically. Every member is added.
 *
 * Private channels (`isPrivate=true`): the channel key is wrapped
 * per-member using X25519 ECDH. For each listed member we derive an
 * AES-GCM KEK via `ECDH(my_priv, their_x25519_pub)`, then encrypt the
 * raw channel key under that KEK with a fresh 12-byte IV. The result
 * travels as `wrapped_keys: { user_id: {iv, ct}, ... }` in the inner
 * payload. Members NOT listed get no entry and can't decrypt — even
 * though they see the envelope, they have no way to recover the key.
 * The envelope is still encrypted under the workspace root key so
 * non-member workspace users can't even see the channel name or topic.
 */
async function sendChannelCreate(current, name, topic, { isPrivate = false, isDm = false, isAnnounce = false, isCanvas = false, memberIds = null } = {}) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  // Slice F1-B / security: only owners/admins can create announcement
  // channels. Sender-side guard so the honest-client UI hides the option;
  // receivers also strip the flag from non-admin senders on dispatch.
  if (isAnnounce) {
    const me = current.members.find(m => m.id === myUserId);
    if (!(me?.role === "owner" || me?.role === "admin")) {
      throw new Error("Only admins can create announcement channels.");
    }
  }
  // Slice CV1: canvas channels can't be private in v1 (the Yjs workspace
  // doc is encrypted under the root key, which every member has — private
  // canvas would be UI-only private, not cryptographically private).
  if (isCanvas && isPrivate) {
    throw new Error("Canvas channels can't be private in v1. Use a public canvas.");
  }
  const aesKey = await Crypto.genAesKey();
  const rawKey = await Crypto.exportAesRaw(aesKey);
  const chId = bytesToB64Url(Crypto.rand(16));
  const chosenMembers = memberIds || current.members.map(m => m.id);

  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");

  // Build inner payload — shape depends on public vs private.
  let inner;
  if (isPrivate) {
    // Private: wrap the raw channel key per-member via ECDH.
    const myX25519Priv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
    const wrapped_keys = {};
    for (const mid of chosenMembers) {
      const member = current.members.find(m => m.id === mid);
      if (!member) throw new Error("Unknown member: " + mid);
      if (!member.x25519_pub) {
        throw new Error(`Can't create private channel with ${member.name}: they joined before X25519 support. Ask them to rejoin.`);
      }
      const theirPub = await Crypto.importX25519Pub(member.x25519_pub);
      const kek = await Crypto.deriveX25519AesKey(myX25519Priv, theirPub);
      const iv = Crypto.rand(12);
      const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, kek, rawKey));
      wrapped_keys[mid] = { iv, ct };
    }
    inner = {
      id: chId, name, topic: topic || "",
      private: true,
      dm: isDm,
      announce: !!isAnnounce,
      canvas: false,   // canvas disallowed for private in v1
      members: chosenMembers,
      wrapped_keys,
      wrapper: myUserId   // needed on the receive side to pick the right
                          // X25519 pubkey for ECDH derivation
    };
  } else {
    // Public: raw key in the clear (the envelope itself is still
    // encrypted under the workspace root key).
    inner = {
      id: chId, name, topic: topic || "",
      private: false,
      dm: false,
      announce: !!isAnnounce,
      canvas: !!isCanvas,
      members: chosenMembers,
      key: rawKey
    };
  }

  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: null,                 // workspace-level envelope
    channelKey: current.rootKey,     // encrypted under root key
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "channel.create",
    inner,
    vectorClock: [[myUserId, meta.lc_counter]]
  });

  // Persist and apply locally.
  await idbPut(current.wsDB, "envelopes", env);
  const chRec = {
    id: chId, name, topic: topic || "",
    private: isPrivate, dm: isDm, dm_with: null,
    announce: !!isAnnounce,
    canvas: !!isCanvas,   // Slice CV1
    members: chosenMembers, created_at: env.ts
  };
  current.channels.push(chRec);
  await idbPut(current.wsDB, "channels", chRec);
  await idbPut(current.wsDB, "keys", rawKey, "ch:" + chId);
  current.channelKeys[chId] = aesKey;

  // Broadcast to any connected peer.
  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));

  return chRec;
}

async function sendMessageEdit(current, targetId, newBody) {
  const msg = current.messages.find(m => m.id === targetId);
  if (!msg) throw new Error("Message not found");
  const ch = current.channels.find(c => c.id === msg.ch);
  const channelKey = current.channelKeys[ch.id];
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const userId = bytesToB64Url(State.identity.pubkey);

  const env = await Envelope.build({

/* ------------------------------------------------------------
 *  §28  1:1 DMs — WT-15
 *
 *  A DM between two parties has no `channel.create` envelope. Both
 *  sides derive:
 *    - `dm_channel_id` = SHA-256(sorted(user_a, user_b).join("|")).slice(0,16)
 *    - `dm_channel_key` = deriveKey(X25519, my_priv, their_pub) → AES-GCM
 *
 *  Because ECDH is symmetric, both parties compute the same key. The
 *  channel id is deterministic so both parties agree on it without
 *  any protocol roundtrip. This means DMs appear the *moment* the
 *  first message arrives — there's no "pending" state.
 *
 *  Local state: we persist the DM channel record + its raw derived key
 *  on first use (either when the user clicks "Start DM" or when the
 *  first incoming DM envelope lands). The `dm: true` flag + `dm_with`
 *  pointer let the sidebar render them under a separate DMs section.
 * ------------------------------------------------------------ */
async function dmChannelId(userA, userB) {
  const sorted = [userA, userB].sort();
  const bytes = new TextEncoder().encode(sorted.join("|"));
  const hash = await Crypto.sha256(bytes);
  return bytesToB64Url(hash.slice(0, 16));
}

async function ensureDmChannel(current, otherMember) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  if (otherMember.id === myUserId) {
    throw new Error("Can't DM yourself");
  }
  if (!otherMember.x25519_pub) {
    throw new Error(`${otherMember.name} doesn't have X25519 keys yet — they joined before Slice 3b.`);
  }
  const dmId = await dmChannelId(myUserId, otherMember.id);
  let ch = current.channels.find(c => c.id === dmId);
  if (ch) return ch;

  // Derive the DM key. We export raw and store it under keys → ch:<dmId>
  // so that `Workspace.open` replay can re-import it the same way every
  // other channel key is handled.
  const myPriv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
  const theirPub = await Crypto.importX25519Pub(otherMember.x25519_pub);
  const aesKey = await Crypto.deriveX25519AesKey(myPriv, theirPub);
  const rawKey = await Crypto.exportAesRaw(aesKey);
  await idbPut(current.wsDB, "keys", rawKey, "ch:" + dmId);
  current.channelKeys[dmId] = aesKey;

  ch = {
    id: dmId,
    name: otherMember.name,
    topic: "",
    private: true,
    dm: true,
    dm_with: otherMember.id,
    members: [myUserId, otherMember.id],
    created_at: Date.now()
  };
  current.channels.push(ch);
  await idbPut(current.wsDB, "channels", ch);
  return ch;
}

/**
 * Given an envelope whose `ch` id doesn't match any known channel, see if
 * it matches a DM channel id derivable from any (me, member) pair. If yes,
 * materialize the DM channel on the fly and return it. Returns null if
 * this envelope isn't for a DM we know how to derive.
 */
async function tryResolveIncomingDm(current, envChId) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  for (const member of current.members) {
    if (member.id === myUserId) continue;
    if (!member.x25519_pub) continue;
    const maybeId = await dmChannelId(myUserId, member.id);
    if (maybeId === envChId) {
      return await ensureDmChannel(current, member);
    }
  }
  return null;
}

async function sendMessageDelete(current, targetId) {
  const msg = current.messages.find(m => m.id === targetId);
  if (!msg) throw new Error("Message not found");
  const ch = current.channels.find(c => c.id === msg.ch);
  const channelKey = current.channelKeys[ch.id];
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");

  const env = await Envelope.build({

  });

/* ------------------------------------------------------------
 *  §28b  Reactions — Slice 3d.1 (WT-20 partial)
 *
 *  reaction.add and reaction.remove envelopes carry a target
 *  message id and an emoji string. The projected reaction state
 *  on each message is an OR-Set keyed by (user_id, emoji) — each
 *  user can add one copy of each emoji to a given message, and
 *  remove their own. Per spec §6.3.
 *
 *  Shape on the in-memory message record:
 *    msg.reactions = { [emoji]: [user_id, ...] }
 *
 *  The emoji keys are stored in insertion order — render path
 *  preserves that order so pills don't jitter as reactions arrive.
 * ------------------------------------------------------------ */
async function sendReactionAdd(current, targetId, emoji) {
  const msg = current.messages.find(m => m.id === targetId);
  if (!msg) throw new Error("Message not found");
  const ch = current.channels.find(c => c.id === msg.ch);
  const channelKey = current.channelKeys[ch.id];
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const userId = bytesToB64Url(State.identity.pubkey);

  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: ch.id,
    channelKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "reaction.add",
    inner: { target: targetId, emoji },
    vectorClock: [[userId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "envelopes", env);

  // Apply locally.
  if (!msg.reactions) msg.reactions = {};
  if (!msg.reactions[emoji]) msg.reactions[emoji] = [];
  if (!msg.reactions[emoji].includes(userId)) msg.reactions[emoji].push(userId);

  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));
}

async function sendReactionRemove(current, targetId, emoji) {
  const msg = current.messages.find(m => m.id === targetId);
  if (!msg) throw new Error("Message not found");
  const ch = current.channels.find(c => c.id === msg.ch);
  const channelKey = current.channelKeys[ch.id];
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const userId = bytesToB64Url(State.identity.pubkey);

  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: ch.id,
    channelKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "reaction.remove",
    inner: { target: targetId, emoji },
    vectorClock: [[userId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "envelopes", env);

  // Apply locally: remove only my own user_id from the emoji's list.
  if (msg.reactions && msg.reactions[emoji]) {
    msg.reactions[emoji] = msg.reactions[emoji].filter(uid => uid !== userId);
    if (msg.reactions[emoji].length === 0) delete msg.reactions[emoji];
    if (Object.keys(msg.reactions).length === 0) delete msg.reactions;
  }

  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));
}

/**
 * Toggle convenience: click a reaction pill to add/remove your own.
 * Used by the UI and also exported for the debug hook.
 */
async function toggleReaction(current, targetId, emoji) {
  const msg = current.messages.find(m => m.id === targetId);
  if (!msg) return;
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const mine = msg.reactions && msg.reactions[emoji] && msg.reactions[emoji].includes(myUserId);
  if (mine) await sendReactionRemove(current, targetId, emoji);
  else       await sendReactionAdd(current, targetId, emoji);
}

/* ------------------------------------------------------------
 *  Slice P1  Pinned messages
 *  Pins live in the Yjs workspace doc (spec §5.4) so they sync to
 *  every member via workspace.patch. Any member can pin or unpin
 *  any visible message in channels they belong to. No new envelope
 *  types needed — this rides the existing CRDT patch path.
 * ------------------------------------------------------------ */
/* ------------------------------------------------------------
 *  Poll voting (inline polls via /poll)
 *  One vote per user per poll; voting again for a different option
 *  replaces the prior vote; voting for the same option clears it.
 * ------------------------------------------------------------ */
async function sendPollVote(current, targetMsgId, optionIdx) {
  const msg = current.messages.find(m => m.id === targetMsgId);
  if (!msg || !msg.poll) throw new Error("Not a poll message");
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const ch = current.channels.find(c => c.id === msg.ch);
  const channelKey = current.channelKeys[ch.id];
  // Toggle off if the user is voting again for the same option.
  const current_vote = msg.votes?.[myUserId];
  const final = current_vote === optionIdx ? -1 : optionIdx;
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: ch.id,
    channelKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "poll.vote",
    inner: { target: targetMsgId, optionIdx: final },
    vectorClock: [[myUserId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "envelopes", env);
  // Apply locally.
  if (!msg.votes) msg.votes = {};
  if (final === -1) delete msg.votes[myUserId]; else msg.votes[myUserId] = final;
  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));
}

function renderPoll(m, myUserId) {
  if (!m.poll) return "";
  const votes = m.votes || {};
  const totals = m.poll.options.map((_, i) =>
    Object.values(votes).filter(v => v === i).length
  );
  const maxVotes = Math.max(1, ...totals);
  const myVote = votes[myUserId];
  return `
    <div class="poll">
      <div class="poll-q">📊 ${escapeHTML(m.poll.question)}</div>
      ${m.poll.options.map((opt, i) => {
        const count = totals[i];
        const pct = Math.round((count / Math.max(1, Object.keys(votes).length)) * 100);
        const mine = myVote === i;
        const width = Math.round((count / maxVotes) * 100);
        return `
          <div class="poll-opt ${mine ? "mine" : ""}" data-poll-vote="${escapeHTML(m.id)}" data-poll-idx="${i}">
            <div class="poll-bar" style="width: ${width}%"></div>
            <div class="poll-opt-label">${mine ? "✓ " : ""}${escapeHTML(opt)}</div>
            <div class="poll-opt-count">${count}${count > 0 ? ` · ${pct}%` : ""}</div>
          </div>
        `;
      }).join("")}
      <div class="poll-total">${Object.keys(votes).length} vote${Object.keys(votes).length === 1 ? "" : "s"}</div>
    </div>
  `;
}

/* Bookmarks — save messages for later (per-user, local-only). */
/* Profile updates — tz / pronouns / title. Persistent envelope (not
 * ephemeral). Receiver updates the member record for env.from. */
/* Reminders — per-device, local-only. Persisted in IDB so they survive
 * a reload, fired by a single interval. Honest caveat: the tab must be
 * open when the reminder is due (no push, no service-worker scheduler).
 * Missed reminders that became due while offline fire on next app open. */
const ReminderMgr = {
  _interval: null,
  start() {
    if (this._interval) return;
    // Check every 20s — reminders are minute-granular so this is fine.
    this._interval = setInterval(() => this.tick().catch(console.warn), 20_000);
    // Also fire once on boot to catch anything that came due while the app was closed.
    setTimeout(() => this.tick().catch(console.warn), 500);
  },
  async tick() {
    const current = State.current;
    if (!current) return;
    const now = Date.now();
    for (const [id, rem] of current.reminders || []) {
      if (rem.fireAt <= now && !rem.fired) {
        rem.fired = true;
        await idbDelete(current.wsDB, "reminders", id);
        current.reminders.delete(id);
        flashReminderToast(`⏰ Reminder: ${rem.text}`, 0);
        if (Notifier?.supported() && Notification.permission === "granted") {
          try { new Notification("Reminder", { body: rem.text }); } catch {}
        }
      }
    }
    // Scheduled sends: actually post the queued message.
    for (const [id, ss] of current.scheduledSends || []) {
      if (ss.fireAt <= now && !ss.fired) {
        ss.fired = true;
        await idbDelete(current.wsDB, "scheduled_sends", id);
        current.scheduledSends.delete(id);
        // Switch to the target channel if needed so sendMessageNow posts there.
        const prevChannel = State.currentChannel;
        try {
          if (!current.channels.find(c => c.id === ss.channelId)) {
            flashReminderToast(`Scheduled send skipped: channel gone — "${ss.body.slice(0, 40)}"`, 0);
            continue;
          }
          State.currentChannel = ss.channelId;
          await sendMessageNow(ss.body);
        } catch (e) {
          console.warn("scheduled send failed:", e);
          flashReminderToast(`Scheduled send failed: ${e.message}`, 0);
        } finally {
          if (prevChannel !== ss.channelId) State.currentChannel = prevChannel;
        }
      }
    }
  },
};

async function scheduleReminder(current, delayMs, text) {
  const id = bytesToB64Url(Crypto.rand(8));
  const rec = { id, fireAt: Date.now() + delayMs, text, setAt: Date.now() };
  if (!current.reminders) current.reminders = new Map();
  current.reminders.set(id, rec);
  await idbPut(current.wsDB, "reminders", rec, id);
}

/* ------------------------------------------------------------
 *  Scheduled send — queue a message to post at a future time.
 *  Honest caveat: tab must be open when the time arrives. Same
 *  ReminderMgr tick drives it; delivery calls sendMessageNow in
 *  the channel the user was in when they scheduled.
 * ------------------------------------------------------------ */
async function scheduleSend(current, fireAt, body, channelId) {
  const id = bytesToB64Url(Crypto.rand(8));
  const rec = { id, fireAt, body, channelId, scheduledAt: Date.now() };
  if (!current.scheduledSends) current.scheduledSends = new Map();
  current.scheduledSends.set(id, rec);
  await idbPut(current.wsDB, "scheduled_sends", rec, id);
}

async function cancelScheduledSend(current, id) {
  if (!current.scheduledSends) return;
  current.scheduledSends.delete(id);
  await idbDelete(current.wsDB, "scheduled_sends", id);
}

/* Parse a relative time spec:
 *   in 15m  / in 2h  / in 3d
 *   at 9am  / at 2:30pm  (today; tomorrow if past)
 *   tomorrow at 9am
 *   monday at 9
 * Returns { fireAt: number, rest: string } or throws on bad input.
 */
function parseTimeSpec(input) {
  const s = (input || "").trim();
  // in <N><unit> <text>
  let m = s.match(/^in\s+(\d+)\s*(m|min|h|hr|d)\s+(.+)$/i);
  if (m) {
    const n = parseInt(m[1], 10);
    const u = m[2].toLowerCase();
    const ms = u.startsWith("h") ? 3600_000 : u === "d" ? 86400_000 : 60_000;
    return { fireAt: Date.now() + n * ms, rest: m[3] };
  }
  // at <time> <text> — today; if past, tomorrow
  m = s.match(/^at\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\s+(.+)$/i);
  if (m) {
    let h = parseInt(m[1], 10);
    const min = parseInt(m[2] || "0", 10);
    const ap = (m[3] || "").toLowerCase();
    if (ap === "pm" && h < 12) h += 12;
    if (ap === "am" && h === 12) h = 0;
    const now = new Date();
    const t = new Date(now);
    t.setHours(h, min, 0, 0);
    if (t.getTime() <= now.getTime()) t.setDate(t.getDate() + 1);
    return { fireAt: t.getTime(), rest: m[4] };
  }
  // tomorrow at <time> <text>
  m = s.match(/^tomorrow\s+at\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\s+(.+)$/i);
  if (m) {
    let h = parseInt(m[1], 10);
    const min = parseInt(m[2] || "0", 10);
    const ap = (m[3] || "").toLowerCase();
    if (ap === "pm" && h < 12) h += 12;
    if (ap === "am" && h === 12) h = 0;
    const t = new Date();
    t.setDate(t.getDate() + 1);
    t.setHours(h, min, 0, 0);
    return { fireAt: t.getTime(), rest: m[4] };
  }
  // <weekday> at <time> <text>
  const weekdays = ["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];
  m = s.match(/^(sun|mon|tue|wed|thu|fri|sat)\w*\s+at\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\s+(.+)$/i);
  if (m) {
    const dayIdx = weekdays.findIndex(d => d.startsWith(m[1].toLowerCase()));
    let h = parseInt(m[2], 10);
    const min = parseInt(m[3] || "0", 10);
    const ap = (m[4] || "").toLowerCase();
    if (ap === "pm" && h < 12) h += 12;
    if (ap === "am" && h === 12) h = 0;
    const t = new Date();
    const diff = (dayIdx - t.getDay() + 7) % 7 || 7;
    t.setDate(t.getDate() + diff);
    t.setHours(h, min, 0, 0);
    return { fireAt: t.getTime(), rest: m[5] };
  }
  throw new Error('Usage: /send in 15m <msg>  ·  /send at 9am <msg>  ·  /send tomorrow at 9am <msg>  ·  /send monday at 9 <msg>');
}

function flashReminderToast(text, autoHideMs = 4000) {
  const existing = document.querySelector(".reminder-toast");
  if (existing) existing.remove();
  const el = document.createElement("div");
  el.className = "reminder-toast";
  el.textContent = text;
  document.body.appendChild(el);
  requestAnimationFrame(() => el.classList.add("show"));
  if (autoHideMs > 0) {
    setTimeout(() => {
      el.classList.remove("show");
      setTimeout(() => el.remove(), 250);
    }, autoHideMs);
  } else {
    // Click-to-dismiss for persistent reminder-fire toasts.
    el.style.cursor = "pointer";
    el.onclick = () => { el.classList.remove("show"); setTimeout(() => el.remove(), 250); };
  }
}

async function sendProfileUpdate(current, patch) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const me = current.members.find(m => m.id === myUserId);
  if (!me) throw new Error("Member record missing.");
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: null,
    channelKey: current.rootKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "member.profile_update",
    inner: {
      timezone: patch.timezone || null,
      pronouns: patch.pronouns || null,
      title:    patch.title    || null,
    },
    vectorClock: [[myUserId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "envelopes", env);
  // Apply locally
  if (patch.timezone !== undefined) me.timezone = patch.timezone || null;
  if (patch.pronouns !== undefined) me.pronouns = patch.pronouns || null;
  if (patch.title    !== undefined) me.title    = patch.title    || null;
  await idbPut(current.wsDB, "members", me);
  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));
}

/* Format a timestamp as "3:42 PM · 9:12 AM for Alice" when we know
 * the author's timezone and it differs from ours. */
function timestampTooltip(ts, author) {
  const mine = new Date(ts).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  if (!author?.timezone) return mine;
  try {
    const theirs = new Date(ts).toLocaleTimeString([], {
      hour: "numeric", minute: "2-digit", timeZone: author.timezone
    });
    if (theirs === mine) return mine;
    return `${mine} · ${theirs} for ${author.name}`;
  } catch { return mine; }
}

async function toggleBookmark(current, msgId) {
  if (!current.bookmarks) current.bookmarks = new Map();
  if (current.bookmarks.has(msgId)) {
    current.bookmarks.delete(msgId);
    await idbDelete(current.wsDB, "bookmarks", msgId);
  } else {
    const msg = current.messages.find(m => m.id === msgId);
    if (!msg) return;
    const rec = { msgId, ch: msg.ch, ts: msg.ts, savedAt: Date.now() };
    current.bookmarks.set(msgId, rec);
    await idbPut(current.wsDB, "bookmarks", rec, msgId);
  }
}

function isBookmarked(current, msgId) {
  return current.bookmarks?.has(msgId) || false;
}

async function toggleChecklistItem(current, targetMsgId, itemIdx) {

function renderChecklist(m) {

          <span>${escapeHTML(it.text)}</span>

      `).join("")}

async function togglePin(current, channelId, msgId) {
  if (!current.doc) throw new Error("workspace doc not loaded");
  const existing = WorkspaceDoc.getPins(current.doc, channelId);
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const update = existing.find(p => p.msgId === msgId)
    ? WorkspaceDoc.removePin(current.doc, channelId, msgId)
    : WorkspaceDoc.addPin(current.doc, channelId, msgId, myUserId);
  await sendWorkspacePatch(current, update);
}

function isPinned(current, channelId, msgId) {
  if (!current?.doc) return false;
  return WorkspaceDoc.getPins(current.doc, channelId).some(p => p.msgId === msgId);
}

/* ------------------------------------------------------------
 *  Slice CV1  Canvas — collaborative markdown doc per channel
 *  Each canvas channel owns a Y.Text inside the workspace's Yjs
 *  doc under the key `canvas:<channelId>`. We bind a textarea to
 *  that Y.Text via a diff-based observer (no external y-textarea
 *  dep). Remote updates arrive through the normal `workspace.patch`
 *  pipeline; local edits debounce a 500ms broadcast so rapid
 *  typing doesn't spam the network.
 *
 *  Access is "public only" in v1 — the Y.Text is stored inside the
 *  workspace-root-key-encrypted Yjs doc, which every member has.
 *  Private canvases would need a separate per-channel-key-encrypted
 *  doc; deferred to a later slice.
 * ------------------------------------------------------------ */
/* ------------------------------------------------------------
 *  Syntax highlighting for fenced code blocks.
 *  Lazy-loaded from esm.sh on first use. We keep a single cached
 *  import + apply after each render to any `<pre.msg-code code[class^=lang-]>`
 *  that hasn't been highlighted yet (marked with a data-hl attr).
 * ------------------------------------------------------------ */
const HighlightMgr = {
  _hljs: null,
  _loading: null,
  async load() {
    if (this._hljs) return this._hljs;
    if (!this._loading) {
      this._loading = (async () => {
        const mod = await import("https://esm.sh/highlight.js@11.10.0");
        return mod.default || mod;
      })();
    }
    this._hljs = await this._loading;
    return this._hljs;
  },
  async applyAll(root = document) {
    const blocks = root.querySelectorAll("pre.msg-code code[class^='lang-']:not([data-hl])");
    if (blocks.length === 0) return;
    let hljs;
    try { hljs = await this.load(); }
    catch (e) { console.warn("syntax highlight load failed:", e); return; }
    for (const el of blocks) {
      const cls = [...el.classList].find(c => c.startsWith("lang-")) || "";
      const lang = cls.replace("lang-", "").toLowerCase();
      try {
        const src = el.textContent || "";
        const res = hljs.getLanguage(lang)
          ? hljs.highlight(src, { language: lang })
          : hljs.highlightAuto(src);
        el.innerHTML = res.value;
        el.setAttribute("data-hl", "1");
      } catch (e) { /* silent — bad lang name, etc. */ }
    }
  },
};

const CanvasMgr = {
  _binding: null,   // { channelId, textarea, observer, disposed }
  _md: null,        // lazy-loaded markdown-it

  getYText(current, channelId) {
    if (!current?.doc) return null;
    return current.doc.getText("canvas:" + channelId);
  },

  dispose() {
    if (!this._binding) return;
    this._binding.disposed = true;
    try { this._binding.ytext.unobserve(this._binding.observer); } catch {}
    this._binding = null;
  },

  bind(current, channelId, textarea) {
    this.dispose();
    const ytext = this.getYText(current, channelId);
    if (!ytext) return;

    let lastText = ytext.toString();
    textarea.value = lastText;
    let broadcastTimer = null;
    let applyingRemote = false;

    const observer = (_event, tx) => {
      if (tx?.origin === "local") return;   // our own mutation, skip
      applyingRemote = true;
      try {
        const newText = ytext.toString();
        if (newText === lastText) return;
        const s = textarea.selectionStart;
        const e = textarea.selectionEnd;
        textarea.value = newText;
        lastText = newText;
        textarea.setSelectionRange(Math.min(s, newText.length), Math.min(e, newText.length));
      } finally {
        applyingRemote = false;
      }
    };
    ytext.observe(observer);

    const debouncedBroadcast = () => {
      clearTimeout(broadcastTimer);
      broadcastTimer = setTimeout(() => {
        if (this._binding?.channelId !== channelId) return;   // switched channels
        const update = Y.encodeStateAsUpdate(current.doc);
        sendWorkspacePatch(current, update).catch(e => console.warn("canvas broadcast:", e));
      }, 500);
    };

    textarea.addEventListener("input", () => {
      if (applyingRemote) return;
      const newText = textarea.value;
      const oldText = lastText;
      if (newText === oldText) return;
      // Diff: find shared prefix + shared suffix, replace the middle.
      let prefix = 0;
      const maxPre = Math.min(newText.length, oldText.length);
      while (prefix < maxPre && newText[prefix] === oldText[prefix]) prefix++;
      let suffix = 0;
      const maxSuf = Math.min(newText.length - prefix, oldText.length - prefix);
      while (suffix < maxSuf &&
             newText[newText.length - 1 - suffix] === oldText[oldText.length - 1 - suffix]) suffix++;
      const delStart = prefix;
      const delLen   = oldText.length - prefix - suffix;
      const insText  = newText.substring(prefix, newText.length - suffix);
      current.doc.transact(() => {
        if (delLen > 0) ytext.delete(delStart, delLen);
        if (insText)    ytext.insert(delStart, insText);
      }, "local");
      lastText = newText;
      debouncedBroadcast();
    });

    this._binding = { channelId, textarea, observer, ytext, disposed: false };
  },

  async renderPreview(current, channelId, container) {
    const ytext = this.getYText(current, channelId);
    if (!ytext) { container.textContent = ""; return; }
    if (!this._md) {
      try {
        const mod = await import("https://esm.sh/markdown-it@14.1.0");
        this._md = (mod.default || mod)({ breaks: true, linkify: true, html: false });
      } catch (e) {
        container.textContent = ytext.toString();
        console.warn("markdown-it load failed:", e);
        return;
      }
    }
    container.innerHTML = this._md.render(ytext.toString());
  },
};

/* ------------------------------------------------------------
 *  Slice Q1  Message permalinks
 *  Clickable timestamp → copies a hash-based deep link. On app
 *  load, a matching hash navigates to the right workspace, opens
 *  the channel, scrolls to the message, and flashes it. The hash
 *  format is `#msg/<wsId>/<chId>/<msgId>` — distinct from the
 *  invite fragment (`#join=...`) so the two never collide.
 * ------------------------------------------------------------ */
function buildPermalink(wsId, chId, msgId) {
  return `${location.origin}${location.pathname}#msg/${encodeURIComponent(wsId)}/${encodeURIComponent(chId)}/${encodeURIComponent(msgId)}`;
}

function parsePermalinkHash() {
  const m = location.hash.match(/^#msg\/([^/]+)\/([^/]+)\/([^/]+)$/);
  if (!m) return null;
  return { wsId: decodeURIComponent(m[1]), chId: decodeURIComponent(m[2]), msgId: decodeURIComponent(m[3]) };
}

async function copyPermalink($el, msgId) {
  const current = State.current;
  if (!current) return;
  const msg = current.messages.find(m => m.id === msgId);
  if (!msg) return;
  const url = buildPermalink(current.meta.id, msg.ch, msgId);
  let copied = false;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try { await navigator.clipboard.writeText(url); copied = true; }
    catch { /* fall through to manual-copy fallback */ }
  }
  if (copied) {
    flashElement($el, "Link copied");
  } else {
    // Fallback when clipboard API is blocked or absent: drop a one-shot
    // selectable textbox next to the timestamp so the user can Ctrl-C it.
    showManualCopyPopover($el, url);
  }
}

function showManualCopyPopover($anchor, url) {
  const pop = document.createElement("div");
  pop.className = "manual-copy-popover";
  pop.innerHTML = `
    <div style="font-size: 11px; color: var(--fg-dim); margin-bottom: 4px;">Copy manually:</div>
    <input type="text" readonly value="${escapeHTML(url)}" style="width: 280px; font-size: 11px; padding: 4px; background: var(--bg-sunken); border: 1px solid var(--line); border-radius: 4px; color: var(--fg);">
  `;
  document.body.appendChild(pop);
  const rect = $anchor.getBoundingClientRect();
  pop.style.position = "fixed";
  pop.style.left = Math.max(8, rect.left) + "px";
  pop.style.top = (rect.bottom + 6) + "px";
  pop.style.background = "var(--bg-elev)";
  pop.style.border = "1px solid var(--line)";
  pop.style.borderRadius = "6px";
  pop.style.padding = "8px 10px";
  pop.style.zIndex = "500";
  pop.style.boxShadow = "0 4px 14px rgba(0,0,0,0.25)";
  const $inp = pop.querySelector("input");
  $inp.focus(); $inp.select();
  const close = () => { pop.remove(); document.removeEventListener("click", onDocClick, true); };
  const onDocClick = (e) => { if (!pop.contains(e.target)) close(); };
  setTimeout(() => document.addEventListener("click", onDocClick, true), 0);
  setTimeout(close, 8000);
}

function flashElement($el, text) {
  let $tip = $el._permalinkTip;
  if (!$tip) {
    $tip = document.createElement("span");
    $tip.className = "permalink-tip";
    $el.appendChild($tip);
    $el._permalinkTip = $tip;
  }
  $tip.textContent = text;
  $tip.classList.add("show");
  clearTimeout($el._permalinkTimer);
  $el._permalinkTimer = setTimeout(() => {
    $tip.classList.remove("show");
    setTimeout(() => { if ($tip && $tip.parentElement) $tip.remove(); $el._permalinkTip = null; }, 200);
  }, 1400);
}

/**
 * Navigate to a permalink target. Called on boot when the URL hash is
 * a permalink, and from click handlers in cross-workspace contexts.
 * Opens the workspace if needed, switches to the channel, scrolls to
 * the message and flashes it.
 */
async function navigateToPermalink({ wsId, chId, msgId }) {
  // Open the target workspace if not already open.
  if (!State.current || State.current.meta.id !== wsId) {
    try { await openWorkspaceById(wsId); }
    catch (e) { console.warn("permalink: workspace open failed", e); return; }
  }
  // Switch to the channel (if it exists — private channels we're not a
  // member of are invisible and simply render no-op).
  const ch = State.current.channels.find(c => c.id === chId);
  if (!ch) {
    console.warn("permalink: channel not found", chId);
    return;
  }
  setState({ currentChannel: chId, threadOpen: null });
  // Give the render a frame, then scroll + flash.
  setTimeout(() => {
    const row = document.querySelector(`[data-msg-row="${CSS.escape(msgId)}"]`);
    if (!row) return;
    row.scrollIntoView({ block: "center", behavior: "smooth" });
    row.classList.add("msg-flash");
    setTimeout(() => row.classList.remove("msg-flash"), 1800);
  }, 80);
}

/* ------------------------------------------------------------
 *  §29  Attachments — Slice 3c
 *
 *  Sending path:
 *    1. Caller gives us a File (from input[type=file] or a drag
 *       event) and the target channel.
 *    2. We read it into a Uint8Array, enforce the 25MB cap.
 *    3. BlobStore.put encrypts with a fresh per-blob key, writes
 *       the ciphertext into OPFS, returns {blob_id, key, iv, size}.
 *    4. We build an `attachment.ref` envelope whose inner payload
 *       is {blob_id, key, iv, size, mime, name}. The envelope
 *       itself is encrypted under the channel key so the per-blob
 *       key never leaves the channel membership.
 *    5. Persist + broadcast. The attachment appears in the local
 *       projection as a message with `attachment` set instead of
 *       `body`.
 *
 *  Receiving path: handled in EnvelopeDispatch case "attachment.ref"
 *  below. Sender-side local playback is immediate (same OPFS).
 *  Remote peers see the envelope but need the raw blob bytes
 *  delivered separately — Slice 3c ships the envelope only; full
 *  blob transfer over the data channel is a Slice 3c follow-up
 *  tracked in PENDING.md.
 * ------------------------------------------------------------ */
/* ------------------------------------------------------------
 *  v1.1  Voice messages + video clips via MediaRecorder
 *  Capture audio or screen-video into a Blob, wrap as a File, and
 *  feed it to the existing sendAttachment pipeline. Inline <audio>
 *  and <video> players in the message list do the rest.
 * ------------------------------------------------------------ */
const MediaCapture = {
  _active: null,   // { stream, recorder, chunks, kind }

  async startAudio() {
    if (this._active) return;
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mime = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
      ? "audio/webm;codecs=opus"
      : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "audio/mp4");
    const recorder = new MediaRecorder(stream, { mimeType: mime });
    const chunks = [];
    recorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
    this._active = { stream, recorder, chunks, kind: "audio", mime };
    recorder.start();
  },

  async startVideo() {
    if (this._active) return;
    // getDisplayMedia: screen capture. User is prompted by the browser for
    // which surface to share. Audio option included for desktop screencasts.
    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    const mime = MediaRecorder.isTypeSupported("video/webm;codecs=vp9,opus")
      ? "video/webm;codecs=vp9,opus"
      : (MediaRecorder.isTypeSupported("video/webm") ? "video/webm" : "video/mp4");
    const recorder = new MediaRecorder(stream, { mimeType: mime });
    const chunks = [];
    recorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
    this._active = { stream, recorder, chunks, kind: "video", mime };
    // Stop if the user ends the capture via the browser's "Stop sharing" bar.
    stream.getVideoTracks()[0].addEventListener("ended", () => {
      if (this._active) this.stop().catch(() => {});
    });
    recorder.start();
  },

  isActive() { return !!this._active; },
  kind()     { return this._active?.kind; },

  async stop() {
    if (!this._active) return null;
    const { recorder, stream, chunks, kind, mime } = this._active;
    this._active = null;
    return new Promise((resolve) => {
      recorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunks, { type: mime });
        const ext = mime.includes("mp4") ? "mp4" : "webm";
        const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
        const name = (kind === "audio" ? "voice-" : "screen-") + stamp + "." + ext;
        resolve(new File([blob], name, { type: mime }));
      };
      recorder.stop();
    });
  },

  async cancel() {
    if (!this._active) return;
    const { recorder, stream } = this._active;
    this._active = null;
    try { recorder.stop(); } catch {}
    stream.getTracks().forEach(t => t.stop());
  },
};

async function sendAttachment(current, channelId, file) {
  if (!file) throw new Error("No file");
  if (file.size > MAX_ATTACHMENT_SIZE) {
    throw new Error(`Attachment too large (${(file.size/1024/1024).toFixed(1)}MB). Max is ${MAX_ATTACHMENT_SIZE/1024/1024}MB.`);
  }
  const bytes = new Uint8Array(await file.arrayBuffer());
  const stored = await BlobStore.put(current.meta.id, bytes);

  const ch = current.channels.find(c => c.id === channelId);
  const channelKey = current.channelKeys[ch.id];
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const userId = bytesToB64Url(State.identity.pubkey);

  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: ch.id,
    channelKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "attachment.ref",
    inner: {
      blob_id: stored.blob_id,
      key: stored.key,
      iv: stored.iv,
      size: stored.size,
      mime: file.type || "application/octet-stream",
      name: file.name
    },
    vectorClock: [[userId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "envelopes", env);

  // Project locally — attachment messages have `attachment` set.
  current.messages.push({
    id: env.id, ch: env.ch, from: env.from, ts: env.ts,
    body: "", attachment: {
      blob_id: stored.blob_id,
      key: stored.key,
      iv: stored.iv,
      size: stored.size,
      mime: file.type || "application/octet-stream",
      name: file.name,
      available: true   // sender always has the bytes
    },
    delivery: PeerMgr.hasPeers(current.meta.id) ? "sent" : "stored",
    edited: false, deleted: false, lc: env.lc
  });
  current.messages.sort((a, b) => a.ts - b.ts);

  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));
  return env;
}

/* ------------------------------------------------------------
 *  §30  Group DMs — Slice 3c
 *
 *  Simplified from the spec's sender-keys pattern (§5.2). For v1
 *  we treat group DMs as multi-member private channels with
 *  `dm: true`: one fresh AES channel key, wrapped per-member via
 *  ECDH, same envelope shape as private channels. This reuses all
 *  the existing machinery from §27 + 3b.2.
 *
 *  What's lost vs proper sender-keys:
 *    - No per-sender key rotation → removing a member from a
 *      group DM requires a full rekey (not just key retirement)
 *    - No forward secrecy improvements from chain key ratcheting
 *      (but v1 doesn't do FS anyway, so no regression)
 *
 *  These are v1.1 features — documented in PENDING.md.
 *
 *  What's preserved:
 *    - Non-members can't decrypt (per-member wrapping via ECDH)
 *    - Messages are signed → forgery resistance
 *    - Members without x25519_pub can't be added (pre-3b joiners)
 *
 *  A group DM has no deterministic channel id (unlike 1:1 DMs)
 *  because N! orderings get messy and because group membership
 *  is an intentional product of a "create" action, not a pure
 *  function of the parties.
 * ------------------------------------------------------------ */
async function createGroupDm(current, otherMembers) {
  if (otherMembers.length < 2) {
    throw new Error("Group DMs need at least 2 other people. Use a 1:1 DM instead.");
  }
  const myUserId = bytesToB64Url(State.identity.pubkey);
  for (const m of otherMembers) {
    if (!m.x25519_pub) {
      throw new Error(`${m.name} doesn't have X25519 keys yet — they joined before Slice 3b.`);
    }
  }
  // Compose a display name from the member names.
  const name = otherMembers.map(m => m.name).join(", ");
  const memberIds = [myUserId, ...otherMembers.map(m => m.id)];

  // Reuse sendChannelCreate with isPrivate + isDm. The isDm flag rides
  // inside the envelope's inner payload so every recipient's dispatch
  // handler projects the channel with dm: true.
  const ch = await sendChannelCreate(current, name, "", {
    isPrivate: true, isDm: true, memberIds
  });
  // Local projection needs the group-DM fields that the shared
  // sendChannelCreate doesn't set — it uses dm_with: null for group DMs
  // (1:1 DMs take the ensureDmChannel path and set dm_with to a user_id).
  ch.dm = true;
  ch.dm_with = null;
  await idbPut(current.wsDB, "channels", ch);

  // Publish our per-sender key for this group DM so members can decrypt
  // our messages. The shared channel key from sendChannelCreate remains
  // as fallback for older clients that predate sender-keys.
  await sendGroupDmSenderKey(current, ch, otherMembers);

  return ch;
}

/**
 * Publish (or refresh) our per-sender AES key for a group DM, wrapped
 * individually for each current member via X25519 ECDH. Recipients store
 * it under "sk:<channelId>:<myUserId>" and use it to decrypt our messages.
 *
 * Envelope type: "group_dm.sender_key", workspace-level, encrypted under
 * root key. Not ephemeral — persisted to the envelopes store so new joiners
 * who receive history can reconstruct the key on replay.
 */
async function sendGroupDmSenderKey(current, groupChannel, members) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const aesKey   = await Crypto.genAesKey();
  const rawKey   = await Crypto.exportAesRaw(aesKey);

  // Wrap the raw key per-member via X25519 ECDH (same pattern as private
  // channel creation in sendChannelCreate).
  const myX25519Priv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
  const wrapped_keys = {};
  const recipients   = (members || groupChannel.members || []).filter(m => {
    const id = typeof m === "string" ? m : m.id;
    return id !== myUserId;
  });
  for (const entry of recipients) {
    const mid    = typeof entry === "string" ? entry : entry.id;
    const member = current.members.find(m => m.id === mid);
    if (!member || !member.x25519_pub) continue;
    const theirPub = await Crypto.importX25519Pub(member.x25519_pub);
    const kek      = await Crypto.deriveX25519AesKey(myX25519Priv, theirPub);
    const iv       = Crypto.rand(12);
    const ct       = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, kek, rawKey));
    wrapped_keys[mid] = { iv, ct };
  }

  // Persist locally so we can use our own sender key immediately.
  await idbPut(current.wsDB, "keys", rawKey, "sk:" + groupChannel.id + ":" + myUserId);
  current.channelKeys[groupChannel.id + ":" + myUserId] = aesKey;

  // Broadcast the envelope.
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta    = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const env = await Envelope.build({
    workspaceId:   meta.id,
    channelId:     null,          // workspace-level
    channelKey:    current.rootKey,
    signKey,
    signerPubkey:  State.identity.pubkey,
    deviceId:      meta.device_id,
    type:          "group_dm.sender_key",
    inner:         { group_id: groupChannel.id, sender_id: myUserId, wrapped_keys },
    vectorClock:   [[myUserId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "envelopes", env);
  await PeerMgr.sendEnvelope(meta.id, env);
}

/* ------------------------------------------------------------
 *  §30  Presence — Slice 3d.3 (WT-24 partial, spec §4.1)
 *
 *  Ephemeral heartbeats. Every 30s while focused, the client
 *  broadcasts a `presence.update` envelope carrying its current
 *  status ("online" / "away" / "offline"). Recipients project
 *  into `bundle.presence[user_id] = {status, updated_at}` but
 *  never persist to IndexedDB. On reload, presence state resets.
 *
 *  Transitions:
 *    focus  → online
 *    blur   → away
 *    unload → offline (best-effort via beforeunload)
 *
 *  Stale sweep: a timer every 30s flips any entry >90s stale to
 *  "offline". Skipped for the local user's own entry, which is
 *  driven by window-focus events, not wall-clock age.
 *
 *  Own-presence is mirrored into the bundle immediately in
 *  `sendPresence` so the local sidebar reflects state changes
 *  without waiting for a network round trip (there isn't one
 *  for self-to-self).
 * ------------------------------------------------------------ */
const PRESENCE_INTERVAL_MS = 30_000;   // broadcast every 30s while focused
const PRESENCE_STALE_MS    = 90_000;   // peers silent >90s → marked offline

/**
 * Slice 4a: announce ourselves to the mesh. Broadcast to every
 * attached peer; rebroadcast logic ensures peers 2+ hops away
 * also learn about us. Workspace-level envelope encrypted under
 * the workspace root key. Fired by PeerMgr.attach so every new
 * connection results in fresh announcements flowing through the
 * mesh, and so peers who only joined recently learn about peers
 * who joined long ago.
 */
async function sendPeerAnnounce(current) {
  if (!current || !State.identity) return;
  if (!PeerMgr.hasPeers(current.meta.id)) return;
  try {
    const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
    const meta = current.meta;
    meta.lc_counter = (meta.lc_counter || 0) + 1;
    const myUserId = bytesToB64Url(State.identity.pubkey);
    const env = await Envelope.build({
      workspaceId: meta.id,
      channelId: null,
      channelKey: current.rootKey,
      signKey,
      signerPubkey: State.identity.pubkey,
      deviceId: meta.device_id,
      type: "gossip.peer_announce",
      inner: { peer: myUserId, devices: [meta.device_id] },
      vectorClock: [[myUserId, meta.lc_counter]]
    });
    // Mark seen immediately so the rebroadcast hop back to us is dropped.
    await SeenSet.add(meta.id, env.id);
    PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn("peer_announce send failed:", e));
  } catch (e) {
    console.warn("peer_announce build failed:", e);
  }
}

/* ------------------------------------------------------------
 *  Mesh auto-dial (offline-mesh spec §4)
 *
 *  Turns the sparse "one QR edge per joiner" topology into a
 *  bounded-degree gossip overlay that scales to a few dozen peers
 *  without full-mesh O(N²) connections or N QR scans. A peer already
 *  connected to the mesh (via any one edge) dials additional members
 *  by relaying its WebRTC offer THROUGH the mesh as `signal.relay`
 *  envelopes (forward-if-not-target); the target answers back the same
 *  way. Host candidates are already bundled in the SDP (gatheringComplete),
 *  so offer+answer is the whole handshake — no separate trickle-ICE.
 *
 *  Glare-free: for any pair, only the lexicographically-smaller user_id
 *  initiates, so each edge is dialed by exactly one side. Degree is
 *  bounded — we proactively dial up to TARGET, and accept inbound offers
 *  up to MAX.
 * ------------------------------------------------------------ */
const MESH_TARGET_DEGREE = 6;   // proactively dial up to this many neighbors
const MESH_MAX_DEGREE    = 12;  // accept inbound offers up to this many
const MESH_HEAL_INTERVAL_MS = 2000;  // periodic re-dial: retry missed offers, heal dropped edges
const MESH_DIAL_TIMEOUT_MS  = 5000;  // an unanswered offer expires so the target can be re-dialed

async function sendSignalRelay(current, targetUserId, targetDeviceId, kind, sdp, dialId) {
  const signKey  = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta     = current.meta;
  const myUserId = bytesToB64Url(State.identity.pubkey);
  // Ephemeral (like presence): do NOT advance lc_counter.
  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId:   null,
    channelKey:  current.rootKey,   // every mesh member can decrypt + forward
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId:    meta.device_id,
    type: "signal.relay",
    // dial_id ties an answer to a specific offer: after a re-dial the pending
    // transport is a NEW one, and a late answer for the expired offer must be
    // rejected rather than applied to it (which would corrupt the new pc).
    inner: { target_user_id: targetUserId, target_device_id: targetDeviceId || null, kind, sdp_frame: sdp, dial_id: dialId || null },
    vectorClock: [[myUserId, meta.lc_counter || 0]]
  });
  await SeenSet.add(meta.id, env.id);   // drop the rebroadcast hop back to us
  return PeerMgr.sendEnvelope(meta.id, env);
}

async function maybeDialMesh(current) {
  if (!current || !State.identity) return;
  const wsId     = current.meta.id;
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const peers    = PeerMgr.peers.get(wsId);
  if (!PeerMgr.pendingDials.has(wsId)) PeerMgr.pendingDials.set(wsId, new Map());
  const pending  = PeerMgr.pendingDials.get(wsId);

  // Expire unanswered offers so the target can be re-dialed. A relayed
  // offer/answer can be dropped (arriving before the forwarding peer's
  // channel is ready); without expiry the peer stays "pending" forever and
  // healing never retries it.
  const now = Date.now();
  for (const [id, entry] of pending) {
    if (now - entry.ts > MESH_DIAL_TIMEOUT_MS) {
      try { entry.transport.close(); } catch {}
      pending.delete(id);
    }
  }

  const degree = () => (peers?.size || 0) + pending.size;
  if (degree() >= MESH_TARGET_DEGREE) return;

  for (const m of current.members) {
    if (degree() >= MESH_TARGET_DEGREE) break;
    if (m.id === myUserId) continue;
    if (peers?.has(m.id) || pending.has(m.id)) continue;
    if (myUserId >= m.id) continue;   // deterministic initiator — smaller id dials
    try {
      const transport = await WebRTCTransport.asInviter({ offline: isOffline() });
      const dialId = bytesToB64Url(Crypto.rand(6));
      pending.set(m.id, { transport, ts: Date.now(), dial_id: dialId });   // set BEFORE await-send so degree() counts it
      await sendSignalRelay(current, m.id, null, "offer", transport.localSdp(), dialId);
    } catch (e) {
      pending.delete(m.id);
      console.warn("mesh dial failed for", (m.id || "").slice(0, 8), e);
    }
  }
}

async function handleSignalRelay(current, env, inner) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  if (!inner || inner.target_user_id !== myUserId) return;  // forwarding handled by the mesh
  const wsId = current.meta.id;
  const from = env.from;
  const peers = PeerMgr.peers.get(wsId);
  if (inner.kind === "offer") {
    const existing = peers?.get(from);
    if (existing && existing.transport.status === "connected") return;  // already live
    // Stale/half-open entry (we attached on a prior offer whose answer was
    // lost, so it's stuck "connecting"): replace it, or re-dials are ignored
    // forever by the has(from) check and the edge never forms.
    if (existing) PeerMgr.detach(wsId, from);
    if (PeerMgr.peerCount(wsId) >= MESH_MAX_DEGREE) return;         // degree cap
    if (!inner.sdp_frame) return;
    const transport = await WebRTCTransport.asJoiner(inner.sdp_frame, { offline: isOffline() });
    PeerMgr.attach(wsId, transport, from);
    await sendSignalRelay(current, from, inner.target_device_id, "answer", transport.localSdp(), inner.dial_id);
  } else if (inner.kind === "answer") {
    const entry = PeerMgr.pendingDials.get(wsId)?.get(from);
    // Reject a stale answer (dial_id mismatch) — it's for an expired offer and
    // would corrupt the current pending transport if applied.
    if (!entry || !inner.sdp_frame || entry.dial_id !== inner.dial_id) return;
    PeerMgr.pendingDials.get(wsId).delete(from);
    await entry.transport.acceptAnswer(inner.sdp_frame);
    PeerMgr.attach(wsId, entry.transport, from);
  }
}

/**
 * Slice 4b.2: broadcast an incremental Yjs update as a `workspace.patch`
 * envelope. Called after any local `WorkspaceDoc.setName` / `addChannel`
 * / `addMember` / etc. mutation that produced an update blob.
 *
 * Also persists the updated doc to IDB and, for name changes, mirrors
 * into the legacy kv `workspace_meta` record + the global workspaces
 * list so pre-migration code paths continue to see the new name.
 */
async function sendWorkspacePatch(current, updateBytes) {
  if (!current || !State.identity) return;
  if (!updateBytes || updateBytes.length === 0) return;

  // Persist the updated local doc snapshot.
  await WorkspaceDoc.save(current.wsDB, current.doc);

  // Mirror name into legacy kv + global workspaces list.
  const newName = WorkspaceDoc.getName(current.doc);
  if (newName && newName !== current.meta.name) {
    current.meta.name = newName;
    await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
    const gwsRec = await idbGet(State.globalDB, "workspaces", current.meta.id);
    if (gwsRec) {
      gwsRec.name = newName;
      await idbPut(State.globalDB, "workspaces", gwsRec);
    }
    // Refresh the in-memory workspaces list so the launcher sees it.
    State.workspaces = await idbGetAll(State.globalDB, "workspaces");
  }

  // Build the envelope. workspace.patch is workspace-level
  // (ch: null), encrypted under the workspace root key like
  // every other admin-tier envelope.
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const myUserId = bytesToB64Url(State.identity.pubkey);

  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: null,
    channelKey: current.rootKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "workspace.patch",
    inner: { update: updateBytes },
    vectorClock: [[myUserId, meta.lc_counter]]
  });

  // Persist to the envelopes store (these are NOT ephemeral — they
  // should survive reload and replay so new peers catch up on any
  // workspace metadata changes they missed).
  await idbPut(current.wsDB, "envelopes", env);

  // Broadcast to all attached peers. sendEnvelope auto-marks in
  // SeenSet so rebroadcast-back-to-us gets dropped.
  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn("workspace.patch send failed:", e));
}

/**
 * Typing indicators (spec §4.1 — `typing.start`).
 * Broadcast to workspace peers via the ephemeral envelope path. No
 * persistence, no history — receivers keep the note alive for a short
 * window and drop it on a timer. The sender-side debounce keeps us from
 * posting a new envelope on every keystroke.
 */
const TypingMgr = {
  _lastSentAt: 0,
  // Receiver-side projection: Map<channelId, Map<userId, until_ts>>
  _fading: new Map(),

  // Sender: debounced "I'm typing". Safe to call on every keystroke.
  async notify(current, channelId) {
    if (!current || !State.identity) return;
    if (!PeerMgr.hasPeers(current.meta.id)) return;
    // Debounce — one envelope per 2.5s per channel.
    const now = Date.now();
    if (now - this._lastSentAt < 2500) return;
    this._lastSentAt = now;

    const ch = current.channels.find(c => c.id === channelId);
    if (!ch || ch.canvas) return;   // canvas channels have no messages to signal typing in
    const channelKey = current.channelKeys[channelId] || current.rootKey;
    try {
      const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
      const meta = current.meta;
      // Ephemeral: do NOT advance lc_counter (see sendPresence) — typing.start
      // is not causally tracked on receive, so bumping would strand the next
      // real envelope behind an unfillable gap. Emit at the current counter.
      const lc = meta.lc_counter || 0;
      const env = await Envelope.build({
        workspaceId: meta.id,
        channelId,
        channelKey,
        signKey,
        signerPubkey: State.identity.pubkey,
        deviceId: meta.device_id,
        type: "typing.start",
        inner: {},
        vectorClock: [[bytesToB64Url(State.identity.pubkey), lc]]
      });
      PeerMgr.sendEnvelope(meta.id, env).catch(() => {});
    } catch (e) { console.warn("typing.start build failed:", e); }
  },

  // Receiver: note the sender as typing in that channel for 6s.
  // Re-notifying extends the window.
  mark(channelId, userId) {
    if (!channelId || !userId) return;
    let inner = this._fading.get(channelId);
    if (!inner) { inner = new Map(); this._fading.set(channelId, inner); }
    inner.set(userId, Date.now() + 6000);
    // Sweep stale entries every call — cheap, bounded by member count.
    this._sweep();
  },

  _sweep() {
    const now = Date.now();
    for (const [chId, inner] of this._fading) {
      for (const [uid, until] of inner) {
        if (until <= now) inner.delete(uid);
      }
      if (inner.size === 0) this._fading.delete(chId);
    }
  },

  activeIn(channelId) {
    this._sweep();
    const inner = this._fading.get(channelId);
    if (!inner) return [];
    return [...inner.keys()];
  },
};

async function sendPresence(current, status) {
  if (!current || !State.identity) return;
  const myUserId = bytesToB64Url(State.identity.pubkey);

  // Slice F1-A: include custom status (text + emoji) in the envelope if
  // the user has set one on this identity. Persisted on the identity
  // record so it survives reload; cleared via `setCustomStatus(null)`.
  const cs = State.identity.custom_status;
  const customPayload = (cs && (cs.text || cs.emoji))
    ? { text: (cs.text || "").slice(0, 80), emoji: (cs.emoji || "").slice(0, 8) }
    : null;

  // Mirror locally first — even if the broadcast fails (no peer attached),
  // the sidebar should still reflect our own state.
  if (!current.presence) current.presence = {};
  current.presence[myUserId] = {
    status,
    custom: customPayload,
    updated_at: Date.now()
  };

  // No peer → nothing to broadcast. The local update above is enough.
  if (!PeerMgr.hasPeers(current.meta.id)) {
    if (State.view === "workspace") render();
    return;
  }

  try {
    const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
    const meta = current.meta;
    // Ephemeral: do NOT advance lc_counter. Presence is not causally tracked
    // on receive (EPHEMERAL_TYPES skip CausalBuffer.advance), so a bump here
    // would consume a sequence number that no receiver's hwm ever advances
    // past — leaving a permanent gap that strands the next real envelope in
    // the causal buffer. Emit at the current counter as a concurrent marker.
    const lc = meta.lc_counter || 0;
    const inner = { status };
    if (customPayload) inner.custom = customPayload;
    const env = await Envelope.build({
      workspaceId: meta.id,
      channelId: null,               // workspace-level envelope
      channelKey: current.rootKey,   // encrypted under root key
      signKey,
      signerPubkey: State.identity.pubkey,
      deviceId: meta.device_id,
      type: "presence.update",
      inner,
      vectorClock: [[myUserId, lc]]
    });
    // NO idbPut — presence is ephemeral (§EPHEMERAL_TYPES).
    PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn("presence send failed:", e));
  } catch (e) {
    console.warn("presence build failed:", e);
  }
  if (State.view === "workspace") render();
}

/**
 * Slice F1-A: set or clear the current user's custom status. Persists
 * to the identity record so it survives reload, and broadcasts a fresh
 * presence heartbeat so peers pick it up without waiting 30s.
 */
async function setCustomStatus(status) {
  if (!State.identity) return;
  if (status && (status.text || status.emoji)) {
    State.identity.custom_status = {
      text: (status.text || "").slice(0, 80),
      emoji: (status.emoji || "").slice(0, 8),
      set_at: Date.now(),
    };
  } else {
    delete State.identity.custom_status;
  }
  await Identity.save(State.globalDB, State.identity);
  if (State.current) {
    const s = document.hasFocus() ? "online" : "away";
    await sendPresence(State.current, s);
  }
}

// Module-level heartbeat state. Cleared on workspace close so a new
// workspace open gets a fresh driver tied to its own bundle.
const PresenceDriver = {
  _interval: null,
  _staleTimer: null,
  _meshTimer: null,
  _focusHandler: null,
  _blurHandler: null,
  _unloadHandler: null,

  start(current) {
    this.stop();   // idempotent — tearing down any prior driver

    // Initial heartbeat — publish our current focus state.
    const initialStatus = document.hasFocus() ? "online" : "away";
    sendPresence(current, initialStatus);

    // Recurring heartbeat while focused. While blurred we still run the
    // interval (cheap) but send "away" each time, so peers don't wrongly
    // flip us to offline after 90s of inactivity.
    this._interval = setInterval(() => {
      const status = document.hasFocus() ? "online" : "away";
      sendPresence(current, status);
    }, PRESENCE_INTERVAL_MS);

    // Mesh self-healing (spec §4): retry missed dials and re-form dropped
    // edges toward the target degree. Event-triggered dialing alone is
    // lossy — a relayed offer/answer can arrive before the forwarding peer's
    // channel is ready and simply be dropped, with nothing to retry it.
    this._meshTimer = setInterval(() => {
      maybeDialMesh(current).catch(() => {});
    }, MESH_HEAL_INTERVAL_MS);

    // Focus/blur transitions — immediate, not waiting for the next tick.
    this._focusHandler = () => sendPresence(current, "online");
    this._blurHandler  = () => sendPresence(current, "away");
    window.addEventListener("focus", this._focusHandler);
    window.addEventListener("blur",  this._blurHandler);

    // Best-effort final heartbeat on unload. beforeunload is unreliable
    // (mobile tab close doesn't fire it, background-killed tabs skip it),
    // but when it does fire the broadcast at least gives peers a chance
    // to transition us to "offline" before the 90s stale sweep catches us.
    this._unloadHandler = () => {
      try { sendPresence(current, "offline"); } catch {}
    };
    window.addEventListener("beforeunload", this._unloadHandler);

    // Stale sweep — every 30s, flip any peer whose updated_at is >90s
    // ago to "offline". Skip our own entry (focus-driven, not aged).
    this._staleTimer = setInterval(() => {
      const myUserId = bytesToB64Url(State.identity.pubkey);
      const now = Date.now();
      let changed = false;
      for (const [uid, entry] of Object.entries(current.presence || {})) {
        if (uid === myUserId) continue;
        if (entry.status === "offline") continue;
        if (now - entry.updated_at > PRESENCE_STALE_MS) {
          entry.status = "offline";
          changed = true;
        }
      }
      if (changed && State.view === "workspace") render();
    }, PRESENCE_INTERVAL_MS);
  },

  stop() {
    if (this._interval)    { clearInterval(this._interval);    this._interval = null; }
    if (this._staleTimer)  { clearInterval(this._staleTimer);  this._staleTimer = null; }
    if (this._meshTimer)   { clearInterval(this._meshTimer);   this._meshTimer = null; }
    if (this._focusHandler)  { window.removeEventListener("focus",  this._focusHandler);  this._focusHandler = null; }
    if (this._blurHandler)   { window.removeEventListener("blur",   this._blurHandler);   this._blurHandler = null; }
    if (this._unloadHandler) { window.removeEventListener("beforeunload", this._unloadHandler); this._unloadHandler = null; }
  }
};

/* ============================================================
 *  §31  Search — local + cross-workspace (Slice 5 / WT-18, WT-19)
 *
 *  MiniSearch is loaded lazily from esm.sh the first time the palette
 *  opens. The current workspace's messages are indexed in-memory each
 *  time the palette opens (fast — messages are already decrypted in
 *  State.current.messages). Other workspaces are indexed from their
 *  pre-built plaintext `search_index` IDB store (written as messages
 *  arrive). Results from all sources are merged and ranked by score.
 * ============================================================ */
let MiniSearch = null;

const SearchIndex = {
  /**
   * Add a single decrypted message record to a workspace's on-disk
   * plaintext index. Called by dispatch after each message.create +
   * attachment.ref projects. Non-blocking — failures are silently
   * swallowed so a search-index write never disrupts the message flow.
   */
  async addMessage(wsDB, msg) {
    if (!msg.body || msg.deleted) return;
    try {
      const rec = {
        id:   msg.id,
        body: msg.body,
        from: msg.from,
        ch:   msg.ch,
        ts:   msg.ts
      };
      await idbPut(wsDB, "search_index", rec, msg.id);
    } catch (_) { /* non-fatal */ }
  },

  /** Load all records from the on-disk index for one workspace. */
  async loadIndex(wsDB) {
    try { return await idbGetAll(wsDB, "search_index"); }
    catch (_) { return []; }
  }
};

/* ------------------------------------------------------------
 *  Slice Q1  ⌘K quick switcher
 *  Unified palette for jumping between channels, DMs, and members.
 *  Channels: switch to them. DMs: switch to them. Members (not yet
 *  DM'd): open/start a 1:1 DM. An "escape hatch" at the bottom
 *  invokes the message-search palette (⌘⇧F) with the typed query.
 * ------------------------------------------------------------ */
function openQuickSwitcher() {
  if (!State.current) return;
  if (document.querySelector(".switcher-overlay")) return;

  const current = State.current;
  const myUserId = bytesToB64Url(State.identity.pubkey);

  // Build target list: channels (non-DM first), DMs, then members who
  // don't already have a DM. Each target has a stable id + render() + go().
  const buildTargets = () => {
    const targets = [];
    // Public + private channels (skip DMs here; they appear below)
    for (const c of current.channels) {
      if (c.dm) continue;
      targets.push({
        kind: "channel",
        key: "ch:" + c.id,
        label: c.name,
        subtitle: c.topic || (c.private ? "Private channel" : "Channel"),
        icon: c.private ? "🔒" : "#",
        match: [c.name, c.topic || ""].join(" "),
        go: () => setState({ currentChannel: c.id, threadOpen: null }),
      });
    }
    // DMs (1:1 + group)
    for (const c of current.channels) {
      if (!c.dm) continue;
      const other = c.dm_with ? current.members.find(m => m.id === c.dm_with) : null;
      const label = other ? other.name : c.name;
      targets.push({
        kind: "dm",
        key: "ch:" + c.id,
        label,
        subtitle: c.dm_with ? "Direct message" : "Group DM",
        icon: c.dm_with ? "●" : "◎",
        iconColor: c.dm_with ? avatarColorFor(c.dm_with) : null,
        match: label,
        go: () => setState({ currentChannel: c.id, threadOpen: null }),
      });
    }
    // Members without an existing DM — clicking starts one.
    const dmPartnerIds = new Set(
      current.channels.filter(c => c.dm && c.dm_with).map(c => c.dm_with)
    );
    for (const m of current.members) {
      if (m.id === myUserId) continue;
      if (dmPartnerIds.has(m.id)) continue;
      targets.push({
        kind: "member",
        key: "mem:" + m.id,
        label: m.name,
        subtitle: "Start a DM",
        icon: "●",
        iconColor: avatarColorFor(m.id),
        match: m.name,
        go: async () => {
          try {
            const ch = await ensureDmChannel(current, m);
            setState({ currentChannel: ch.id, threadOpen: null });
          } catch (e) {
            alert("Couldn't start DM: " + e.message);
          }
        },
      });
    }
    return targets;
  };

  const allTargets = buildTargets();

  const overlay = document.createElement("div");
  overlay.className = "search-overlay switcher-overlay";
  overlay.innerHTML = `
    <div class="search-palette">
      <div class="search-input-row">
        <span class="search-input-icon">⌕</span>
        <input id="switcher-input" type="text" placeholder="Jump to a channel, DM, or person…" autocomplete="off">
        <span class="search-kbd">Esc</span>
      </div>
      <div class="search-results" id="switcher-results"></div>
    </div>
  `;
  document.body.appendChild(overlay);

  const $input = overlay.querySelector("#switcher-input");
  const $results = overlay.querySelector("#switcher-results");
  $input.focus();

  overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });

  let activeIdx = 0;
  let filtered = allTargets.slice(0, 12);

  const iconSpan = (t) => t.iconColor
    ? `<span class="switcher-icon" style="background: ${t.iconColor}; color: white;">${escapeHTML(initials(t.label))}</span>`
    : `<span class="switcher-icon plain">${escapeHTML(t.icon)}</span>`;

  const renderList = (query) => {
    const q = query.trim().toLowerCase();
    if (q === "") {
      filtered = allTargets.slice(0, 12);
    } else {
      filtered = allTargets
        .map(t => ({ t, idx: t.match.toLowerCase().indexOf(q) }))
        .filter(({ idx }) => idx >= 0)
        // Prefer prefix matches, then shorter labels, stable by existing order
        .sort((a, b) => a.idx - b.idx || a.t.label.length - b.t.label.length)
        .slice(0, 12)
        .map(({ t }) => t);
    }
    if (activeIdx >= filtered.length) activeIdx = 0;
    const searchFallback = q
      ? `<div class="switcher-row switcher-fallback ${activeIdx === filtered.length ? "active" : ""}" data-fallback="1">
           <span class="switcher-icon plain">⌕</span>
           <div class="switcher-body">
             <div class="switcher-label">Search messages for "${escapeHTML(q)}"</div>
             <div class="switcher-sub">Open the message search (⌘⇧F)</div>
           </div>
         </div>`
      : "";
    $results.innerHTML = filtered.length === 0 && !q
      ? `<div class="search-empty">Nothing to jump to yet.</div>`
      : filtered.map((t, i) => `
          <div class="switcher-row ${i === activeIdx ? "active" : ""}" data-idx="${i}">
            ${iconSpan(t)}
            <div class="switcher-body">
              <div class="switcher-label">${escapeHTML(t.label)}</div>
              <div class="switcher-sub">${escapeHTML(t.subtitle)}</div>
            </div>
          </div>
        `).join("") + searchFallback;
    $results.querySelectorAll(".switcher-row").forEach(el => {
      el.onmousedown = (ev) => {
        ev.preventDefault();
        if (el.dataset.fallback) { activeIdx = filtered.length; pick(); }
        else { activeIdx = parseInt(el.dataset.idx, 10); pick(); }
      };
    });
  };

  const pick = () => {
    const q = $input.value.trim();
    if (q && activeIdx === filtered.length) {
      // Fallback row → message search
      overlay.remove();
      openSearchPalette().then(() => {
        const si = document.getElementById("search-input");
        if (si) { si.value = q; si.dispatchEvent(new Event("input", { bubbles: true })); }
      });
      return;
    }
    const target = filtered[activeIdx];
    if (!target) return;
    overlay.remove();
    Promise.resolve(target.go()).catch(console.warn);
  };

  $input.oninput = () => renderList($input.value);
  $input.onkeydown = (e) => {
    const max = filtered.length + ($input.value.trim() ? 1 : 0);
    if (e.key === "ArrowDown") { e.preventDefault(); activeIdx = (activeIdx + 1) % max; renderList($input.value); }
    else if (e.key === "ArrowUp") { e.preventDefault(); activeIdx = (activeIdx - 1 + max) % max; renderList($input.value); }
    else if (e.key === "Enter") { e.preventDefault(); pick(); }
  };
  renderList("");
}

/**
 * Open the search command palette (Cmd/Ctrl+Shift+F).
