        bundle.pendingJoin.grant,
        new Promise(res => setTimeout(() => res(null), 10_000)),
      ]);
      await sendMemberJoin(bundle, selfMember, grant);
    });

    setState({ view: "join-waiting" });
  } catch (e) {
    console.error(e);
    setState({ view: "error", error: new Error("Join failed: " + e.message) });
  }
}

// Inviter side: sign a grant for `joinerUserId` and push it over the transport
// once the data channel is open, so the joiner can attach it to member.join.
async function issueAdmissionGrant(current, transport, joinerUserId) {
  const grant = await createAdmissionGrant(joinerUserId, current.meta.id);
  transport.opened.then(async () => {
    const meta = current.meta;
    meta.lc_counter = (meta.lc_counter || 0) + 1;
    const env = await Envelope.build({
      workspaceId: meta.id, channelId: null, channelKey: current.rootKey,
      signKey: await Crypto.importSignKey(State.identity.privkey_pkcs8),
      signerPubkey: State.identity.pubkey, deviceId: meta.device_id,
      type: "join.grant", inner: { grant },
      vectorClock: [[bytesToB64Url(State.identity.pubkey), meta.lc_counter]],
    });
    // Only the joiner is connected at this point; the grant reaches them.
    await PeerMgr.sendEnvelope(meta.id, env);
  }).catch(e => console.warn("grant send:", e));
}

async function sendMemberJoin(current, selfMember, grant) {
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const userId = bytesToB64Url(State.identity.pubkey);
  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: null,
    channelKey: current.rootKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "member.join",
    inner: {
      profile: { name: selfMember.name, color: selfMember.color },
      // C2: the nonce the inviter must echo back in member.welcome. Binds
      // the welcome to THIS join request rather than letting any root-key
      // holder push a snapshot at us whenever they like.
      join_nonce: current.pendingJoin?.nonce,
      // Admission grant, signed by the inviter, binding our identity key.
      // Peers accept this member.join only if the grant verifies.
      grant,
      devices: selfMember.devices,
      x25519_pub: State.identity.x25519_pub,  // Slice 3b: joiner publishes
                                              // their X25519 pubkey so the
                                              // existing members can wrap
                                              // private channel keys for
                                              // them and derive DM keys.
      bridge_name: BridgeMgr.name(meta.id) || undefined  // office label for sidebar grouping
    },
    vectorClock: [[userId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "envelopes", env);
  await PeerMgr.sendEnvelope(meta.id, env);
}

/**
 * C2 fallout: a joiner drops any member.welcome that doesn't echo its nonce.
 * That is correct, but against a client built before C2 the welcome never
 * carries one — so the join stalls on "Waiting…" with no error, looking
 * exactly like a dead connection while the inviter's side looks successful.
 *
 * There's no version on the wire to detect this properly, so use the only
 * honest signal available: we connected and then nothing completed the join.
 * Say what to check rather than spinning forever.
 */
function armJoinStallHint() {
  if (State._joinStallTimer) clearTimeout(State._joinStallTimer);
  State._joinStallTimer = setTimeout(() => {
    if (State.view !== "join-waiting") return;
    const el = document.getElementById("wait-msg");
    if (!el) return;
    el.innerHTML = `Still waiting. If they've already accepted, one of you may be running an
      older version of Mehfil — reload both sides on the same version and try a fresh invite.`;
    el.style.color = "var(--warn)";
  }, 45_000);
}

function renderJoinWaiting() {
  // Offline-mesh spec §3.3: a scanned join sends the answer back as a
  // cycling QR the inviter scans, not a URL to copy.
  if (State.join.viaScan) { armJoinStallHint(); return renderJoinScanReply(); }
  const url = State.join.replyUrl;
  $app.innerHTML = `
    <div class="center">
      <div class="card invite-panel">
        <h1>One more step</h1>
        <p class="sub">Send this URL back to <strong>${escapeHTML(State.join.payload.inviter_name)}</strong>. Once they paste it in their invite panel, you'll both connect and land in the workspace.</p>
        <div class="url-box" id="reply-url-box">${escapeHTML(url)}</div>
        <div class="row">
          <button id="copy-reply">Copy link</button>
          <div class="grow"></div>
          <span class="sub" id="wait-msg">Waiting for them to accept…</span>
        </div>
      </div>
    </div>
  `;
  armJoinStallHint();
  document.getElementById("copy-reply").onclick = async () => {
    try {
      await navigator.clipboard.writeText(url);
      document.getElementById("copy-reply").textContent = "Copied ✓";
    } catch {
      const range = document.createRange();
      range.selectNode(document.getElementById("reply-url-box"));
      getSelection().removeAllRanges();
      getSelection().addRange(range);
    }
  };
}

/**
 * Offline-mesh spec §3.3: joiner's reply screen. Renders the answer SDP as
 * a cycling QR for the inviter to scan back. The data channel opens when
 * they accept it, and member.welcome then transitions us into the
 * workspace shell — the cycling QR self-terminates when this view unmounts.
 */
function renderJoinScanReply() {
  const p = State.join.payload;
  $app.innerHTML = `
    <div class="center">
      <div class="card invite-panel">
        <h1>Show them this code</h1>
        <p class="sub">Hold this up to <strong>${escapeHTML(p.inviter_name)}</strong>'s camera. They tap <strong>Scan their reply</strong> to finish. You'll both land in the workspace the moment it connects.</p>
        <div id="reply-qr-holder"><span class="sub">building code…</span></div>
        <p class="sub" id="reply-wait" style="text-align: center; margin-top: 12px;">Waiting to connect…</p>
      </div>
    </div>
  `;
  if (State.join._cyc) { State.join._cyc.stop(); State.join._cyc = null; }
  QRFrames.encode({ r: State.join.replyFrag })
    .then(frames => CyclingQR.render(document.getElementById("reply-qr-holder"), frames))
    .then(ctrl => { if (State.view === "join-waiting" && State.join) State.join._cyc = ctrl; else ctrl.stop(); })
    .catch(e => {
      const h = document.getElementById("reply-qr-holder");
      if (h) h.innerHTML = `<span class="sub" style="color: var(--danger);">${escapeHTML(e.message)}</span>`;
    });
}

/* ------------------------------------------------------------
 *  §14  SDP codec — compress RTCSessionDescription for URL fragment
 *
 *  SDP is verbose (~2-4KB). The browser already ships a deflate
 *  implementation via CompressionStream, so we lean on it instead
 *  of vendoring a compressor. Typical compression ratio ~3x →
 *  final fragment is ~1-1.5KB, fits comfortably in a QR code.
 *
 *  CompressionStream is supported in Chrome 80+, Firefox 113+,
 *  Safari 16.4+. Same minimum-browser bar as Ed25519 in Web Crypto.
 * ------------------------------------------------------------ */
const SDPCodec = {
  async compress(text) {
    const stream = new Blob([text]).stream().pipeThrough(new CompressionStream("deflate-raw"));
    const buf = await new Response(stream).arrayBuffer();
    return new Uint8Array(buf);
  },
  async decompress(bytes) {
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
    const buf = await new Response(stream).arrayBuffer();
    return new TextDecoder().decode(buf);
  }
};

/* ------------------------------------------------------------
 *  §15  Trust card — deterministic 2×2 visual hash
 *
 *  Per spec §2: the same 16-byte fingerprint deterministically
 *  renders to a small grid of 4 colored geometric shapes. This
 *  turns verification from homework into pattern-matching — users
 *  compare "two red triangles and a blue square" across devices
 *  rather than staring at hex.
 *
 *  Rendering: 2×2 grid of tiles. Each tile's bytes pick shape
 *  (circle/square/triangle/diamond), color (from an 8-hue palette),
 *  and rotation (0/90/180/270°). 16 bytes → 4 tiles × 4 bytes each.
 * ------------------------------------------------------------ */
const TrustCard = {
  shapes: ["circle", "square", "triangle", "diamond"],
  // High-contrast palette, same 8 colors as avatar colors (§16 below).
  palette: ["#ef4444", "#f59e0b", "#10b981", "#06b6d4", "#3b82f6", "#8b5cf6", "#ec4899", "#64748b"],

  /** Render a 96×96 SVG trust card from 16 fingerprint bytes. */
  render(fpBytes, size = 96) {
    const tile = size / 2;
    const tiles = [0, 1, 2, 3].map(i => {
      const o = i * 4;
      return {
        shape: this.shapes[fpBytes[o] & 0x03],
        color: this.palette[fpBytes[o + 1] & 0x07],
        rotate: (fpBytes[o + 2] & 0x03) * 90
        // S3: `variant` (fpBytes[o+3] & 0x01) was computed here and never read
        // by render(), so every 4th fingerprint byte contributed nothing to the
        // trust card. Removed the dead field. (Widening the card to use those
        // bytes would raise its discriminating power but changes the security
        // visual for existing users — left for a deliberate human call.)
      };
    });
    const parts = [`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="border-radius: 8px; background: var(--bg-sunken);">`];
    for (let i = 0; i < 4; i++) {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const cx = col * tile + tile / 2;
      const cy = row * tile + tile / 2;
      const t = tiles[i];
      const r = tile * 0.38;
      parts.push(`<g transform="translate(${cx} ${cy}) rotate(${t.rotate})">`);
      if (t.shape === "circle") {
        parts.push(`<circle r="${r}" fill="${t.color}"/>`);
      } else if (t.shape === "square") {
        parts.push(`<rect x="${-r}" y="${-r}" width="${2*r}" height="${2*r}" fill="${t.color}"/>`);
      } else if (t.shape === "triangle") {
        const h = r * 1.1;
        parts.push(`<polygon points="0,${-h} ${r},${h*0.6} ${-r},${h*0.6}" fill="${t.color}"/>`);
      } else if (t.shape === "diamond") {
        parts.push(`<polygon points="0,${-r} ${r},0 0,${r} ${-r},0" fill="${t.color}"/>`);
      }
      parts.push(`</g>`);
    }
    parts.push(`</svg>`);
    return parts.join("");
  },

  /** Render from a 32-byte Ed25519 pubkey — hashes it first. */
  async renderFromPubkey(pubkey, size = 96) {
    const h = await Crypto.sha256(pubkey);
    return this.render(h.slice(0, 16), size);
  }
};

/* ------------------------------------------------------------
 *  §16  Avatar colors — 8-hue palette, matches trust card
 * ------------------------------------------------------------ */
const AVATAR_COLORS = TrustCard.palette;

function avatarColorFor(userId) {
  // Deterministic pick so every device renders the same color for a
  // given user without needing to sync a color choice.
  const bytes = b64UrlToBytes(userId);
  return AVATAR_COLORS[bytes[0] & 0x07];
}

/* ------------------------------------------------------------
 *  §17  QR encoder — vendored, inlined, zero network
 *
 *  Originally lazy-loaded from esm.sh, which fails in exactly the
 *  scenario the offline-mesh spec targets (no internet). The
 *  encoder (qrcode-generator, MIT) is now inlined as `window.qrcode`
 *  in the vendor <script> above, so codes generate with no network —
 *  see MEHFIL-OFFLINE-MESH-SPEC.md §5, §10. `toString()` builds a
 *  scalable SVG from the module matrix. `load()` is retained as a
 *  resolved no-op so existing callers don't need to change.
 * ------------------------------------------------------------ */
const QR = {
  async load() { return true; },
  /**
   * Build a scalable SVG QR from `text` at error-correction `ec`
   * ("L" | "M" | "Q" | "H"). Type number 0 auto-fits the smallest
   * version. `scalable` yields a viewBox-based SVG the container sizes.
   */
  _svg(text, ec) {
    if (typeof window === "undefined" || !window.qrcode) {
      throw new Error("QR encoder unavailable.");
    }
    const q = window.qrcode(0, ec);
    q.addData(text);            // byte mode (base64url has "-"/"_", not alnum-QR)
    q.make();
    return q.createSvgTag({ cellSize: 4, margin: 2, scalable: true });
  },
  async toSVG(text) { return this._svg(text, "L"); },
  /**
   * QR for an offline multi-frame handshake frame (QRFrames §3.2). These
   * carry the whole SDP + ICE set with no channel to trickle over, so the
   * payload is denser than an invite URL — we drop to error-correction "M"
   * for capacity while keeping frames small enough to scan off a phone.
   */
  async toSVGFrame(text) { return this._svg(text, "M"); }
};

/* ------------------------------------------------------------
 *  §17a  Offline detection + multi-frame QR SDP codec
 *
 *  Implements the offline-mesh bootstrap spec (MEHFIL-OFFLINE-MESH-SPEC.md).
 *
 *  `isOffline()` — the single source of truth for "no internet uplink."
 *  Drives host-only ICE (§2) and the Offline-mesh badge (§6). We treat
 *  `navigator.onLine === false` as authoritative; note it only means "no
 *  network interface has a default route," which is exactly the phone-
 *  hotspot-with-no-uplink case this spec targets.
 *
 *  `QRFrames` — splits an SDP handshake payload too large for one QR
 *  frame into a sequence of scannable frames (spec §3.2):
 *
 *      MHFL1|<frame_idx>|<frame_count>|<payload_hash8>|<payload_chunk>
 *
 *  The receiver buffers by frame_idx, reassembles once frame_count frames
 *  are collected (order-independent), verifies payload_hash8 against the
 *  reassembled payload, and only then decompresses + parses — so a bad
 *  scan surfaces as "damaged, try again" instead of a malformed-SDP throw.
 *  Single-frame payloads (frame_count === 1) need no special-casing and
 *  degrade to the §7.2 static-QR behavior.
 * ------------------------------------------------------------ */
function isOffline() {
  try { return navigator.onLine === false; } catch { return false; }
}

const QRFrames = {
  MAGIC: "MHFL1",
  // Per-frame b64url-char budget. Conservative default for reliable phone-
  // camera scanning at EC level M; the M0 hardware spike (spec §8) tunes
  // this against real devices — deliberately not asserted as final here.
  FRAME_BUDGET: 700,

  /** First 8 hex chars of SHA-256(payloadStr). */
  async _hash8(str) {
    const h = await Crypto.sha256(new TextEncoder().encode(str));
    return Array.from(h.slice(0, 4)).map(b => b.toString(16).padStart(2, "0")).join("");
  },

  /**
   * Encode a JSON-able object (typically {type, sdp}) into an ordered
   * array of QR frame strings. deflate-raw + base64url keeps the payload
   * as small as the gathered candidate set allows.
   */
  async encode(obj, budget = this.FRAME_BUDGET) {
    const json = JSON.stringify(obj);
    const compressed = await SDPCodec.compress(json);
    const payload = bytesToB64Url(compressed);
    const hash8 = await this._hash8(payload);
    const chunks = [];
    for (let i = 0; i < payload.length; i += budget) chunks.push(payload.slice(i, i + budget));
    if (chunks.length === 0) chunks.push("");
    const count = chunks.length;
    return chunks.map((c, i) => `${this.MAGIC}|${i}|${count}|${hash8}|${c}`);
  },

  /** Parse one scanned frame string → {idx, count, hash8, chunk} | null. */
  parseFrame(text) {
    if (typeof text !== "string" || !text.startsWith(this.MAGIC + "|")) return null;
    const parts = text.split("|");
    if (parts.length < 5) return null;
    const idx = parseInt(parts[1], 10);
    const count = parseInt(parts[2], 10);
    const hash8 = parts[3];
    // Rejoin the tail defensively; base64url never contains "|" so this is
    // a no-op in practice, but it keeps the parser total.
    const chunk = parts.slice(4).join("|");
    if (!Number.isInteger(idx) || !Number.isInteger(count)) return null;
    if (count < 1 || idx < 0 || idx >= count) return null;
    if (!/^[0-9a-f]{8}$/.test(hash8)) return null;
    return { idx, count, hash8, chunk };
  },

  /** A stateful reassembler for scanned frames. */
  newReceiver() {
    return { count: null, hash8: null, frames: new Map() };
  },

  /**
   * Feed a parsed frame into a receiver. If a frame from a *different*
   * payload arrives (the sender's SDP rotated mid-scan), the buffer resets
   * to the newer payload rather than mixing two sets. Returns progress.
   */
  accept(recv, frame) {
    if (!frame) return { done: false, have: recv.frames.size, need: recv.count, ok: false };
    if (recv.hash8 === null) { recv.hash8 = frame.hash8; recv.count = frame.count; }
    if (frame.hash8 !== recv.hash8 || frame.count !== recv.count) {
      recv.frames.clear();
      recv.hash8 = frame.hash8;
      recv.count = frame.count;
    }
    recv.frames.set(frame.idx, frame.chunk);
    return { done: recv.frames.size === recv.count, have: recv.frames.size, need: recv.count, ok: true };
  },

  /**
   * Once every frame is collected, reassemble → verify hash → decompress →
   * JSON.parse. Throws "Damaged scan" on hash mismatch (spec §3.2), which
   * callers surface as a retry prompt rather than a hard error.
   */
  async finish(recv) {
    if (recv.count === null || recv.frames.size !== recv.count) throw new Error("Scan incomplete.");
    let payload = "";
    for (let i = 0; i < recv.count; i++) {
      const c = recv.frames.get(i);
      if (c === undefined) throw new Error("Scan incomplete.");
      payload += c;
    }
    const h = await this._hash8(payload);
    if (h !== recv.hash8) throw new Error("Damaged scan — try again.");
    const compressed = b64UrlToBytes(payload);
    const json = await SDPCodec.decompress(compressed);
    return JSON.parse(json);
  }
};

/**
 * Round-trip check for QRFrames: encode a synthetic multi-frame payload,
 * scramble the frame order, reassemble, and assert we recover the input;
 * then assert a corrupted frame is rejected as a "damaged scan." Throws on
 * any mismatch. Called fire-and-forget at boot and exposed for the M0
 * headless harness (offline-mesh spec §8).
 */
async function qrFramesSelfTest() {
  // A payload comfortably larger than one frame budget (mimics a gathered
  // SDP with a handful of host candidates). Deterministic pseudo-random
  // bytes so it does NOT deflate away to a single frame — we need to
  // exercise real splitting/reassembly.
  let filler = "", seed = 0x9e3779b1;
  for (let i = 0; i < 1500; i++) { seed = (seed * 1103515245 + 12345) & 0x7fffffff; filler += String.fromCharCode(33 + (seed % 90)); }
  const obj = { type: "offer", sdp: "v=0\r\na=candidate:" + filler + "\r\n" };
  const frames = await QRFrames.encode(obj, 700);
  if (frames.length < 2) throw new Error("expected multi-frame split");

  // Reassemble out of order.
  const recv = QRFrames.newReceiver();
  const shuffled = frames.slice().reverse();
  let done = false;
  for (const f of shuffled) done = QRFrames.accept(recv, QRFrames.parseFrame(f)).done;
  if (!done) throw new Error("receiver never reported done");
  const back = await QRFrames.finish(recv);
  if (back.type !== obj.type || back.sdp !== obj.sdp) throw new Error("round-trip mismatch");

  // A corrupted chunk must be caught by the payload hash, not parsed blindly.
  const bad = QRFrames.newReceiver();
  for (let i = 0; i < frames.length; i++) {
    let f = QRFrames.parseFrame(frames[i]);
    if (i === 0) f = { ...f, chunk: f.chunk.slice(0, -1) + (f.chunk.endsWith("A") ? "B" : "A") };
    QRFrames.accept(bad, f);
  }
  let rejected = false;
  try { await QRFrames.finish(bad); } catch { rejected = true; }
  if (!rejected) throw new Error("corrupted payload was not rejected");
}

/* ------------------------------------------------------------
 *  §17b  Camera QR scanner + cycling multi-frame QR display
 *
 *  The in-person, no-channel half of the offline handshake (spec §3.3,
 *  §6). `CyclingQR` renders a multi-frame payload as an auto-cycling QR
 *  with a manual prev/next fallback; `openScanModal` opens the rear camera
 *  and reassembles frames via QRFrames until a full payload is recovered.
 *
 *  Scanning uses the native `BarcodeDetector` API — no bundled decoder, no
 *  network — which is exactly right for the offline target (Chromium/
 *  Android phone hotspots). Where it's unavailable (notably iOS Safari) we
 *  fall back to pasting the link the other device shows, so the flow still
 *  completes without a camera.
 * ------------------------------------------------------------ */
const QRScanner = {
  // In-page scanning works wherever we can open a camera and decode frames.
  // We prefer the native BarcodeDetector (fast, hardware-accelerated) and fall
  // back to the vendored jsQR software decoder — which is what makes scanning
  // work on iOS/WebKit, where BarcodeDetector doesn't exist (offline-mesh spec
  // §3.3, §10). So scanning is no longer gated on the platform.
  hasNative() { try { return "BarcodeDetector" in window; } catch { return false; } },
  hasSoftware() { try { return typeof window.jsQR === "function"; } catch { return false; } },

  /**
   * Build a frame detector bound to `video`. Returns an async function that
   * yields an array of decoded QR string values on each call. Prefers the
   * native detector; otherwise decodes pixels with jsQR off an offscreen
   * canvas.
   */
  makeDetector(video) {
    if (this.hasNative()) {
      const det = new window.BarcodeDetector({ formats: ["qr_code"] });
      return async () => (await det.detect(video)).map(c => c.rawValue);
    }
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    return async () => {
      const w = video.videoWidth, h = video.videoHeight;
      if (!w || !h) return [];
      canvas.width = w; canvas.height = h;
      ctx.drawImage(video, 0, 0, w, h);
      const img = ctx.getImageData(0, 0, w, h);
      const res = window.jsQR(img.data, w, h, { inversionAttempts: "dontInvert" });
      return res && res.data ? [res.data] : [];
    };
  }
};

const CyclingQR = {
  /**
   * Render `frames` (array of QRFrames strings) into `container`, cycling
   * ~every 900ms with a manual prev/next fallback. Returns { stop() } — the
   * caller MUST call stop() when its panel closes to clear the interval.
   */
  async render(container, frames, opts = {}) {
    const interval = opts.interval || 900;
    let idx = 0, timer = null, stopped = false;
    const svgs = [];
    for (const f of frames) {
      try { svgs.push(await QR.toSVGFrame(f)); }
      catch (e) {
        container.innerHTML = `<span class="sub" style="color: var(--danger);">${escapeHTML(e.message)}</span>`;
        return { stop() {} };
      }
    }
    if (stopped) return { stop() {} };
    const single = frames.length === 1;
    const stopTimer = () => { if (timer) { clearInterval(timer); timer = null; } };
    const paint = () => {
      container.innerHTML = `
        <div class="qr-box" style="padding: 10px;">${svgs[idx]}</div>
        ${single ? "" : `
          <div class="row" style="justify-content: center; gap: 12px; margin-top: 8px; align-items: center;">
            <button data-qr-prev title="Previous frame">‹</button>
            <span class="sub">frame ${idx + 1} / ${frames.length}</span>
            <button data-qr-next title="Next frame">›</button>
          </div>`}`;
      if (!single) {
        container.querySelector("[data-qr-prev]").onclick = () => { idx = (idx - 1 + frames.length) % frames.length; stopTimer(); paint(); start(); };
        container.querySelector("[data-qr-next]").onclick = () => { idx = (idx + 1) % frames.length; stopTimer(); paint(); start(); };
      }
    };
    const start = () => {
      if (single || stopped) return;
      timer = setInterval(() => {
        // Self-terminate once the panel is gone from the DOM — belt-and-
        // suspenders against a caller that forgets to stop() on navigation.
        if (!container.isConnected) { stopTimer(); return; }
        idx = (idx + 1) % frames.length;
        paint();
      }, interval);
    };
    paint();
    start();
    return { stop() { stopped = true; stopTimer(); } };
  }
};

/**
 * Open a camera scan overlay that reassembles a multi-frame QRFrames
 * payload (spec §3.3). Calls `onDone(obj)` with the decoded object once a
 * full payload is recovered and its hash verifies. `expectKey` shapes the
 * paste-fallback result to match a scanned object (e.g. { j } or { r }).
 * Returns { close } so callers can dismiss it programmatically.
 */
function openScanModal({ title, hint, expectKey, onDone }) {
  document.querySelectorAll(".modal-bg.scan-modal").forEach(el => el.remove());
  const wrap = document.createElement("div");
  wrap.className = "modal-bg scan-modal";
  const card = document.createElement("div");
  card.className = "card";
  card.style.maxWidth = "440px";
  wrap.appendChild(card);
  document.body.appendChild(wrap);

  let stream = null, cancelled = false, loopTimer = null;
  const recv = QRFrames.newReceiver();
  const resetRecv = () => { recv.frames.clear(); recv.hash8 = null; recv.count = null; };

  const cleanup = () => {
    cancelled = true;
    if (loopTimer) { clearTimeout(loopTimer); loopTimer = null; }
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  };
  const close = () => { cleanup(); wrap.remove(); };

  // Paste fallback — used only if the camera itself can't be opened (no
  // camera, or permission denied). Scanning works on every platform now via
  // the jsQR software decoder, so this is no longer a platform gate.
  const showPasteFallback = (msg) => {
    card.innerHTML = `
      <h1>${escapeHTML(title)}</h1>
      <p class="sub">${escapeHTML(msg)} Paste the link the other device shows instead:</p>
      <div class="field">
        <input type="text" id="scan-paste" placeholder="https://…#…">
        <div class="err" id="scan-err"></div>
      </div>
      <div class="row"><button id="scan-cancel">Cancel</button><div class="grow"></div><button class="primary" id="scan-ok">Continue</button></div>`;
    card.querySelector("#scan-cancel").onclick = close;
    card.querySelector("#scan-ok").onclick = () => {
      const raw = card.querySelector("#scan-paste").value.trim();
      const m = raw.match(/#(?:join|join-reply)=([A-Za-z0-9_-]+)/);
      if (!m) { card.querySelector("#scan-err").textContent = "That doesn't look like a Mehfil link."; return; }
      close();
      onDone({ [expectKey]: m[1] });
    };
  };

  card.innerHTML = `
    <h1>${escapeHTML(title)}</h1>
    ${hint ? `<p class="sub">${escapeHTML(hint)}</p>` : ""}
    <div class="qr-box" style="padding: 0; overflow: hidden; background: #000;">
      <video id="scan-video" autoplay playsinline muted style="width: 100%; max-width: 380px; display: block; border-radius: 8px; background: #000;"></video>
    </div>
    <p class="sub" id="scan-status" style="text-align: center; margin-top: 10px;">Point the camera at their QR code…</p>
    <div class="row"><button id="scan-cancel">Cancel</button></div>`;
  card.querySelector("#scan-cancel").onclick = close;

  const video = card.querySelector("#scan-video");
  const status = card.querySelector("#scan-status");
  const detect = QRScanner.makeDetector(video);

  (async () => {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    } catch (e) {
      if (!cancelled) showPasteFallback("Couldn't open the camera (" + (e.message || e.name) + ").");
      return;
    }
    if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
    video.srcObject = stream;
    try { await video.play(); } catch {}

    const loop = async () => {
      if (cancelled) return;
      try {
        const values = await detect();
        for (const val of values) {
          const frame = QRFrames.parseFrame(val);
          if (!frame) continue;
          const prog = QRFrames.accept(recv, frame);
          status.textContent = prog.need > 1 ? `Scanning… ${prog.have} / ${prog.need} frames` : "Reading…";
          if (prog.done) {
            let obj;
            try { obj = await QRFrames.finish(recv); }
            catch (err) { status.textContent = err.message; resetRecv(); continue; }
            close();
            onDone(obj);
            return;
          }
        }
      } catch { /* transient decode error — keep scanning */ }
      if (!cancelled) loopTimer = setTimeout(loop, 120);
    };
    loop();
  })();

  return { close };
}

/* ------------------------------------------------------------
 *  §18  Invite payload — spec §10
 *
 *  The invite URL fragment carries a MessagePack-encoded payload.
 *  Design choice for v1: fragment is unencrypted. Rationale pinned
 *  in PROTOCOL.md §8 — fragments are never logged by servers, and
 *  the user controls the delivery channel for the URL itself.
 *  Anyone with the URL is by construction being invited.
 *
 *  v1 payload includes the raw workspace root key (`wrk`) rather
 *  than a per-member wrapped version, because the joiner has no
 *  pre-established pubkey to wrap for. Proper per-member wrapping
 *  happens via `member.welcome` after the join handshake completes.
 * ------------------------------------------------------------ */
const InvitePayload = {
  /**
   * Encode an invite into a URL fragment.
   *
   * @param payload {
   *   ws, name, wrk, inviter, inviter_fp_bytes, offer_sdp,
   *   general_channel_id, general_channel_key, inviter_name, expires
   * }
   */
  /**
   * C6: the bytes the inviter signs. Everything that decides who you are
   * talking to and what you will connect to — the inviter key, the SDP, the
   * workspace keys, the expiry, and a per-invite nonce — is inside the
   * signature. The `inviter_fp` field is deliberately NOT here: it is not
   * transmitted at all any more, it is derived from `inviter` on the
   * receiving side, so there is nothing for an attacker to set.
   */
  _transcript(o) {
    return MP.encode({
      v: o.v, ws: o.ws, name: o.name, wrk: o.wrk,
      inviter: o.inviter, inviter_name: o.inviter_name,
      gch: o.gch, gck: o.gck, offer: o.offer,
      expires: o.expires, nonce: o.nonce
    });
  },

  async encode(payload, signKey) {
    const compressed = await SDPCodec.compress(payload.offer_sdp);
    const body = {
      v:           1,
      ws:          payload.ws,
      name:        payload.name,
      wrk:         payload.wrk,           // raw 32 bytes
      inviter:     payload.inviter,
      inviter_name: payload.inviter_name,
      gch:         payload.general_channel_id,
      gck:         payload.general_channel_key,  // raw 32 bytes
      offer:       compressed,
      expires:     payload.expires,
      nonce:       Crypto.rand(16)
    };
    const sig = await Crypto.sign(signKey, InvitePayload._transcript(body));
    return bytesToB64Url(MP.encode({ ...body, sig }));
  },

  /**
   * Decode and AUTHENTICATE an invite.
   *
   * C6: previously the payload independently supplied the inviter key, the
   * SDP, the workspace keys, AND the fingerprint that got displayed for the
   * out-of-band check — with nothing tying them together. A MITM swapped the
   * inviter key and SDP for their own and swapped the shown fingerprint to
   * match, so the "unskippable verification" step compared the attacker's
   * fingerprint against itself and agreed.
   *
   * Two changes close that. The fingerprint is now RECOMPUTED from the
   * inviter key rather than read off the wire, so it always describes the
   * key you will actually talk to; and the transcript is signed by that key,
   * so the SDP and workspace keys can't be spliced without also replacing
   * the identity — which changes the fingerprint the user is checking.
   *
   * Throws on a bad signature or an expired invite; callers surface it.
   */
  async decode(fragment) {
    // A truncated or mangled link fails inside atob/msgpack with a raw
    // platform error ("Failed to execute 'atob'…"), which tells the user
    // nothing. Name the likely cause instead.
    let obj;
    try {
      obj = MP.decode(b64UrlToBytes(fragment));
      if (!obj || typeof obj !== "object") throw new Error("not a map");
    } catch (_) {
      throw new Error("it isn't a complete Mehfil invite link — it may have been cut off when it was copied. Ask for the whole link again.");
    }

    if (!obj.inviter || !obj.sig) {
      throw new Error("it carries no signature. Ask for a fresh invite link.");
    }
    // Verify against the key the invite claims — then show the user the
    // fingerprint OF THAT KEY, so substituting it is visible out of band.
    let verified = false;
    try {
      const vk = await Crypto.importVerifyKey(b64UrlToBytes(obj.inviter));
      verified = await Crypto.verify(vk, obj.sig, InvitePayload._transcript(obj));
    } catch (_) { verified = false; }
    if (!verified) {
      throw new Error("the signature doesn't match, so it may have been tampered with in transit. Ask for a fresh invite link, sent a different way.");
    }
    // M8: invites carry an expiry that was never enforced. Allow a few
    // minutes of grace — a joiner whose clock runs fast shouldn't reject a
    // valid invite and blame the inviter for it.
    if (obj.expires && Date.now() > obj.expires + INVITE_CLOCK_GRACE_MS) {
      const err = new Error("it has expired. Ask for a fresh invite link.");
      err.code = "invite_expired";
      err.ws = obj.ws;
      throw err;
    }

    const sdp = await SDPCodec.decompress(obj.offer);
    const fpHash = await Crypto.sha256(b64UrlToBytes(obj.inviter));
    return {
      v: obj.v,
      ws: obj.ws,
      name: obj.name,
      wrk: obj.wrk,
      inviter: obj.inviter,
      // Derived, never transmitted — see above.
      inviter_fp_bytes: fpHash.slice(0, 16),
      inviter_name: obj.inviter_name,
      general_channel_id: obj.gch,
      general_channel_key: obj.gck,
      offer_sdp: sdp,
      expires: obj.expires
    };
  },

  /**
   * Encode a join REPLY (Bose → Asha). Carries the joiner's answer
   * SDP plus their identity pubkey so Asha can verify fingerprint
   * matches what Bose showed on her screen during OOB verification
   * (Slice 3+ — for now we trust the data-channel handshake).
   */
  async encodeReply(payload) {
    const compressed = await SDPCodec.compress(payload.answer_sdp);
    const mp = MP.encode({
      v: 1,
      ws: payload.ws,
      joiner: payload.joiner_user_id,
      joiner_name: payload.joiner_name,
      joiner_color: payload.joiner_color,
      answer: compressed
    });
    return bytesToB64Url(mp);
  },

  async decodeReply(fragment) {
    const mp = b64UrlToBytes(fragment);
    const obj = MP.decode(mp);
    const sdp = await SDPCodec.decompress(obj.answer);
    return {
      v: obj.v,
      ws: obj.ws,
      joiner_user_id: obj.joiner,
      joiner_name: obj.joiner_name,
      joiner_color: obj.joiner_color,
      answer_sdp: sdp
    };
  }
};

/* ------------------------------------------------------------
 *  §19  WebRTC transport — Mode A (two-person peer)
 *
 *  A thin wrapper around RTCPeerConnection + RTCDataChannel. The
 *  public API is intentionally narrow to match the Transport
 *  interface sketched in spec §7: send(envelopeBytes),
 *  onEnvelope(callback), status.
 *
 *  Two constructors:
 *   - `asInviter()` creates the data channel and an offer.
 *   - `asJoiner(offerSdp)` accepts an offer and produces an answer.
 *
 *  Both expose a `gatheredPromise` that resolves once the local
 *  SDP includes all ICE candidates (one-shot gather, no trickle).
 * ------------------------------------------------------------ */
const RTC_CONFIG = {
  iceServers: [
    { urls: "stun:stun.cloudflare.com:3478" }
  ]
};

class WebRTCTransport {
  constructor(offline = false) {
    // Offline-mesh spec §2: on a single hotspot subnet with no internet
    // uplink, host candidates alone connect two peers — STUN only matters
    // for NAT traversal across *different* networks, and reaching a STUN
    // server needs the very internet we don't have. So we gather with an
    // empty ICE server list, which keeps gathering near-instant and never
    // stalls waiting on an unreachable STUN endpoint.
    this.offline = offline;
    this.pc = new RTCPeerConnection(offline ? { iceServers: [] } : RTC_CONFIG);
    this.dc = null;
    this.opened = new Promise(r => { this._resolveOpen = r; });
    this.closed = new Promise(r => { this._resolveClosed = r; });
    this.onPacket = null;  // set by the peer manager
    this.status = "connecting";
    this.pc.addEventListener("connectionstatechange", () => {
      const s = this.pc.connectionState;
      if (s === "connected") this.status = "connected";
      else if (s === "disconnected" || s === "failed" || s === "closed") {
        this.status = "offline";
        if (this._resolveClosed) { this._resolveClosed(); this._resolveClosed = null; }
      }
      if (State.view === "workspace") render();
    });
  }

  _wireDataChannel(dc) {
    this.dc = dc;
    dc.binaryType = "arraybuffer";
    dc.onopen = () => {
      this.status = "connected";
      if (this._resolveOpen) { this._resolveOpen(); this._resolveOpen = null; }
      if (State.view === "workspace") render();
    };
    dc.onclose = () => {
      this.status = "offline";
      if (State.view === "workspace") render();
    };
    dc.onmessage = (ev) => {
      const bytes = new Uint8Array(ev.data);
      if (this.onPacket) this.onPacket(bytes);
    };
  }

  static async asInviter(opts = {}) {
    const offline = opts.offline ?? isOffline();
    const t = new WebRTCTransport(offline);
    const dc = t.pc.createDataChannel("mehfil", { ordered: true });
    t._wireDataChannel(dc);
    const offer = await t.pc.createOffer();
    await t.pc.setLocalDescription(offer);
    await gatheringComplete(t.pc, offline);
    return t;
  }

  static async asJoiner(offerSdp, opts = {}) {
    const offline = opts.offline ?? isOffline();
    const t = new WebRTCTransport(offline);
    t.pc.ondatachannel = (ev) => t._wireDataChannel(ev.channel);
    await t.pc.setRemoteDescription({ type: "offer", sdp: offerSdp });
    const answer = await t.pc.createAnswer();
    await t.pc.setLocalDescription(answer);
    await gatheringComplete(t.pc, offline);
    return t;
  }

  async acceptAnswer(answerSdp) {
    await this.pc.setRemoteDescription({ type: "answer", sdp: answerSdp });
  }

  localSdp() { return this.pc.localDescription.sdp; }

  send(bytes) {
    if (!this.dc || this.dc.readyState !== "open") {
      throw new Error("Data channel not open");
    }
    this.dc.send(bytes);
  }

  close() {
    try { this.dc && this.dc.close(); } catch {}
    try { this.pc.close(); } catch {}
    this.status = "offline";
  }
}

function gatheringComplete(pc, offline = false) {
  return new Promise(resolve => {
    if (pc.iceGatheringState === "complete") { resolve(); return; }
    const check = () => {
      if (pc.iceGatheringState === "complete") {
        pc.removeEventListener("icegatheringstatechange", check);
        resolve();
      }
    };
    pc.addEventListener("icegatheringstatechange", check);
    // Safety timeout. Host-only gathering (offline, no STUN) completes
    // near-instantly, so cap it tight (spec §3.2: 2s on LAN); with STUN in
    // the mix, 5s covers typical LAN/STUN candidate gathering.
    setTimeout(resolve, offline ? 2000 : 5000);
  });
}

/* ------------------------------------------------------------
 *  §20  Peer manager + envelope dispatch + gossip rebroadcast
 *
 *  Wraps WebRTC transports and handles wire-level framing, ACKs
 *  for delivery check marks, dispatching incoming envelopes to
 *  the right handlers based on `type`, AND (Slice 4a) gossip
 *  rebroadcast for multi-peer mesh routing.
 *
 *  Wire framing:
 *   - Byte 0 is a tag:
 *       0x01 = envelope (msgpack-encoded)
 *       0x02 = ack       (payload is the envelope_id as UTF-8)
 *       0x03 = blob.request
 *       0x04 = blob.chunk
 *   - Bytes 1..N are the payload.
 *
 *  This framing is transport-local, not part of the signed
 *  envelope protocol.
 *
 *  ===== Slice 4a multi-peer model =====
 *
 *  PeerMgr now supports MULTIPLE peers per workspace. The shape is
 *  Map<workspace_id, Map<peer_id, {transport}>>. Each entry in the
 *  inner map represents one direct WebRTC data channel to one peer.
 *
 *  Each peer is identified by `peer_id` — currently set to the peer's
 *  user_id, derived during the join handshake. PRE-4a callers passed
 *  a `peerUserId` when attaching; that argument is now stored as the
 *  inner map key.
 *
 *  When a non-ephemeral envelope arrives via PeerMgr.handlePacket, we:
 *    1. Process it locally via EnvelopeDispatch.receive (which
 *       includes a seen-set check — see SeenSet below)
 *    2. Rebroadcast it to every OTHER peer in the same workspace
 *       (mesh forwarding). The seen-set ensures the envelope dies
 *       after one hop on each peer that already has it.
 *
 *  `sendEnvelope(wsId, env)` now broadcasts to ALL attached peers,
 *  not just one.
 * ------------------------------------------------------------ */
const PeerMgr = {
  // Map<workspace_id, Map<peer_id, {transport}>>
  peers: new Map(),
  // Mesh auto-dial (spec §4): outbound offers awaiting an answer relayed
  // back through the mesh. Map<workspace_id, Map<target_peer_id, transport>>.
  pendingDials: new Map(),

  /**
   * Attach a transport for a specific peer in a specific workspace.
   * Multiple calls with different peerUserIds add additional peers;
   * the same peerUserId replaces an existing transport.
   */
  attach(workspaceId, transport, peerUserId) {
    let wsPeers = this.peers.get(workspaceId);
    if (!wsPeers) {
      wsPeers = new Map();
      this.peers.set(workspaceId, wsPeers);
    }
    // If a previous transport for this peer exists, close it cleanly.
    const existing = wsPeers.get(peerUserId);
    if (existing) {
      try { existing.transport.close(); } catch {}
    }
    wsPeers.set(peerUserId, { transport });

    transport.onPacket = async (bytes) => {
      try {
        // Pass the source peer id so we know NOT to rebroadcast
        // back to the peer we just received from.
        await this.handlePacket(workspaceId, bytes, peerUserId);
      } catch (e) {
        console.error("Peer packet error:", e);
      }
    };

    // Auto-clean a dropped edge so the mesh heals (re-dials) it. Guard against
    // a stale transport's late close evicting the replacement we just attached.
    transport.closed.then(() => {
      const cur = this.peers.get(workspaceId)?.get(peerUserId);
      if (cur && cur.transport === transport) this.detach(workspaceId, peerUserId);
    }).catch(() => {});

    // Admission grant: if WE are a member and the peer we're attaching is NOT
    // yet a member, they're joining through us — issue them a signed grant so
    // their member.join is authenticated to the rest of the workspace. Done
    // here (not in the UI accept handler) so it also covers the harness/API
    // join path, which calls attach directly.
    if (State.current && State.current.meta.id === workspaceId && State.identity) {
      const cur = State.current;
      const myId = canonUserId(bytesToB64Url(State.identity.pubkey));
      const iAmMember = cur.members.some(m => canonUserId(m.id) === myId);
      const peerIsMember = cur.members.some(m => canonUserId(m.id) === canonUserId(peerUserId));
      if (iAmMember && !peerIsMember && peerUserId) {
        issueAdmissionGrant(cur, transport, peerUserId).catch(e => console.warn("grant issue:", e));
      }
    }

    // Slice 3d.3: re-broadcast our current presence to the newly-attached
    // peer so they see us immediately rather than waiting up to 30s for
    // the next scheduled heartbeat. Fire-and-forget.
    if (State.current && State.current.meta.id === workspaceId) {
      const status = document.hasFocus() ? "online" : "away";
      sendPresence(State.current, status).catch(e => console.warn("presence on attach failed:", e));
      // Slice 4a: also announce ourselves to the mesh. The new peer
      // already knows we exist (we just connected to them), but the
      // rebroadcast lets peers 2+ hops away learn about us via the
      // gossip path.
      sendPeerAnnounce(State.current).catch(e => console.warn("peer_announce on attach failed:", e));
      // §6: flush any messages that were stored locally while we had no peer.
      flushStoredMessages(State.current, workspaceId).catch(e => console.warn("flush stored:", e));
    }
  },

  /**
   * Detach a single peer from a workspace. If `peerUserId` is omitted,
   * detach ALL peers in the workspace (full disconnect). Backwards
   * compatible with pre-4a single-peer callers.
   */
  detach(workspaceId, peerUserId) {
    const wsPeers = this.peers.get(workspaceId);
    if (!wsPeers) return;
    if (peerUserId) {
      const p = wsPeers.get(peerUserId);
      if (p) {
        try { p.transport.close(); } catch {}
        wsPeers.delete(peerUserId);
      }
      this.pendingDials.get(workspaceId)?.delete(peerUserId);
    } else {
      for (const p of wsPeers.values()) {
        try { p.transport.close(); } catch {}
      }
      this.peers.delete(workspaceId);
      this.pendingDials.delete(workspaceId);
      return;
    }
    if (wsPeers.size === 0) this.peers.delete(workspaceId);
  },

  /**
   * Status for a workspace overall. Returns "connected" if at least
   * one attached peer reports connected, otherwise "offline" if any
   * peer is connecting, otherwise "none".
   */
  status(workspaceId) {
    const wsPeers = this.peers.get(workspaceId);
    if (!wsPeers || wsPeers.size === 0) return "none";
    let any = false, anyConnecting = false;
    for (const p of wsPeers.values()) {
      if (p.transport.status === "connected") any = true;
      else if (p.transport.status === "connecting") anyConnecting = true;
    }
    return any ? "connected" : anyConnecting ? "connecting" : "offline";
  },

  /**
   * Offline-mesh spec §6: true if at least one *connected* peer is on a
   * host-only (STUN-less) transport — i.e. the mesh is a local hotspot with
   * no internet uplink. Drives the "Offline mesh" badge even when
   * navigator.onLine still reports true (WiFi with no route to the wire).
   */
  anyOffline(workspaceId) {
    const wsPeers = this.peers.get(workspaceId);
    if (!wsPeers) return false;
    for (const p of wsPeers.values()) {
      if (p.transport.status === "connected" && p.transport.offline) return true;
    }
    return false;
  },

  /** How many peers are attached for a workspace? */
  peerCount(workspaceId) {
    const wsPeers = this.peers.get(workspaceId);
    return wsPeers ? wsPeers.size : 0;
  },

  /** True if at least one peer is attached for the workspace. */
  hasPeers(workspaceId) {
    return this.peerCount(workspaceId) > 0;
  },

  /**
   * Broadcast an envelope to ALL attached peers for the workspace,
   * optionally excluding one source peer (used by the gossip
   * rebroadcast path to avoid sending an envelope back to where
   * we just received it from).
   */
  async sendEnvelope(workspaceId, env, excludePeerId) {
    const wsPeers = this.peers.get(workspaceId);
    if (!wsPeers || wsPeers.size === 0) return false;
    // Slice 4a: mark the envelope as seen BEFORE broadcasting so any
    // rebroadcast hop that loops back to us is dropped by the seen-set
    // check in handlePacket. This applies to BOTH locally-originated
    // sends (where excludePeerId is undefined — every receiving peer
    // will rebroadcast to its other peers, eventually back to us) AND
    // gossip rebroadcasts (where excludePeerId is set to skip the
    // immediate source). Ephemeral envelopes don't need this — they
    // aren't rebroadcast — but the cost is one Map.set() so we always do it.
    await SeenSet.add(workspaceId, env.id);

    const body = MP.encode(env);
    const framed = new Uint8Array(1 + body.length);
    framed[0] = 0x01;
    framed.set(body, 1);
    let sentAny = false;
    for (const [peerId, p] of wsPeers) {
      if (peerId === excludePeerId) continue;
      try {
        p.transport.send(framed);
        sentAny = true;
      } catch (e) {
        console.warn("send failed for peer", peerId, e);
      }
    }
    // §35: also push to relay if one is configured (store-and-forward).
    // §37: also push to bridge if one is configured.
    // Non-ephemeral only — presence and typing heartbeats are per-device
    // and make no sense forwarded via store-and-forward transports.
    if (!EPHEMERAL_TYPES.has(env.type)) {
      RelayMgr.send(workspaceId, body).catch(e => console.warn("relay push:", e));
      BridgeMgr.send(workspaceId, body).catch(e => console.warn("bridge push:", e));
    }
    return sentAny;
  },

  /**
   * ACK is point-to-point — only send back to the peer we received
   * from. (S5: there is no `excludePeer` param on this path; a stale
   * comment referenced one. We send only to the named peer.)
   */
  async sendAck(workspaceId, envelopeId, peerUserId) {
    const wsPeers = this.peers.get(workspaceId);
    if (!wsPeers) return;
    const p = wsPeers.get(peerUserId);
    if (!p) return;
    const idBytes = new TextEncoder().encode(envelopeId);
    const framed = new Uint8Array(1 + idBytes.length);
    framed[0] = 0x02;
    framed.set(idBytes, 1);
    try { p.transport.send(framed); } catch {}
  },

  async handlePacket(workspaceId, bytes, sourcePeerId) {
    if (bytes.length < 1) return;
    const tag = bytes[0];
    const payload = bytes.subarray(1);
    if (tag === 0x01) {
      const env = MP.decode(payload);
      // Gossip dedupe: drop if we've already seen this envelope.
      // The seen-set check is the FIRST thing we do — before sig
      // verification, before persistence — so loops die fast.
      const known = await SeenSet.has(workspaceId, env.id);
      if (known) return;
      await SeenSet.add(workspaceId, env.id);

      // Process locally.
      await EnvelopeDispatch.receive(workspaceId, env);

      // Ack to the sender (UX sugar — single → double check).
      await this.sendAck(workspaceId, env.id, sourcePeerId);

      // Rebroadcast to every OTHER attached peer. Ephemeral envelopes
      // (presence, typing) are NOT rebroadcast — each peer sends their
      // own heartbeat directly, and forwarded heartbeats would mislead
      // recipients about whose status it actually is. EXCEPT signal.relay
      // (spec §4): it is ephemeral (never persisted) but MUST be forwarded
      // so relayed WebRTC signaling reaches a target several hops away —
      // that is the whole point of "one scan joins the mesh". The SeenSet
      // still kills loops after one hop per peer.
      if (!EPHEMERAL_TYPES.has(env.type) || env.type === "signal.relay") {
        await this.sendEnvelope(workspaceId, env, sourcePeerId);
      }
    } else if (tag === 0x02) {
      const id = new TextDecoder().decode(payload);
      EnvelopeDispatch.onAck(workspaceId, id);
    } else if (tag === 0x03) {
      const req = MP.decode(payload);
      await BlobTransfer.serveRequest(workspaceId, req.blob_id, sourcePeerId);
    } else if (tag === 0x04) {
      const chunk = MP.decode(payload);
      await BlobTransfer.receiveChunk(workspaceId, chunk);
    } else if (tag === 0x05) {
      // Slice 4c: resync.request — peer is asking us to re-send
      // any envelopes from a specific (sender, counter range) we
      // happen to have in our envelopes store.
      const req = MP.decode(payload);
      await ResyncResponder.serve(workspaceId, req, sourcePeerId);
    } else {
      console.warn("Unknown transport tag:", tag);
    }
  },

  /**
   * Send a blob request to whichever peer we think has the blob.
   * For 4a we just broadcast — any peer that has it will respond,
   * any peer that doesn't will silently drop the request.
   */
  async sendBlobRequest(workspaceId, blobId) {
    const wsPeers = this.peers.get(workspaceId);
    if (!wsPeers || wsPeers.size === 0) return false;
    const body = MP.encode({ blob_id: blobId });
    const framed = new Uint8Array(1 + body.length);
    framed[0] = 0x03;
    framed.set(body, 1);
    let sent = false;
    for (const p of wsPeers.values()) {
      try { p.transport.send(framed); sent = true; }
      catch (e) { console.warn("blob.request send failed:", e); }
    }
    return sent;
  },

  /**
   * Slice 4c: broadcast a resync.request to all attached peers.
   * The first one(s) with matching envelopes will reply by
   * re-broadcasting them through the normal envelope path.
   */
  async sendResyncRequest(workspaceId, targetUserId, fromCounter, toCounter) {
    const wsPeers = this.peers.get(workspaceId);
    if (!wsPeers || wsPeers.size === 0) return false;
    const body = MP.encode({
      target: targetUserId,
      from: fromCounter,
      to: toCounter
    });
    const framed = new Uint8Array(1 + body.length);
    framed[0] = 0x05;
    framed.set(body, 1);
    let sent = false;
    for (const p of wsPeers.values()) {
      try { p.transport.send(framed); sent = true; }
      catch (e) { console.warn("resync.request send failed:", e); }
    }
    return sent;
  },

  /**
   * Send a single chunk of a blob transfer to a specific peer
   * (the one that requested it). Slice 3c.1 design point.
   */
  async sendBlobChunk(workspaceId, blobId, seq, total, dataBytes, peerUserId) {
    const wsPeers = this.peers.get(workspaceId);
    if (!wsPeers) return false;
    const body = MP.encode({
      blob_id: blobId, seq, total, data: dataBytes
    });
    const framed = new Uint8Array(1 + body.length);
    framed[0] = 0x04;
    framed.set(body, 1);
    if (peerUserId) {
      // Targeted send to the requester
      const p = wsPeers.get(peerUserId);
      if (!p) return false;
      try { p.transport.send(framed); return true; }
      catch (e) { console.warn("blob.chunk send failed:", e); return false; }
    }
    // Fallback (legacy): send to first peer found
    for (const p of wsPeers.values()) {
      try { p.transport.send(framed); return true; }
      catch (e) { console.warn("blob.chunk send failed:", e); return false; }
    }
    return false;
  }
};

/* ------------------------------------------------------------
 *  §20a  SeenSet — gossip dedupe (Slice 4a)
 *
 *  10K-entry LRU set of envelope ids we've already processed.
 *  Backed by the `seen_set` IndexedDB store created in Slice 0
 *  (per spec §9.1) so the set survives reload — preventing
 *  re-broadcast loops across page lifetimes.
 *
 *  Implementation:
 *    - In-memory `Map<envelope_id, ts>` for fast O(1) lookups
 *      while a workspace is open
 *    - On `add`, also persist to IndexedDB asynchronously
 *    - On workspace open, hydrate the in-memory cache from IDB
 *    - LRU pruning: when cache grows past MAX, drop oldest 10%
 *
 *  The "seen" assertion is conservative: a duplicate is a duplicate.
 *  The cost of dropping a legitimate retransmission is zero (we
 *  already have the data); the cost of NOT dropping is a broadcast
 *  storm. Always err toward dropping.
 * ------------------------------------------------------------ */
const SEEN_SET_MAX = 10_000;

const SeenSet = {
  // WeakMap<wsDB, Map<envelope_id, ts>> — keyed by the IDB connection
  // object, NOT by workspace_id. This matters for the test harness:
  // a single page can have two Mehfil "peer" bundles with the same
  // workspace_id but distinct wsDB instances. WeakMap-by-wsDB keeps
  // their seen-sets isolated. In production (one browser tab per
  // origin) the two are equivalent.
  _cache: new WeakMap(),

  /**
   * Hydrate the in-memory cache for a workspace from its IDB store.
   * Called once per workspace open. After hydration, every entry in
   * the persisted `seen_set` store is loaded into memory.
   */
  async hydrate(wsDB) {
    const cache = new Map();
    await new Promise((resolve, reject) => {
      const tx = wsDB.transaction("seen_set");
      const store = tx.objectStore("seen_set");
      const req = store.openCursor();
      req.onsuccess = () => {
        const cursor = req.result;
        if (cursor) {
          cache.set(cursor.key, cursor.value);
          cursor.continue();
        } else {
          resolve();
        }
      };
      req.onerror = () => reject(req.error);
    });
    this._cache.set(wsDB, cache);
  },

  async has(workspaceId, envelopeId) {
    const wsDB = State.current?.wsDB;
    if (!wsDB) return false;
    const cache = this._cache.get(wsDB);
    if (!cache) return false;
    return cache.has(envelopeId);
  },

  /**
   * Mark an envelope as seen. Updates the in-memory cache + persists
   * to IDB. If the cache exceeds MAX, prunes the oldest 10% of entries
   * (LRU by insertion order, which is what Map iteration gives us).
   */
  async add(workspaceId, envelopeId) {
    const current = State.current;
    if (!current) return;
    const wsDB = current.wsDB;
    let cache = this._cache.get(wsDB);
    if (!cache) {
      cache = new Map();
      this._cache.set(wsDB, cache);
    }
    if (cache.has(envelopeId)) return;
    const ts = Date.now();
    cache.set(envelopeId, ts);

    // Prune if oversized — drop the oldest 10% to amortize the cost.
    if (cache.size > SEEN_SET_MAX) {
      const toRemove = Math.floor(SEEN_SET_MAX * 0.1);
      let i = 0;
      const removeKeys = [];
      for (const k of cache.keys()) {
        if (i++ >= toRemove) break;
        removeKeys.push(k);
      }
      for (const k of removeKeys) {
        cache.delete(k);
        idbDelete(wsDB, "seen_set", k).catch(() => {});
      }
    }

    // Persist async — fire and forget. The in-memory cache is the
    // authoritative source while the workspace is open; IDB is the
    // backing store for survival across reloads.
    idbPut(wsDB, "seen_set", ts, envelopeId).catch(e => {
      console.warn("seen_set persist failed:", e);
    });
  }
};

/* ------------------------------------------------------------
 *  §20c  Causal delivery buffer (Slice 4b.1)
 *
 *  Vector clock dependency checking. Every envelope carries an
 *  `lc` field: a list of [user_id, counter] pairs representing
 *  the sender's knowledge of each other writer's counter at the
 *  time of send. For Slice 4b.1 we interpret this minimally:
 *
 *    - An envelope from sender X with counter N depends on having
 *      seen counter N-1 from X first. This is the per-sender
 *      causal chain. An envelope arriving with counter N > hwm+1
 *      is buffered until the gap is filled.
 *
 *    - Other entries in `lc` (not the sender's own counter) are
 *      informational — they tell us the sender HAD seen those
 *      counters at send time, so if we haven't, we're behind. We
 *      use them to detect gaps but NOT to block delivery of this
 *      envelope (v1 accepts messages that reference counters from
 *      other senders we haven't seen; the order within a single
 *      sender is the main causal guarantee).
 *
 *  The "wait for N-1 before delivering N" rule ships here. Richer
 *  vector-clock comparison (Lamport clock dominance) is spec §6.1
 *  and can be added later without a wire-format change.
 *
 *  Persistence: `hwm` is rebuilt from the envelopes store on
 *  every `Workspace.open`, so the causal buffer state is derived
 *  not stored. `causalBuffer` lives only in memory — envelopes
 *  that are still buffered at shutdown are in the envelopes
 *  store already (they were persisted via the normal dispatch
 *  path during hydration), so replay restores the same state.
 *
 *  Actually — wait. Envelopes in the causalBuffer are NOT
 *  persisted before being buffered, because the dispatch pipeline
 *  persists AFTER the causal check. So buffered envelopes would
 *  be lost on shutdown.
 *
 *  The fix is to persist the envelope in the dispatch pipeline
 *  BEFORE the causal check — the envelopes store is append-only,
 *  and holding an out-of-order envelope there is harmless (replay
 *  will re-order via ts-sort in Workspace.open). That's what the
 *  Slice 4b.1 dispatch changes do: persist first, then causal
 *  check, then project.
 * ------------------------------------------------------------ */
const CausalBuffer = {
  /**
   * Given an envelope and the current bundle's high-water-mark map,
   * decide whether the envelope's causal dependencies are satisfied.
   *
   * Returns true if the envelope can be delivered now. The rule: the
   * envelope's own sender-counter must be exactly one greater than
   * our current hwm for (sender, device), OR it's the first envelope
   * we've ever seen from that sender (counter 1 with hwm 0).
   *
   * Re-delivery of the same counter (a hash collision or a bug) is
   * treated as "ok" — the dispatch pipeline dedupes by id earlier.
   */
  canDeliver(bundle, env) {
    if (!env.lc || !Array.isArray(env.lc)) return true;
    // Find the sender's own counter in lc.
    const senderEntry = env.lc.find(e => Array.isArray(e) && e[0] === env.from);
    if (!senderEntry) return true;  // no self-counter, can't block
    const expectedCounter = senderEntry[1];
    if (typeof expectedCounter !== "number") return true;
    const deviceHwm = bundle.hwm.get(env.from);
    // First contact with this (sender, device): accept and let advance()
    // set the baseline. We cannot have observed the sender's earlier
    // counters — ephemeral heartbeats (presence/announce) bump lc_counter
    // but are never causally tracked on receive, and a joiner's pre-connect
    // sends may have been dropped before the data channel opened. Gating the
    // first real envelope (e.g. member.join arriving at counter 3) against
    // "<= 1" strands it in the buffer forever, so a new peer never joins.
    if (!deviceHwm || !deviceHwm.has(env.dev)) return true;
    const currentHwm = deviceHwm.get(env.dev) || 0;
    // Allow delivery if:
    //   - the envelope advances the chain by exactly 1 (normal case)
    //   - the envelope is already delivered (same counter — idempotent)
    //   - the envelope is older than hwm (out-of-order stale arrival,
    //     usually a replay; the seen-set would normally catch it but
    //     we allow it through as a safety net)
    return expectedCounter <= currentHwm + 1;
  },

  /**
   * Update the hwm for (sender, device) after a successful delivery.
   * Called from the dispatch pipeline after EnvelopeDispatch.handle
   * succeeds for a non-ephemeral envelope.
   */
  advance(bundle, env) {
    if (!env.lc || !Array.isArray(env.lc)) return;
    const senderEntry = env.lc.find(e => Array.isArray(e) && e[0] === env.from);
    if (!senderEntry) return;
    const counter = senderEntry[1];
    if (typeof counter !== "number") return;
    let inner = bundle.hwm.get(env.from);
    if (!inner) { inner = new Map(); bundle.hwm.set(env.from, inner); }
    const cur = inner.get(env.dev) || 0;
    if (counter > cur) inner.set(env.dev, counter);
  },

  /**
   * Push an envelope onto the buffer. Called when canDeliver returns
   * false. The envelope is already persisted to IDB by the caller, so
   * shutdown mid-buffer is recoverable on next workspace open.
   */
  buffer(bundle, env) {
    // Dedupe — don't buffer the same envelope twice.
    if (bundle.causalBuffer.find(e => e.id === env.id)) return;
    bundle.causalBuffer.push(env);
  },

  /**
   * Walk the buffer and release any envelope whose dependencies are
   * now satisfied. Called after every successful delivery. Releases
   * in a loop until a full pass makes no progress — handles chains
   * of transitively dependent envelopes.
   *
   * Returns the list of envelopes that were released (for testing).
   */
  async drain(bundle, dispatchFn) {
    const released = [];
    let progress = true;
    while (progress) {
      progress = false;
      for (let i = 0; i < bundle.causalBuffer.length; i++) {
        const env = bundle.causalBuffer[i];
        if (!this.canDeliver(bundle, env)) continue;
        // Remove from buffer + deliver.
        bundle.causalBuffer.splice(i, 1);
        i--;
        await dispatchFn(env);
        released.push(env);
        progress = true;
      }
    }
    return released;
  },

  /** Current buffer size — used by gap detection in Slice 4c. */
  size(bundle) {
    return bundle.causalBuffer.length;
  }
};

/* ------------------------------------------------------------
 *  §20c2  GapTracker — Slice 4c
 *
 *  Two complementary signals tell us we're missing envelopes
 *  from a peer:
 *
 *  1. The causal buffer (§20c) holds envelopes whose own
 *     sender-counter exceeds hwm+1. We KNOW we're missing the
 *     gap because we have the later envelope to prove it.
 *
 *  2. The lc field of an envelope from sender X may contain
 *     entries like [Y, 7] — meaning "X had seen Y's counter 7
 *     when X sent this". If our own hwm for (Y, Y_device) is
 *     below 7, we're missing some of Y's envelopes too — even
 *     if we have no later envelope from Y to prove it.
 *
 *  GapTracker.observe(bundle, env) inspects the second signal
 *  every time an envelope arrives. It records the highest counter
 *  we've ever seen mentioned for each (sender, device) pair in
 *  bundle.gaps, regardless of whether we've actually received
 *  that envelope. The "missing range" for a sender is then the
 *  difference between gaps[(sender, device)] and hwm[(sender,
 *  device)].
 *
 *  Note on device id: lc entries in v1 carry only [user_id,
 *  counter] — no device id. We don't know which device of the
 *  sender produced the counter. For Slice 4c we attribute all
 *  lc-peeked counters to a special "unknown" device id, and
 *  surface gaps as "messages from Alice", not "messages from
 *  Alice's phone". v1.1 multi-device may upgrade lc to carry
 *  device ids.
 * ------------------------------------------------------------ */
const GapTracker = {
  /**
   * Inspect an envelope's lc and update bundle.gaps for any
   * (sender, device) pair where the lc-peeked counter is higher
   * than what we currently know about. Called from the dispatch
   * pipeline AFTER successful processing of the envelope.
   */
  observe(bundle, env) {
    if (!env.lc || !Array.isArray(env.lc)) return;
    for (const entry of env.lc) {
      if (!Array.isArray(entry) || entry.length !== 2) continue;
      const [senderId, counter] = entry;
      if (typeof counter !== "number" || counter <= 0) continue;
      // Skip the entry for the envelope's own sender — that one
      // is handled by hwm advancement in CausalBuffer.advance.
      if (senderId === env.from) continue;
      // For lc entries from other senders we don't know the device,
      // so we use a sentinel "lc_peek" device key. When the actual
      // envelope arrives, hwm tracks the real device id. The gap
      // calculation then compares lc_peek max against the SUM of
      // all known device counters for that sender — see missingFor.
      let inner = bundle.gaps.get(senderId);
      if (!inner) { inner = new Map(); bundle.gaps.set(senderId, inner); }
      const cur = inner.get("lc_peek") || 0;
      if (counter > cur) inner.set("lc_peek", counter);
    }
  },

  /**
   * How many envelopes are we missing from a given sender?
   * Combines two signals:
   *   - lc-peek max (the highest counter another envelope claimed
   *     this sender had reached)
   *   - hwm sum across all known devices for this sender
   *
   * If lc-peek > hwm sum, there's a gap. Returns the gap size.
   */
  missingFor(bundle, senderId) {
    const inner = bundle.gaps.get(senderId);
    if (!inner) return 0;
    const peeked = inner.get("lc_peek") || 0;
    const hwmDevices = bundle.hwm.get(senderId);
    let hwmMax = 0;
    if (hwmDevices) {
      for (const counter of hwmDevices.values()) {
        if (counter > hwmMax) hwmMax = counter;
      }
    }
    return Math.max(0, peeked - hwmMax);
  },

  /**
   * List all senders with non-zero gaps, plus how many envelopes
   * we're missing from each. Used by the gap banner UI.
   */
  allGaps(bundle) {
    const out = [];
    for (const senderId of bundle.gaps.keys()) {
      const missing = this.missingFor(bundle, senderId);
      if (missing > 0) out.push({ senderId, missing });
    }
    // Also include senders represented in the causal buffer but
    // not in the gaps map (we have the future envelope but no lc
    // peek from another sender).
    for (const env of bundle.causalBuffer) {
      const senderEntry = (env.lc || []).find(e => Array.isArray(e) && e[0] === env.from);
      if (!senderEntry) continue;
      const target = senderEntry[1];
      const hwmDevices = bundle.hwm.get(env.from);
      const hwmMax = hwmDevices ? Math.max(0, ...hwmDevices.values()) : 0;
      const missing = Math.max(0, target - hwmMax - 1); // -1 because target itself is in the buffer
      if (missing > 0 && !out.find(g => g.senderId === env.from)) {
        out.push({ senderId: env.from, missing });
      }
    }
    return out;
  }
};

/* ------------------------------------------------------------
 *  §20c3  ResyncResponder — Slice 4c
 *
 *  Serves incoming resync.request packets. Walks the local
 *  envelopes store, finds any envelopes matching the request's
 *  (target user, counter range), and re-sends each one through
 *  the normal PeerMgr.sendEnvelope path. The seen-set ensures
 *  the requester drops any envelope they already have, and
 *  applies the rest via the regular dispatch pipeline.
 *
 *  Note: we send to ALL peers, not just the requester. Other
 *  peers in the mesh may also be missing these envelopes — the
 *  rebroadcast doubles as opportunistic gossip. Their seen-set
 *  drops anything they already have.
 *
 *  Privacy: we only re-send envelopes for channels the requester
 *  is in. We approximate this by checking that the envelope's
 *  channel id is one we ourselves can decrypt (i.e. we have the
 *  channel key) — but this is a weak check. A peer that's a
 *  member of channel X but not channel Y could request a counter
 *  range and indirectly observe whether the target sends to Y.
 *  Slice 5+ should add a per-channel resync ACL.
 * ------------------------------------------------------------ */
const ResyncResponder = {
  async serve(workspaceId, req, requesterPeerId) {
    const current = State.current;
    if (!current || current.meta.id !== workspaceId) return;
    if (!req || !req.target || typeof req.from !== "number" || typeof req.to !== "number") return;

    // Walk the envelopes store. For small stores this is fine;
    // for larger ones we'd want to use the `from` index added in
    // Slice 0 — `envelopes.createIndex("from", "from")`.
    const all = await idbGetAll(current.wsDB, "envelopes");
    const matches = all.filter(env => {
      if (env.from !== req.target) return false;
      // Skip ephemeral types — they should never be in the store
      // anyway, but defense in depth.
      if (EPHEMERAL_TYPES.has(env.type)) return false;
      // Find sender's counter in lc.
      const senderEntry = (env.lc || []).find(e => Array.isArray(e) && e[0] === env.from);
      if (!senderEntry) return false;
      const counter = senderEntry[1];
      return counter >= req.from && counter <= req.to;
    });

    // Re-broadcast each match. PeerMgr.sendEnvelope handles
    // SeenSet marking and avoids reflecting back to ourselves.
    for (const env of matches) {
      try {
        await PeerMgr.sendEnvelope(workspaceId, env);
      } catch (e) {
        console.warn("resync re-broadcast failed for", env.id, e);
      }
    }
  }
};

/* ------------------------------------------------------------
 *  §20d  WorkspaceDoc — Yjs CRDT wrapper (Slice 4b.2)
 *
 *  Workspace metadata (name, channels, members, settings) lives
 *  in a Yjs document. Each mutation captures an incremental
 *  update via Y.encodeStateAsUpdate, which travels inside a
 *  `workspace.patch` envelope to other peers. Recipients apply
 *  the update via Y.applyUpdate — automatic CRDT merge.
 *
 *  Why a wrapper: application code should not touch Y.Doc, Y.Map
 *  or Y.Array directly. The wrapper gives us named methods with
 *  clean type signatures, centralizes the "capture the update
 *  and broadcast" pattern, and provides a single chokepoint for
 *  migrations and observability. If we ever need to swap Yjs for
 *  something else, only this module changes.
 *
 *  The Yjs doc has three top-level shared types:
 *    - meta     (Y.Map)  — workspace name, icon, settings
 *    - channels (Y.Map)  — channel_id → channel record
 *    - members  (Y.Map)  — user_id → member record
 *
 *  For Slice 4b.2 we wire up `meta.name` as the first fully-
 *  migrated field. Channels and members still flow through the
 *  existing channel.create / member.join envelope paths and are
 *  mirrored into the Yjs doc on ingest — the old kv/projection
 *  stores stay authoritative for those until Slice 5 migrates
 *  them one-by-one.
 * ------------------------------------------------------------ */
const WorkspaceDoc = {
  /**
   * Create a fresh Y.Doc with the expected top-level shared types.
   * Used by both the migration path (Workspace.create → seed doc
   * from the initial metadata) and by the loader when no persisted
   * doc exists yet.
   */
  create() {
    if (!Y) throw new Error("Yjs not loaded");
    const doc = new Y.Doc();
    // Touch the shared types so they exist in the doc. Y.Map is
    // created lazily on first access.
    doc.getMap("meta");
    doc.getMap("channels");
    doc.getMap("members");
    return doc;
  },

  /**
   * Load the Yjs doc from a workspace's IDB. If no persisted doc
   * exists, returns null so the caller can run migration.
   */
  async load(wsDB) {
    const bytes = await idbGet(wsDB, "keys", "workspace_yjs");
    if (!bytes) return null;
    const doc = this.create();
    Y.applyUpdate(doc, bytes);
    return doc;
  },

  /**
   * Persist the current full state of the doc as a single binary
   * blob. This is the simplest possible persistence — every save
   * replaces the blob with a fresh snapshot. Slice 5+ may switch
   * to incremental persistence if the snapshot size becomes a
   * measurable concern (it won't for small workspaces).
   */
  async save(wsDB, doc) {
    const bytes = Y.encodeStateAsUpdate(doc);
    await idbPut(wsDB, "keys", bytes, "workspace_yjs");
  },

  /**
   * Apply a remote update to the local doc. Used by the
   * `workspace.patch` dispatch handler.
   */
  applyUpdate(doc, updateBytes) {
    Y.applyUpdate(doc, updateBytes, "remote");
  },

  /**
   * Run a mutation inside a transaction, return the update bytes
   * to broadcast. Callers pass the result to `sendWorkspacePatch`.
   *
   * IMPORTANT (Slice 4b.2): we return the FULL state, not just the
   * delta-since-the-last-send. Yjs's delta encoding
   * (`encodeStateAsUpdate(doc, stateVector)`) returns operations
   * that reference prior ops as causal parents. When those are
   * applied to a peer that doesn't already have the parents,
   * Yjs marks them as "pending" and does NOT apply them. For a
   * workspace where peers might independently seed their local
   * doc (migration, join handshake, etc.), delta updates don't
   * graft cleanly. Full-state updates always merge via the CRDT.
   *
   * The cost: every mutation broadcasts the full metadata blob.
   * For workspace metadata (a few hundred bytes in practice)
   * this is negligible. Slice 5+ may optimize via "bootstrap on
   * join then delta" once member.welcome carries a snapshot.
   */
  mutate(doc, fn) {
    Y.transact(doc, fn, "local");
    return Y.encodeStateAsUpdate(doc);
  },

  // ========== Named mutation methods ==========
  // Each returns the update bytes from the transaction so the
  // caller can broadcast them via sendWorkspacePatch. Only callers
  // that actually want to broadcast need to care about the return
  // value — the in-memory doc is mutated either way.

  setName(doc, name) {
    return this.mutate(doc, () => {
      doc.getMap("meta").set("name", name);
    });
  },

  addChannel(doc, channelRec) {
    return this.mutate(doc, () => {
      const channels = doc.getMap("channels");
      // Store a plain JSON-compatible record. Yjs handles the merge
      // at the map-entry granularity: concurrent adds of different
      // ids both land, concurrent adds of the SAME id go through
      // Y.Map LWW semantics (last writer in the merge wins).
      channels.set(channelRec.id, JSON.parse(JSON.stringify(channelRec)));
    });
  },

  addMember(doc, memberRec) {
    return this.mutate(doc, () => {
      const members = doc.getMap("members");
      // x25519_pub is a Uint8Array — serialize as array for Yjs
      // (which wants plain JSON-compatible values in Y.Map).
      const clean = { ...memberRec };
      if (clean.x25519_pub instanceof Uint8Array) {
        clean.x25519_pub_b64 = bytesToB64(clean.x25519_pub);
        delete clean.x25519_pub;
      }
      if (clean.fpBytes) delete clean.fpBytes;  // derived, re-computed on load
      members.set(memberRec.id, JSON.parse(JSON.stringify(clean)));
    });
  },

  // ========== Read projections ==========

  getName(doc) {
    return doc.getMap("meta").get("name");
  },

  getChannels(doc) {
    const channels = doc.getMap("channels");
    const out = [];
    channels.forEach((v) => out.push({ ...v }));
    return out;
  },

  getMembers(doc) {
    const members = doc.getMap("members");
    const out = [];
    members.forEach((v) => {
      const rec = { ...v };
      if (rec.x25519_pub_b64) {
        rec.x25519_pub = b64ToBytes(rec.x25519_pub_b64);
        delete rec.x25519_pub_b64;
      }
      out.push(rec);
    });
    return out;
  },

  /**
   * Store relay configs in the Yjs doc so peers receive them via workspace.patch.
   * Relays carry a bearer token — peers need it to push/poll the relay themselves.
   */
  setRelays(doc, relays) {
    return this.mutate(doc, () => {
      doc.getMap("meta").set("relays", JSON.parse(JSON.stringify(relays || [])));
    });
  },

  getRelays(doc) {
    return doc.getMap("meta").get("relays") || [];
  },

  // ========== User groups (Slice F1-C) ==========
  // Stored in the Yjs doc so membership syncs to every member via
  // workspace.patch. Shape: `groups` is a Y.Map keyed by group_id,
  // each value is `{id, name, memberIds: [...], createdBy, createdAt}`.

  addGroup(doc, group) {
    return this.mutate(doc, () => {
      const groups = doc.getMap("groups");
      groups.set(group.id, JSON.parse(JSON.stringify(group)));
    });
  },

  removeGroup(doc, groupId) {
    return this.mutate(doc, () => {
      const groups = doc.getMap("groups");
      if (groups.has(groupId)) groups.delete(groupId);
    });
  },

  getGroups(doc) {
    const groups = doc.getMap("groups");
    const out = [];
    groups.forEach((v) => { if (v) out.push({ ...v, memberIds: [...(v.memberIds || [])] }); });
    return out;
  },

  // ========== Pinned messages (Slice P1 / spec §5.4) ==========
  // Stored in the Yjs doc so pins sync to every member via
  // workspace.patch. Shape: `pins` is a Y.Map keyed by channel_id,
  // each value is an array of `{msgId, by, at}` entries.

  addPin(doc, channelId, msgId, byUserId) {
    return this.mutate(doc, () => {
      const pins = doc.getMap("pins");
      let list = pins.get(channelId);
      if (!Array.isArray(list)) list = [];
      if (!list.find(p => p.msgId === msgId)) {
        list = [...list, { msgId, by: byUserId, at: Date.now() }];
        pins.set(channelId, list);
      }
    });
  },
