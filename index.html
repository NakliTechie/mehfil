function renderAllThreadsModal() {
  if (document.querySelector('.modal-bg[data-all-threads]')) return;
  const current = State.current;
  const myUserId = bytesToB64Url(State.identity.pubkey);

  // Collect thread roots: any message that has replies pointing at it.
  const replyCount = new Map();
  const latestReply = new Map();
  const myInvolvement = new Set();
  for (const m of current.messages) {
    if (m.thread) {
      replyCount.set(m.thread, (replyCount.get(m.thread) || 0) + 1);
      const prev = latestReply.get(m.thread) || 0;
      if (m.ts > prev) latestReply.set(m.thread, m.ts);
      if (m.from === myUserId) myInvolvement.add(m.thread);
      if (m.mentions && m.mentions.includes(myUserId)) myInvolvement.add(m.thread);
    }
  }
  // Root message ids that have at least one reply.
  const rootIds = [...replyCount.keys()];
  // Also include roots authored by me or mentioning me, even with zero replies? Skip — zero-reply isn't a thread yet.
  // Include roots I authored — "my own threads to follow".
  for (const rootId of rootIds) {
    const root = current.messages.find(m => m.id === rootId);
    if (root && root.from === myUserId) myInvolvement.add(rootId);
    if (root && root.mentions && root.mentions.includes(myUserId)) myInvolvement.add(rootId);
  }
  const involved = rootIds.filter(id => myInvolvement.has(id));
  involved.sort((a, b) => (latestReply.get(b) || 0) - (latestReply.get(a) || 0));

  const rowHtml = (rootId) => {
    const root = current.messages.find(m => m.id === rootId);
    if (!root) return "";
    const ch = current.channels.find(c => c.id === root.ch);
    const author = current.members.find(m => m.id === root.from);
    const authorName = author?.name || "?";
    const chLabel = ch ? (ch.dm ? "DM" : (ch.private ? "🔒 " : "# ") + ch.name) : "?";
    const body = root.deleted
      ? `<em style="color: var(--fg-dim);">(deleted)</em>`
      : escapeHTML((root.body || (root.attachment ? `📎 ${root.attachment.name || "attachment"}` : "")).slice(0, 180));
    const count = replyCount.get(rootId) || 0;
    const last = latestReply.get(rootId) || root.ts;
    return `
      <div class="switcher-row" data-open-thread-in="${escapeHTML(root.ch)}" data-thread-parent="${escapeHTML(rootId)}">
        <span class="switcher-icon plain">💬</span>
        <div class="switcher-body">
          <div class="switcher-label"><strong>${escapeHTML(authorName)}</strong> in ${escapeHTML(chLabel)}</div>
          <div class="switcher-sub" style="max-width: 420px;">${body}</div>
          <div style="font-size: 10px; color: var(--fg-dim); margin-top: 2px;">${count} ${count === 1 ? "reply" : "replies"} · last ${formatRelative(last)}</div>
        </div>
      </div>
    `;
  };

  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  wrap.dataset.allThreads = "1";
  wrap.innerHTML = `
    <div class="card" style="max-width: 600px; max-height: calc(100vh - 60px); overflow-y: auto;">
      <div class="row" style="margin-bottom: 12px;">
        <h1 style="margin: 0; font-size: 18px; flex: 1;">💬 Threads you're in</h1>
        <button class="icon-btn" id="all-threads-close" style="font-size: 18px; padding: 2px 7px;">✕</button>
      </div>
      ${involved.length === 0
        ? `<div style="color: var(--fg-dim); font-size: 13px; padding: 20px 0; text-align: center;">No active threads yet. Start one by replying in any channel.</div>`
        : involved.map(rowHtml).join("")}
    </div>
  `;
  document.body.appendChild(wrap);
  wrap.querySelector("#all-threads-close").onclick = () => { wrap.remove(); closeModal(); };
  wrap.onclick = (e) => { if (e.target === wrap) { wrap.remove(); closeModal(); } };
  wrap.querySelectorAll("[data-open-thread-in]").forEach(el => {
    el.onclick = () => {
      const chId = el.getAttribute("data-open-thread-in");
      const parent = el.getAttribute("data-thread-parent");
      wrap.remove();
      setState({ currentChannel: chId, threadOpen: parent, modal: null });
    };
  });
}

  wrap.querySelectorAll("[data-preset]").forEach(btn => {

  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  wrap.innerHTML = `
    <div class="card" style="max-width: 440px;">
      <h1>Back up your identity</h1>

        <input type="password" id="pass1" autofocus>
      </div>

      </div>
      <div class="row">

        <div class="grow"></div>
        <button class="primary" id="do-backup">Download backup file</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);

  const $p1 = wrap.querySelector("#pass1");
  const $p2 = wrap.querySelector("#pass2");
  const $err = wrap.querySelector("#pass-err");
  const $do = wrap.querySelector("#do-backup");
  const $cancel = wrap.querySelector("#cancel-backup");

  function close() { wrap.remove(); closeModal(); }

  $cancel.onclick = close;
  $do.onclick = async () => {
    $err.textContent = "";
    if (!$p1.value || $p1.value.length < 6) {
      $err.textContent = "Pick at least 6 characters."; return;
    }
    if ($p1.value !== $p2.value) {
      $err.textContent = "Passphrases don't match."; return;
    }
    $do.disabled = true;
    try {
      // v2 file: the wrapped ciphertext is a canonical msgpack-encoded
      // object carrying BOTH the Ed25519 PKCS8 and the X25519 PKCS8.
      // Older v1 files carried only the Ed25519 PKCS8 as raw bytes; the
      // loader handles both shapes.
      const bundle = MP.encode({
        ed25519: State.identity.privkey_pkcs8,
        x25519:  State.identity.x25519_priv_pkcs8
      });
      const wrapped = await Crypto.pbkdf2Wrap($p1.value, bundle);
      const file = {
        magic: "mehfil-key",
        v: 2,
        created_at: Date.now(),
        kdf: wrapped.kdf,
        wrap: wrapped.wrap,
        pubkey_b64: bytesToB64(State.identity.pubkey),
        x25519_pubkey_b64: bytesToB64(State.identity.x25519_pub)
      };
      const blob = new Blob([JSON.stringify(file, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `mehfil-${file.pubkey_b64.slice(0,8)}.mehfil-key`;
      a.click();
      URL.revokeObjectURL(url);

      const updated = await Identity.markBackedUp(State.globalDB);
      // Refresh in-memory identity record without losing the loaded private key bytes.
      State.identity = { ...State.identity, backed_up: true };
      wrap.remove();
      // Strip the dot/banner if present
      document.querySelectorAll(".corner-warn, .corner-ok").forEach(el => el.remove());
      setState({ modal: null, backupNag: "done" });
      // After 4 seconds, fade the checkmark away
      setTimeout(() => {
        document.querySelectorAll(".corner-ok").forEach(el => el.remove());
      }, 4000);
    } catch (e) {
      $err.textContent = e.message;
      $do.disabled = false;
    }
  };
}

function openRestoreModal() {
  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  wrap.innerHTML = `
    <div class="card" style="max-width: 460px;">
      <h1>Restore identity</h1>
      <p class="sub">Pick the <code>.mehfil-key</code> file you saved earlier and enter its passphrase. Your current identity on this device will be replaced.</p>
      <div class="field">
        <label>Backup file</label>
        <input type="file" id="restore-file" accept=".mehfil-key,application/json">
      </div>
      <div class="field">
        <label>Passphrase</label>
        <input type="password" id="restore-pass">
        <div class="err" id="restore-err"></div>
      </div>
      <div class="row">
        <button id="restore-cancel">Cancel</button>
        <div class="grow"></div>
        <button class="primary" id="restore-do">Restore</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  const close = () => wrap.remove();
  wrap.querySelector("#restore-cancel").onclick = close;
  wrap.querySelector("#restore-do").onclick = async () => {
    const $err = wrap.querySelector("#restore-err");
    $err.textContent = "";
    const $file = wrap.querySelector("#restore-file");
    const pass = wrap.querySelector("#restore-pass").value;
    if (!$file.files[0]) { $err.textContent = "Pick a backup file first."; return; }
    if (!pass) { $err.textContent = "Enter your passphrase."; return; }
    wrap.querySelector("#restore-do").disabled = true;
    try {
      const text = await $file.files[0].text();
      const file = JSON.parse(text);
      if (file.magic !== "mehfil-key") throw new Error("That's not a Mehfil backup file.");
      if (file.v !== 1 && file.v !== 2) throw new Error("Unknown backup file version: " + file.v);
      const plaintext = await Crypto.pbkdf2Unwrap(pass, { kdf: file.kdf, wrap: file.wrap });
      let edPkcs8, xPkcs8, xPub;
      if (file.v === 2) {
        const bundle = MP.decode(plaintext);
        edPkcs8 = bundle.ed25519;
        xPkcs8  = bundle.x25519;
        xPub    = b64ToBytes(file.x25519_pubkey_b64);
      } else {
        // v1: plaintext is the raw PKCS8 Ed25519 key. X25519 is lost —
        // generate a fresh keypair.
        edPkcs8 = plaintext;
        const x = await Crypto.genX25519();
        xPkcs8 = x.x25519_priv_pkcs8;
        xPub   = x.x25519_pub;
      }
      const edPub = b64ToBytes(file.pubkey_b64);
      // Sanity check: signing key + public key must agree. Generate a test
      // signature and verify with the public key.
      const signKey = await Crypto.importSignKey(edPkcs8);
      const testBytes = new TextEncoder().encode("mehfil-restore-check");
      const sig = await Crypto.sign(signKey, testBytes);
      const verifyKey = await Crypto.importVerifyKey(edPub);
      const ok = await Crypto.verify(verifyKey, sig, testBytes);
      if (!ok) throw new Error("Passphrase decrypted but the key didn't match its public half — file corrupted?");

      const rec = {
        pubkey: edPub,
        privkey_pkcs8: edPkcs8,
        x25519_pub: xPub,
        x25519_priv_pkcs8: xPkcs8,
        created_at: Date.now(),
        backed_up: true,
        backup_dismissed_at: null
      };
      await Identity.save(State.globalDB, rec);
      State.identity = rec;
      close();
      setState({ view: "landing", workspaces: await idbGetAll(State.globalDB, "workspaces") });
      alert(file.v === 1
        ? "Identity restored. This was a v1 backup so a fresh X25519 keypair was generated — past direct messages and private channels will not be readable."
        : "Identity restored.");
    } catch (e) {
      $err.textContent = e.message;
      wrap.querySelector("#restore-do").disabled = false;
    }
  };
}

/* ------------------------------------------------------------
 *  §10b Rangrez palette registry
 *
 *  Per-device aesthetic preference, persisted in localStorage under
 *  "mehfil:palette". The early-load script in <head> applies the saved
 *  palette before first paint — this object is the runtime source of
 *  truth for the picker UI and any later switches.
 *
 *  Each entry's `accent` mirrors the BRAND token in the corresponding
 *  CSS override (top of the <style> block) and the early-script ACCENTS
 *  map. All three must agree.
 *
 *  Source: https://github.com/NakliTechie/rangrez
 * ------------------------------------------------------------ */
const Palette = (() => {
  // swatch = [bg, panel, accent, fg] — drives the 2x2 preview tile.
  const LIST = [
    { id: "default",     label: "Indigo",          tag: "Default",        feel: "The original Mehfil indigo",                            accent: "#5b4fe8", role: "auto",  swatch: ["#fafaf7","#ffffff","#5b4fe8","#1a1a1a"] },
    { id: "kahwa",       label: "کہوہ Kahwa",       tag: "Kashmir",        feel: "Saffron, cardamom, almond — the literal mehfil",        accent: "#a83018", role: "light", swatch: ["#ecd498","#f4dca8","#a83018","#2a1808"] },
    { id: "tagore",      label: "ঠাকুর Tagore",      tag: "Bengal",         feel: "Jorasanko whitewash, where Gitanjali was written",      accent: "#b83820", role: "light", swatch: ["#f4e8e0","#fcf0e8","#b83820","#2a1a18"] },
    { id: "mumbai-deco", label: "Mumbai Art Deco", tag: "Bombay",         feel: "Marine Drive at dusk, Parsi merchants' Miami",          accent: "#c8341a", role: "light", swatch: ["#f5ede0","#fcf5e8","#c8341a","#1a1818"] },
    { id: "khesht",      label: "خشت Khesht",      tag: "Yazd",           feel: "Mud-brick warmth, 2,000-year-old wind towers",          accent: "#b8281a", role: "light", swatch: ["#f0dcc0","#f8e8cc","#b8281a","#3a1a08"] },
    { id: "sahara",      label: "صحراء Sahara",    tag: "Morocco",        feel: "Erg Chebbi dunes at golden hour",                        accent: "#b8401a", role: "light", swatch: ["#f4e4c0","#fcecc8","#b8401a","#3a1f08"] },
    { id: "dal-lake",    label: "Dal Lake Dusk",   tag: "Kashmir · dark", feel: "Shikara on still water, lotus pads catching last sun",  accent: "#c0481a", role: "dark",  swatch: ["#08182a","#142438","#c0481a","#f0c870"] },
    { id: "yalda",       label: "شب یلدا Yalda",   tag: "Persia · dark",  feel: "Winter solstice, Hafez, pomegranate till dawn",         accent: "#d83828", role: "dark",  swatch: ["#14080c","#1e0e14","#d83828","#f0c870"] },
  ];
  const KEY = "mehfil:palette";

  function list() { return LIST; }

  function current() {
    try {
      const v = localStorage.getItem(KEY);
      return LIST.find(p => p.id === v) ? v : "default";
    } catch (e) { return "default"; }
  }

  function apply(id) {
    const entry = LIST.find(p => p.id === id) || LIST[0];
    if (entry.id === "default") {
      document.documentElement.removeAttribute("data-palette");
    } else {
      document.documentElement.setAttribute("data-palette", entry.id);
    }
    const meta = document.getElementById("meta-theme-color");
    if (meta) meta.setAttribute("content", entry.accent);
    try { localStorage.setItem(KEY, entry.id); } catch (e) { /* private mode */ }
    return entry;
  }

  return { list, current, apply };
})();

function paletteSwatchHTML(id) {
  const entry = Palette.list().find(p => p.id === id);
  if (!entry) return "";
  return entry.swatch.map(c => `<span style="background:${c};"></span>`).join("");
}

      <div class="settings-tabs">
        <button class="settings-tab ${tab === "identity"  ? "active" : ""}" data-stab="identity">Identity</button>
        <button class="settings-tab ${tab === "devices"   ? "active" : ""}" data-stab="devices">Devices</button>
        <button class="settings-tab ${tab === "workspace" ? "active" : ""}" data-stab="workspace">Workspace</button>
        ${isAdminUser ? `<button class="settings-tab ${tab === "admin" ? "active" : ""}" data-stab="admin">Admin</button>` : ""}
      </div>
      <div class="settings-tab-body" id="stab-body">
        ${renderSettingsTabBody(tab, current, me, isAdminUser, wsName)}
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  wrap.querySelector("#settings-close").onclick = () => { wrap.remove(); closeModal(); };

  // Tab switching — rebuild body in place without closing the modal.
  wrap.querySelectorAll(".settings-tab").forEach(btn => {
    btn.onclick = () => {
      const t = btn.dataset.stab;
      State._settingsTab = t;
      wrap.querySelectorAll(".settings-tab").forEach(b => b.classList.toggle("active", b.dataset.stab === t));
      wrap.querySelector("#stab-body").innerHTML = renderSettingsTabBody(t, current, me, isAdminUser, wsName);
      wireSettingsTab(t, wrap, current, me, wsName);
    };
  });
  wireSettingsTab(tab, wrap, current, me, wsName);
}

function renderSettingsTabBody(tab, current, me, isAdminUser, wsName) {
  if (tab === "identity")  return renderSettingsIdentityTab(me);
  if (tab === "devices")   return renderSettingsDevicesTab(current, me);
  if (tab === "workspace") return renderSettingsWorkspaceTab(wsName, current);
  if (tab === "admin" && isAdminUser) return renderSettingsAdminTab(current, me);
  return "";
}

function renderSettingsDevicesTab(current, me) {
  const myDeviceId = current.meta.device_id;
  const lastSeen   = current.deviceLastSeen || {};
  const fmtDevice  = id => `<code style="font-size:11px;">${escapeHTML(id.slice(0, 12))}…</code>`;
  const fmtTime    = ts => ts ? `last seen ${formatDate(ts)}` : "last seen unknown";

  const otherDevices = (me.devices || []).filter(d => d !== myDeviceId);
  const othersHtml = otherDevices.length === 0
    ? `<div style="color:var(--fg-dim);font-size:12px;padding:8px 0;">No other paired devices.</div>`
    : otherDevices.map(d => `
        <div class="relay-row" style="align-items:center;">
          <div class="relay-row-info">
            ${fmtDevice(d)}
            <div style="font-size:11px;color:var(--fg-dim);">${fmtTime(lastSeen[me.id + ":" + d])}</div>
          </div>
          <button class="danger" data-revoke-device="${escapeHTML(d)}" style="font-size:12px;padding:4px 10px;">Revoke</button>
        </div>`).join("");

  const relay = (current.relays || [])[0];
  const canPair = !!relay;

  return `
    <div class="field">
      <label>This device</label>
      <div style="background:var(--bg-sunken);border-radius:6px;padding:10px;font-size:12px;">
        <code>${escapeHTML(myDeviceId)}</code>
        <span style="color:var(--fg-dim);margin-left:8px;">(current)</span>
      </div>
    </div>
    <div class="field">
      <label>Paired devices</label>
      ${othersHtml}
    </div>
    <div style="margin-top:8px;">
      ${canPair
        ? `<button class="primary" id="btn-add-device-pair">+ Pair a new device</button>`
        : `<button class="primary" disabled title="Add a relay first (Settings → Workspace → Relays)">+ Pair a new device</button>
           <div style="font-size:11px;color:var(--fg-dim);margin-top:6px;">Requires a relay — add one in the Workspace tab first.</div>`}
    </div>
  `;
}

function renderSettingsWorkspaceTab(wsName, current) {

    : relays.map((r, i) => `
        <div class="relay-row">
          <div class="relay-row-info">
            <div style="font-size: 12px; font-weight: 500;">${escapeHTML(r.type)}</div>
            <div class="relay-row-url">${escapeHTML(r.url)}</div>

          <button class="danger" data-remove-relay="${i}" style="font-size: 11px; padding: 4px 8px;">Remove</button>
        </div>`).join("");

  const bridges = current.bridges || [];
  const bridgeRows = bridges.length === 0
    ? `<div style="color: var(--fg-dim); font-size: 12px; padding: 8px 0;">No bridge configured. Using relay or WebRTC only.</div>`

            <div style="font-size: 12px; font-weight: 500;">LAN Bridge</div>
            <div class="relay-row-url">${escapeHTML(b.url)}</div>

  return `

      <label>Workspace name</label>
      <div class="row" style="gap: 8px;">
        <input type="text" id="ws-rename" value="${escapeHTML(wsName)}" maxlength="64" style="flex: 1;">

        <div class="field" style="margin-bottom: 8px;">

        <div class="err" id="relay-err"></div>
        <div class="row">
          <button id="relay-cancel">Cancel</button>

        </div>

    <div class="field">
      <label>LAN Bridge</label>
      <div style="font-size: 12px; color: var(--fg-mute); margin-bottom: 8px;">

      </div>
      <div id="bridge-list">${bridgeRows}</div>
      <button id="btn-add-bridge" style="margin-top: 8px; font-size: 12px; padding: 6px 12px;">+ Add bridge</button>

        }
        if (state === "denied") {
          return `<div style="font-size: 12px; color: var(--warn);">Blocked — enable in your browser site settings, then reload.</div>`;
        }
        if (state === "default") {
          return `<button id="btn-enable-notif" class="primary" style="font-size: 12px; padding: 6px 12px;">Enable browser notifications</button>`;

      <div style="margin-top: 14px;">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" id="ws-dnd-toggle" ${current.meta.dnd ? "checked" : ""}>

        <div style="font-size: 12px; color: var(--fg-mute); margin-bottom: 6px;">Muted channels</div>
        ${current.channels.filter(c => !c.dm).length === 0
          ? `<div style="font-size: 12px; color: var(--fg-dim);">No channels yet.</div>`
          : current.channels.filter(c => !c.dm).map(c => {

              return `
                <label style="display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer;">

      <select id="rekey-schedule" style="font: inherit; background: var(--bg-elev); border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; color: var(--fg);">
        <option value="off" ${(current.meta.rekey_schedule || "off") === "off" ? "selected" : ""}>Off</option>
        <option value="quarterly" ${current.meta.rekey_schedule === "quarterly" ? "selected" : ""}>Every 90 days</option>
        <option value="yearly" ${current.meta.rekey_schedule === "yearly" ? "selected" : ""}>Yearly</option>
      </select>
      ${current.meta.last_rekey_at
        ? `<div style="font-size: 11px; color: var(--fg-dim); margin-top: 6px;">Last rekeyed ${formatDate(current.meta.last_rekey_at)}</div>`

      <label>Import workspace</label>
      <div style="font-size: 12px; color: var(--fg-mute); margin-bottom: 8px;">Restore a workspace from a <code>.workspace</code> backup file.</div>
      <button id="btn-import-ws">Import workspace…</button>
    </div>
  `;
}

function renderSettingsAdminTab(current, me) {
  const myUserId = me.id;
  const pendingPromos = current.doc
    ? WorkspaceDoc.getPendingPromotions(current.doc)
    : [];

  const memberRows = current.members.map(m => {
    const badgeClass = m.role === "owner" ? "owner" : m.role === "admin" ? "admin" : "";
    const canRemove = (me.role === "owner" || me.role === "admin") && m.id !== myUserId && m.role !== "owner";
    const canPromote = (me.role === "owner" || me.role === "admin") && m.id !== myUserId && m.role === "member";
    // v1.1: voluntary admin transfer — unilateral grant, no consensus needed.
    const canTransfer = (me.role === "owner" || me.role === "admin") && m.id !== myUserId && m.role === "member";
    // v1.1: step down — on your own row, only if you're admin (not owner)
    // and at least one other admin remains.
    const otherAdminsExist = current.members.some(x =>
      x.id !== myUserId && (x.role === "owner" || x.role === "admin")
    );
    const canStepDown = m.id === myUserId && m.role === "admin" && otherAdminsExist;
    return `
      <div class="member-row">
        <div class="avatar" style="background: ${avatarColorFor(m.id)}; width: 28px; height: 28px; font-size: 11px;">${escapeHTML(initials(m.name))}</div>
        <div class="member-row-info">
          <div class="member-row-name">${escapeHTML(m.name)}${m.id === myUserId ? " <span style='color:var(--fg-dim);font-size:11px;'>(you)</span>" : ""}</div>
          <div class="member-row-fp">${escapeHTML(m.fp || "")}</div>
        </div>
        <span class="role-badge ${badgeClass}">${escapeHTML(m.role)}</span>
        ${canPromote ? `<button class="icon-btn" data-draft-promo="${escapeHTML(m.id)}" title="Propose promotion to admin (needs 2 co-signers)" style="font-size: 12px; padding: 3px 8px;">Promote…</button>` : ""}
        ${canTransfer ? `<button class="icon-btn" data-transfer-admin="${escapeHTML(m.id)}" title="Grant admin to this member (unilateral)" style="font-size: 12px; padding: 3px 8px;">Make admin</button>` : ""}
        ${canStepDown ? `<button class="icon-btn" data-step-down="1" title="Step down from admin (unilateral; another admin remains)" style="font-size: 12px; padding: 3px 8px;">Step down</button>` : ""}
        ${canRemove ? `<button class="danger icon-btn" data-remove-member="${escapeHTML(m.id)}" title="Remove from workspace" style="font-size: 12px; padding: 3px 8px;">Remove</button>` : ""}
      </div>
    `;
  }).join("");

  const promoCards = pendingPromos.map(pp => {
    const target = current.members.find(m => m.id === pp.target_id);
    const drafter = current.members.find(m => m.id === pp.drafter_id);
    const supporters = pp.cosigs || [];
    const alreadySupported = supporters.some(s => s.user_id === myUserId);
    const threshold = 2;
    const canCosign = !alreadySupported && pp.target_id !== myUserId;
    const canFinalize = supporters.length >= threshold;
    const expiresIn = Math.max(0, Math.round((pp.expires_at - Date.now()) / 86400000));
    return `
      <div class="promo-card">
        <div class="promo-card-title">Promote ${escapeHTML(target?.name || pp.target_id)} to admin</div>
        <div class="promo-card-sub">
          Proposed by ${escapeHTML(drafter?.name || pp.drafter_id)} · ${supporters.length}/${threshold} supporters · expires in ${expiresIn}d
        </div>
        <div class="promo-card-actions">
          ${canCosign ? `<button class="primary" data-cosign="${escapeHTML(pp.id)}" style="font-size: 12px; padding: 5px 12px;">Support this promotion</button>` : ""}
          ${canFinalize ? `<button class="primary" data-finalize-promo="${escapeHTML(pp.id)}" style="font-size: 12px; padding: 5px 12px; background: var(--ok); border-color: var(--ok);">Activate promotion</button>` : ""}
          ${alreadySupported ? `<span style="color: var(--ok); font-size: 12px;">✓ You supported this</span>` : ""}
        </div>
      </div>
    `;
  }).join("");

  // Slice F1-C: user groups.
  const groups = current.doc ? WorkspaceDoc.getGroups(current.doc) : [];
  const groupRows = groups.length === 0
    ? `<div style="color: var(--fg-dim); font-size: 12px; padding: 8px 0;">No user groups yet. Groups expand to their members when mentioned.</div>`
    : groups.map(g => {
        const memberNames = (g.memberIds || [])
          .map(uid => current.members.find(mm => mm.id === uid)?.name || "?")
          .join(", ");
        return `
          <div class="relay-row">
            <div class="relay-row-info">
              <div style="font-size: 13px; font-weight: 500;">@${escapeHTML(g.name)} <span style="color:var(--fg-dim); font-weight: 400; font-size: 11px;">· ${(g.memberIds||[]).length} members</span></div>
              <div style="font-size: 11px; color: var(--fg-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHTML(memberNames)}</div>
            </div>
            <button class="danger" data-remove-group="${escapeHTML(g.id)}" style="font-size: 11px; padding: 4px 8px;">Delete</button>
          </div>`;
      }).join("");

  return `
    <div class="field">
      <label>Members</label>
      <div id="admin-member-list">${memberRows}</div>
    </div>
    ${pendingPromos.length > 0 ? `
      <div class="field">
        <label>Pending promotions</label>
        <div id="admin-promo-list">${promoCards}</div>
      </div>
    ` : ""}
    <div class="field">
      <label>User groups</label>
      <div style="font-size: 12px; color: var(--fg-mute); margin-bottom: 8px;">
        Named sets of members. Mentioning <code>@groupname</code> notifies everyone in the group.
      </div>
      <div id="group-list">${groupRows}</div>
      <button id="btn-add-group" style="margin-top: 8px; font-size: 12px; padding: 6px 12px;">+ Create group</button>
      <div id="group-form" style="display: none; margin-top: 10px; padding: 12px; background: var(--bg-sunken); border-radius: 8px;">
        <div class="field" style="margin-bottom: 8px;">
          <label>Name</label>
          <input type="text" id="group-name" placeholder="e.g. engineering" maxlength="40" style="font-size: 13px;">
        </div>
        <div class="field" style="margin-bottom: 8px;">
          <label>Members</label>
          <div id="group-member-list" style="max-height: 180px; overflow-y: auto; padding: 4px 0;">
            ${current.members.map(mm => `
              <label style="display: flex; align-items: center; gap: 8px; padding: 3px 0; cursor: pointer;">
                <input type="checkbox" class="group-member-cb" data-mid="${escapeHTML(mm.id)}">
                <div class="avatar" style="width: 18px; height: 18px; font-size: 9px; background: ${avatarColorFor(mm.id)}">${escapeHTML(initials(mm.name))}</div>
                <span style="font-size: 12px;">${escapeHTML(mm.name)}</span>
              </label>
            `).join("")}
          </div>
        </div>
        <div class="err" id="group-err"></div>
        <div class="row">
          <button id="group-cancel">Cancel</button>
          <div class="grow"></div>
          <button class="primary" id="group-save">Create group</button>
        </div>
      </div>
    </div>
    <div class="err" id="admin-err"></div>
  `;
}

function wireSettingsTab(tab, wrap, current, me, wsName) {
  if (tab === "identity") {
    const btn = wrap.querySelector("#s-backup-btn");
    if (btn) btn.onclick = () => { wrap.remove(); openBackupModal(); };
    // Profile auto-detect + save
    const $auto = wrap.querySelector("#profile-tz-auto");
    if ($auto) $auto.onclick = () => {
      wrap.querySelector("#profile-tz").value = Intl.DateTimeFormat().resolvedOptions().timeZone;
    };
    const $save = wrap.querySelector("#profile-save");
    if ($save) $save.onclick = async () => {
      const $err = wrap.querySelector("#profile-err");
      $err.textContent = "";
      const patch = {
        pronouns: wrap.querySelector("#profile-pronouns").value.trim(),
        title:    wrap.querySelector("#profile-title").value.trim(),
        timezone: wrap.querySelector("#profile-tz").value.trim(),
      };
      $save.disabled = true;
      try {
        await sendProfileUpdate(current, patch);
        wrap.remove();
        setState({ modal: null });
      } catch (e) {
        $err.textContent = e.message;
        $save.disabled = false;
      }
    };
    // Palette picker — apply on click, persist, update active highlight in place.
    const $grid = wrap.querySelector("#palette-grid");
    if ($grid) {
      $grid.querySelectorAll(".palette-card").forEach(card => {
        card.onclick = () => {
          const id = card.dataset.paletteId;
          Palette.apply(id);
          $grid.querySelectorAll(".palette-card").forEach(c =>
            c.classList.toggle("active", c.dataset.paletteId === id));
        };
      });
    }

  } else if (tab === "devices") {
    const $addBtn = wrap.querySelector("#btn-add-device-pair");
    if ($addBtn) {
      $addBtn.onclick = () => { wrap.remove(); openDevicePairInitiatorModal(current); };
    }
    wrap.querySelectorAll("[data-revoke-device]").forEach(btn => {
      const deviceId = btn.dataset.revokeDevice;
      btn.onclick = async () => {
        if (!confirm(`Revoke device ${deviceId.slice(0, 12)}…?\n\nIt will no longer be able to send messages as you. Old messages it sent remain valid.`)) return;
        btn.disabled = true;
        try {
          await sendDeviceRevoke(current, deviceId);
          wrap.remove();
          renderSettingsModal();
        } catch (e) {
          alert("Revoke failed: " + e.message);
          btn.disabled = false;
        }
      };
    });

  } else if (tab === "workspace") {
    const $err = wrap.querySelector("#rename-err");
    wrap.querySelector("#settings-rename").onclick = async () => {
      $err.textContent = "";
      const newName = wrap.querySelector("#ws-rename").value.trim();
      if (!newName) { $err.textContent = "Name is required."; return; }
      if (newName === wsName) { $err.textContent = "Same as current name."; return; }
      wrap.querySelector("#settings-rename").disabled = true;
      try {
        const update = WorkspaceDoc.setName(current.doc, newName);
        await sendWorkspacePatch(current, update);
        wrap.remove();
        setState({ modal: null });
      } catch (e) {
        $err.textContent = e.message;
        wrap.querySelector("#settings-rename").disabled = false;
      }
    };

    // Relay management
    const $addBtn = wrap.querySelector("#btn-add-relay");
    const $relayForm = wrap.querySelector("#relay-form");
    $addBtn.onclick = () => {
      $relayForm.style.display = "block";
      $addBtn.style.display = "none";
    };
    wrap.querySelector("#relay-cancel").onclick = () => {
      $relayForm.style.display = "none";
      $addBtn.style.display = "";
    };
    wrap.querySelector("#relay-test").onclick = async () => {
      const $re = wrap.querySelector("#relay-err");
      $re.textContent = "";
      const url = wrap.querySelector("#relay-url").value.trim();
      const token = wrap.querySelector("#relay-token").value.trim();
      if (!url) { $re.textContent = "URL required."; return; }
      try {
        const probe = new URL(`/ws/${encodeURIComponent(current.meta.id)}/cursor`, url);
        const resp = await fetch(probe.href, {
          headers: token ? { "Authorization": "Bearer " + token } : {}
        });
        if (resp.ok || resp.status === 404) {
          $re.style.color = "var(--ok)";
          $re.textContent = "✓ Relay reachable (status " + resp.status + ")";
          $re.style.color = "var(--ok)";
        } else {
          $re.textContent = "Relay returned " + resp.status;
        }
      } catch (e) {
        $re.textContent = "Connection failed: " + e.message;
      }
    };
    wrap.querySelector("#relay-save").onclick = async () => {
      const $re = wrap.querySelector("#relay-err");
      $re.textContent = "";
      const url = wrap.querySelector("#relay-url").value.trim();
      const token = wrap.querySelector("#relay-token").value.trim();
      const type = wrap.querySelector("#relay-type").value;
      if (!url) { $re.textContent = "URL required."; return; }
      try { new URL(url); } catch (_) { $re.textContent = "Invalid URL."; return; }
      const relay = { type, url, token, added_at: Date.now() };
      if (!current.relays) current.relays = [];
      current.relays.push(relay);
      // Persist relay config in workspace meta
      current.meta.relays = current.relays;
      await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
      // §35: start relay transport immediately.
      RelayMgr.startForWorkspace(current);
      // Propagate relay config to peers via workspace.patch so they
      // can use the relay without manual reconfiguration.
      if (current.doc) {
        const update = WorkspaceDoc.setRelays(current.doc, current.relays);
        sendWorkspacePatch(current, update).catch(e => console.warn("relay patch:", e));
      }
      wrap.remove();
      setState({ modal: null });
    };
    wrap.querySelectorAll("[data-remove-relay]").forEach(btn => {
      btn.onclick = async () => {
        const idx = parseInt(btn.dataset.removeRelay, 10);
        if (!isNaN(idx)) {
          current.relays.splice(idx, 1);
          current.meta.relays = current.relays;
          await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
          // §35: restart (or stop) relay transport after removal.
          RelayMgr.startForWorkspace(current);
          // Propagate the removal to peers.
          if (current.doc) {
            const update = WorkspaceDoc.setRelays(current.doc, current.relays);
            sendWorkspacePatch(current, update).catch(e => console.warn("relay patch:", e));
          }
          wrap.remove();
          setState({ modal: null });
        }
      };
    });

    // §37: Bridge wiring
    const $addBridge   = wrap.querySelector("#btn-add-bridge");
    const $bridgeForm  = wrap.querySelector("#bridge-form");
    $addBridge.onclick = () => { $bridgeForm.style.display = "block"; $addBridge.style.display = "none"; };
    wrap.querySelector("#bridge-cancel").onclick = () => {
      $bridgeForm.style.display = "none"; $addBridge.style.display = "";
    };
    wrap.querySelector("#bridge-autodetect").onclick = async () => {
      const $be = wrap.querySelector("#bridge-err");
      $be.textContent = "Detecting bridge…";
      try {
        const found = await detectBridge();
        if (found) {
          wrap.querySelector("#bridge-url").value = found.url;
          $be.textContent = `Found bridge at ${found.url} — fp: ${found.fp}`;
        } else {
          $be.textContent = "No bridge found. Is mehfil-bridge running on this machine or LAN?";
        }
      } catch (e) {
        $be.textContent = "Detection failed: " + e.message;
      }
    };
    wrap.querySelector("#bridge-save").onclick = async () => {
      const $be = wrap.querySelector("#bridge-err");
      $be.textContent = "";
      const url = wrap.querySelector("#bridge-url").value.trim();
      if (!url) { $be.textContent = "URL required."; return; }
      try { new URL(url); } catch (_) { $be.textContent = "Invalid URL."; return; }
      const bridge = { url, fp: null, added_at: Date.now() };
      if (!current.bridges) current.bridges = [];
      current.bridges.push(bridge);
      current.meta.bridges = current.bridges;
      await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
      // §37: start bridge transport (will prompt for fp on first connect).
      BridgeMgr.startForWorkspace(current);
      wrap.remove();
      setState({ modal: null });
    };
    wrap.querySelectorAll("[data-remove-bridge]").forEach(btn => {
      btn.onclick = async () => {
        const idx = parseInt(btn.dataset.removeBridge, 10);
        if (!isNaN(idx)) {
          if (!current.bridges) current.bridges = [];
          current.bridges.splice(idx, 1);
          current.meta.bridges = current.bridges;
          await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
          BridgeMgr.stop(current.meta.id);
          wrap.remove();
          setState({ modal: null });
        }
      };
    });

    // v2: rekey schedule dropdown.
    const $rekeyScheduleSel = wrap.querySelector("#rekey-schedule");
    if ($rekeyScheduleSel) $rekeyScheduleSel.onchange = async () => {
      current.meta.rekey_schedule = $rekeyScheduleSel.value;
      await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
    };

    // Export / import
    // §36: Invite by code (only wired when relay configured → button exists)
    const $invByCode = wrap.querySelector("#btn-invite-by-code");
    if ($invByCode) $invByCode.onclick = () => { wrap.remove(); openPairingCodeSendModal(current); };
    wrap.querySelector("#btn-export-ws").onclick = () => { wrap.remove(); openExportModal(); };
    wrap.querySelector("#btn-import-ws").onclick = () => { wrap.remove(); openImportModal(); };

    // Slice N1: notifications + DND + per-channel mute
    const $enableNotif = wrap.querySelector("#btn-enable-notif");
    if ($enableNotif) $enableNotif.onclick = async () => {
      $enableNotif.disabled = true;
      const res = await Notifier.requestPermission();
      if (res === "granted") {
        // Re-render the tab body to reflect the new permission state.
        wrap.querySelector("#stab-body").innerHTML = renderSettingsTabBody("workspace", current, me, (me.role === "owner" || me.role === "admin"), wsName);
        wireSettingsTab("workspace", wrap, current, me, wsName);
      } else {
        $enableNotif.disabled = false;
        $enableNotif.textContent = res === "denied" ? "Blocked — check browser settings" : "Enable browser notifications";
      }
    };
    const $dndToggle = wrap.querySelector("#ws-dnd-toggle");
    if ($dndToggle) $dndToggle.onchange = async () => {
      await setWorkspaceDnd(current, $dndToggle.checked);
      // Re-render the workspace shell so the sidebar mute indicators update.
      if (State.view === "workspace") render();
    };
    wrap.querySelectorAll(".ch-mute-toggle").forEach(cb => {
      cb.onchange = async () => {
        await toggleChannelMute(current, cb.dataset.chId);
        if (State.view === "workspace") render();
      };
    });

  } else if (tab === "admin") {
    const $err = wrap.querySelector("#admin-err");

    // Remove member
    wrap.querySelectorAll("[data-remove-member]").forEach(btn => {
      btn.onclick = async () => {
        const targetId = btn.dataset.removeMember;
        const target = current.members.find(m => m.id === targetId);
        if (!target) return;
        const confirmed = confirm(
          `Remove ${target.name} from this workspace?\n\n` +
          `They'll keep any messages they've already received. ` +
          `New keys will be distributed to remaining members so they can't read future messages.`
        );
        if (!confirmed) return;
        btn.disabled = true;
        try {
          await sendMemberRemove(current, targetId);
          wrap.remove();
          setState({ modal: null });
        } catch (e) {
          $err.textContent = e.message;
          btn.disabled = false;
        }
      };
    });

    // Draft promotion
    wrap.querySelectorAll("[data-draft-promo]").forEach(btn => {
      btn.onclick = async () => {
        const targetId = btn.dataset.draftPromo;
        const target = current.members.find(m => m.id === targetId);
        if (!target) return;
        btn.disabled = true;
        try {
          await draftPromotion(current, targetId);
          wrap.remove();
          openSettings("admin");
        } catch (e) {
          $err.textContent = e.message;
          btn.disabled = false;
        }
      };
    });
    // v1.1: voluntary admin transfer.
    wrap.querySelectorAll("[data-transfer-admin]").forEach(btn => {
      btn.onclick = async () => {
        const targetId = btn.dataset.transferAdmin;
        const target = current.members.find(m => m.id === targetId);
        if (!target) return;
        if (!confirm(`Make ${target.name} an admin?\n\nThis is a unilateral grant — no co-signature needed. You will still be an admin.`)) return;
        btn.disabled = true;
        try {
          await sendTransferAdmin(current, targetId);
          wrap.remove();
          openSettings("admin");
        } catch (e) {
          $err.textContent = e.message;
          btn.disabled = false;
        }
      };
    });
    // v1.1: step-down (self-demote).
    const $stepDown = wrap.querySelector("[data-step-down]");
    if ($stepDown) {
      $stepDown.onclick = async () => {
        if (!confirm("Step down from admin?\n\nYou'll become a regular member and lose admin controls. Another admin remains so the workspace keeps an admin presence.")) return;
        $stepDown.disabled = true;
        try {
          await sendStepDown(current);
          wrap.remove();
          setState({ modal: null });
        } catch (e) {
          $err.textContent = e.message;
          $stepDown.disabled = false;
        }
      };
    }

    // Co-sign promotion
    wrap.querySelectorAll("[data-cosign]").forEach(btn => {
      btn.onclick = async () => {
        const proposalId = btn.dataset.cosign;
        btn.disabled = true;
        try {
          await addCoSignPromotion(current, proposalId);
          wrap.remove();
          openSettings("admin");
        } catch (e) {
          $err.textContent = e.message;
          btn.disabled = false;
        }
      };
    });

    // Finalize promotion
    wrap.querySelectorAll("[data-finalize-promo]").forEach(btn => {
      btn.onclick = async () => {
        const proposalId = btn.dataset.finalizePromo;
        btn.disabled = true;
        try {
          await finalizePromotion(current, proposalId);
          wrap.remove();
          setState({ modal: null });
        } catch (e) {
          $err.textContent = e.message;
          btn.disabled = false;
        }
      };
    });

    // Slice F1-C: user groups — create/delete.
    const $addGroup = wrap.querySelector("#btn-add-group");
    const $groupForm = wrap.querySelector("#group-form");
    if ($addGroup) {
      $addGroup.onclick = () => {
        $groupForm.style.display = "block";
        $addGroup.style.display = "none";
      };
    }
    wrap.querySelector("#group-cancel")?.addEventListener("click", () => {
      $groupForm.style.display = "none";
      $addGroup.style.display = "";
      wrap.querySelector("#group-name").value = "";
      wrap.querySelectorAll(".group-member-cb").forEach(cb => { cb.checked = false; });
      wrap.querySelector("#group-err").textContent = "";
    });
    wrap.querySelector("#group-save")?.addEventListener("click", async () => {
      const $ge = wrap.querySelector("#group-err");
      $ge.textContent = "";
      const name = wrap.querySelector("#group-name").value.trim();
      if (!name) { $ge.textContent = "Name is required."; return; }
      if (!/^[a-z0-9][a-z0-9-]{0,39}$/i.test(name)) {
        $ge.textContent = "Letters, digits, and hyphens only.";
        return;
      }
      const existing = WorkspaceDoc.getGroups(current.doc);
      if (existing.some(g => g.name.toLowerCase() === name.toLowerCase())) {
        $ge.textContent = "A group with this name already exists.";
        return;
      }
      const memberIds = [...wrap.querySelectorAll(".group-member-cb:checked")].map(cb => cb.getAttribute("data-mid"));
      if (memberIds.length === 0) { $ge.textContent = "Pick at least one member."; return; }
      wrap.querySelector("#group-save").disabled = true;
      try {
        const group = {
          id: bytesToB64Url(Crypto.rand(8)),
          name,
          memberIds,
          createdBy: me.id,
          createdAt: Date.now(),
        };
        const update = WorkspaceDoc.addGroup(current.doc, group);
        await sendWorkspacePatch(current, update);
        wrap.remove();
        openSettings("admin");
      } catch (e) {
        $ge.textContent = e.message;
        wrap.querySelector("#group-save").disabled = false;
      }
    });
    wrap.querySelectorAll("[data-remove-group]").forEach(btn => {
      btn.onclick = async () => {
        const groupId = btn.dataset.removeGroup;
        if (!confirm("Delete this group? Past mentions keep their effect; future @groupname stops expanding.")) return;
        btn.disabled = true;
        try {
          const update = WorkspaceDoc.removeGroup(current.doc, groupId);
          await sendWorkspacePatch(current, update);
          wrap.remove();
          openSettings("admin");
        } catch (e) {
          alert("Delete failed: " + e.message);
          btn.disabled = false;
        }
      };
    });
  }
}

/* ------------------------------------------------------------
 *  §23  Invite modal (inviter side — WT-04, WT-05)
 *
 *  Flow:
 *    1. Modal opens → spin up WebRTC transport as inviter
 *       (ICE gathering runs in background ~1-2s).
 *    2. Once gathered, build invite payload and render QR + URL.
 *    3. User copies URL / QR, sends OOB.
 *    4. Modal also shows a "paste their reply here" field.
 *    5. On paste + submit, decode reply, accept answer, attach
 *       transport to PeerMgr. Data channel opens, member.join
 *       arrives from the joiner, welcome is sent back, sidebar
 *       updates with the new member.
 * ------------------------------------------------------------ */
/**
 * Gather a WebRTC offer and build the invite fragment + URL. `offline`
 * forces host-only ICE (offline-mesh spec §2) for the in-room, no-internet
 * handshake. Shared by the online modal open and the offline switch.
 */
async function prepareInvite(offline) {
  const transport = await WebRTCTransport.asInviter(offline ? { offline: true } : {});
  const current = State.current;
  const myRaw = await idbGet(current.wsDB, "keys", "root");
  const gchKey = await idbGet(current.wsDB, "keys", "ch:" + current.meta.general_channel_id);
  const me = current.members.find(m => m.id === bytesToB64Url(State.identity.pubkey));
  // C6: sign the invite transcript. The joiner recomputes the fingerprint
  // from the signed key, so `inviter_fp_bytes` is no longer sent.
  const inviteSignKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const frag = await InvitePayload.encode({
    ws: current.meta.id,
    name: current.meta.name,
    wrk: myRaw,
    inviter: bytesToB64Url(State.identity.pubkey),
    inviter_name: me.name,
    general_channel_id: current.meta.general_channel_id,
    general_channel_key: gchKey,
    offer_sdp: transport.localSdp(),
    expires: Date.now() + 24 * 3600 * 1000
  }, inviteSignKey);
  const url = `${location.origin}${location.pathname}#join=${frag}`;
  return { transport, url, frag };
}

async function openInviteModal() {
  setState({ modal: "invite" });
  // Kick off the WebRTC gather + payload prep asynchronously.
  if (!State.invite) {
    State.invite = { phase: "gathering" };
    try {
      const { transport, url, frag } = await prepareInvite(isOffline());
      State.invite = { phase: "ready", transport, url, frag };
      if (State.modal === "invite") renderInviteModal();
    } catch (e) {
      State.invite = { phase: "error", error: e.message };
      if (State.modal === "invite") renderInviteModal();
    }
  }
}

/**
 * Switch the invite to the offline in-room handshake: re-gather the offer
 * host-only (no STUN) so it works on a hotspot with no uplink, then show it
 * as a cycling QR. Used when navigator.onLine can't be trusted (spec §2).
 */
async function switchInviteToOffline() {
  const old = State.invite;
  if (old && old.transport && !old.transport.offline && !PeerMgr.hasPeers(State.current?.meta?.id)) {
    try { old.transport.close(); } catch {}
  }
  if (old && old._cyc) { old._cyc.stop(); old._cyc = null; }
  State.invite = { phase: "gathering", forceOffline: true, tab: "room" };
  renderInviteModal();
  try {
    const { transport, url, frag } = await prepareInvite(true);
    State.invite = { phase: "ready", transport, url, frag, tab: "room", forceOffline: true };
  } catch (e) {
    State.invite = { phase: "error", error: e.message };
  }
  if (State.modal === "invite") renderInviteModal();
}

function renderInviteModal() {
  // Remove any existing modal layer first (idempotent re-render).
  document.querySelectorAll(".modal-bg").forEach(el => el.remove());

  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  const card = document.createElement("div");
  card.className = "card invite-panel";
  wrap.appendChild(card);
  document.body.appendChild(wrap);

  const inv = State.invite;
  if (!inv || inv.phase === "gathering") {
    card.innerHTML = `
      <h1>Invite someone</h1>
      <p class="sub">Setting up a direct peer connection… (this takes a second)</p>
      <div class="row">
        <button id="invite-close">Close</button>
      </div>
    `;
    card.querySelector("#invite-close").onclick = closeInviteModal;
    return;
  }
  if (inv.phase === "error") {
    card.innerHTML = `
      <h1>Invite</h1>
      <p class="sub" style="color: var(--danger);">${escapeHTML(inv.error)}</p>
      <button id="invite-close">Close</button>
    `;
    card.querySelector("#invite-close").onclick = closeInviteModal;
    return;
  }

  // Ready — render tabs, QR/URL, reply paste area.
  const tab = inv.tab || "remote";
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const me = State.current.members.find(m => m.id === myUserId);
  const fpHex = me.fp;   // pre-computed during Workspace.open
  card.innerHTML = `
    <h1>Invite someone</h1>
    <div class="invite-tabs">
      <button class="invite-tab ${tab === 'remote' ? 'active' : ''}" data-tab="remote">They're remote</button>
      <button class="invite-tab ${tab === 'room'   ? 'active' : ''}" data-tab="room">They're in the room</button>
    </div>
    <div id="invite-body"></div>
    <div class="fp-block" style="margin-top: 18px;">
      <div id="invite-trust-card"></div>
      <div class="fp-meta">
        <div class="fp-label">Your fingerprint</div>
        <div class="fp-hex">${escapeHTML(fpHex)}</div>
      </div>
    </div>
    <div class="field" style="margin-top: 14px;">
      <label>When they've sent you their reply URL, paste it here:</label>
      <input type="text" id="reply-url" placeholder="https://…#join-reply=…">
      <div class="err" id="reply-err"></div>
    </div>
    <div class="row">
      <button id="invite-close">Cancel</button>
      <div class="grow"></div>
      <button class="primary" id="invite-accept">Accept reply</button>
    </div>
  `;

  const renderBody = async () => {
    const $body = card.querySelector("#invite-body");
    if (inv.tab === "room") {
      const offlineMode = isOffline() || inv.forceOffline;
      if (offlineMode) {
        // Offline-mesh spec §3.3 / §6: cycling multi-frame offer QR the
        // other device scans in-page, plus a button to scan their reply
        // back. No link, no server, no internet — camera to camera.
        $body.innerHTML = `
          <p class="sub">No internet needed. Have them open Mehfil on the same WiFi hotspot, tap <strong>Join by scanning (offline)</strong>, and point their camera here. When they show you their reply code, tap <strong>Scan their reply</strong>.</p>
          <p class="sub" style="font-size: 12px;">Don't have Mehfil on their phone yet? <a id="inv-download" style="color: var(--accent); cursor: pointer;">Download it</a> and AirDrop / Quick Share the file across first.</p>
          <div id="qr-holder"><span class="sub">building code…</span></div>
          <div class="row" style="margin-top: 10px; justify-content: center;">
            <button class="primary" id="scan-reply-btn">Scan their reply</button>
          </div>`;
        const invDl = card.querySelector("#inv-download");
        if (invDl) invDl.onclick = downloadAppFile;
        if (inv._cyc) { inv._cyc.stop(); inv._cyc = null; }
        try {
          const frames = await QRFrames.encode({ j: inv.frag });
          const holder = card.querySelector("#qr-holder");
          if (holder) inv._cyc = await CyclingQR.render(holder, frames);
        } catch (e) {
          const holder = card.querySelector("#qr-holder");
          if (holder) holder.innerHTML = `<span class="sub" style="color: var(--danger);">${escapeHTML(e.message)}</span>`;
        }
        const scanBtn = card.querySelector("#scan-reply-btn");
        if (scanBtn) scanBtn.onclick = () => openScanModal({
          title: "Scan their reply",
          hint: "Point your camera at the reply code on their screen.",
          expectKey: "r",
          onDone: async (obj) => {
            try {
              if (!obj || typeof obj.r !== "string") throw new Error("That isn't a Mehfil reply code.");
              const reply = await InvitePayload.decodeReply(obj.r);
              if (reply.ws !== State.current.meta.id) throw new Error("That reply is for a different workspace.");
              await inv.transport.acceptAnswer(reply.answer_sdp);
              PeerMgr.attach(State.current.meta.id, inv.transport, reply.joiner_user_id);
              if (inv._cyc) { inv._cyc.stop(); inv._cyc = null; }
              State.invite = null;
              closeInviteModal();
            } catch (e) {
              alert(e.message);
            }
          }
        });
      } else {
        $body.innerHTML = `
          <div class="qr-box" id="qr-holder"><span class="sub">loading QR…</span></div>
          <p class="sub" style="text-align: center; margin-top: 8px;"><a id="go-offline" style="color: var(--accent); cursor: pointer;">No internet on this network? Scan-to-connect instead →</a></p>`;
        try {
          const svg = await QR.toSVG(inv.url);
          card.querySelector("#qr-holder").innerHTML = svg;
        } catch (e) {
          card.querySelector("#qr-holder").innerHTML = `<span class="sub" style="color: var(--danger);">${escapeHTML(e.message)}</span>`;
        }
        const goOffline = card.querySelector("#go-offline");
        if (goOffline) goOffline.onclick = switchInviteToOffline;
      }
    } else {
      $body.innerHTML = `
        <p class="sub">Copy this link and send it however you normally do (WhatsApp, Signal, email). Then verify your fingerprint with them out of band — read it aloud, compare on video, something you both trust.</p>
        <div class="url-box" id="invite-url">${escapeHTML(inv.url)}</div>
        <div class="row">
          <button id="copy-url">Copy link</button>
        </div>
      `;
      card.querySelector("#copy-url").onclick = async () => {
        try {
          await navigator.clipboard.writeText(inv.url);
          card.querySelector("#copy-url").textContent = "Copied ✓";
        } catch {
          // fall back: select the text so user can cmd-c
          const range = document.createRange();
          range.selectNode(card.querySelector("#invite-url"));
          getSelection().removeAllRanges();
          getSelection().addRange(range);
        }
      };
    }
  };
  renderBody();

  // Trust card
  TrustCard.renderFromPubkey(State.identity.pubkey, 80).then(svg => {
    const el = card.querySelector("#invite-trust-card");
    if (el) el.innerHTML = svg;
  });

  // Tab switching
  card.querySelectorAll(".invite-tab").forEach(btn => {
    btn.onclick = () => {
      inv.tab = btn.getAttribute("data-tab");
      renderInviteModal();
    };
  });

  card.querySelector("#invite-close").onclick = closeInviteModal;
  card.querySelector("#invite-accept").onclick = async () => {
    const $err = card.querySelector("#reply-err");
    const raw = card.querySelector("#reply-url").value.trim();
    $err.textContent = "";
    try {
      const m = raw.match(/#join-reply=([A-Za-z0-9_-]+)/);
      if (!m) throw new Error("That doesn't look like a reply URL.");
      const reply = await InvitePayload.decodeReply(m[1]);
      if (reply.ws !== State.current.meta.id) throw new Error("That reply is for a different workspace.");
      await inv.transport.acceptAnswer(reply.answer_sdp);
      // Attach transport; peer user id becomes known when we receive member.join.
      PeerMgr.attach(State.current.meta.id, inv.transport, reply.joiner_user_id);
      State.invite = null;
      closeInviteModal();
      render();
    } catch (e) {
      $err.textContent = e.message;
    }
  };
}

function closeInviteModal() {
  document.querySelectorAll(".modal-bg").forEach(el => el.remove());
  if (State.invite && State.invite._cyc) { State.invite._cyc.stop(); State.invite._cyc = null; }
  // Don't tear down the transport if it was just accepted — only if
  // we're really canceling the invite flow entirely.
  if (State.invite && State.invite.phase === "ready" && !PeerMgr.hasPeers(State.current?.meta?.id)) {
    try { State.invite.transport.close(); } catch {}
    State.invite = null;
  }
  setState({ modal: null });
}

/* ------------------------------------------------------------
 *  §26  Drafts — per-channel composer state persisted to the
 *       `drafts` IndexedDB store so refresh / channel switch
 *       doesn't lose typed-but-unsent text.
 * ------------------------------------------------------------ */
async function loadDraft(channelId) {
  if (!State.current || !channelId) return "";
  return (await idbGet(State.current.wsDB, "drafts", channelId)) || "";
}

async function persistDraft(channelId, body) {
  if (!State.current || !channelId) return;
  if (body && body.trim()) {
    await idbPut(State.current.wsDB, "drafts", body, channelId);
  } else {
    await idbDelete(State.current.wsDB, "drafts", channelId);
  }
}

async function clearDraft(channelId) {
  if (!State.current || !channelId) return;
  await idbDelete(State.current.wsDB, "drafts", channelId);
}

/**
 * Turn a message-text div into an editable field in place. Enter commits,
 * Escape cancels. No separate modal — matches the spec's "calm by default"
 * tone and avoids covering the surrounding conversation.
 */
/* ------------------------------------------------------------
 *  §28c  Reaction picker popup — Slice 3d.1
 *
 *  8 curated emoji for the happy path. No full keyboard picker in
 *  v1 — too much code for too little value. Users can toggle an
 *  existing reaction by clicking its pill (which reuses whatever
 *  emoji someone else already sent), so the 8-emoji limit only
 *  affects first-reacts.
 * ------------------------------------------------------------ */
const REACTION_EMOJI = ["👍", "❤️", "😂", "😮", "😢", "🙏", "👀", "✅"];

function openReactionPicker(anchorEl, messageId) {
  // Close any existing picker first.
  document.querySelectorAll(".reaction-picker").forEach(el => el.remove());

  const picker = document.createElement("div");
  picker.className = "reaction-picker";
  picker.innerHTML = REACTION_EMOJI.map(e =>
    `<button data-emoji="${escapeHTML(e)}">${e}</button>`
  ).join("");
  document.body.appendChild(picker);

  // Position just above the anchor button, right-aligned to it.
  const rect = anchorEl.getBoundingClientRect();
  picker.style.top = (rect.top - picker.offsetHeight - 6) + "px";
  picker.style.left = (rect.right - picker.offsetWidth) + "px";

  picker.querySelectorAll("button").forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      const emoji = btn.getAttribute("data-emoji");
      picker.remove();
      try {
        await toggleReaction(State.current, messageId, emoji);
        render();
      } catch (err) { console.error(err); }
    };
  });

  // Dismiss on next outside click.
  setTimeout(() => {
    const dismiss = (e) => {
      if (!picker.contains(e.target)) {
        picker.remove();
        document.removeEventListener("click", dismiss);
      }
    };
    document.addEventListener("click", dismiss);
  }, 0);
}

function beginInlineEdit(messageId) {
  const el = document.querySelector(`[data-msg-text="${CSS.escape(messageId)}"]`);
  if (!el) return;
  const msg = State.current.messages.find(m => m.id === messageId);
  if (!msg || msg.deleted) return;
  const original = msg.body;
  // Reset the content to plain text. The render path may have injected
  // styled spans (@mention highlighting) which the user shouldn't have
  // to navigate around while editing.
  el.textContent = original;
  el.classList.add("editing");
  el.contentEditable = "true";
  el.focus();
  // Put the cursor at the end.
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  const finish = async (commit) => {
    el.contentEditable = "false";
    el.classList.remove("editing");
    const newBody = el.innerText;
    if (commit && newBody.trim() && newBody !== original) {
      try {
        await sendMessageEdit(State.current, messageId, newBody);
      } catch (err) {
        console.error(err);
      }
    }
    render();
  };

  el.onkeydown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); finish(true); }
    else if (e.key === "Escape")          { e.preventDefault(); finish(false); }
  };
  // Paste sanitization: strip any HTML from clipboard content and insert
  // as plain text. Prevents styled paste from leaking markup into the
  // contenteditable div, which would end up in the new message body
  // as-is once innerText is read.
  el.onpaste = (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData("text/plain");
    // document.execCommand is deprecated but still the only way to do an
    // "insert plain text at caret" that updates the contenteditable's
    // internal selection model correctly. The modern alternative is
    // Selection.collapse + Range.insertNode which is verbose and fiddly.
    document.execCommand("insertText", false, text);
  };
  el.onblur = () => finish(true);
}

/* ------------------------------------------------------------
 *  §27  Create-channel modal — WT-13
 * ------------------------------------------------------------ */
function openCreateChannelModal() {
  const wrap = document.createElement("div");

  // always included implicitly.
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const others = State.current.members.filter(m => m.id !== myUserId && m.x25519_pub);
  // Slice F1-B: only owners/admins can mark channels as announcement-only.
  const me = State.current.members.find(m => m.id === myUserId);
  const isAdminUser = me && (me.role === "owner" || me.role === "admin");
  wrap.innerHTML = `
    <div class="card" style="max-width: 460px;">
      <h1>Create a channel</h1>
      <p class="sub">Public channels are visible to everyone in the workspace. Private channels are invisible to non-members.</p>
      <div class="field">
        <label>Name</label>
        <input type="text" id="ch-name" placeholder="e.g. design-review" autofocus maxlength="40">
        <div class="err" id="ch-err"></div>
      </div>
      <div class="field">
        <label>Topic (optional)</label>
        <input type="text" id="ch-topic" placeholder="What's this channel for?" maxlength="140">
      </div>
      <div class="field">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" id="ch-private">
          <span>Private channel</span>
        </label>
      </div>
      ${isAdminUser ? `
      <div class="field">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" id="ch-announce">
          <span>Announcement channel</span>
        </label>
        <div style="font-size: 11px; color: var(--fg-dim); margin-left: 24px; margin-top: 2px;">
          Only admins can post. Everyone else reads.
        </div>
      </div>` : ""}
      <div class="field">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" id="ch-canvas">
          <span>Canvas channel</span>
        </label>
        <div style="font-size: 11px; color: var(--fg-dim); margin-left: 24px; margin-top: 2px;">
          Collaborative document instead of a message stream. Public only (v1).
        </div>
      </div>
      <div class="field" id="ch-members-field" style="display: none;">
        <label>Who's in it?</label>
        ${others.length === 0 ? `<div class="sub">No other members yet — invite someone first.</div>` : others.map(m => `
          <label style="display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer;">
            <input type="checkbox" class="ch-member-cb" data-mid="${escapeHTML(m.id)}">
            <div class="avatar" style="width: 20px; height: 20px; font-size: 10px; background: ${avatarColorFor(m.id)}">${escapeHTML(initials(m.name))}</div>
            <span>${escapeHTML(m.name)}</span>
          </label>
        `).join("")}
      </div>
      <div class="row">
        <button id="ch-cancel">Cancel</button>
        <div class="grow"></div>
        <button class="primary" id="ch-create">Create</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  const close = () => wrap.remove();
  wrap.querySelector("#ch-cancel").onclick = close;

  // Toggle the members field when private is checked.
  const $private = wrap.querySelector("#ch-private");
  const $canvas  = wrap.querySelector("#ch-canvas");
  const $membersField = wrap.querySelector("#ch-members-field");
  $private.onchange = () => {
    $membersField.style.display = $private.checked ? "" : "none";
    // Private + canvas are mutually exclusive in v1
    if ($private.checked) $canvas.checked = false;
    $canvas.disabled = $private.checked;
  };
  $canvas.onchange = () => {
    if ($canvas.checked) { $private.checked = false; $private.disabled = true; }
    else { $private.disabled = false; }
  };

  const submit = async () => {
    const $err = wrap.querySelector("#ch-err");
    $err.textContent = "";
    const name = wrap.querySelector("#ch-name").value.trim();
    const topic = wrap.querySelector("#ch-topic").value.trim();
    const isPrivate = $private.checked;
    const isAnnounce = !!wrap.querySelector("#ch-announce")?.checked;
    const isCanvas   = !!$canvas.checked;
    if (!name) { $err.textContent = "Name is required."; return; }
    if (!/^[a-z0-9][a-z0-9-]{0,39}$/i.test(name)) {
      $err.textContent = "Letters, digits, and hyphens only.";
      return;
    }
    if (State.current.channels.find(c => c.name === name)) {
      $err.textContent = "A channel with this name already exists.";
      return;

    let memberIds = null;
    if (isPrivate) {
      const picked = [...wrap.querySelectorAll(".ch-member-cb:checked")].map(cb => cb.getAttribute("data-mid"));

    try {
      const ch = await sendChannelCreate(State.current, name, topic, { isPrivate, isAnnounce, isCanvas, memberIds });
      close();
      setState({ currentChannel: ch.id });
    } catch (e) {
      $err.textContent = e.message;
      wrap.querySelector("#ch-create").disabled = false;
    }
  };
  wrap.querySelector("#ch-create").onclick = submit;
  wrap.querySelector("#ch-name").onkeydown = (e) => { if (e.key === "Enter") submit(); };
  wrap.querySelector("#ch-topic").onkeydown = (e) => { if (e.key === "Enter") submit(); };
}

/* ------------------------------------------------------------
 *  §24  Join flow (joiner side — WT-07)
 *
 *  Entry: the URL fragment `#join=<payload>` is detected during
 *  boot. Flow: decode payload → verify screen → name+color →
 *  spin up transport → generate reply URL → show it to the user
 *  to send back → wait for data channel open + welcome envelope
 *  → transition into workspace shell.
 * ------------------------------------------------------------ */
async function beginJoinFromFragment(fragment, viaScan = false) {
  try {
    const payload = await InvitePayload.decode(fragment);
    // Guard: if we already have this workspace locally, open it directly
    // instead of re-joining. Matches the "reopen" case where a user opens
    // an old invite URL to a workspace they're already in.
    const existing = await idbGet(State.globalDB, "workspaces", payload.ws);
    if (existing) {
      // Clean the URL and open normally.
      history.replaceState(null, "", location.pathname);
      await openWorkspaceById(payload.ws);
      return;
    }
    // viaScan: the offer arrived by camera on a hotspot with no internet
    // (offline-mesh spec §3.3), so the reply travels back the same way —
    // as a cycling QR — and the WebRTC side gathers host-only.
    State.join = { payload, phase: "verify", viaScan };
    setState({ view: "join-verify" });
  } catch (e) {
    // C6/M8: an expired invite to a workspace we're ALREADY in is the
    // "I bookmarked the join URL" case — reopen it rather than erroring.
    // Only the expiry error qualifies, and only after the signature has
    // already verified: moving the reopen check ahead of verification would
    // reopen it for fully forged invites too.
    if (e.code === "invite_expired" && e.ws) {
      const held = await idbGet(State.globalDB, "workspaces", e.ws).catch(() => null);
      if (held) {
        history.replaceState(null, "", location.pathname);
        await openWorkspaceById(e.ws);
        return;
      }
    }
    setState({ view: "error", error: new Error("Couldn't read that invite: " + e.message) });
  }
}

/**
 * Offline-mesh spec §3.3 / §6: the joiner-side entry point. Scan the
 * inviter's cycling offer QR in-page (no URL, no channel), then run the
 * normal verify → name → handshake flow, returning the answer as a cycling
 * QR the inviter scans back.
 */
function beginScanToJoin() {
  openScanModal({
    title: "Join by scanning",
    hint: "On the same WiFi hotspot, point your camera at the code the other person is showing.",
    expectKey: "j",
    onDone: async (obj) => {
      if (!obj || typeof obj.j !== "string") {
        setState({ view: "error", error: new Error("That QR code isn't a Mehfil invite.") });
        return;
      }
      await beginJoinFromFragment(obj.j, true);
    }
  });
}

        <div class="fp-block">

            <div class="fp-hex">${escapeHTML(fpHex)}</div>
          </div>
        </div>

        </div>

  };

    setState({ view: "join-name-color" });
  };

function renderJoinNameColor() {
  const p = State.join.payload;
  const picked = State.join.color || AVATAR_COLORS[0];
  $app.innerHTML = `
    <div class="center">
      <div class="card" style="max-width: 420px;">

          <label>Your name</label>
          <input type="text" id="join-name" placeholder="e.g. Bose" autofocus maxlength="40">
          <div class="err" id="join-err"></div>
        </div>

          <label>Pick a color</label>
          <div class="color-grid" id="color-grid">
            ${AVATAR_COLORS.map(c => `
              <div class="color-swatch ${c === picked ? 'selected' : ''}" data-color="${c}" style="background: ${c}"></div>
            `).join("")}
          </div>
        </div>
        <div class="row">
          <button id="join-back">Back</button>
          <div class="grow"></div>

        </div>
      </div>
    </div>
  `;
  document.getElementById("join-back").onclick = () => setState({ view: "join-verify" });
  document.querySelectorAll("[data-color]").forEach(el => {

      State.join.color = el.getAttribute("data-color");
      renderJoinNameColor();
    };
  });

    State.join.name = name;
    State.join.color = State.join.color || AVATAR_COLORS[0];

}

async function beginJoinHandshake() {
  try {
    const p = State.join.payload;
    // 1. Spin up WebRTC as joiner, starting from the offer SDP in the payload.
    //    A scanned (offline) handshake forces host-only ICE explicitly —
    //    navigator.onLine can't be trusted to be false on a hotspot with no
    //    uplink (spec §2), so the user's choice of the offline path decides.
    const transport = await WebRTCTransport.asJoiner(p.offer_sdp, State.join.viaScan ? { offline: true } : {});
    const answerSdp = transport.localSdp();
    const myUserId = bytesToB64Url(State.identity.pubkey);

    // 2. Create local workspace DB and seed state.
    const wsDB = await openWorkspaceDB(p.ws);
    const deviceId = State.identity.device_id;   // certified per-install device id

    // Store root key and general channel key.
    await idbPut(wsDB, "keys", p.wrk, "root");
    await idbPut(wsDB, "keys", p.general_channel_key, "ch:" + p.general_channel_id);

    // Seed channels (general only for Slice 2).
    const channelRec = {
      id: p.general_channel_id,
      name: "general",
      topic: "",
      private: false,
      members: [p.inviter, myUserId],
      created_at: Date.now()
    };
    await idbPut(wsDB, "channels", channelRec);

    // Seed members: self + inviter (Asha). Inviter's full member info will
    // be refined when member.welcome arrives with the authoritative snapshot.
    const selfMember = {
      // H6: sanitise our OWN name too. Peers run it through
      // sanitizeDisplayName on receipt, so seeding the raw string here is
      // how our record ends up differing from everyone else's copy of it.
      id: myUserId, name: sanitizeDisplayName(State.join.name), color: State.join.color,
      role: "member", devices: [deviceId], joined_at: Date.now(),
      x25519_pub: State.identity.x25519_pub
    };
    // Inviter's x25519_pub is not in the invite fragment (spec §10); it
    // arrives with member.welcome. Seed as null for now; dispatch will
    // overwrite on welcome receipt.
    const inviterMember = {
      // H6: the invite payload is attacker-shaped input like any other — and
      // this record is seeded before the welcome arrives, so the snapshot
      // loop's sanitise never reaches it (it only runs for members it hasn't
      // already seen). This is the one place the inviter's name gets cleaned.
      id: p.inviter, name: sanitizeDisplayName(p.inviter_name), color: avatarColorFor(p.inviter),
      role: "owner", devices: [], joined_at: Date.now(),
      x25519_pub: null
    };
    await attachFingerprint(selfMember);
    await attachFingerprint(inviterMember);
    await idbPut(wsDB, "members", selfMember);
    await idbPut(wsDB, "members", inviterMember);

    // Store workspace meta with lc_counter = 0.
    const meta = {
      id: p.ws, name: p.name, created_at: Date.now(),
      member_count: 2, device_id: deviceId,
      general_channel_id: p.general_channel_id, lc_counter: 0
    };
    await idbPut(wsDB, "keys", meta, "workspace_meta");

    // Register in global DB.
    await idbPut(State.globalDB, "workspaces", {
      id: p.ws, name: p.name, created_at: Date.now(), last_opened_at: Date.now()
    });

    // 3. Build an in-memory bundle matching Workspace.open shape.
    //    This MUST carry every field Workspace.open returns — the incoming
    //    member.welcome runs through the same dispatch pipeline as any
    //    envelope, which reads bundle.hwm (CausalBuffer.canDeliver),
    //    bundle.causalBuffer, bundle.gaps (GapTracker), and bundle.doc
    //    (workspace.patch). A partial bundle here made canDeliver throw on
    //    the first welcome, so join hung forever on "Waiting…" despite a
    //    live connection. Seed the doc the same way Workspace.open does.
    const rootKey = await Crypto.importAesRaw(p.wrk);
    const generalKey = await Crypto.importAesRaw(p.general_channel_key);
    let joinDoc = await WorkspaceDoc.load(wsDB);
    if (!joinDoc) joinDoc = await WorkspaceDoc.migrateFromLegacy(wsDB, meta, [channelRec], [inviterMember, selfMember]);
    const bundle = {
      wsDB, meta,
      channels: [channelRec],
      members: [inviterMember, selfMember],
      channelKeys: { [p.general_channel_id]: generalKey },
      rootKey,
      messages: [],
      presence: {},
      // Causal-delivery + CRDT state (Slice 4b/4c) — empty for a fresh joiner,
      // populated as envelopes arrive. Mirrors Workspace.open's return shape.
      hwm: new Map(),
      causalBuffer: [],
      gaps: new Map(),
      doc: joinDoc,
      relays: meta.relays || [],
      bridges: meta.bridges || [],
      readMarkers: new Map(),
      bookmarks: new Map(),
      reminders: new Map(),
      scheduledSends: new Map(),
      // C2: the open join request this client is waiting on. A member.welcome
      // rewrites our whole projection — channels, keys, members and their
      // ROLES — so it is only ever legitimate as the answer to a join we
      // started, from the inviter we verified out of band, addressed to us,
      // carrying the nonce we minted. Cleared the moment one is applied, so
      // it is single-use. Anything arriving outside that window is dropped.
      pendingJoin: (() => {
        const pj = { nonce: bytesToB64(Crypto.rand(16)), inviter: canonUserId(p.inviter) };
        // The admission grant arrives from the inviter over the data channel
        // (a join.grant envelope). member.join waits on this so it can carry
        // the grant; the join.grant handler resolves it.
        pj.grant = new Promise(res => { pj._resolveGrant = res; });
        return pj;
      })()
    };
    State.current = bundle;
    State.currentChannel = p.general_channel_id;

    // 4. Attach the transport so incoming envelopes are processed.
    PeerMgr.attach(p.ws, transport, p.inviter);

    // 5. Build the reply URL right away (answer SDP + joiner profile).
    const replyFrag = await InvitePayload.encodeReply({
      ws: p.ws,
      joiner_user_id: myUserId,
      joiner_name: State.join.name,
      joiner_color: State.join.color,
      answer_sdp: answerSdp
    });
    const replyUrl = `${location.origin}${location.pathname}#join-reply=${replyFrag}`;
    State.join.replyUrl = replyUrl;
    State.join.replyFrag = replyFrag;
    State.join.phase = State.join.viaScan ? "reply-scan" : "reply-url";

    // 6. When the data channel opens (after inviter accepts the reply),
    //    send the member.join envelope. member.welcome from inviter will
    //    then transition us into the workspace shell via EnvelopeDispatch.
    transport.opened.then(async () => {
      // Wait for the inviter's admission grant (bounded), then send member.join
      // carrying it. If it never comes (a pre-admission inviter, or a broken
      // handshake), member.join goes out without one and peers reject it —
      // which surfaces as the join-stall hint rather than a silent half-join.
      const grant = await Promise.race([
