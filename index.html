  removePin(doc, channelId, msgId) {
    return this.mutate(doc, () => {
      const pins = doc.getMap("pins");
      const list = pins.get(channelId);
      if (!Array.isArray(list)) return;
      const next = list.filter(p => p.msgId !== msgId);
      if (next.length === 0) pins.delete(channelId);
      else pins.set(channelId, next);
    });
  },

  getPins(doc, channelId) {
    const pins = doc.getMap("pins");
    const list = pins.get(channelId);
    return Array.isArray(list) ? list.slice() : [];
  },

  // ========== Pending promotions (Slice 5 / §4.3) ==========
  // Stored in the Yjs doc so they're shared with peers via workspace.patch.

  setPendingPromotion(doc, proposal) {
    return this.mutate(doc, () => {
      if (!doc.getMap("pending_promotions")) {
        // Older docs that were created before Slice 5 may not have this map.
        // Yjs creates the map lazily on first access.
      }
      doc.getMap("pending_promotions").set(
        proposal.id,
        JSON.parse(JSON.stringify(proposal))
      );
    });
  },

  removePendingPromotion(doc, proposalId) {
    return this.mutate(doc, () => {
      const m = doc.getMap("pending_promotions");
      if (m.has(proposalId)) m.delete(proposalId);
    });
  },

  getPendingPromotions(doc) {
    const m = doc.getMap("pending_promotions");
    const out = [];
    m.forEach((v) => {
      if (v && !v.removed) out.push({ ...v });
    });
    return out;
  },

  /**
   * Build an initial Yjs doc from the existing (pre-4b.2) projected
   * state. Used by the migration path in Workspace.open.
   */
  async migrateFromLegacy(wsDB, meta, channels, members) {
    const doc = this.create();
    Y.transact(doc, () => {
      doc.getMap("meta").set("name", meta.name);
      doc.getMap("meta").set("created_at", meta.created_at || Date.now());
      const chMap = doc.getMap("channels");
      for (const ch of channels) {
        chMap.set(ch.id, JSON.parse(JSON.stringify(ch)));
      }
      const memMap = doc.getMap("members");
      for (const m of members) {
        const clean = { ...m };
        if (clean.x25519_pub instanceof Uint8Array) {
          clean.x25519_pub_b64 = bytesToB64(clean.x25519_pub);
          delete clean.x25519_pub;
        }
        if (clean.fpBytes) delete clean.fpBytes;
        memMap.set(m.id, JSON.parse(JSON.stringify(clean)));
      }
    }, "migration");
    await this.save(wsDB, doc);
    return doc;
  }
};

/* ------------------------------------------------------------
 *  §20b  BlobTransfer — peer-to-peer attachment delivery
 *         (Slice 3c.1)
 *
 *  A receiver who sees an attachment.ref envelope but lacks the
 *  ciphertext bytes in local OPFS can ask the sender (or any
 *  attached peer) for them. The sender reads the raw ciphertext
 *  from their OPFS, chunks at 16KB, and streams each chunk over
 *  the data channel via `PeerMgr.sendBlobChunk`. The receiver
 *  reassembles the chunks in memory, writes the full ciphertext
 *  to its own OPFS at the same blob_id, and re-renders so the
 *  attachment goes from "Not downloaded" to viewable.
 *
 *  Wire framing lives in PeerMgr §20 above. This module tracks
 *  the in-flight state on both sides.
 *
 *  Dedupe: if the same blob is requested twice before the first
 *  request completes, the second call is a no-op (the in-flight
 *  Map catches it).
 * ------------------------------------------------------------ */
// Chunk size: the WebRTC data channel has a practical ~16KB safe-message
// limit across browsers/routers. We reserve ~2KB of headroom for the
// msgpack envelope (map header, key strings, seq/total integers, bin
// length prefix) so the framed packet stays under the limit even at
// the maximum total_chunks count.
const CHUNK_SIZE = 14 * 1024;   // 14KB of payload per chunk
// M5: the most chunks a within-limits blob can legitimately need, plus slack.
// A peer claiming more than this is rejected before it can size a buffer on it.
const MAX_BLOB_CHUNKS = Math.ceil(MAX_ATTACHMENT_SIZE / CHUNK_SIZE) + 16;
const AUTO_FETCH_SIZE_LIMIT = 1024 * 1024;   // auto-fetch images ≤ 1MB

const BlobTransfer = {
  // In-flight inbound transfers, keyed by blob_id.
  // Value: { total, chunks: Uint8Array[], received: Set<number>, bytesReceived }
  _inbound: new Map(),

  /**
   * Ask the attached peer for a blob we don't have. Idempotent —
   * a second call while a fetch is in flight is a no-op.
   */
  async requestBlob(workspaceId, blobId) {
    if (this._inbound.has(blobId)) return;
    // Mark as in-flight with an empty state; the first chunk will
    // populate the `total` field and size the buffer.
    this._inbound.set(blobId, {
      total: null,
      chunks: null,
      received: new Set(),
      bytesReceived: 0,
      startedAt: Date.now()
    });
    const ok = await PeerMgr.sendBlobRequest(workspaceId, blobId);
    if (!ok) {
      this._inbound.delete(blobId);
    }
  },

  /**
   * Handle an incoming blob.request: look up the blob in our local
   * OPFS, chunk the ciphertext, send each chunk back as a blob.chunk
   * packet. If we don't have the blob, drop silently — later slices
   * (Slice 4 gossip) may forward the request to other peers.
   */
  async serveRequest(workspaceId, blobId) {
    const ct = await BlobStore.getCiphertext(workspaceId, blobId);
    if (!ct) return;   // we don't have it; silent drop
    const total = Math.ceil(ct.length / CHUNK_SIZE);
    for (let seq = 0; seq < total; seq++) {
      const start = seq * CHUNK_SIZE;
      const end   = Math.min(start + CHUNK_SIZE, ct.length);
      const slice = ct.subarray(start, end);
      // slice is a view into the larger buffer; the msgpack encoder
      // will serialize it as-is. We don't need to copy.
      const ok = await PeerMgr.sendBlobChunk(workspaceId, blobId, seq, total, slice);
      if (!ok) return;   // transport broke, abort
    }
  },

  /**
   * Handle an incoming blob.chunk: assemble into the in-flight
   * buffer, and on the last chunk write the full ciphertext to
   * local OPFS and re-render any affected messages.
   */
  async receiveChunk(workspaceId, chunk) {
    let state = this._inbound.get(chunk.blob_id);
    if (!state) {
      // We didn't ask for this blob, or the fetch was canceled.
      // In Slice 3c.1 we drop unsolicited chunks; Slice 4 may
      // gossip-forward them.
      return;
    }
    if (state.total === null) {
      // First chunk sizes the buffer. M5: `total` is peer-supplied, so
      // `new Array(total)` was an unbounded allocation. A blob is capped at
      // MAX_ATTACHMENT_SIZE and chunked at CHUNK_SIZE, so anything past that
      // many chunks is a lie — reject it rather than allocate on it.
      if (!Number.isInteger(chunk.total) || chunk.total <= 0 || chunk.total > MAX_BLOB_CHUNKS) {
        console.warn("blob: implausible chunk total, dropping", chunk.total);
        this._inbound.delete(chunk.blob_id);
        return;
      }
      state.total = chunk.total;
      state.chunks = new Array(chunk.total);
    }
    // M5: seq indexes the buffer, so an out-of-range seq writes a stray sparse
    // slot (and would never complete). Bound it to [0, total).
    if (!Number.isInteger(chunk.seq) || chunk.seq < 0 || chunk.seq >= state.total) return;
    if (state.received.has(chunk.seq)) return;   // duplicate, ignore
    state.chunks[chunk.seq] = chunk.data;
    state.received.add(chunk.seq);
    state.bytesReceived += chunk.data.length;

    // Any listener watching transfer progress (e.g. a downloading
    // spinner in the UI) picks this up on the next render.
    if (State.view === "workspace") render();

    if (state.received.size === state.total) {
      // All chunks present. Concatenate.
      let totalBytes = 0;
      for (const c of state.chunks) totalBytes += c.length;
      const assembled = new Uint8Array(totalBytes);
      let offset = 0;
      for (const c of state.chunks) {
        assembled.set(c, offset);
        offset += c.length;
      }
      this._inbound.delete(chunk.blob_id);

      // Write to OPFS under the same blob_id; both sides are now
      // symmetric and BlobStore.get will decrypt successfully.
      await BlobStore.putCiphertext(workspaceId, chunk.blob_id, assembled);

      // Flip the `available` flag on any message referencing this blob,
      // and re-render so the image/file renders now that we have bytes.
      if (State.current && State.current.meta.id === workspaceId) {
        for (const msg of State.current.messages) {
          if (msg.attachment && msg.attachment.blob_id === chunk.blob_id) {
            msg.attachment.available = true;
          }
        }
        if (State.view === "workspace") render();
      }
    }
  },

  /**
   * Is a blob currently being fetched? Used by the render path to
   * show a "downloading" spinner instead of "not available yet".
   */
  isInFlight(blobId) {
    return this._inbound.has(blobId);
  },

  /**
   * Progress (0-1) of an in-flight transfer, or null if not in flight
   * or the first chunk hasn't arrived yet.
   */
  progressOf(blobId) {
    const state = this._inbound.get(blobId);
    if (!state || state.total === null) return null;
    return state.received.size / state.total;
  }
};

/* ------------------------------------------------------------
 *  §21  Envelope dispatch — incoming envelope handlers
 *
 *  Every incoming envelope (over any transport) lands here.
 *  Responsibilities:
 *    1. Verify signature, drop on failure
 *    2. Persist to `envelopes` store (idempotent by id)
 *    3. Decrypt the inner payload
 *    4. Apply type-specific projection update
 *    5. Trigger a re-render if the workspace is currently open
 * ------------------------------------------------------------ */
// Envelope types that are NOT persisted to the `envelopes` store. They're
// still signed + encrypted for authenticity + privacy, but live only in
// memory — reloading the workspace starts presence from a blank slate.
// Spec §4.1 marks `presence.update` and `typing.start` as ephemeral.
const EPHEMERAL_TYPES = new Set([
  "presence.update", "typing.start",
  "huddle.join", "huddle.leave", "huddle.signal",
  // Offline-mesh spec §4: gossip-relayed mesh signaling. Reserved here so
  // it is never persisted to IDB or pushed to store-and-forward transports.
  // The full multi-hop relay + auto-dial (M1) lands behind its own hardware
  // gate — see the dispatch case and MEHFIL-OFFLINE-MESH-SPEC.md §4.
  "signal.relay"
]);

const EnvelopeDispatch = {
  async receive(workspaceId, env) {
    // Only process if this workspace is currently open — later slices
    // will handle background workspaces too via a registry.
    const current = State.current;
    if (!current || current.meta.id !== workspaceId) {
      console.warn("Envelope for non-open workspace:", workspaceId);
      return;
    }

    // H2 (receiver half): the envelope must claim the workspace it arrived on.
    // Dispatch compared only the transport's workspaceId against current, not
    // the envelope's own `env.ws`, so a genuine, threshold-valid envelope from
    // workspace X could be re-wrapped and replayed into workspace Y that shares
    // members (the cross-workspace promote replay behind C4). This is the
    // receiver-side close; putting `ws` inside the *signed* payload — so it
    // can't be re-wrapped at all — is the wire-format half, deferred with H2's
    // DM-key domain separation (plan/pending.md).
    if (env.ws !== workspaceId) {
      console.warn("Dropping envelope whose env.ws != workspace:", env.ws, workspaceId);
      return;
    }

    // 1. Signature verification.
    const ok = await Envelope.verify(env);
    if (!ok) {
      console.warn("Dropping envelope with bad signature:", env.id);
      return;
    }

    // 1b. Active-device authorization. verify() proved the cert is
    // internally consistent; this proves the device is still ALLOWED to act —
    // i.e. it hasn't been revoked out of its owner's active-device list. This
    // is the enforcement half of C5: a revoked (or stolen) device's cert stays
    // valid forever, so the only thing that stops it is dropping envelopes
    // whose env.dev is no longer in the sender's device list.
    //
    // Only at LIVE ingest, never on reload replay: a revoked device's past
    // messages were authored legitimately while it was active, so revocation
    // must not retroactively erase history — it stops future authority (here)
    // and future readership (the rekey).
    //
    // Exempt the join handshake: member.join's sender isn't a member yet (it's
    // the envelope that adds them, gated by the admission grant), and
    // member.welcome is gated by the C2 inviter+nonce check while the joiner
    // may not yet know the inviter's device. NOTE: these two are the one path
    // where a revoked device's envelope can still be persisted and replay on
    // reload — it's harmless only because the member.join handler is idempotent
    // for an existing member and member.welcome is bound by the C2 checks. If
    // either handler's internal guards are ever loosened, revisit this
    // exemption.
    //
    // Scope: this gate covers a *revoked device of a current member*. It does
    // NOT cover a removed member or an unknown sender — the `sender &&` clause
    // deliberately lets an envelope whose from isn't a current member through
    // (its authz is the per-handler checks + the rekey that denies removed
    // members future keys). Don't mistake this for member-removal enforcement.
    if (env.type !== "member.join" && env.type !== "member.welcome" && env.type !== "join.grant") {
      const sender = current.members.find(m => canonUserId(m.id) === canonUserId(env.from));
      if (sender && !(Array.isArray(sender.devices) && sender.devices.includes(env.dev))) {
        console.warn("Dropping envelope from a revoked/unknown device:", env.from, env.dev);
        return;
      }
    }

    // 2. Dedupe + persist — EXCEPT ephemeral types, which skip both
    //    (each heartbeat is intentionally a new envelope and we don't
    //    want to clutter the envelopes store or survive reload).
    //
    //    IMPORTANT (Slice 4b.1): persistence happens BEFORE the causal
    //    delivery check below. This means envelopes that are buffered
    //    due to missing dependencies are already on disk, so a shutdown
    //    mid-buffer is recoverable — Workspace.open's replay loop will
    //    process them in ts-sorted order after hydration, and the ones
    //    whose dependencies eventually arrive will flow through the
    //    CausalBuffer.drain path normally.
    if (!EPHEMERAL_TYPES.has(env.type)) {
      const existing = await idbGet(current.wsDB, "envelopes", env.id);
      if (existing) return;
      await idbPut(current.wsDB, "envelopes", env);
    }

    // 2b. Causal delivery check (Slice 4b.1). Ephemeral envelopes
    //     skip this — presence heartbeats have no causal dependencies.
    //     Non-ephemeral envelopes go through CausalBuffer: if
    //     dependencies are satisfied, they proceed to dispatch
    //     immediately; otherwise they're buffered and the drain
    //     path will pick them up when prerequisites arrive.
    if (!EPHEMERAL_TYPES.has(env.type)) {
      if (!CausalBuffer.canDeliver(current, env)) {
        CausalBuffer.buffer(current, env);
        return;
      }
    }

    // 3. Figure out the decryption key. For envelopes addressed to a
    //    known channel we look up the channel key; for workspace-level
    //    envelopes (member.join / welcome) we use the workspace root key.
    //    If `env.ch` is set but unknown, this may be the first DM envelope
    //    from a peer — try to resolve it via the deterministic DM channel
    //    id derivation (§28). If that matches a (me, member) pair, the
    //    DM channel gets materialized on the fly and we proceed.
    let key;
    if (env.ch) {
      // Prefer per-sender key for group DMs (sender-keys pattern).
      const senderKey = current.channelKeys[env.ch + ":" + env.from];
      const sharedKey = current.channelKeys[env.ch];
      if (senderKey || sharedKey) {
        key = senderKey || sharedKey;
      } else {
        const resolved = await tryResolveIncomingDm(current, env.ch);
        if (resolved) {
          key = current.channelKeys[env.ch + ":" + env.from] || current.channelKeys[env.ch];
        } else {
          // Channel unknown and not a DM we can derive — likely a private
          // channel we're not a member of. Drop silently.
          return;
        }
      }
    } else {
      key = current.rootKey;   // workspace-level envelopes
    }
    if (!key) {
      console.warn("No key to decrypt envelope", env.id, env.type);
      return;
    }

    let inner;
    try {
      inner = await Envelope.decrypt(env, key);
    } catch (e) {
      console.warn("Decrypt failed for", env.id, e);
      return;
    }

    // 4. Type-specific handling.
    await this.handle(current, env, inner);

    // 4b. Advance the per-sender high-water-mark and drain the
    //     causal buffer. Any envelopes whose dependencies are now
    //     satisfied get delivered in a transitive pass.
    //     Slice 4c: also observe lc peeks to populate the gap tracker.
    if (!EPHEMERAL_TYPES.has(env.type)) {
      CausalBuffer.advance(current, env);
      GapTracker.observe(current, env);
      if (CausalBuffer.size(current) > 0) {
        // Re-dispatch released envelopes via a trampoline that
        // skips the causal check (they just passed it). Use a local
        // helper to avoid recursion through the full receive path.
        await CausalBuffer.drain(current, async (releasedEnv) => {
          // Run the same post-persist, post-causal flow for the
          // released envelope. We inline the key lookup + decrypt
          // + handle steps instead of re-entering receive() so the
          // causal check doesn't fire a second time.
          let relKey;
          if (releasedEnv.ch) {
            const relSenderKey = current.channelKeys[releasedEnv.ch + ":" + releasedEnv.from];
            const relSharedKey = current.channelKeys[releasedEnv.ch];
            if (relSenderKey || relSharedKey) {
              relKey = relSenderKey || relSharedKey;
            } else {
              const res = await tryResolveIncomingDm(current, releasedEnv.ch);
              if (res) relKey = current.channelKeys[releasedEnv.ch + ":" + releasedEnv.from] || current.channelKeys[releasedEnv.ch];
              else return;
            }
          } else {
            relKey = current.rootKey;
          }
          if (!relKey) return;
          let relInner;
          try { relInner = await Envelope.decrypt(releasedEnv, relKey); }
          catch { return; }
          await this.handle(current, releasedEnv, relInner);
          CausalBuffer.advance(current, releasedEnv);
          GapTracker.observe(current, releasedEnv);
        });
      }
    }

    // 5. Re-render.
    if (State.view === "workspace") render();
  },

  async handle(current, env, inner) {
    switch (env.type) {
      case "poll.vote": {
        const pollMsg = current.messages.find(m => m.id === inner.target);
        if (!pollMsg || !pollMsg.poll) break;
        if (!pollMsg.votes) pollMsg.votes = {};
        if (typeof inner.optionIdx === "number" && inner.optionIdx >= 0 && inner.optionIdx < pollMsg.poll.options.length) {
          pollMsg.votes[env.from] = inner.optionIdx;
        } else if (inner.optionIdx === null || inner.optionIdx === -1) {
          delete pollMsg.votes[env.from];
        }
        break;
      }

      case "checklist.toggle": {
        const tgt = current.messages.find(m => m.id === inner.target);
        if (!tgt || !tgt.checklist) break;
        const idx = inner.itemIdx;
        if (typeof idx === "number" && tgt.checklist.items[idx]) {
          tgt.checklist.items[idx].done = !!inner.done;
        }
        break;
      }

      case "message.create":
        // Slice F1-B: on announcement channels, drop any message whose
        // sender isn't currently an owner or admin. The sender-side gate
        // in sendMessageNow is an honest-client UX check; this receive-
        // side filter keeps the projection clean against forged/stale
        // senders. Role is computed against our current membership view
        // so a demoted admin's in-flight messages stop appearing on peers
        // as soon as the demotion arrives.
        {
          const _ch = current.channels.find(c => c.id === env.ch);
          if (_ch && _ch.announce) {
            const sender = current.members.find(m => m.id === env.from);
            if (!(sender?.role === "owner" || sender?.role === "admin")) {
              console.warn("announce channel: dropping non-admin message", env.id);
              break;
            }
          }
        }
        // Security: re-parse the mentions list against our own members +
        // groups projection. A malicious sender can put arbitrary user ids
        // in inner.mentions to force notifications on everyone even when
        // their body has no @name tokens — mute/DND is supposed to allow
        // @mentions through. Trust the signature for authorship; trust our
        // own parse for who was mentioned.
        const trustedMentions = parseMentions(
          inner.body || "",
          current.members,
          current.doc ? WorkspaceDoc.getGroups(current.doc) : []
        );
        // Skip if already projected (can happen when replaying history to a
        // joiner who races their own send).
        if (!current.messages.find(m => m.id === env.id)) {
          current.messages.push({
            id: env.id, ch: env.ch, from: env.from, ts: env.ts, body: inner.body,
            mentions: trustedMentions.length > 0 ? trustedMentions : undefined,
            thread: inner.thread || undefined,
            poll: inner.poll || undefined,
            votes: inner.poll ? {} : undefined,
            checklist: inner.checklist ? JSON.parse(JSON.stringify(inner.checklist)) : undefined,
            delivery: "delivered",
            edited: false,
            deleted: false,
            lc: env.lc
          });
          current.messages.sort((a, b) => a.ts - b.ts);
          // Add to on-disk search index (Slice 5 / WT-18). Non-blocking.
          const newMsg = current.messages.find(m => m.id === env.id);
          if (newMsg) SearchIndex.addMessage(current.wsDB, newMsg).catch(() => {});
          // Slice N1: fire a desktop notification for live messages. Skip
          // stale backlog (relay catch-up on reconnect) via a 60s horizon —
          // historical replay already bypasses this path (it goes through
          // Workspace.open). Mentions override mute/DND; see Notifier.
          // Pass the verified mentions so a forged-mentions envelope can't
          // trigger a breakthrough on muted channels.
          const myUid = bytesToB64Url(State.identity.pubkey);
          const isRecent = (Date.now() - env.ts) < 60_000;
          const innerForNotif = { ...inner, mentions: trustedMentions };
          if (isRecent && Notifier.shouldNotify(current, env, innerForNotif, myUid)) {
            Notifier.fire(env, innerForNotif, current, current.members);
          }
        }
        break;

      case "attachment.ref": {
        // Incoming file attachment. The envelope payload carries the
        // per-blob key + IV + blob_id; the actual ciphertext lives in
        // the sender's OPFS. The blob bytes arrive separately via the
        // BlobTransfer protocol (§20b) — requested eagerly for small
        // images, lazily on click for everything else.
        if (current.messages.find(m => m.id === env.id)) break;
        const mySelf = env.from === bytesToB64Url(State.identity.pubkey);
        const available = mySelf
          ? true
          : await BlobStore.has(current.meta.id, inner.blob_id);
        current.messages.push({
          id: env.id, ch: env.ch, from: env.from, ts: env.ts,
          body: "",
          attachment: {
            blob_id: inner.blob_id,
            key: inner.key,
            iv: inner.iv,
            size: inner.size,
            mime: inner.mime,
            name: inner.name,
            available
          },
          delivery: "delivered",
          edited: false,
          deleted: false,
          lc: env.lc
        });
        current.messages.sort((a, b) => a.ts - b.ts);

        // Auto-fetch trigger: if we're not the sender, the blob isn't
        // already local, a peer is attached, and the file is a small
        // image, kick off a blob request immediately. Larger files and
        // non-images wait for a user click in the render path.
        if (!mySelf && !available && PeerMgr.hasPeers(current.meta.id)) {
          const isSmallImage = (inner.mime || "").startsWith("image/")
                            && inner.size <= AUTO_FETCH_SIZE_LIMIT;
          if (isSmallImage) {
            // Fire and forget — progress + completion are handled by
            // BlobTransfer.receiveChunk which will re-render on success.
            BlobTransfer.requestBlob(current.meta.id, inner.blob_id)
              .catch(e => console.warn("auto-fetch failed:", e));
          }
        }
        // Slice N1: notification for live incoming attachments.
        {
          const myUid = bytesToB64Url(State.identity.pubkey);
          const isRecent = (Date.now() - env.ts) < 60_000;
          if (isRecent && Notifier.shouldNotify(current, env, inner, myUid)) {
            Notifier.fire(env, inner, current, current.members);
          }
        }
        break;
      }

      case "message.edit": {
        // LWW by (lc, user_id). We compare vector clocks component-wise;
        // the edit wins if its lc strictly dominates the current message's
        // last-known lc, else it ties on (lc, user_id) lexicographically.
        // Spec §6.3 — for Slice 3a we use a simplified "latest ts for same
        // sender wins" since vector clocks with a single writer per message
        // collapse to scalar comparison. Full lc comparison in Slice 4.
        const msg = current.messages.find(m => m.id === inner.target);
        if (msg && !msg.deleted) {
          // Only the original sender can edit their own message. Any other
          // signer → drop silently (could log to quarantine in Slice 5).
          if (env.from === msg.from && env.ts >= msg.ts) {
            msg.body = inner.body;
            msg.edited = true;
            msg.edited_at = env.ts;
          }
        }
        break;
      }

      case "message.delete": {
        // Add-only tombstone set, wins over edits. Only the original sender
        // (or an admin, in Slice 5) can delete. For 3a: sender-only.
        const msg = current.messages.find(m => m.id === inner.target);
        if (msg && env.from === msg.from) {
          msg.deleted = true;
          msg.deleted_at = env.ts;
          msg.body = "";   // clear for safety; UI renders placeholder
        }
        break;
      }

      case "reaction.add": {
        // OR-Set add by (user_id, emoji). Anyone in the channel can react
        // to any message — no sender-only restriction.
        const msg = current.messages.find(m => m.id === inner.target);
        if (!msg) break;
        if (!msg.reactions) msg.reactions = {};
        if (!msg.reactions[inner.emoji]) msg.reactions[inner.emoji] = [];
        if (!msg.reactions[inner.emoji].includes(env.from)) {
          msg.reactions[inner.emoji].push(env.from);
        }
        break;
      }

      case "reaction.remove": {
        // OR-Set remove: only removes the specific (user_id, emoji) pair
        // signed by env.from. Other users' copies of the same emoji are
        // unaffected.
        const msg = current.messages.find(m => m.id === inner.target);
        if (!msg || !msg.reactions || !msg.reactions[inner.emoji]) break;
        msg.reactions[inner.emoji] = msg.reactions[inner.emoji].filter(uid => uid !== env.from);
        if (msg.reactions[inner.emoji].length === 0) delete msg.reactions[inner.emoji];
        if (Object.keys(msg.reactions).length === 0) delete msg.reactions;
        break;
      }

      case "group_dm.sender_key": {
        // A group DM participant is publishing (or refreshing) their per-sender
        // AES key, wrapped for every current group member via X25519 ECDH.
        // inner: { group_id, sender_id, wrapped_keys: { user_id: {iv, ct} } }
        const { group_id, sender_id, wrapped_keys: skWrapped } = inner;
        // Security: envelope sender must match the claimed key owner —
        // prevents a member from publishing a rogue key for someone else.
        if (env.from !== sender_id) {
          console.warn("group_dm.sender_key: sender mismatch, ignoring");
          break;
        }
        const myUserIdSk = bytesToB64Url(State.identity.pubkey);
        const myEntrySk = skWrapped && skWrapped[myUserIdSk];
        if (!myEntrySk) break;  // not addressed to us
        const skSender = current.members.find(m => m.id === sender_id);
        if (!skSender || !skSender.x25519_pub) break;
        try {
          const myPrivSk = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
          const theirPubSk = await Crypto.importX25519Pub(skSender.x25519_pub);
          const kekSk = await Crypto.deriveX25519AesKey(myPrivSk, theirPubSk);
          const rawKeySk = new Uint8Array(await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: myEntrySk.iv }, kekSk, myEntrySk.ct
          ));
          await idbPut(current.wsDB, "keys", rawKeySk, "sk:" + group_id + ":" + sender_id);
          current.channelKeys[group_id + ":" + sender_id] = await Crypto.importAesRaw(rawKeySk);
        } catch (e) {
          console.warn("group_dm.sender_key unwrap failed", e);
        }
        break;
      }

      case "channel.create": {
        // Add the new channel to the local projection and import its key.
        // Public channels carry a raw key in the inner payload (the envelope
        // itself is encrypted under the workspace root key so all members
        // can read it). Private channels carry a per-member wrapped-keys
        // map — we look up our own entry and unwrap via X25519 ECDH with
        // the wrapper's pubkey.
        if (current.channels.find(c => c.id === inner.id)) break;
        let rawKey;
        if (inner.private) {
          const myUserId = bytesToB64Url(State.identity.pubkey);
          const wrapped = inner.wrapped_keys && inner.wrapped_keys[myUserId];
          if (!wrapped) {
            // Not a member of this private channel — record the channel
            // exists in a "hidden" state? No: per spec §5.2 private channels
            // are INVISIBLE to non-members. Drop the envelope silently.
            break;
          }
          const wrapper = current.members.find(m => m.id === inner.wrapper);
          if (!wrapper || !wrapper.x25519_pub) {
            console.warn("private channel: wrapper missing or has no x25519_pub");
            break;
          }
          try {
            const myPriv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
            const theirPub = await Crypto.importX25519Pub(wrapper.x25519_pub);
            const kek = await Crypto.deriveX25519AesKey(myPriv, theirPub);
            rawKey = new Uint8Array(await crypto.subtle.decrypt(
              { name: "AES-GCM", iv: wrapped.iv }, kek, wrapped.ct
            ));
          } catch (e) {
            console.warn("private channel key unwrap failed", e);
            break;
          }
        } else {
          rawKey = inner.key;
        }
        // Slice F1-B / security: strip the announce flag if the sender
        // isn't currently an admin/owner. Prevents a malicious client
        // from forging admins-only-post channels.
        let announceVerified = !!inner.announce;
        if (announceVerified) {
          const ccSender = current.members.find(m => m.id === env.from);
          if (!(ccSender?.role === "owner" || ccSender?.role === "admin")) {
            console.warn("channel.create: non-admin set announce flag, stripping", env.id);
            announceVerified = false;
          }
        }
        const chRec = {
          id: inner.id,
          name: sanitizeChannelName(inner.name, !!inner.dm),   // H6
          topic: inner.topic || "",
          private: !!inner.private,
          dm: !!inner.dm,   // group DMs carry dm:true in the envelope
          dm_with: null,    // null for group DMs; 1:1 DMs don't use this path
          announce: announceVerified,
          canvas: !!inner.canvas && !inner.private,  // Slice CV1 — public-only
          members: inner.members || [],
          created_at: env.ts
        };
        current.channels.push(chRec);
        await idbPut(current.wsDB, "channels", chRec);
        await idbPut(current.wsDB, "keys", rawKey, "ch:" + inner.id);
        current.channelKeys[inner.id] = await Crypto.importAesRaw(rawKey);
        break;
      }

      case "join.grant": {
        // Inviter → joiner, over the data channel: the admission grant the
        // joiner attaches to its member.join. Accept only from the inviter of
        // the join we're mid-way through, and resolve the waiter.
        const pj = current.pendingJoin;
        if (pj && canonUserId(env.from) === pj.inviter && pj._resolveGrant) {
          pj._resolveGrant(inner.grant || null);
        }
        break;
      }

      case "member.join": {
        // A new member has joined. Add to members projection.
        const newMember = {
          id: env.from,
          name: sanitizeDisplayName(inner.profile?.name),   // H6 — feeds DM channel names
          color: inner.profile?.color,
          role: "member",
          devices: inner.devices || [env.dev],
          joined_at: env.ts,
          x25519_pub: inner.x25519_pub || null,  // Slice 3b
          bridge_name: inner.bridge_name || null  // office label for sidebar grouping
        };
        // C4: compare canonically. "X" and "X=" are the same Ed25519 key but
        // different strings, so an unpadded/padded pair used to open TWO
        // member rows for one keypair — enough on its own to reach the
        // promote threshold, and enough to leave member.remove incomplete.
        const joinId = canonUserId(newMember.id);
        if (!joinId) {
          console.warn("member.join: undecodable user id, ignoring", newMember.id);
          break;
        }
        newMember.id = joinId;
        const jExisting = current.members.find(m => canonUserId(m.id) === joinId);
        if (!jExisting) {
          // Admission grant required to ADD a new member: member.join is no
          // longer self-asserted. The grant must be signed by a current member
          // (the inviter) and bind this joiner's key. Re-announces from an
          // existing member (reconnect, device pairing) skip this — they're
          // not being admitted, and the nonce would already be burned.
          if (!await verifyAdmissionGrant(inner.grant, env.from, current.meta.id, current.members)) {
            console.warn("member.join without a valid admission grant, dropping", env.from);
            break;
          }
          const gNonce = inner.grant.nonce;
          const admBurned = (await idbGet(current.wsDB, "keys", "admission_nonces")) || [];
          if (admBurned.includes(gNonce)) {
            console.warn("member.join: admission grant already used, dropping replay", env.from);
            break;
          }
          admBurned.push(gNonce);
          // Bounded like promote_nonces: evicting an old nonce past 512 makes
          // that grant replayable, but only in combination with re-adding a
          // removed member, and after 512 *successful* distinct admissions.
          // Same weakening class as the promote-nonce ring; raise if it ever
          // becomes the weak link.
          await idbPut(current.wsDB, "keys", admBurned.slice(-512), "admission_nonces");

          await attachFingerprint(newMember);
          current.members.push(newMember);
          await idbPut(current.wsDB, "members", newMember);
          current.meta.member_count = current.members.length;
          await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
        }
        // If we're the existing member (not the joiner), respond with welcome.
        const imInviter = current.members[0].id === bytesToB64Url(State.identity.pubkey);
        if (imInviter && env.from !== current.members[0].id) {
          await sendWelcome(current, env.from, inner.join_nonce);
          // And replay historic envelopes so the joiner sees prior messages.
          await replayHistory(current, env.from);
        }
        // §4: a new member exists — form a direct edge to them if we win the
        // tie-break and have room (bounded degree).
        maybeDialMesh(current).catch(e => console.warn("mesh dial:", e));
        break;
      }

      case "member.welcome": {
        // C2: a welcome rewrites the entire projection — channels, channel
        // keys, the member list and every member's ROLE. Applied unguarded it
        // was a workspace takeover: any root-key holder could send one
        // carrying {id: attacker, role: "admin"} and pass every downstream
        // admin check from then on. Four conditions, all required:
        //
        //   1. we are actually mid-join (a settled member never needs one),
        //   2. it is addressed to us and not to somebody else,
        //   3. it came from the inviter whose fingerprint the user checked
        //      out of band — not merely from someone holding the root key,
        //   4. it echoes the nonce we minted for THIS join request.
        //
        // (3) is only as strong as the out-of-band fingerprint check, which
        // C6 is what makes trustworthy — the two findings are a pair.
        const pj = current.pendingJoin;
        const myId = canonUserId(bytesToB64Url(State.identity.pubkey));
        if (!pj) {
          console.warn("member.welcome outside an active join, dropping", env.from);
          break;
        }
        if (canonUserId(inner.target) !== myId) {
          console.warn("member.welcome not addressed to us, dropping", inner.target);
          break;
        }
        if (canonUserId(env.from) !== pj.inviter) {
          console.warn("member.welcome from someone other than our inviter, dropping", env.from);
          break;
        }
        if (!inner.join_nonce || inner.join_nonce !== pj.nonce) {
          console.warn("member.welcome nonce mismatch, dropping");
          break;
        }
        // Single-use: consume before applying, so a second welcome (or a
        // replayed copy of this one) finds no open request.
        //
        // Consuming BEFORE the apply is the security-correct order, but it
        // means a throw mid-apply would stand the joiner up forever: the
        // request is spent, so a re-sent welcome would be dropped, and there
        // is no retry path. So every record below is applied defensively —
        // one unusable channel key or member row is skipped, never fatal.
        current.pendingJoin = null;

        // C3: resolve the inviter's X25519 key BEFORE the channels loop.
        //
        // The channels loop needs it to unwrap restricted channel keys, but
        // the only inviter row a joiner has at this point is the stub
        // beginJoinHandshake seeds with `x25519_pub: null` — the real key
        // arrives in *this* envelope's member list, which used to be applied
        // afterwards. So the unwrap always failed and every private channel
        // and group DM silently vanished for every joiner. Read it out of the
        // snapshot directly rather than depending on the order of two loops.
        const senderCanon = canonUserId(env.from);
        const senderX25519 =
          (Array.isArray(inner.snapshot?.members)
            ? inner.snapshot.members.find(m => canonUserId(m?.id) === senderCanon)?.x25519_pub
            : null)
          || current.members.find(m => canonUserId(m.id) === senderCanon)?.x25519_pub
          || null;
        // Derived once — the KEK is the same for every record in the snapshot.
        let welcomeKek = null;
        if (senderX25519) {
          try {
            welcomeKek = await Crypto.deriveX25519AesKey(
              await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8),
              await Crypto.importX25519Pub(senderX25519)
            );
          } catch (e) { console.warn("member.welcome: cannot derive unwrap key", e); }
        }
        const unwrapForMe = async (blob) => new Uint8Array(await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: blob.iv }, welcomeKek, blob.ct
        ));

        // Apply workspace doc snapshot: channels + their keys + members.
        if (Array.isArray(inner.snapshot?.channels)) {
          for (const ch of inner.snapshot.channels) {
            try {
              if (!ch || typeof ch.id !== "string") continue;
              const existing = current.channels.find(c => c.id === ch.id);
              if (!existing) {
                const chRec = {
                  id: ch.id,
                  name: sanitizeChannelName(ch.name, !!ch.dm),   // H6 — third entry path
                  topic: ch.topic || "",
                  // M9: keep the flags. They used to be dropped here — every
                  // channel was projected as public, so a group DM rendered
                  // with public chrome and an announce channel lost its
                  // post restriction.
                  private: !!ch.private,
                  dm: !!ch.dm,
                  dm_with: ch.dm_with || null,
                  announce: !!ch.announce,
                  canvas: !!ch.canvas && !ch.private,
                  members: ch.members || [],
                  created_at: ch.created_at || env.ts
                };
                // C3: public channels carry the key raw; private channels and
                // group DMs are sealed to our X25519 key by the inviter.
                //
                // Enforced on this side too, not just the sender's: refuse a
                // restricted channel we aren't a member of, and refuse a raw
                // key for one. Otherwise C3 would be sender-enforced only —
                // a welcome could still hand us a private channel's key with
                // `key: raw` and we'd install it.
                const restricted = !!ch.private || !!ch.dm;
                let rawKey;
                if (restricted) {
                  const meCanon = canonUserId(bytesToB64Url(State.identity.pubkey));
                  const listed = Array.isArray(ch.members)
                    && ch.members.some(id => canonUserId(id) === meCanon);
                  if (!listed) {
                    console.warn("member.welcome: restricted channel we're not a member of, dropping", ch.id);
                    continue;
                  }
                  if (!ch.wrapped_key) {
                    console.warn("member.welcome: restricted channel sent unsealed, dropping", ch.id);
                    continue;
                  }
                  if (!welcomeKek) {
                    console.warn("member.welcome: no unwrap key available for", ch.id);
                    continue;
                  }
                  rawKey = await unwrapForMe(ch.wrapped_key);
                } else {
                  rawKey = ch.key;
                }
                // Import the key FIRST: an unusable key is the one failure
                // that must not leave a visible channel we can't decrypt.
                current.channelKeys[ch.id] = await Crypto.importAesRaw(rawKey);
                await idbPut(current.wsDB, "keys", rawKey, "ch:" + ch.id);
                current.channels.push(chRec);
                await idbPut(current.wsDB, "channels", chRec);
              }
            } catch (e) {
              console.warn("member.welcome: skipping unusable channel record", ch?.id, e);
            }
          }
        }
        if (Array.isArray(inner.snapshot?.members)) {
          for (const m of inner.snapshot.members) {
           try {
            if (!m || typeof m !== "object") continue;
            // C4: canonicalise here too. member.join already collapses alias
            // spellings of a key, but a snapshot could still seed two rows
            // for one identity — which no longer buys votes (the promote
            // handler compares canonically) but does inflate member_count
            // and leave member.remove incomplete. A record whose id doesn't
            // decode is skipped rather than handed to attachFingerprint,
            // which would throw and abort the whole batch.
            const canonId = canonUserId(m.id);
            if (!canonId) continue;
            m.id = canonId;
            const existing = current.members.find(x => canonUserId(x.id) === canonId);
            if (!existing) {
              m.name = sanitizeDisplayName(m.name);   // H6 — feeds DM channel names
              // C2: roles come from a peer-supplied blob, so clamp them to
              // the known set and never let the snapshot hand US a role —
              // ours is decided by the ops we can verify, not by whoever
              // welcomed us. An unrecognised role degrades to "member".
              m.role = MEMBER_ROLES.includes(m.role) ? m.role : "member";
              if (canonUserId(m.id) === myId) m.role = "member";
              await attachFingerprint(m);
              current.members.push(m);
              await idbPut(current.wsDB, "members", m);
            } else {
              // Backfill onto a member we seeded earlier (the inviter, seeded
              // with x25519_pub:null and devices:[] during the handshake).
              // devices matters now: the active-device gate drops envelopes
              // whose env.dev isn't in the sender's device list, so a stale
              // empty list would drop every message from the inviter.
              let changed = false;
              if (!existing.x25519_pub && m.x25519_pub) { existing.x25519_pub = m.x25519_pub; changed = true; }
              if ((!existing.devices || existing.devices.length === 0) && Array.isArray(m.devices) && m.devices.length) {
                existing.devices = m.devices; changed = true;
              }
              if (changed) await idbPut(current.wsDB, "members", existing);
            }
           } catch (e) {
             console.warn("member.welcome: skipping unusable member record", e);
           }
          }
          current.meta.member_count = current.members.length;
          await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
        }
        // Import per-sender group DM keys from the snapshot so the joiner
        // can decrypt group DM history without waiting for individual
        // group_dm.sender_key envelopes to replay.
        if (Array.isArray(inner.snapshot?.senderKeys)) {
          // C3: these arrive sealed to our X25519 key now (they decrypt other
          // people's DMs, so they were the worst thing in the old raw
          // snapshot). `raw` is still accepted so a snapshot built by a peer
          // that predates this can still be read — remove that arm once the
          // fleet has turned over.
          for (const sk of inner.snapshot.senderKeys) {
            try {
              const { channelId, senderId, raw, wrapped } = sk || {};
              if (!channelId || !senderId) continue;
              let keyRaw = raw;
              if (wrapped) {
                if (!welcomeKek) continue;
                keyRaw = await unwrapForMe(wrapped);
              }
              if (!keyRaw) continue;
              await idbPut(current.wsDB, "keys", keyRaw, "sk:" + channelId + ":" + senderId);
              current.channelKeys[channelId + ":" + senderId] = await Crypto.importAesRaw(keyRaw);
            } catch (e) {
              console.warn("member.welcome: skipping unusable sender key", e);
            }
          }
        }
        // After welcome, the joiner can finally enter the workspace shell.
        if (State.view === "join-waiting") {
          State.current = current;
          State.currentChannel = inner.snapshot?.channels?.[0]?.id || current.meta.general_channel_id;
          setState({ view: "workspace" });
          // Kick off presence heartbeats for the newly-joined workspace.
          PresenceDriver.start(current);
        }
        // §4: now that we know the full member list, densify the overlay —
        // dial a few members directly instead of relying on the single
        // inviter edge (redundancy + low diameter for a few-dozen mesh).
        maybeDialMesh(current).catch(e => console.warn("mesh dial:", e));
        break;
      }

      case "typing.start": {
        // Ephemeral — no projection writes, just a fading indicator.
        const myUid = bytesToB64Url(State.identity.pubkey);
        if (env.from !== myUid) {
          TypingMgr.mark(env.ch, env.from);
          // Schedule a re-render when the indicator should fade (6s after
          // last keystroke per TypingMgr.mark). This is cheap — one timer
          // per note, cleared when overwritten.
          setTimeout(() => {
            if (State.view === "workspace") render();
          }, 6100);
        }
        break;
      }

      case "presence.update": {
        // Ephemeral — projected into bundle.presence, never persisted.
        // `updated_at` is local wall clock so the stale sweep (§30b
        // below) can flip this entry to "offline" after 90s without
        // depending on the peer's clock.
        // Slice F1-A: carry custom status (`custom: {text, emoji}`)
        // when the peer has set one. Optional field — absent in older
        // builds; defaults to null.
        if (!current.presence) current.presence = {};
        const custom = (inner.custom && (inner.custom.text || inner.custom.emoji))
          ? { text: String(inner.custom.text || "").slice(0, 80), emoji: String(inner.custom.emoji || "").slice(0, 8) }
          : null;
        current.presence[env.from] = {
          // C1: `status` is a closed enum, not free text. It reaches a class
          // attribute in the sidebar, so an unvalidated peer string is a
          // stored-XSS vector. Anything off-list degrades to "offline".
          status: PRESENCE_STATUSES.includes(inner.status) ? inner.status : "offline",
          custom,
          updated_at: Date.now()
        };
        break;
      }

      case "gossip.peer_announce": {
        // Slice 4a: a peer is announcing themselves to the mesh.
        // For 4a we just record their existence in `current.knownPeers`
        // — a Set of user_ids we've seen broadcast through gossip.
        // Slice 4d (or later) may use this to attempt direct WebRTC
        // connections via signaling-relayed-through-the-mesh.
        //
        // The current per-peer projection (members store) is the
        // authoritative member list; this set is just "peers we've
        // seen send a gossip envelope at least once". The two can
        // diverge: a member exists from member.join even if they're
        // currently offline, while knownPeers only has currently-
        // observed peers.
        if (!current.knownPeers) current.knownPeers = new Set();
        current.knownPeers.add(env.from);
        // §4: a peer is reachable via gossip — try to form a direct edge
        // (bounded degree) so the overlay densifies beyond the join topology.
        maybeDialMesh(current).catch(e => console.warn("mesh dial:", e));
        break;
      }

      case "workspace.patch": {
        // Slice 4b.2: apply an incremental Yjs update to the local
        // workspace doc. `inner.update` is a Uint8Array produced by
        // Y.encodeStateAsUpdate on the sender side. Y.applyUpdate
        // is commutative + idempotent — out-of-order arrival is
        // handled by Yjs itself, so we don't need the causal buffer
        // to block this type. (The receive path already did the
        // causal check before calling us, but Yjs would tolerate
        // arbitrary order anyway.)
        if (!current.doc || !inner.update) break;

        // Security: the Yjs doc holds fields that should only change
        // under admin authority (workspace name, relay config, channel
        // topics, user groups). The envelope signature authenticates
        // the sender, but nothing else gates which fields they can
        // mutate. Snapshot admin-only fields BEFORE applying, then if
        // the sender isn't an admin, revert any admin-only change with
        // a local mutation. The CRDT converges because any admin peer
        // that also receives the malicious update will revert the same
        // way — no explicit re-broadcast needed.
        const wpSender  = current.members.find(m => m.id === env.from);
        const wpIsAdmin = wpSender && (wpSender.role === "owner" || wpSender.role === "admin");

        const preName    = WorkspaceDoc.getName(current.doc);
        const preRelays  = WorkspaceDoc.getRelays(current.doc);
        const preTopics  = new Map(
          WorkspaceDoc.getChannels(current.doc).map(c => [c.id, c.topic || ""])
        );
        const preGroups  = WorkspaceDoc.getGroups(current.doc);

        WorkspaceDoc.applyUpdate(current.doc, inner.update);

        if (!wpIsAdmin) {
          // Workspace name
          const postName = WorkspaceDoc.getName(current.doc);
          if (postName !== preName && typeof preName === "string") {
            console.warn("workspace.patch: non-admin rename attempt, reverting", env.from);
            WorkspaceDoc.setName(current.doc, preName);
          }
          // Relay config — the most sensitive field (metadata attack vector)
          const postRelays = WorkspaceDoc.getRelays(current.doc);
          if (JSON.stringify(postRelays) !== JSON.stringify(preRelays || [])) {
            console.warn("workspace.patch: non-admin relay change attempt, reverting", env.from);
            WorkspaceDoc.setRelays(current.doc, preRelays || []);
          }
          // Channel topics — revert any that changed. Applied via addChannel
          // (which overwrites the whole record), so we rebuild with the
          // prior topic and the post-apply rest.
          for (const dc of WorkspaceDoc.getChannels(current.doc)) {
            const priorTopic = preTopics.get(dc.id);
            if (priorTopic !== undefined && (dc.topic || "") !== priorTopic) {
              console.warn("workspace.patch: non-admin topic change on", dc.id, "by", env.from, "— reverting");
              const fixed = { ...dc, topic: priorTopic };
              WorkspaceDoc.addChannel(current.doc, fixed);
            }
          }
          // User groups — revert adds, mutations, and deletes. Any group
          // present post-apply but absent pre-apply is removed; any group
          // whose contents changed is restored.
          const postGroups  = WorkspaceDoc.getGroups(current.doc);
          const preGroupMap = new Map(preGroups.map(g => [g.id, g]));
          const postGroupMap = new Map(postGroups.map(g => [g.id, g]));
          for (const g of postGroups) {
            if (!preGroupMap.has(g.id)) {
              console.warn("workspace.patch: non-admin group add, reverting", g.id);
              WorkspaceDoc.removeGroup(current.doc, g.id);
            } else {
              const pre = preGroupMap.get(g.id);
              if (JSON.stringify(pre) !== JSON.stringify(g)) {
                console.warn("workspace.patch: non-admin group mutation, reverting", g.id);
                WorkspaceDoc.addGroup(current.doc, pre);
              }
            }
          }
          for (const g of preGroups) {
            if (!postGroupMap.has(g.id)) {
              console.warn("workspace.patch: non-admin group delete, restoring", g.id);
              WorkspaceDoc.addGroup(current.doc, g);
            }
          }
          // Pins and pending promotions are open to any member by design
          // (spec §5.4 pins, §4.3 promotion drafting) — no revert there.
        }

        // Persist the (possibly corrected) state as the new snapshot.
        await WorkspaceDoc.save(current.wsDB, current.doc);
        // Mirror to the kv `workspace_meta` record for paths that
        // still read from the legacy store (ws name in sidebar, etc.)
        // — this shim goes away when Slice 5 migrates those paths
        // to read from current.doc directly.
        const newName = WorkspaceDoc.getName(current.doc);
        if (newName && newName !== current.meta.name) {
          current.meta.name = newName;
          await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
          // Also update the global workspaces list so the launcher
          // reflects the rename.
          const gwsRec = await idbGet(State.globalDB, "workspaces", current.meta.id);
          if (gwsRec) {
            gwsRec.name = newName;
            await idbPut(State.globalDB, "workspaces", gwsRec);
          }
        }
        // Mirror relay config changes propagated by admins.
        const newRelays = WorkspaceDoc.getRelays(current.doc);
        if (Array.isArray(newRelays) && JSON.stringify(newRelays) !== JSON.stringify(current.relays || [])) {
          current.relays      = newRelays;
          current.meta.relays = newRelays;
          await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
          RelayMgr.startForWorkspace(current);
        }
        // Slice S1 follow-up: mirror channel topic edits from the Yjs
        // doc into the in-memory `channels` projection + IDB so peers
        // see /topic changes live without a reload. Only mirrors the
        // topic field — not `private`, `members`, or key material,
        // which have separate distribution paths (channel.create /
        // channel.rekey / wrapped_keys). New-channel creation still
        // flows through channel.create envelopes, not workspace.patch.
        const docChannels = WorkspaceDoc.getChannels(current.doc);
        for (const dc of docChannels) {
          const local = current.channels.find(c => c.id === dc.id);
          if (!local) continue;   // unknown channel (private, not a member) — skip
          if (typeof dc.topic === "string" && dc.topic !== (local.topic || "")) {
            local.topic = dc.topic;
            await idbPut(current.wsDB, "channels", local);
          }
        }
        break;
      }

      case "member.remove": {
        // Admin op: remove a member from the workspace.
        // Sender must be admin/owner. After this envelope, workspace.rekey
        // and channel.rekey envelopes follow to revoke the removed member's
        // access to future messages.
        const myUserId = bytesToB64Url(State.identity.pubkey);
        const sender = current.members.find(m => m.id === env.from);
        if (!sender || (sender.role !== "owner" && sender.role !== "admin")) {
          console.warn("member.remove from non-admin, ignoring");
          break;
        }
        const removedId = inner.target;
        if (removedId === myUserId) {
          // We've been removed. Show a notice and close the workspace.
          const idx = current.members.findIndex(m => m.id === removedId);
          if (idx !== -1) current.members.splice(idx, 1);
          alert("You've been removed from this workspace.");
          setState({ view: "landing" });
          break;
        }
        const idxToRemove = current.members.findIndex(m => m.id === removedId);
        if (idxToRemove !== -1) {
          current.members.splice(idxToRemove, 1);
          // Remove from IDB projection.
          const tx = current.wsDB.transaction("members", "readwrite");
          tx.objectStore("members").delete(removedId);
          await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
          current.meta.member_count = current.members.length;
          await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
        }
        break;
      }

      case "workspace.rekey": {
        // A new workspace root key has been distributed. `inner.wrapped_keys`
        // is a map of user_id → {iv, ct} wrapped with X25519. Find our entry
        // and unwrap the new root key.
        // Security: only admins/owners may rotate the workspace root key.
        const rkSender = current.members.find(m => m.id === env.from);
        if (!rkSender || (rkSender.role !== "owner" && rkSender.role !== "admin")) {
          console.warn("workspace.rekey from non-admin, ignoring");
          break;
        }
        const myUserId = bytesToB64Url(State.identity.pubkey);
        const myEntry = inner.wrapped_keys && inner.wrapped_keys[myUserId];
        if (!myEntry) {
          // We have no entry — we were removed. Ignore.
          break;
        }
        // Unwrap: ECDH(my_x25519_priv, sender_x25519_pub) → KEK → decrypt.
        const sender = rkSender; // already found above
        if (!sender.x25519_pub) {
          console.warn("workspace.rekey: sender has no x25519_pub");
          break;
        }
        const myPriv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
        const theirPub = await Crypto.importX25519Pub(sender.x25519_pub);
        const kek = await Crypto.deriveX25519AesKey(myPriv, theirPub);
        const newRawKey = await Crypto.aesDecrypt(kek, myEntry.iv, myEntry.ct);
        await idbPut(current.wsDB, "keys", newRawKey, "root");
        current.rootKey = await Crypto.importAesRaw(newRawKey);
        break;
      }

      case "channel.rekey": {
        // A channel key has been rotated. For public channels the new raw key
        // is inside the envelope (encrypted under the workspace root key —
        // which is how we got here). For private channels, the key is wrapped
        // per-member in `inner.wrapped_keys`.
        // Security: only admins/owners may rotate channel keys.
        const crkSender = current.members.find(m => m.id === env.from);
        if (!crkSender || (crkSender.role !== "owner" && crkSender.role !== "admin")) {
          console.warn("channel.rekey from non-admin, ignoring");
          break;
        }
        const myUserId = bytesToB64Url(State.identity.pubkey);
        const chId = inner.channel_id;
        if (!chId) break;
        let newRawKey;
        if (inner.key) {
          // Public channel: raw key in the payload.
          newRawKey = inner.key;
        } else if (inner.wrapped_keys) {
          // Private channel: wrapped for us.
          const myEntry = inner.wrapped_keys[myUserId];
          if (!myEntry) break; // Not a member of this channel.
          const sender = crkSender; // already found above
          if (!sender.x25519_pub) break;
          const myPriv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
          const theirPub = await Crypto.importX25519Pub(sender.x25519_pub);
          const kek = await Crypto.deriveX25519AesKey(myPriv, theirPub);
          newRawKey = await Crypto.aesDecrypt(kek, myEntry.iv, myEntry.ct);
        } else {
          break;
        }
        await idbPut(current.wsDB, "keys", newRawKey, "ch:" + chId);
        current.channelKeys[chId] = await Crypto.importAesRaw(newRawKey);
        break;
      }

      case "member.step_down": {
        // v1.1: sender unilaterally steps down from admin → member. Verify
        // they were admin, another admin remains, and owners can't step
        // down via this path (would orphan the workspace).
        const sdSender = current.members.find(m => m.id === env.from);
        if (!sdSender || sdSender.role !== "admin") {
          console.warn("member.step_down from non-admin or owner, ignoring", env.from);
          break;
        }
        const othersStillAdmin = current.members.some(m =>
          m.id !== env.from && (m.role === "owner" || m.role === "admin")
        );
        if (!othersStillAdmin) {
          console.warn("member.step_down: no other admin remains, ignoring", env.from);
          break;
        }
        sdSender.role = "member";
        await idbPut(current.wsDB, "members", sdSender);
        break;
      }

      case "member.profile_update": {
        // v1.1: member-self-updated profile fields (tz, pronouns, title).
        // Sender can only update their own record.
        const pm = current.members.find(m => m.id === env.from);
        if (!pm) break;
        if (inner.timezone !== undefined) pm.timezone = inner.timezone || null;
        if (inner.pronouns !== undefined) pm.pronouns = inner.pronouns || null;
        if (inner.title    !== undefined) pm.title    = inner.title    || null;
        await idbPut(current.wsDB, "members", pm);
        break;
      }

      case "member.transfer_admin": {
        // v1.1: unilateral hand-off of admin rights. Sender must currently
        // be an owner or admin; target must be a known member who isn't
        // already admin/owner. The sender's role is unchanged — this is
        // "grant to target", not "swap".
        const taSender = current.members.find(m => m.id === env.from);
        if (!(taSender?.role === "owner" || taSender?.role === "admin")) {
          console.warn("member.transfer_admin from non-admin, ignoring");
          break;
        }
        const taTarget = current.members.find(m => m.id === inner.target);
        if (!taTarget) { console.warn("member.transfer_admin: unknown target"); break; }
        if (taTarget.role === "owner" || taTarget.role === "admin") break;
        taTarget.role = "admin";
        await idbPut(current.wsDB, "members", taTarget);
        break;
      }

      case "member.promote": {
        // Promote a member to admin via consensus (2+ distinct valid sigs).
        // `inner.signers` carries [{user_id, sig}] from the proposal — each
        // signed the canonical promote payload independently. Verify each sig
        // against the canonical bytes and count distinct valid signers.
        const targetId = canonUserId(inner.target);
        if (!targetId || !inner.ts || !Array.isArray(inner.signers)) break;
        // The nonce is the replay key, so it has to be real bytes. A string
        // or a msgpack map would collapse through bytesToB64 to a constant
        // ("AAAA…"), poisoning one burn slot for everybody.
        if (!(inner.nonce instanceof Uint8Array) || inner.nonce.length < 8) break;

        // C4: the sender must itself be a member. Anyone holding the root key
        // could previously inject a promote without being in the workspace.
        const promoteFrom = canonUserId(env.from);
        if (!promoteFrom || !current.members.some(m => canonUserId(m.id) === promoteFrom)) {
          console.warn("member.promote: sender is not a member, dropping", env.from);
          break;
        }

        // C4: burn the nonce. Without this the exact same cosig set could be
        // re-wrapped in a fresh envelope (new env.id, so the SeenSet misses
        // it) and replayed — including after the target stepped down, which
        // silently re-promotes them. Burning is deliberately clock-free: an
        // expiry window would make an authz projection depend on each peer's
        // wall clock, so a peer partitioned past the window would diverge
        // permanently from everyone else on a role.
        const promoteNonce = bytesToB64(inner.nonce);
        const burned = (await idbGet(current.wsDB, "keys", "promote_nonces")) || [];
        if (burned.includes(promoteNonce)) {
          console.warn("member.promote: nonce already used, dropping replay");
          break;
        }

        const sigPayload = MP.encode({ type: "member.promote", target: inner.target, ts: inner.ts, nonce: inner.nonce });

        let validSigners = new Set();
        for (const signer of inner.signers) {
          // Guard `signer` itself: a null / non-object entry (a member can put
          // anything in the signers array) would throw out of dispatch on the
          // deref below and skip CausalBuffer.advance for this receive.
          if (!signer || typeof signer !== "object" || !signer.user_id || !signer.sig) continue;
          // C4: a signature is only a *vote* if it belongs to someone who can
          // vote. Previously any Ed25519 keypair counted, so two throwaway
          // keys reached the threshold and self-escalated to admin.
          //
          // Compared canonically: "X" and "X=" decode to the same pubkey but
          // compare as different strings, so one keypair could hold two
          // member rows and cast two votes.
          const signerId = canonUserId(signer.user_id);
          if (!signerId) continue;
          // Admission decision (2026-07-24): a promote vote counts only from an
          // ADMIN, not any member. Plain-member sock puppets (which a malicious
          // member can mint) must not be able to reach the promote threshold —
          // that was C4's residual escalation path. Resolves H8 (spec: 2-of-N).
          // NB: this trusts each member's `role` in the local projection. A
          // member.welcome snapshot is peer-supplied and can seed a fresh
          // joiner's row with role:"admin" — but welcome is C2-gated (only your
          // verified inviter, mid-join, for you), so any role inflation is
          // local to that joiner and bounded by the trust you already placed in
          // the inviter. Deriving roles purely from verifiable promote ops
          // would remove even that; noted as a follow-on.
          if (!current.members.some(m => canonUserId(m.id) === signerId && isAdminRole(m.role))) continue;
          // C4: the target can't vote for their own promotion.
          if (signerId === targetId) continue;
          try {
            const pub = b64UrlToBytes(signer.user_id);
            const vk  = await Crypto.importVerifyKey(pub);
            if (await Crypto.verify(vk, signer.sig, sigPayload)) {
              validSigners.add(signerId);
            }
          } catch (_) { /* bad sig — ignore */ }
        }

        // 2-of-N admins, but bounded by how many admins actually exist so a
        // sole owner can still bootstrap the first admin: min(2, adminCount).
        // Target excluded from the count — they can't be one of their own
        // approvers.
        const adminCount = current.members.filter(
          m => isAdminRole(m.role) && canonUserId(m.id) !== targetId).length;
        const needed = Math.min(PROMOTE_THRESHOLD, Math.max(1, adminCount));
        if (validSigners.size < needed) {
          console.warn("member.promote: need " + needed + " admin signer(s), got " + validSigners.size + ", dropping");
          break;
        }

        burned.push(promoteNonce);
        // Bounded so the record can't grow forever. The bound is itself a
        // weakening — evicting an old nonce makes that promote replayable
        // again — but filling it needs thousands of *successful* promotes,
        // which needs sybil identities, which is the parked admission-control
        // gap (see plan/pending.md). Raise or key by (nonce, target) if that
        // ever closes and this bound becomes the weakest link.
        await idbPut(current.wsDB, "keys", burned.slice(-4096), "promote_nonces");

        const target = current.members.find(m => canonUserId(m.id) === targetId);
        if (target && target.role === "member") {
          target.role = "admin";
          await idbPut(current.wsDB, "members", target);
        }
        // Remove from pending promotions if present.
        if (current.doc) {
          const promos = WorkspaceDoc.getPendingPromotions(current.doc);
          const pp = promos.find(p => p.target_id === targetId);
          if (pp) {
            WorkspaceDoc.removePendingPromotion(current.doc, pp.id);
            await WorkspaceDoc.save(current.wsDB, current.doc);
          }
        }
        break;
      }

      case "device.add": {
        // A device belonging to an existing member has been added.
        // inner: { device_id: string, ts: number }
        // Sender (env.from) must already be a workspace member.
        const daMember = current.members.find(m => m.id === env.from);
        if (!daMember) { console.warn("device.add from unknown member, ignoring", env.from); break; }
        if (!Array.isArray(daMember.devices)) daMember.devices = [];
        if (!daMember.devices.includes(inner.device_id)) {
          daMember.devices.push(inner.device_id);
          await idbPut(current.wsDB, "members", daMember);
        }
        if (!current.deviceLastSeen) current.deviceLastSeen = {};
        current.deviceLastSeen[env.from + ":" + inner.device_id] = inner.ts || env.ts;
        break;
      }

      case "device.revoke": {
        // A device has been revoked by its owner or an admin.
        // inner: { device_id: string, ts: number }
        const myUserId  = bytesToB64Url(State.identity.pubkey);
        const drSender  = current.members.find(m => m.id === env.from);
        const isAdminDr = drSender && (drSender.role === "owner" || drSender.role === "admin");
        // Find which member owns this device.
        const drOwner = current.members.find(m =>
          Array.isArray(m.devices) && m.devices.includes(inner.device_id)
        );
        if (!drOwner) { console.warn("device.revoke: device not found in any member", inner.device_id); break; }
        const isSelfRevoke = (drOwner.id === env.from);
        if (!isSelfRevoke && !isAdminDr) {
          console.warn("device.revoke from non-admin non-owner, ignoring"); break;
        }
        drOwner.devices = drOwner.devices.filter(d => d !== inner.device_id);
        await idbPut(current.wsDB, "members", drOwner);
        if (current.deviceLastSeen) delete current.deviceLastSeen[drOwner.id + ":" + inner.device_id];
        // Self-detection: if OUR current device was just revoked, wipe keys + show revoked screen.
        if (drOwner.id === myUserId && inner.device_id === current.meta.device_id) {
          await handleSelfRevocation(current.meta.id);
          return;
        }
        break;
      }

      case "huddle.join":
        await HuddleMgr.onJoin(workspaceId, env);
        break;

      case "huddle.leave":
        HuddleMgr.onLeave(workspaceId, env);
        break;

      case "huddle.signal":
        await HuddleMgr.onSignal(workspaceId, env, inner);
        break;

      case "signal.relay":
        // Offline-mesh spec §4: peer-to-peer signaling relayed across the
        // gossip mesh so a new peer needs exactly one QR handshake with any
        // one existing peer, not one per pair. Inner:
        //   { target_user_id, target_device_id, kind, sdp_frame }
        // Forwarding to non-targets is handled by PeerMgr.handlePacket
        // (signal.relay is exempt from the ephemeral no-rebroadcast rule);
        // here we act only if we are the target.
        await handleSignalRelay(current, env, inner);
        break;

      default:
        console.warn("Unhandled envelope type:", env.type);
    }
  },

  onAck(workspaceId, envelopeId) {
    const current = State.current;
    if (!current || current.meta.id !== workspaceId) return;
    const msg = current.messages.find(m => m.id === envelopeId);
    if (msg) {
      msg.delivery = "delivered";
      if (State.view === "workspace") render();
    }
  }
};

/* ------------------------------------------------------------
 *  §22  member.welcome + history replay helpers
 * ------------------------------------------------------------ */
async function sendWelcome(current, targetUserId, joinNonce) {
  // C3: the snapshot used to carry every channel's RAW key — including
  // private channels and group DMs the recipient has nothing to do with —
  // inside an envelope encrypted under the workspace root key. Every member
  // holds that key, so "private" channels were readable by the whole
  // workspace, and each new joiner was handed the back catalogue.
  //
  // Two changes. Membership decides what goes in at all: a private or DM
  // channel appears only if the target is actually one of its members. And
  // what does go in is wrapped to the target's X25519 key rather than left
  // raw, because the envelope itself is readable by every member — filtering
  // alone would still leak to everyone else on the wire.
  //
  // Public channel keys stay raw: every member is entitled to them by
  // definition, and wrapping them would buy nothing.
  const targetId = canonUserId(targetUserId);
  const targetMember = current.members.find(m => canonUserId(m.id) === targetId);
  const targetPub = targetMember?.x25519_pub || null;
  const myX25519Priv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
  let targetKek = null;
  if (targetPub) {
    targetKek = await Crypto.deriveX25519AesKey(myX25519Priv, await Crypto.importX25519Pub(targetPub));
  }
  const wrapForTarget = async (raw) => {
    const iv = Crypto.rand(12);
    const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, targetKek, raw));
    return { iv, ct };
  };
  const isMemberOf = (ch) =>
    Array.isArray(ch.members) && ch.members.some(id => canonUserId(id) === targetId);

  const snapshotChannels = [];
  for (const ch of current.channels) {
    const restricted = !!ch.private || !!ch.dm;
    if (restricted) {
      // Not theirs — the channel must not appear in the snapshot at all.
      // Per spec §5.2 private channels are invisible to non-members, so we
      // leak neither the key nor the fact that the channel exists.
      if (!isMemberOf(ch)) continue;
      // Theirs, but we can't wrap for them (no published X25519 key) — skip
      // rather than fall back to shipping it raw. They can be re-invited to
      // the channel once their key is known; a silent leak can't be undone.
      if (!targetKek) {
        console.warn("welcome: no x25519_pub for target, omitting restricted channel", ch.id);
        continue;
      }
    }
    const raw = await idbGet(current.wsDB, "keys", "ch:" + ch.id);
    // A missing key would make wrapForTarget throw, and this runs inside the
    // member.join dispatch case — an exception here stalls the OWNER's causal
    // buffer for this joiner. Skip the channel instead.
    if (!raw) {
      console.warn("welcome: no stored key for channel, omitting", ch.id);
      continue;
    }
    snapshotChannels.push({
      id: ch.id,
      name: ch.name,
      topic: ch.topic,
      // M9: carry the flags that decide how the channel behaves and renders.
      // They used to be dropped, so a joiner projected every channel as a
      // plain public one — a group DM with public chrome, an announce channel
      // anyone could post to, a canvas that wasn't one.
      private: !!ch.private,
      dm: !!ch.dm,
      dm_with: ch.dm_with || null,
      announce: !!ch.announce,
      canvas: !!ch.canvas,
      members: ch.members,
      created_at: ch.created_at,
      // C3: raw only for public channels, which every member may read
      // anyway. Restricted ones are sealed to the target's X25519 key.
      key: (!!ch.private || !!ch.dm) ? undefined : raw,
      wrapped_key: (!!ch.private || !!ch.dm) ? await wrapForTarget(raw) : undefined
    });
  }

  // Per-sender group DM keys, so the joiner can read group DM history it is
  // entitled to. C3: these are the most sensitive things in the snapshot —
  // they decrypt other people's DMs — and they were shipped raw, for every
  // group DM in the workspace, to every joiner. Same rule as the channels:
  // only for group DMs the target belongs to, and sealed to their key.
