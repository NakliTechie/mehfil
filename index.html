      if (Date.now() > challenge.expires) throw new Error("This code has expired. Ask for a fresh one.");

      // Generate ephemeral keys for this device.
      const ephem_ed_B    = await Crypto.genIdentity();
      const ephem_x_B     = await Crypto.genX25519();
      const new_device_id = bytesToB64Url(Crypto.rand(8));

      const fpB    = await Crypto.sha256(ephem_ed_B.pubkey);
      const fpHex  = bytesToHex(fpB.slice(0, 16));
      const fpFmt  = fpHex.match(/.{4}/g).join(" ");
      const trustSvg = await TrustCard.renderFromPubkey(ephem_ed_B.pubkey, 72);

      // Use relay token from challenge (Device A included it so Device B can post back).
      const actualBase  = (challenge.relay_url || relayBase).replace(/\/$/, "");
      const actualToken = challenge.relay_token || relayToken;
      const postHdr     = { "Content-Type": "application/json",
                            ...(actualToken ? { "Authorization": "Bearer " + actualToken } : {}) };

      const encResp = await PairingCode.encrypt(pairingAesKey, {
        type:           "device.pair.response",
        ephem_ed_pub_B: bytesToB64(ephem_ed_B.pubkey),
        ephem_x_pub_B:  bytesToB64(ephem_x_B.x25519_pub),
        device_label:   navigator.userAgent.slice(0, 80),
        new_device_id
      });
      const rr = await fetch(`${actualBase}/pairing`, {
        method:  "POST",
        headers: postHdr,
        body:    JSON.stringify({ code_hash: respHash, payload: encResp, ttl_ms: 300_000 })
      });
      if (!rr.ok) throw new Error(`Relay returned ${rr.status} when posting response`);

      // Show fingerprint for user to verify against Device A's display.
      wrap.querySelector(".card").innerHTML = `
        <h1 style="font-size:18px;margin-bottom:8px;">Show this fingerprint to Device A</h1>
        <p class="sub" style="margin-bottom:12px;">Device A will show you a fingerprint — confirm it matches before approving.</p>
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:16px;">
          ${trustSvg}
          <code style="font-size:13px;letter-spacing:0.08em;">${escapeHTML(fpFmt)}</code>
        </div>
        <p class="sub" style="font-size:12px;" id="dpair-wait">Waiting for Device A to confirm…</p>
        <button id="dpair-cancel2" style="margin-top:12px;">Cancel</button>
      `;
      wrap.querySelector("#dpair-cancel2").onclick = cancelFn;

      // Store session state and poll for key bundle.
      State.pairingSession = {
        pollTimer:      null,
        pairingAesKey,
        ephem_x_priv_B: ephem_x_B.x25519_priv_pkcs8,
        ephem_x_pub_A:  challenge.ephem_x_pub_A,
        new_device_id,
        actualBase,
        keysHash
      };

      State.pairingSession.pollTimer = setInterval(async () => {
        try {
          const kr = await fetch(`${actualBase}/pairing/${keysHash}`,
            { headers: actualToken ? { "Authorization": "Bearer " + actualToken } : {} });
          if (kr.status === 404) return;
          if (!kr.ok) throw new Error(`Relay error ${kr.status}`);
          const { payload: keyPayload } = await kr.json();
          clearInterval(State.pairingSession.pollTimer);

          const outer  = await PairingCode.decrypt(pairingAesKey, keyPayload);
          if (outer.type !== "device.pair.keys") throw new Error("Unexpected payload type");

          const privKey = await Crypto.importX25519Priv(State.pairingSession.ephem_x_priv_B);
          const pubKey  = await Crypto.importX25519Pub(b64ToBytes(State.pairingSession.ephem_x_pub_A));
          const kek     = await Crypto.deriveX25519AesKey(privKey, pubKey);
          const pt      = await Crypto.aesDecrypt(kek, b64ToBytes(outer.iv_b64), b64ToBytes(outer.ct_b64));
          const bundle  = MP.decode(pt);

          // Import identity.
          const importedIdentity = {
            pubkey:            bundle.ed_pub,
            privkey_pkcs8:     bundle.ed_pkcs8,
            x25519_pub:        bundle.x_pub,
            x25519_priv_pkcs8: bundle.x_pkcs8,
            created_at:        Date.now(),
            backed_up:         true
          };
          await Identity.save(State.globalDB, importedIdentity);
          State.identity = importedIdentity;

          // Seed workspace(s).
          for (const ws of (bundle.workspaces || [])) {
            if (await idbGet(State.globalDB, "workspaces", ws.id)) continue;
            const wsDB = await openWorkspaceDB(ws.id);
            await idbPut(wsDB, "keys", {
              id:                 ws.id,
              name:               ws.name,
              general_channel_id: ws.general_channel_id,
              device_id:          ws.new_device_id,
              relays:             ws.relays || [],
              created_at:         Date.now()
            }, "workspace_meta");
            await idbPut(wsDB, "keys", ws.root_key,            "root");
            await idbPut(wsDB, "keys", ws.general_channel_key, "ch:" + ws.general_channel_id);
            await idbPut(State.globalDB, "workspaces", {
              id: ws.id, name: ws.name, created_at: Date.now(), last_opened_at: Date.now()
            });
            wsDB.close();
          }

          State.pairingSession = null;
          wrap.remove();

          // Open workspace; announce new device after it loads.
          if (bundle.workspaces?.length) {
            const ws0 = bundle.workspaces[0];
            await openWorkspaceById(ws0.id);
            if (State.current) {
              sendDeviceAdd(State.current, ws0.new_device_id)
                .catch(e => console.warn("device.add after pair:", e));
            }
          } else {
            setState({ view: "landing", workspaces: await idbGetAll(State.globalDB, "workspaces") });
          }
        } catch (e) {
          const $w = wrap.querySelector("#dpair-wait");
          if ($w) $w.textContent = "Error: " + e.message;
        }
      }, 3000);

    } catch (e) {
      $err.textContent = e.message;
      $btn.disabled = false;
      $btn.textContent = "Continue";
    }
  };

  $btn.onclick = join;
  $input.onkeydown = e => { if (e.key === "Enter") join(); };
}

/* ------------------------------------------------------------
 *  §37  Bridge transport — LAN bridge adapter (Slice 8)
 *
 *  BridgeTransport polls GET /ws/:id/envelopes and pushes via PUT,
 *  identical API surface to the Cloudflare relay but:
 *    - No bearer token (LAN trust model; physical network = auth boundary)
 *    - Fingerprint pinning: first-connect modal, mismatch warning
 *
 *  BridgeMgr is the workspace-level manager: one BridgeTransport per
 *  workspace, started on Workspace.open and stopped on workspace close.
 *
 *  detectBridge() tries mehfil.local:8765 then localhost:8765 (mDNS fallback).
 * ------------------------------------------------------------ */

/**
 * BridgeTransport — manages polling and pushing for one workspace + bridge.
 *
 * Config: { url, pinnedFp, workspaceId, onFpConfirm, onFpMismatch }
 *   url         — bridge base URL (no trailing slash)
 *   pinnedFp    — previously confirmed hex fingerprint, or null on first use
 *   workspaceId — used in /ws/:id/* paths
 *   onFpConfirm — async (fp: string) => boolean — called on first connect
 *   onFpMismatch — (expected, got) => void — called when stored fp doesn't match
 */
class BridgeTransport {
  constructor({ url, pinnedFp, workspaceId, onFpConfirm, onFpMismatch }) {
    this.url          = url.replace(/\/$/, "");
    this.pinnedFp     = pinnedFp || null;
    this.workspaceId  = workspaceId;
    this.onFpConfirm  = onFpConfirm;
    this.onFpMismatch = onFpMismatch;
    this.cursor       = "";
    this.pollTimer    = null;
    this.status       = "connecting";
    this._closed      = false;
    this._fpVerified  = false;
  }

  _wsUrl(path) {
    return `${this.url}/ws/${encodeURIComponent(this.workspaceId)}${path}`;
  }

  async _verifyFp() {
    const resp = await fetch(`${this.url}/health`, { signal: AbortSignal.timeout(5000) });
    if (!resp.ok) return false;
    const json  = await resp.json();
    const liveFp = json.fp;
    if (!liveFp) return false;
    // Capture the bridge's display name (set via BRIDGE_NAME env on the binary).
    this.liveName = json.name || null;
    if (!this.pinnedFp) {
      // First connect: ask the user to confirm the fingerprint.
      const confirmed = await this.onFpConfirm(liveFp);
      if (!confirmed) { this._closed = true; return false; }
      this.pinnedFp = liveFp;
      return true;
    }
    if (this.pinnedFp !== liveFp) {
      this.onFpMismatch(this.pinnedFp, liveFp);
      this._closed = true;
      return false;
    }
    return true;
  }

  async fetchCursor() {
    try {
      const resp = await fetch(this._wsUrl("/cursor"), { signal: AbortSignal.timeout(5000) });
      if (!resp.ok) return;
      const json = await resp.json();
      this.cursor = json.cursor || "";
    } catch (_) { /* best-effort */ }
  }

  async start() {
    if (this._closed) return;
    try {
      const ok = await this._verifyFp();
      if (!ok) return;
      this._fpVerified = true;
      await this.fetchCursor();
      this.status = "connected";
      this._poll();
    } catch (e) {
      this.status = "connecting";
      console.warn("[BridgeTransport] start failed:", e.message);
      // Retry in 10 s in case the bridge is slow to start.
      if (!this._closed) this.pollTimer = setTimeout(() => this.start(), 10_000);
    }
  }

  async _poll() {
    if (this._closed) return;
    try {
      const url  = this._wsUrl(`/envelopes?since=${encodeURIComponent(this.cursor)}&limit=100`);
      const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const items = await resp.json();
      this.status = "connected";
      if (items.length > 0) {
        for (const item of items) this._ingest(item);
        this.cursor = items[items.length - 1].seq;
      }
    } catch (e) {
      if (!this._closed) {
        this.status = "connecting";
        console.warn("[BridgeTransport] poll error:", e.message);
      }
    }
    if (!this._closed) {
      this.pollTimer = setTimeout(() => this._poll(), 3000);
    }
  }

  _ingest({ data }) {
    if (!data) return;
    try {
      const bytes = b64ToBytes(data);
      const env   = MP.decode(bytes);
      if (!env?.id) return;
      SeenSet.has(this.workspaceId, env.id).then(seen => {
        if (seen) return;
        SeenSet.add(this.workspaceId, env.id);
        // H4: receive is (workspaceId, env) — the args were reversed, so every
        // bridge envelope was treated as belonging to a non-open workspace and
        // dropped. Serialize the gossip rebroadcast after receive resolves.
        // (Gating gossip on *acceptance* is H1/Batch D — receive signals drops
        // by returning, not throwing, so it isn't gated here.)
        EnvelopeDispatch.receive(this.workspaceId, env)
          .catch(e => console.warn("[BridgeTransport] receive:", e))
          .finally(() => PeerMgr.sendEnvelope(this.workspaceId, env, null).catch(() => {}));
      });
    } catch (e) {
      console.warn("[BridgeTransport] ingest error:", e);
    }
  }

  async send(envBytes) {
    if (this._closed || !this._fpVerified) return;
    try {
      await fetch(this._wsUrl("/envelopes"), {
        method:  "PUT",
        body:    envBytes,
        headers: { "Content-Type": "application/octet-stream" },
        signal:  AbortSignal.timeout(5000)
      });
    } catch (e) {
      console.warn("[BridgeTransport] send error:", e.message);
    }
  }

  close() {
    this._closed = true;
    this.status  = "offline";
    if (this.pollTimer) { clearTimeout(this.pollTimer); this.pollTimer = null; }
  }
}

/** BridgeMgr — workspace-level bridge lifecycle manager. */
const BridgeMgr = {
  _transports: new Map(), // wsId → BridgeTransport

  startForWorkspace(current) {
    const wsId = current.meta.id;
    // Tear down existing transport for this workspace.
    const existing = this._transports.get(wsId);
    if (existing) { existing.close(); this._transports.delete(wsId); }

    const bridges = current.bridges || current.meta.bridges || [];
    if (bridges.length === 0) return;

    const cfg       = bridges[0]; // one active bridge per workspace
    const transport = new BridgeTransport({
      url:       cfg.url,
      pinnedFp:  cfg.fp || null,
      workspaceId: wsId,
      onFpConfirm: async (fp) => new Promise(resolve => {
        openBridgeFpConfirmModal(fp,
          async () => {
            // Confirmed — persist the pinned fingerprint.
            cfg.fp              = fp;
            current.meta.bridges = bridges;
            await idbPut(current.wsDB, "keys", current.meta, "workspace_meta").catch(console.warn);
            resolve(true);
          },
          () => resolve(false)
        );
      }),
      onFpMismatch: (expected, got) => showBridgeFpMismatchModal(expected, got)
    });
    this._transports.set(wsId, transport);
    transport.start().catch(e => console.warn("[BridgeMgr] start:", e));
  },

  stop(wsId) {
    const t = this._transports.get(wsId);
    if (t) { t.close(); this._transports.delete(wsId); }
  },

  async send(wsId, envBytes) {
    const t = this._transports.get(wsId);
    if (t) await t.send(envBytes);
  },

  status(wsId) {
    const t = this._transports.get(wsId);
    return t ? t.status : "offline";
  },

  /** Return the live display name reported by the bridge's /health endpoint, or null. */
  name(wsId) {
    const t = this._transports.get(wsId);
    return (t && t.liveName) ? t.liveName : null;
  }
};

/**
 * detectBridge() — tries the two most likely bridge addresses.
 * Returns { url, fp } if found, null otherwise.
 */
async function detectBridge() {
  const candidates = [
    "http://mehfil.local:8765",
    "http://localhost:8765"
  ];
  for (const url of candidates) {
    try {
      const resp = await fetch(`${url}/health`, { signal: AbortSignal.timeout(3000) });
      if (resp.ok) {
        const json = await resp.json();
        if (json.ok && json.fp) return { url, fp: json.fp };
      }
    } catch (_) { /* bridge not at this address */ }
  }
  return null;
}

/* ------------------------------------------------------------
 *  §38  Huddles — encrypted WebRTC audio mesh
 *
 *  One huddle per workspace at a time. Any member can start one;
 *  anyone online can jump in. Signaling uses the same envelope
 *  infrastructure as messages — huddle.signal carries offer/answer/ICE
 *  encrypted under the workspace root key. Audio is peer-to-peer via
 *  RTCPeerConnection (separate from the data channel used for messages).
 *
 *  Envelope types (all ephemeral — not stored in IDB):
 *    huddle.join   — announce presence in the huddle
 *    huddle.leave  — announce departure
 *    huddle.signal — WebRTC signaling (offer | answer | ICE candidate)
 *                    inner: { to, sdp_type?, sdp?, ice? }
 * ------------------------------------------------------------ */

const HuddleMgr = (() => {
  // Private state
  let _ws          = null;       // active workspace id, or null
  let _participants = [];        // [{id, name}] — includes self
  let _pcs         = new Map();  // peerId → RTCPeerConnection
  let _remoteAudios = new Map(); // peerId → <audio> element
  let _localStream  = null;
  let _muted        = false;
  let _audioCtx     = null;
  let _analysers    = new Map(); // peerId → {analyser, data, speaking}
  let _speakTimer   = null;
  // Screen share state (v2 extension)
  let _screenStream  = null;     // local captured stream
  let _screenTrack   = null;     // local video track
  let _screenSenders = new Map();// peerId → RTCRtpSender (so we can removeTrack)
  let _remoteScreens = new Map();// peerId → MediaStream (their shared screen)

  // ── Helpers ────────────────────────────────────────────────

  async function _sendEnvelope(wsId, type, inner) {
    const current = State.current;
    if (!current || current.meta.id !== wsId) return;
    const meta     = current.meta;
    const myUserId = bytesToB64Url(State.identity.pubkey);
    const env = await Envelope.build({
      workspaceId:  wsId,
      channelId:    null,
      channelKey:   current.rootKey,
      signKey:      State.identity.signKey,
      signerPubkey: State.identity.pubkey,
      deviceId:     meta.device_id,
      type,
      inner,
      vectorClock:  [[myUserId, meta.lc_counter]]
    });
    // Ephemeral: no idbPut.
    await PeerMgr.sendEnvelope(wsId, env);
  }

  async function _sendSignal(wsId, to, payload) {
    await _sendEnvelope(wsId, "huddle.signal", { to, ...payload });
  }

  function _getOrCreatePc(wsId, peerId) {
    if (_pcs.has(peerId)) return _pcs.get(peerId);
    const pc = new RTCPeerConnection(RTC_CONFIG);

    // Add local audio
    if (_localStream) _localStream.getTracks().forEach(t => pc.addTrack(t, _localStream));
    // Add local screen video if we're already sharing
    if (_screenTrack && _screenStream) {
      const sender = pc.addTrack(_screenTrack, _screenStream);
      _screenSenders.set(peerId, sender);
    }

    // Trickle ICE — send each candidate as a signal envelope
    pc.onicecandidate = ({ candidate }) => {
      if (candidate) _sendSignal(wsId, peerId, { ice: candidate.toJSON() }).catch(() => {});
    };

    // Incoming remote track — split by kind: audio goes to hidden <audio>
    // with a speaking analyser; video goes to the shared _remoteScreens
    // map and triggers a re-render to surface it.
    pc.ontrack = ({ streams, track }) => {
      const stream = streams[0];
      if (!stream) return;
      if (track.kind === "video") {
        _remoteScreens.set(peerId, stream);
        track.addEventListener("ended", () => {
          _remoteScreens.delete(peerId);
          render();
        });
        render();
        return;
      }
      // Audio: play + hook speaking analyser
      let audio = document.getElementById("huddle-audio-" + peerId.slice(0, 8));
      if (!audio) {
        audio = document.createElement("audio");
        audio.id = "huddle-audio-" + peerId.slice(0, 8);
        audio.autoplay = true;
        document.body.appendChild(audio);
      }
      audio.srcObject = stream;
      if (_audioCtx) {
        const source   = _audioCtx.createMediaStreamSource(stream);
        const analyser = _audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        _analysers.set(peerId, { analyser, data: new Uint8Array(analyser.frequencyBinCount), speaking: false });
        _remoteAudios.set(peerId, audio);
      }
    };

    pc.onconnectionstatechange = () => {
      if (pc.connectionState === "failed" || pc.connectionState === "closed") {
        _pcs.delete(peerId);
      }
    };

    _pcs.set(peerId, pc);
    return pc;
  }

  async function _renegotiate(wsId, peerId, pc) {
    if (!pc) return;
    try {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await _sendSignal(wsId, peerId, { sdp_type: "offer", sdp: pc.localDescription.sdp });
    } catch (e) { console.warn("huddle renegotiate failed:", e); }
  }

  function _removePeer(peerId) {
    const pc = _pcs.get(peerId);
    if (pc) { pc.close(); _pcs.delete(peerId); }
    const audio = _remoteAudios.get(peerId);
    if (audio) { audio.remove(); _remoteAudios.delete(peerId); }
    const a = _analysers.get(peerId);
    if (a) { try { a.analyser.disconnect(); } catch (_) {} _analysers.delete(peerId); }
    _screenSenders.delete(peerId);
    _remoteScreens.delete(peerId);
    const idx = _participants.findIndex(p => p.id === peerId);
    if (idx !== -1) _participants.splice(idx, 1);
  }

  function _startSpeakTimer() {
    _speakTimer = setInterval(() => {
      for (const [peerId, { analyser, data, speaking }] of _analysers) {
        analyser.getByteFrequencyData(data);
        const vol = data.reduce((a, b) => a + b, 0) / data.length;
        const isSpeaking = vol > 12;
        if (isSpeaking !== speaking) {
          _analysers.get(peerId).speaking = isSpeaking;
          const av = document.getElementById("huddle-av-" + peerId.slice(0, 12));
          if (av) av.classList.toggle("speaking", isSpeaking);
        }
      }
    }, 150);
  }

  function _cleanup() {
    for (const peerId of [..._pcs.keys()]) _removePeer(peerId);
    _pcs.clear();
    if (_localStream) { _localStream.getTracks().forEach(t => t.stop()); _localStream = null; }
    if (_screenStream) { _screenStream.getTracks().forEach(t => t.stop()); _screenStream = null; }
    _screenTrack = null;
    _screenSenders.clear();
    _remoteScreens.clear();
    if (_audioCtx) { _audioCtx.close().catch(() => {}); _audioCtx = null; }
    if (_speakTimer) { clearInterval(_speakTimer); _speakTimer = null; }
    _participants = [];
    _ws = null;
    _muted = false;
  }

  // ── Public API ─────────────────────────────────────────────

  return {
    get active()       { return _ws !== null; },
    get muted()        { return _muted; },
    get participants() { return _participants; },
    get wsId()         { return _ws; },

    /** Join (or start) the workspace huddle. */
    async join(wsId) {
      if (_ws) await this.leave();
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch (e) {
        alert("Microphone access denied. Please allow microphone access to use huddles.");
        return;
      }
      _ws          = wsId;
      _localStream = stream;
      _muted       = false;
      _participants = [];
      _audioCtx    = new AudioContext();
      _startSpeakTimer();

      // Add self to participant list
      const current = State.current;
      const myId = bytesToB64Url(State.identity.pubkey);
      const me = current && current.members.find(m => m.id === myId);
      if (me) _participants.push({ id: me.id, name: me.name });

      await _sendEnvelope(wsId, "huddle.join", {});
      render();
    },

    /** Leave the huddle. */
    async leave() {
      if (!_ws) return;
      const wsId = _ws;
      await _sendEnvelope(wsId, "huddle.leave", {}).catch(() => {});
      _cleanup();
      render();
    },

    /** Toggle microphone mute. */
    toggleMute() {
      _muted = !_muted;
      if (_localStream) _localStream.getAudioTracks().forEach(t => { t.enabled = !_muted; });
      render();
    },

    get sharingScreen()    { return !!_screenTrack; },
    get localScreenStream(){ return _screenStream; },
    get remoteScreens()    { return _remoteScreens; },

    /** Start sharing the local screen to every peer in the huddle. */
    async startScreenShare() {
      if (!_ws) return;
      if (_screenTrack) return;
      let stream;
      try {
        stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
      } catch (e) {
        if (e.name !== "NotAllowedError") console.warn("display media failed:", e);
        return;
      }
      const track = stream.getVideoTracks()[0];
      if (!track) return;
      _screenStream = stream;
      _screenTrack  = track;
      // Browser "Stop sharing" control ends the track — propagate.
      track.addEventListener("ended", () => {
        if (_screenTrack === track) this.stopScreenShare().catch(() => {});
      });
      // Add to every existing peer + renegotiate so they get the new m-section.
      for (const [peerId, pc] of _pcs) {
        try {
          const sender = pc.addTrack(track, stream);
          _screenSenders.set(peerId, sender);
          await _renegotiate(_ws, peerId, pc);
        } catch (e) { console.warn("screen add to peer failed:", e); }
      }
      render();
    },

    /** Stop sharing and remove the track from every peer. */
    async stopScreenShare() {
      if (!_screenTrack) return;
      const wsId = _ws;
      const track = _screenTrack;
      _screenTrack = null;
      try { track.stop(); } catch {}
      if (_screenStream) {
        _screenStream.getTracks().forEach(t => { try { t.stop(); } catch {} });
        _screenStream = null;
      }
      for (const [peerId, sender] of _screenSenders) {
        const pc = _pcs.get(peerId);
        if (pc && sender) { try { pc.removeTrack(sender); } catch {} }
        if (pc) await _renegotiate(wsId, peerId, pc);
      }
      _screenSenders.clear();
      render();
    },

    // ── Dispatch hooks ─────────────────────────────────────

    /** Called when a huddle.join envelope arrives from another peer. */
    async onJoin(wsId, env) {
      // Only act if we're already in the huddle for this workspace.
      if (_ws !== wsId) return;
      const current = State.current;
      if (!current || current.meta.id !== wsId) return;
      const peerId = env.from;
      const myId   = bytesToB64Url(State.identity.pubkey);
      if (peerId === myId) return;

      // Add to participants list if not already there
      const member = current.members.find(m => m.id === peerId);
      if (member && !_participants.find(p => p.id === peerId)) {
        _participants.push({ id: member.id, name: member.name });
      }

      // We are the offerer — create and send an offer
      const pc    = _getOrCreatePc(wsId, peerId);
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      // Trickle ICE: send offer SDP immediately, candidates will follow
      await _sendSignal(wsId, peerId, { sdp_type: "offer", sdp: pc.localDescription.sdp });
      render();
    },

    /** Called when a huddle.leave arrives. */
    onLeave(wsId, env) {
      if (_ws !== wsId) return;
      const peerId = env.from;
      _removePeer(peerId);
      if (State.view === "workspace") render();
    },

    /** Called when a huddle.signal arrives. */
    async onSignal(wsId, env, inner) {
      // Only process if we're in this huddle AND this signal is addressed to us.
      if (_ws !== wsId) return;
      const myId = bytesToB64Url(State.identity.pubkey);
      if (inner.to !== myId) return;
      const peerId = env.from;
      const pc     = _getOrCreatePc(wsId, peerId);

      if (inner.sdp_type === "offer") {
        await pc.setRemoteDescription({ type: "offer", sdp: inner.sdp });
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await _sendSignal(wsId, peerId, { sdp_type: "answer", sdp: pc.localDescription.sdp });
      } else if (inner.sdp_type === "answer") {
        if (pc.signalingState === "have-local-offer") {
          await pc.setRemoteDescription({ type: "answer", sdp: inner.sdp });
        }
      } else if (inner.ice) {
        await pc.addIceCandidate(inner.ice).catch(() => {});
      }
    },

    /** Render the huddle bar HTML for the active workspace. */
    renderBar(current) {
      if (_ws !== current.meta.id) return "";
      const myId = bytesToB64Url(State.identity.pubkey);
      // Collect the active screen shares — local + any remote peers.
      const screenStreams = [];
      if (_screenTrack && _screenStream) {
        screenStreams.push({ peerId: myId, name: "You", local: true });
      }
      for (const peerId of _remoteScreens.keys()) {
        const p = _participants.find(pp => pp.id === peerId);
        screenStreams.push({ peerId, name: p?.name || "?", local: false });
      }
      const sharePills = screenStreams.length > 0
        ? `<div class="huddle-screens" id="huddle-screens">
             ${screenStreams.map(s => `
               <div class="huddle-screen-tile">
                 <video id="huddle-vid-${escapeHTML(s.peerId.slice(0, 12))}" data-peer="${escapeHTML(s.peerId)}" autoplay playsinline${s.local ? " muted" : ""}></video>
                 <div class="huddle-screen-label">${escapeHTML(s.name)}${s.local ? " · your screen" : "'s screen"}</div>
               </div>
             `).join("")}
           </div>`
        : "";
      return `
        ${sharePills}
        <div class="huddle-bar" id="huddle-bar">
          <span class="huddle-label">🎙 Live</span>
          <div class="huddle-avatars">
            ${_participants.map(p => `
              <div class="huddle-avatar${p.id === myId ? "" : ""}"
                   id="huddle-av-${escapeHTML(p.id.slice(0, 12))}"
                   style="background: ${avatarColorFor(p.id)}"
                   title="${escapeHTML(p.name)}">${escapeHTML(initials(p.name))}</div>
            `).join("")}
          </div>
          <div class="huddle-actions">
            <button class="icon-btn${_muted ? " huddle-muted" : ""}" id="btn-huddle-mute"
                    title="${_muted ? "Unmute" : "Mute"}">🎤</button>
            <button class="icon-btn${_screenTrack ? " active" : ""}" id="btn-huddle-screen"
                    title="${_screenTrack ? "Stop sharing" : "Share screen"}">🖥</button>
            <button id="btn-huddle-leave">Leave</button>
          </div>
        </div>
      `;
    }
  };
})();

    detectBridge, openBridgeFpConfirmModal, showBridgeFpMismatchModal,
    // v2
    HuddleMgr,
    // v1.1
    sendDeviceAdd, sendDeviceRevoke, handleSelfRevocation,
    openDevicePairInitiatorModal, openDevicePairJoinerModal,
    // v1.2
    sendGroupDmSenderKey, draftPromotion,
    get Y() { return Y; },
    get MiniSearch() { return MiniSearch; },
    bytesToB64Url, b64UrlToBytes, bytesToHex, bytesToB64,
    render, setState,
    // Slice U1
    computeUnread, markChannelRead,
    // Slice N1
    Notifier, toggleChannelMute, setWorkspaceDnd,
    // Slice P1
    togglePin, isPinned,
    // Slice S1
    SLASH, flashComposerError,
    // Slice Q1
    openQuickSwitcher, buildPermalink, parsePermalinkHash, navigateToPermalink, copyPermalink,
    // Slice K1
    SHORTCUTS,
    // Slice F1
    setCustomStatus, STATUS_PRESETS,
    // Slice CV1
    CanvasMgr,
    // v1.1 / v2
    sendTransferAdmin, sendStepDown, sendScheduledRekey, MediaCapture,
    renderRekeyBanner,
    // Post-roadmap (getters so the literal evaluates before these are declared below)
    get TypingMgr()  { return TypingMgr;  },

    sendPollVote, toggleBookmark, isBookmarked, toggleChecklistItem,

}

// Yjs — lazy-loaded from esm.sh during boot(). Yjs provides the CRDT
// for workspace metadata (channel list, member list, workspace name,
// settings). Slice 4b.2 introduces the Yjs doc alongside the existing
// kv meta store; the kv path continues to work during migration.
// Pinned in PROTOCOL.md §23 (Yjs decision) and §25 (this slice).
let Y = null;

async function boot() {
  try {
    if (typeof indexedDB === "undefined") {
      throw new Error("Mehfil needs IndexedDB. Try a recent Firefox, Chrome, or Safari.");
    }
    if (typeof CompressionStream === "undefined") {
      throw new Error("Mehfil needs CompressionStream (Chrome 80+, Firefox 113+, Safari 16.4+).");
    }
    selfTest();
    // Offline-mesh spec §8 (M0 gate, in miniature): a synchronous-ish
    // round-trip of the multi-frame QR codec so a broken split/reassemble
    // surfaces at boot in dev rather than mid-handshake in a field with no
    // signal. Fire-and-forget — never blocks boot, only warns.
    qrFramesSelfTest().catch(e => console.warn("QRFrames self-test:", e));

    // Yjs is vendored/inlined (see the vendored <script> block near the top,
    // global `__MehfilYjs`) so boot has zero network dependency — a fresh
    // offline device, or the AirDropped single file opened via file://, starts
    // with no signal. If the global is somehow missing, fail clean.
    Y = window.__MehfilYjs;
    if (!Y || !Y.Doc) {
      throw new Error("Yjs failed to initialize (inlined bundle missing). Reload the page.");
    }

    const globalDB = await openGlobalDB();
    const identity = await Identity.ensure(globalDB);
    const workspaces = await idbGetAll(globalDB, "workspaces");
    State.globalDB = globalDB;
    State.identity = identity;
    State.workspaces = workspaces;

    // Check the URL fragment: #join=<payload> jumps into the joiner flow.
    const joinMatch = location.hash.match(/#join=([A-Za-z0-9_-]+)/);
    if (joinMatch) {
      await beginJoinFromFragment(joinMatch[1]);
      return;
    }
    // Slice Q1: #msg/<ws>/<ch>/<msgId> permalink — open workspace + scroll.
    const permalink = parsePermalinkHash();
    if (permalink && State.workspaces.some(w => w.id === permalink.wsId)) {
      navigateToPermalink(permalink).catch(e => console.warn("permalink nav:", e));
      return;
    }
    setState({ view: "landing" });
  } catch (e) {
    console.error(e);
    setState({ view: "error", error: e });
  }
}

window.addEventListener("error", (e) => {
  console.error("Uncaught:", e.error);
});
window.addEventListener("unhandledrejection", (e) => {
  console.error("Unhandled rejection:", e.reason);
});

// Offline-mesh spec §6: the transport badge derives its "Offline mesh"
// state from isOffline() at render time, so a change in uplink status has
// to trigger a re-render for the badge to flip. Cheap and idempotent.
window.addEventListener("online",  () => { if (State.view === "workspace") render(); });
window.addEventListener("offline", () => { if (State.view === "workspace") render(); });

// Slice Q1: permalink hashchange — navigate to #msg/<ws>/<ch>/<id>
// links when they change in-flight (e.g. user pastes a link into the
// address bar while the app is already open).
window.addEventListener("hashchange", () => {
  const permalink = parsePermalinkHash();
  if (!permalink) return;
  if (!State.workspaces || !State.workspaces.some(w => w.id === permalink.wsId)) return;
  navigateToPermalink(permalink).catch(e => console.warn("permalink nav:", e));
});

// Global keyboard handler: Cmd/Ctrl+K opens the quick switcher; Cmd/Ctrl+Shift+F
// opens the message search palette; Escape closes overlays.
// Priority order (Escape): search overlay → reaction picker → modals → thread panel.
window.addEventListener("keydown", (e) => {
  // Slice Q1: Cmd/Ctrl+K — quick switcher (channels + DMs + members).
  // Moved from ⌘K search (now ⌘⇧F) to match Slack's convention.
  if ((e.metaKey || e.ctrlKey) && e.key === "k" && !e.shiftKey && State.view === "workspace") {
    e.preventDefault();
    openQuickSwitcher();
    return;
  }
  // Cmd/Ctrl+Shift+F — message search palette (Slice 5 / WT-18, WT-19).
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === "F" || e.key === "f") && State.view === "workspace") {
    e.preventDefault();
    openSearchPalette().catch(console.warn);
    return;
  }

  // §6 WT-29: Cmd/Ctrl+T — return to workspace picker (landing).
  if ((e.metaKey || e.ctrlKey) && e.key === "t" && !e.shiftKey && State.view === "workspace") {
    e.preventDefault();
    setState({ view: "landing" });
    return;
  }

  // §6 WT-29: Cmd/Ctrl+1–9 — switch workspace by position in recently-opened list.
  if ((e.metaKey || e.ctrlKey) && /^[1-9]$/.test(e.key) && !e.shiftKey && !e.altKey) {
    const idx = parseInt(e.key, 10) - 1;
    const workspaces = State.workspaces || [];
    if (idx < workspaces.length) {
      const target = workspaces[idx];
      if (!State.current || target.id !== State.current.meta.id) {
        e.preventDefault();
        openWorkspaceById(target.id).catch(console.warn);
      }
      // If already in target workspace, let the key fall through (e.g. tab 1).
    }
    return;
  }

  // Slice K1: broader shortcuts.
  // ⌘/ — shortcuts help overlay, works even inside inputs.
  if ((e.metaKey || e.ctrlKey) && e.key === "/" && !e.shiftKey) {
    e.preventDefault();
    setState({ modal: "shortcuts" });
    return;
  }
  // ? — same, but only when the user isn't typing. Bare "?" is Shift+/ on
  // most US layouts, so we check the composed character, and skip when an
  // input-like element has focus.
  if (e.key === "?" && !e.metaKey && !e.ctrlKey && !e.altKey) {
    const ae = document.activeElement;
    const isTyping = ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" || ae.isContentEditable);
    if (!isTyping) { e.preventDefault(); setState({ modal: "shortcuts" }); return; }
  }
  // ⌘, — settings (standard Mac convention; Ctrl+, on non-Mac).
  if ((e.metaKey || e.ctrlKey) && e.key === "," && !e.shiftKey && State.view === "workspace") {
    e.preventDefault();
    openSettings();
    return;
  }
  // ⌘⇧P — pins modal for the current channel.
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === "P" || e.key === "p") && State.view === "workspace") {
    e.preventDefault();
    setState({ modal: "pins" });
    return;
  }
  // ⌘⇧M — toggle mute on the current channel.
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === "M" || e.key === "m") && State.view === "workspace") {
    e.preventDefault();
    const current = State.current;
    const chId = State.currentChannel;
    if (current && chId) toggleChannelMute(current, chId).then(() => render()).catch(console.warn);
    return;
  }
  // ⌘⇧D — toggle workspace Do Not Disturb.
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === "D" || e.key === "d") && State.view === "workspace") {
    e.preventDefault();
    const current = State.current;
    if (current) setWorkspaceDnd(current, !current.meta.dnd).then(() => render()).catch(console.warn);
    return;
  }

  if (e.key !== "Escape") return;
  // Switcher + search palette — both use .search-overlay as the class.
  const searchOverlay = document.querySelector(".search-overlay");
  if (searchOverlay) { searchOverlay.remove(); e.preventDefault(); return; }
  // Reaction picker — floating, non-modal element.
  const picker = document.querySelector(".reaction-picker");
  if (picker) { picker.remove(); e.preventDefault(); return; }
  // Then the topmost modal (DOM order; last-added wins since modals
  // stack via appendChild).
  const modals = document.querySelectorAll(".modal-bg");
  if (modals.length > 0) {
    const top = modals[modals.length - 1];
    top.remove();
    if (State.modal) setState({ modal: null });
    e.preventDefault();
    return;
  }
  // Finally, the thread panel (if open).
  if (State.threadOpen) {
    setState({ threadOpen: null });
    e.preventDefault();
    return;
  }
});

// PWA: register the service worker after boot so initial render isn't
// blocked. The SW only caches the static shell — no push, no interception
// of relay/bridge traffic. Skip during debug harness (?as=) + file://.
if ("serviceWorker" in navigator &&
    location.protocol !== "file:" &&
    !/[?&]as=/.test(location.search)) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js", { scope: "./" })
      .catch(e => console.warn("SW register failed:", e));
  });
}

/* ------------------------------------------------------------
 *  Test runner
 *  Triggered by the URL flag `?test=1`. Replaces the normal app
 *  with an in-page test panel. Tests are pure where possible;
 *  bundle-dependent tests build small fixtures inline. Output:
 *  per-test pass/fail with stack traces on failure.
 * ------------------------------------------------------------ */
const TestRunner = {
  tests: [],
  add(name, fn) { this.tests.push({ name, fn }); },
  assert(cond, msg) { if (!cond) throw new Error(msg || "assertion failed"); },
  assertEq(a, b, msg) {
    const sa = JSON.stringify(a), sb = JSON.stringify(b);
    if (sa !== sb) throw new Error((msg || "not equal") + `:\n  expected ${sb}\n  got      ${sa}`);
  },
  async run() {
    const results = [];
    for (const t of this.tests) {
      try {
        await t.fn();
        results.push({ name: t.name, ok: true });
      } catch (e) {
        results.push({ name: t.name, ok: false, err: e.message, stack: (e.stack || "").split("\n").slice(1, 4).join("\n") });
      }
    }
    return results;
  },
};

function registerTests() {
  const T = TestRunner;

  // ── Pure: MessagePack canonical codec ───────────────────────
  T.add("MP: round-trip scalars + arrays + maps", () => {
    const v = { name: "bose", age: 42, tags: ["a", "b"], flag: true, none: null };
    const decoded = MP.decode(MP.encode(v));
    // Canonical decode returns keys in sorted order; compare by field, not structure.
    T.assertEq(decoded.name, v.name);
    T.assertEq(decoded.age, v.age);
    T.assertEq(decoded.tags, v.tags);
    T.assertEq(decoded.flag, v.flag);
    T.assertEq(decoded.none, v.none);
  });
  T.add("MP: sorted map-keys yield identical bytes regardless of insertion order", () => {
    const a = MP.encode({ z: 1, a: 2, m: 3 });
    const b = MP.encode({ a: 2, m: 3, z: 1 });
    T.assertEq([...a], [...b], "canonical encoding must be key-order independent");
  });
  T.add("MP: bin round-trips byte-identical", () => {
    const src = new Uint8Array([0, 1, 2, 255, 128]);
    const round = MP.decode(MP.encode({ x: src })).x;
    T.assertEq([...round], [...src]);
  });

  // ── Pure: mentions ──────────────────────────────────────────
  T.add("parseMentions: basic name match", () => {
    const members = [{ id: "u1", name: "Alice" }, { id: "u2", name: "Bose" }];
    T.assertEq(parseMentions("hey @Alice got a sec?", members), ["u1"]);
  });
  T.add("parseMentions: trailing punctuation doesn't eat the name", () => {
    const members = [{ id: "u1", name: "Alice" }];
    T.assertEq(parseMentions("@Alice.", members), ["u1"]);
  });
  T.add("parseMentions: unknown name ignored", () => {
    const members = [{ id: "u1", name: "Alice" }];
    T.assertEq(parseMentions("@nobody", members), []);
  });
  T.add("parseMentions: group expands to every memberId", () => {
    const members = [{ id: "u1", name: "Alice" }, { id: "u2", name: "Bose" }, { id: "u3", name: "Charlie" }];
    const groups = [{ id: "g1", name: "eng", memberIds: ["u2", "u3"] }];
    const out = parseMentions("ship it @eng", members, groups);
    T.assertEq(out.sort(), ["u2", "u3"]);
  });
  T.add("parseMentions: group precedence over same-named member", () => {
    const members = [{ id: "u1", name: "eng" }, { id: "u2", name: "Bose" }];
    const groups = [{ id: "g1", name: "eng", memberIds: ["u2"] }];
    T.assertEq(parseMentions("@eng please", members, groups), ["u2"]);
  });

  // ── Pure: permalink parser ──────────────────────────────────
  T.add("permalink: buildPermalink + parsePermalinkHash round-trip", () => {
    const ws = "wsId-abc_123", ch = "chId-xyz", mid = "msg-789";
    const url = buildPermalink(ws, ch, mid);
    const orig = location.hash;
    location.hash = "#" + url.split("#")[1];
    const parsed = parsePermalinkHash();
    location.hash = orig || "";
    T.assertEq(parsed, { wsId: ws, chId: ch, msgId: mid });
  });
  T.add("permalink: malformed hash returns null", () => {
    const orig = location.hash;
    location.hash = "#notapermalink";
    const p = parsePermalinkHash();
    location.hash = orig || "";
    T.assertEq(p, null);
  });

  // ── Pure: formatBytes ───────────────────────────────────────
  T.add("formatBytes: ranges", () => {
    T.assertEq(formatBytes(0), "0 B");
    T.assertEq(formatBytes(1023), "1023 B");
    T.assertEq(formatBytes(1024 * 1.5), "1.5 KB");
    T.assertEq(formatBytes(1024 * 1024 * 2.25), "2.3 MB");
  });

  // ── Unread computation ───────────────────────────────────────
  T.add("computeUnread: skips own + deleted + threads + older-than-marker", () => {
    const bundle = {
      readMarkers: new Map([["c1", { lastReadTs: 100 }]]),
      messages: [
        { ch: "c1", from: "me",     ts: 50,  body: "mine-old" },        // ours → skip
        { ch: "c1", from: "other",  ts: 80,  body: "before-marker" },   // older → skip
        { ch: "c1", from: "other",  ts: 150, body: "unread", deleted: false, mentions: ["me"] },   // +1 mention
        { ch: "c1", from: "other",  ts: 200, body: "reply", thread: "x" }, // thread → skip
        { ch: "c1", from: "other",  ts: 250, body: "unread2", deleted: false },  // +1 unread
        { ch: "c1", from: "other",  ts: 300, body: "gone",    deleted: true },   // deleted → skip
        { ch: "c2", from: "other",  ts: 400, body: "other ch" },        // wrong channel → skip
      ],
    };
    const u = computeUnread(bundle, "me", "c1");
    T.assertEq(u.count, 2);
    T.assertEq(u.mentions, 1);
    T.assertEq(u.firstUnreadId, undefined);   // ids aren't set in fixture
  });

  // ── WorkspaceDoc: pins ──────────────────────────────────────
  T.add("WorkspaceDoc: pin add + get + remove", () => {
    const doc = WorkspaceDoc.create();
    WorkspaceDoc.addPin(doc, "c1", "m1", "u1");
    WorkspaceDoc.addPin(doc, "c1", "m2", "u1");
    T.assertEq(WorkspaceDoc.getPins(doc, "c1").length, 2);
    WorkspaceDoc.removePin(doc, "c1", "m1");
    const pins = WorkspaceDoc.getPins(doc, "c1");
    T.assertEq(pins.length, 1);
    T.assertEq(pins[0].msgId, "m2");
  });

  // ── WorkspaceDoc: groups ────────────────────────────────────
  T.add("WorkspaceDoc: group add + get + remove", () => {
    const doc = WorkspaceDoc.create();
    WorkspaceDoc.addGroup(doc, { id: "g1", name: "eng", memberIds: ["u1", "u2"], createdBy: "u1", createdAt: Date.now() });
    const g = WorkspaceDoc.getGroups(doc);
    T.assertEq(g.length, 1);
    T.assertEq(g[0].memberIds, ["u1", "u2"]);
    WorkspaceDoc.removeGroup(doc, "g1");
    T.assertEq(WorkspaceDoc.getGroups(doc).length, 0);
  });

  // ── Envelope: sign + verify round-trip ──────────────────────
  T.add("envelope: sign + verify succeeds on own keypair", async () => {
    const priv = await crypto.subtle.generateKey({ name: "Ed25519" }, true, ["sign", "verify"]);
    const pub = new Uint8Array(await crypto.subtle.exportKey("raw", priv.publicKey));
    const signKey = priv.privateKey;
    const aesKey = await Crypto.genAesKey();
    const env = await Envelope.build({
      workspaceId: bytesToB64Url(Crypto.rand(16)),
      channelId: bytesToB64Url(Crypto.rand(16)),
      channelKey: aesKey, signKey, signerPubkey: pub,
      deviceId: "dev1", type: "message.create",
      inner: { body: "hello", fmt: "text" },
      vectorClock: [[bytesToB64Url(pub), 1]],
    });
    T.assert(await Envelope.verify(env), "signature should verify");
  });
  T.add("envelope: tampered body fails verify", async () => {
    const priv = await crypto.subtle.generateKey({ name: "Ed25519" }, true, ["sign", "verify"]);
    const pub = new Uint8Array(await crypto.subtle.exportKey("raw", priv.publicKey));
    const aesKey = await Crypto.genAesKey();
    const env = await Envelope.build({
      workspaceId: bytesToB64Url(Crypto.rand(16)),
      channelId: bytesToB64Url(Crypto.rand(16)),
      channelKey: aesKey, signKey: priv.privateKey, signerPubkey: pub,
      deviceId: "dev1", type: "message.create",
      inner: { body: "hello", fmt: "text" },
      vectorClock: [[bytesToB64Url(pub), 1]],
    });
    // Flip a byte in ct
    env.ct = new Uint8Array(env.ct);
    env.ct[0] ^= 0xff;
    T.assert(!(await Envelope.verify(env)), "tampered envelope must fail verify");
  });

  // ── TypingMgr ───────────────────────────────────────────────
  T.add("TypingMgr: mark + activeIn", () => {
    TypingMgr._fading.clear();
    TypingMgr.mark("c1", "u1");
    TypingMgr.mark("c1", "u2");
    const actives = TypingMgr.activeIn("c1").sort();
    T.assertEq(actives, ["u1", "u2"]);
    TypingMgr._fading.clear();
  });
  T.add("TypingMgr: stale entries are swept on read", () => {
    TypingMgr._fading.clear();
    // Seed with an already-expired entry
    TypingMgr._fading.set("c1", new Map([["u1", Date.now() - 1000]]));
    T.assertEq(TypingMgr.activeIn("c1"), []);
    T.assert(!TypingMgr._fading.has("c1"), "empty inner map should be cleaned");
  });

  // ── Canvas Y.Text binding ───────────────────────────────────
  T.add("CanvasMgr: diff-based textarea binding updates Y.Text", async () => {
    // Build a minimal fake bundle with a real Yjs doc
    const bundle = { doc: WorkspaceDoc.create() };
    const ta = document.createElement("textarea");
    document.body.appendChild(ta);
    CanvasMgr.bind(bundle, "chX", ta);
    ta.value = "Hello";
    ta.dispatchEvent(new Event("input", { bubbles: true }));
    await new Promise(r => setTimeout(r, 20));
    T.assertEq(CanvasMgr.getYText(bundle, "chX").toString(), "Hello");
    ta.value = "Hello world";
    ta.dispatchEvent(new Event("input", { bubbles: true }));
    await new Promise(r => setTimeout(r, 20));
    T.assertEq(CanvasMgr.getYText(bundle, "chX").toString(), "Hello world");
    CanvasMgr.dispose();
    ta.remove();
  });
}

function renderTestPanel(results) {
  const pass = results.filter(r => r.ok).length;
  const fail = results.length - pass;
  const style = `
    <style>
      body { font: 14px/1.5 -apple-system, sans-serif; padding: 24px; max-width: 820px; margin: 0 auto; }
      h1 { margin: 0 0 16px; font-size: 22px; }
      .sum { padding: 10px 14px; border-radius: 6px; margin-bottom: 18px; font-weight: 500; }
      .sum.ok { background: #d1fadf; color: #064e3b; }
      .sum.fail { background: #fee2e2; color: #7f1d1d; }
      .t { padding: 6px 10px; border-radius: 4px; margin-bottom: 3px; }
      .t.ok { color: #064e3b; }
      .t.fail { background: #fef2f2; color: #7f1d1d; }
      .t pre { margin: 4px 0 0 24px; font-size: 11px; white-space: pre-wrap; color: #991b1b; }
      .marker { display: inline-block; width: 1.2em; }
    </style>
  `;
  document.body.innerHTML = style + `
    <h1>Mehfil tests</h1>
    <div class="sum ${fail === 0 ? "ok" : "fail"}">
      ${pass} passed · ${fail} failed · ${results.length} total
    </div>
    ${results.map(r => `
      <div class="t ${r.ok ? "ok" : "fail"}">
        <span class="marker">${r.ok ? "✓" : "✗"}</span>${escapeHTML(r.name)}
        ${r.ok ? "" : `<pre>${escapeHTML(r.err || "")}\n${escapeHTML(r.stack || "")}</pre>`}
      </div>
    `).join("")}
  `;
}

if (/[?&]test=1/.test(location.search)) {
  (async () => {
    // Yjs is inlined (global __MehfilYjs); several tests use WorkspaceDoc / Y.Doc.
    if (!Y) Y = window.__MehfilYjs;
    selfTest();   // runs the canonical msgpack self-test first
    registerTests();
    const results = await TestRunner.run();
    renderTestPanel(results);
  })().catch(e => {
    document.body.innerHTML = "<pre style='padding:20px;color:red;'>Test harness failed:\n" + (e.stack || e) + "</pre>";
  });
} else {
  boot();
}
</script>
