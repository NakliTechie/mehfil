  // Main channel view filters out thread replies — they render inside
  // the thread panel when opened, not inline with the channel flow.
  const allChannelMessages = current.messages.filter(m => m.ch === currentChannel);
  const channelMessages = allChannelMessages.filter(m => !m.thread);
  // Reply count map: parent_id → number of direct replies. Computed O(n)
  // per render, n = messages in this channel, which stays small in v1.
  const replyCounts = new Map();
  for (const m of allChannelMessages) {

  const myUserId = bytesToB64Url(State.identity.pubkey);

  const peerStatus   = PeerMgr.status(current.meta.id);
  const relayStatus  = RelayMgr.status(current.meta.id);
  const bridgeStatus = BridgeMgr.status(current.meta.id);

  $app.innerHTML = `
    <div id="banner-slot"></div>

          ${current.channels.filter(c => !c.dm).map(c => {
            const u = computeUnread(current, myUserId, c.id);
            const isActive = c.id === currentChannel;
            const showBadge = u.count > 0 && !isActive;
            const isMention = u.mentions > 0 && !isActive;
            const isMuted = (current.meta.muted_channels || []).includes(c.id);
            const chHash = c.canvas ? "📝" : (c.announce ? "📢" : (c.private ? "🔒" : "#"));
            const chTitleSuffix = c.canvas ? " (canvas)" : (c.announce ? " (announcement channel)" : "");
            return `
            <div class="ch-item ${isActive ? "active" : ""} ${showBadge ? "unread" : ""} ${isMuted ? "muted" : ""}" data-ch="${escapeHTML(c.id)}" title="${escapeHTML(c.name + chTitleSuffix)}">
              ${showBadge ? `<span class="unread-badge${isMention ? " mention" : ""}" title="${u.count} unread${u.mentions > 0 ? `, ${u.mentions} mention${u.mentions === 1 ? "" : "s"}` : ""}">${isMention ? `@${u.mentions}` : u.count}</span>` : ""}
              <span class="hash">${chHash}</span>${escapeHTML(c.name)}${isMuted ? ` <span class="muted-mark" title="Muted">🔕</span>` : ""}

              // .presence-dot.{online,away,offline}.
              const p = (current.presence || {})[m.id];
              // §6: presence entries older than 90s are treated as stale → offline.
              const stale = p && (Date.now() - p.updated_at) > 90_000;
              // C1: `status` lands in a class attribute below, so it is pinned
              // to a source literal rather than interpolated from stored data.
              // The receive handler validates too; this is the sink-side half,

            // Build ordered group map: local (null) first, then remotes sorted by name.
            const groupMap = new Map();

              html += local.map(renderMember).join("");
            }
            const remoteKeys = [...groupMap.keys()].filter(k => k !== null).sort();
            for (const k of remoteKeys) {
              html += officeLabel(k, local.length > 0 || html.length > 0);
              html += groupMap.get(k).map(renderMember).join("");
            }
            return html;
          })()}
          ${current.members.length >= 3 ? `
            <div class="ch-item" id="btn-group-dm" style="color: var(--accent); margin-top: 4px;">
              + Start group DM
            </div>
          ` : ""}
          <div class="ch-item" id="btn-invite" style="color: var(--accent); margin-top: 4px;"
               title="${memberTier(current) === 1 ? 'Share a link to bring others into this workspace' : ''}">
            + Invite someone${current.members.length === 1 ? ` <span style="color: var(--fg-dim); font-size: 11px;">— get started</span>` : ""}
          </div>
        </div>
        <div class="sidebar-foot">
          <div class="me-row" id="btn-set-status" title="Set a custom status">
            <div class="avatar" style="background: ${avatarColorFor(me.id)}">${escapeHTML(initials(me.name))}</div>
            <div class="me-info">
              <div class="me-name">${escapeHTML(me.name)}</div>
              ${(() => {
                const cs = State.identity.custom_status;
                if (cs && (cs.text || cs.emoji)) {
                  return `<div class="me-custom">${escapeHTML((cs.emoji || "") + " " + (cs.text || "")).trim().slice(0, 30)}</div>`;
                }
                return `<div class="me-fp" title="${escapeHTML(fp)}">${escapeHTML(fp)}</div>`;
              })()}
            </div>
          </div>
          <button class="icon-btn${HuddleMgr.active && HuddleMgr.wsId === current.meta.id ? " active" : ""}" id="btn-huddle" title="${HuddleMgr.active && HuddleMgr.wsId === current.meta.id ? "In huddle — click to leave" : "Start a huddle"}">🎙</button>
          <button class="icon-btn" id="btn-settings" title="Settings">⚙</button>
        </div>
      </aside>
      <main class="main">
        <div class="main-head">
          <div class="ch-title"><span style="color: var(--fg-dim)">${channel.canvas ? "📝" : "#"}</span> ${escapeHTML(channel.name)}</div>
          ${channel.topic ? `<div class="ch-topic" title="${escapeHTML(channel.topic)}">${escapeHTML(channel.topic)}</div>` : ""}
          ${channel.canvas ? `<button class="pins-pill" id="btn-canvas-toggle" title="Toggle edit / preview">${State._canvasPreview ? "✎ Edit" : "👁 Preview"}</button>` : ""}
          ${!channel.canvas ? (() => {
            const pinCount = current.doc ? WorkspaceDoc.getPins(current.doc, currentChannel).length : 0;
            return pinCount > 0
              ? `<button class="pins-pill" id="btn-open-pins" title="See pinned messages">📌 ${pinCount} pinned</button>`
              : "";
          })() : ""}
          <div class="badge ${badge.cls}" title="${escapeHTML(badge.title)}">
            <span class="dot" style="${badge.dotStyle}"></span>${escapeHTML(badge.label)}
          </div>
        </div>
        ${renderGapBanner(current)}
        ${renderTierEscalationBanner(current)}
        ${renderRekeyBanner(current, me)}
        ${channel.canvas
          ? `<div class="canvas-pane" id="canvas-pane">
               ${State._canvasPreview
                 ? `<div class="canvas-preview" id="canvas-preview">Loading…</div>`
                 : `<textarea class="canvas-editor" id="canvas-editor" placeholder="Start typing — anyone in the workspace can edit. Markdown supported in Preview."></textarea>`
               }
             </div>`
          : `<div class="messages" id="messages-list">
               ${channelMessages.length === 0 && isOnlyMember ? renderEmptyState() : ""}
               ${(() => {
                 const u = computeUnread(current, myUserId, currentChannel);
                 let out = "";
                 let dividerDone = false;
                 for (const m of channelMessages) {
                   if (!dividerDone && u.firstUnreadId && m.id === u.firstUnreadId) {
                     out += `<div class="unread-divider" id="unread-divider">New</div>`;
                     dividerDone = true;
                   }
                   out += renderMessage(m, current.members, myUserId, { replyCount: replyCounts.get(m.id) || 0 });
                 }
                 return out;
               })()}
             </div>`
        }
        ${(() => {
          // Typing indicator — "Alice and Bose are typing…" below the
          // message list. Filters out our own id defensively (the dispatch
          // already skips self-marks, but defence in depth). Resolves ids
          // against the member projection; unknown senders show as
          // "someone".
          if (channel.canvas) return "";
          const typers = TypingMgr.activeIn(currentChannel).filter(uid => uid !== myUserId);
          if (typers.length === 0) return "";
          const names = typers.map(uid => current.members.find(m => m.id === uid)?.name || "someone");
          const label = names.length === 1
            ? `${escapeHTML(names[0])} is typing…`
            : names.length === 2
            ? `${escapeHTML(names[0])} and ${escapeHTML(names[1])} are typing…`
            : `${escapeHTML(names[0])}, ${escapeHTML(names[1])} and ${names.length - 2} more are typing…`;
          return `<div class="typing-indicator">${label}</div>`;
        })()}
        ${HuddleMgr.renderBar(current)}
        ${(() => {
          // Slice CV1: canvas channels have no composer — editing happens
          // in the canvas pane itself.
          if (channel.canvas) return "";
          // Slice F1-B: announcement channels — if you're not an admin,
          // render a read-only banner in place of the composer.
          if (channel.announce) {
            const isAdm = me.role === "owner" || me.role === "admin";
            if (!isAdm) {
              return `<div class="composer composer-locked" title="Only admins can post in announcement channels">📢 Only admins can post in this channel.</div>`;
            }
          }
          return `
            <div class="composer">
              <div class="composer-box" id="composer-box">
                <textarea id="composer" rows="2" placeholder="${escapeHTML(composePlaceholder(channel, current))}" autofocus></textarea>
                <div class="composer-actions">
                  <input type="file" id="attach-input" style="display:none">
                  <button class="icon-btn" id="btn-attach" title="Attach a file">📎</button>
                  <button class="icon-btn" id="btn-record-audio" title="Record a voice message">🎙</button>
                  <button class="icon-btn" id="btn-record-video" title="Record a screen clip">🎬</button>
                </div>
              </div>
              <div id="drop-hint" class="drop-hint" style="display:none">Drop the file to attach</div>
              <div id="record-status" style="display:none;"></div>
            </div>`;
        })()}
      </main>
      ${State.threadOpen ? renderThreadPanel(current, allChannelMessages, myUserId) : ""}
    </div>
  `;

  // Channel switch. Saves the current composer into drafts before switching
  // and restores the target channel's draft on arrival. Closes any open
  // thread panel — threads are scoped to a single channel. Marks the
  // leaving channel as read (Slice U1) so its sidebar badge clears.
  document.querySelectorAll("[data-ch]").forEach(el => {
    el.onclick = async () => {
      const newChId = el.getAttribute("data-ch");
      if (newChId === State.currentChannel) return;
      // M15: the composer isn't mounted for every channel (announce channels
      // the user can't post to, canvas channels), so guard the deref — the
      // two other composer reads already do. Nothing to persist if absent.
      const $composerEl = document.getElementById("composer");
      if ($composerEl) await persistDraft(State.currentChannel, $composerEl.value);
      if (State.currentChannel) {
        markChannelRead(current, State.currentChannel).catch(e => console.warn("markRead:", e));
      }
      // Slice CV1: reset the canvas preview flag so a new channel opens in edit mode.
      State._canvasPreview = false;
      setState({ currentChannel: newChId, threadOpen: null });
    };
  });

  document.getElementById("btn-settings").onclick = () => openSettings();
  document.getElementById("btn-invite").onclick = openInviteModal;
  document.getElementById("btn-new-channel").onclick = openCreateChannelModal;
  // v2: All threads entry
  const $allThreads = document.getElementById("btn-all-threads");
  if ($allThreads) $allThreads.onclick = () => setState({ modal: "all-threads" });
  const $saved = document.getElementById("btn-saved");
  if ($saved) $saved.onclick = () => setState({ modal: "saved" });
  const $drafts = document.getElementById("btn-drafts");
  if ($drafts) $drafts.onclick = () => setState({ modal: "drafts" });
  // Slice F1-A: click the me-row to open the custom status picker.
  const $setStatus = document.getElementById("btn-set-status");
  if ($setStatus) $setStatus.onclick = () => setState({ modal: "status" });

  // Slice 4c: gap banner "Try to fetch" button. Walks the visible
  // gap list and broadcasts one resync.request per sender, asking
  // for the missing range. Replies arrive as normal envelopes
  // through the dispatch path; the seen-set drops dupes.
  const $fetchGap = document.getElementById("btn-fetch-gap");
  if ($fetchGap) {
    $fetchGap.onclick = async () => {
      const banner = $fetchGap.closest(".gap-banner");
      const senderIds = banner.getAttribute("data-gap-senders").split(",");
      $fetchGap.disabled = true;
      $fetchGap.textContent = "Fetching…";
      for (const senderId of senderIds) {
        // Compute the missing range from hwm + lc-peek max.
        const inner = current.gaps.get(senderId);
        const peeked = inner?.get("lc_peek") || 0;
        const hwmDevices = current.hwm.get(senderId);
        const hwmMax = hwmDevices ? Math.max(0, ...hwmDevices.values()) : 0;
        if (peeked <= hwmMax) continue;
        await PeerMgr.sendResyncRequest(current.meta.id, senderId, hwmMax + 1, peeked);
      }
      // The banner will disappear naturally on the next render
      // when the dispatched envelopes advance hwm past peeked.
      // Re-enable in case nothing was returned (peers offline).
      setTimeout(() => {
        if ($fetchGap.parentElement) {
          $fetchGap.disabled = false;
          $fetchGap.textContent = "Try to fetch";
        }
      }, 3000);
    };
  }
  // §6 Tier escalation banner wiring.
  const $setupRelay = document.getElementById("btn-setup-relay");
  if ($setupRelay) $setupRelay.onclick = () => openSettings("workspace");
  const $dismissTier = document.getElementById("btn-dismiss-tier-banner");
  if ($dismissTier) $dismissTier.onclick = async () => {
    current.meta.tier_banner_dismissed = Date.now();
    await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
    setState({});
  };
  // v2: rekey banner wiring.
  const $rekeyNow = document.getElementById("btn-rekey-now");
  if ($rekeyNow) $rekeyNow.onclick = async () => {
    if (!confirm("Rotate all workspace and channel keys now?\n\nHistory stays decryptable to current members. New traffic uses fresh keys.")) return;
    $rekeyNow.disabled = true;
    $rekeyNow.textContent = "Rotating keys…";
    try {
      await sendScheduledRekey(current);
      setState({});
    } catch (e) {
      alert("Rekey failed: " + e.message);
      $rekeyNow.disabled = false;
      $rekeyNow.textContent = "Rekey now";
    }
  };
  const $dismissRekey = document.getElementById("btn-dismiss-rekey");
  if ($dismissRekey) $dismissRekey.onclick = async () => {
    current.meta.rekey_banner_dismissed = Date.now();
    await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
    setState({});
  };

  // Huddle button (sidebar footer)
  const $huddle = document.getElementById("btn-huddle");
  if ($huddle) $huddle.onclick = async () => {
    if (HuddleMgr.active && HuddleMgr.wsId === current.meta.id) {
      await HuddleMgr.leave();
    } else {
      await HuddleMgr.join(current.meta.id);
    }
  };
  // Huddle bar controls
  const $huddleMute = document.getElementById("btn-huddle-mute");
  if ($huddleMute) $huddleMute.onclick = () => HuddleMgr.toggleMute();
  const $huddleLeave = document.getElementById("btn-huddle-leave");
  if ($huddleLeave) $huddleLeave.onclick = () => HuddleMgr.leave();
  const $huddleScreen = document.getElementById("btn-huddle-screen");
  if ($huddleScreen) $huddleScreen.onclick = async () => {
    if (HuddleMgr.sharingScreen) await HuddleMgr.stopScreenShare();
    else                         await HuddleMgr.startScreenShare();
  };
  // Attach the live MediaStreams to video elements rendered by renderBar.
  {
    const myId = bytesToB64Url(State.identity.pubkey);
    document.querySelectorAll(".huddle-screen-tile video[data-peer]").forEach(vid => {
      const peerId = vid.getAttribute("data-peer");
      const stream = peerId === myId
        ? HuddleMgr.localScreenStream
        : HuddleMgr.remoteScreens.get(peerId);
      if (stream && vid.srcObject !== stream) vid.srcObject = stream;
    });
  }

  const $groupDm = document.getElementById("btn-group-dm");
  if ($groupDm) $groupDm.onclick = openGroupDmModal;

  // "People" entries: click to start a DM.
  document.querySelectorAll("[data-pmember]").forEach(el => {
    const mid = el.getAttribute("data-pmember");
    if (!mid) return;  // skip self
    el.style.cursor = "pointer";
    el.onclick = async () => {
      const member = current.members.find(m => m.id === mid);
      if (!member) return;
      try {
        const dmCh = await ensureDmChannel(current, member);
        setState({ currentChannel: dmCh.id });
      } catch (e) {
        alert(e.message);
      }
    };
  });

  // "People" entries: ★ Propose-as-admin button (admins/owners only).
  document.querySelectorAll("[data-sidebar-propose]").forEach(el => {
    const mid = el.getAttribute("data-sidebar-propose");
    if (!mid) return;
    el.onclick = async (e) => {
      e.stopPropagation();  // prevent the parent DM-click from firing
      el.disabled = true;
      try {
        await draftPromotion(current, mid);
        openSettings("admin");  // jump to Admin tab so user sees the pending proposal
      } catch (err) {
        alert("Could not propose promotion: " + err.message);
        el.disabled = false;
      }
    };
  });

  // Composer wiring. Skipped entirely for read-only (announcement) channels
  // where the textarea is replaced by a banner.
  const $composer = document.getElementById("composer");
  if ($composer) {
  // Restore draft for this channel (if any).
  loadDraft(currentChannel).then(draft => {
    if (draft && !$composer.value) {
      $composer.value = draft;
    }
  });

  // @mention autocomplete state — scoped to this composer instance so
  // re-rendering clears it naturally.
  let mentionPopup = null;
  let mentionActiveIdx = 0;
  let mentionMatches = [];
  const closeMentionPopup = () => {
    if (mentionPopup) { mentionPopup.remove(); mentionPopup = null; }
    mentionMatches = [];
    mentionActiveIdx = 0;
  };
  const updateMentionPopup = () => {
    // Detect an `@word` token ending at the caret.
    const pos = $composer.selectionStart;
    const upTo = $composer.value.slice(0, pos);
    const m = upTo.match(/@([\p{L}\p{N}_-]*)$/u);
    if (!m) { closeMentionPopup(); return; }
    const prefix = m[1].toLowerCase();
    // Slice F1-C: include user groups in the autocomplete candidates.
    // Groups render first (they're typically smaller sets with distinct
    // names), then members.
    const groupsForAc = current.doc ? WorkspaceDoc.getGroups(current.doc) : [];
    const groupMatches = groupsForAc
      .filter(g => g.name.toLowerCase().startsWith(prefix))
      .map(g => ({ kind: "group", id: g.id, name: g.name, count: (g.memberIds || []).length }));
    const memberMatches = current.members
      .filter(mem => mem.name.toLowerCase().startsWith(prefix))
      .map(mem => ({ kind: "member", id: mem.id, name: mem.name }));
    mentionMatches = [...groupMatches, ...memberMatches].slice(0, 6);
    if (mentionMatches.length === 0) { closeMentionPopup(); return; }
    if (mentionActiveIdx >= mentionMatches.length) mentionActiveIdx = 0;
    if (!mentionPopup) {
      mentionPopup = document.createElement("div");
      mentionPopup.className = "mention-autocomplete";
      document.body.appendChild(mentionPopup);
    }
    mentionPopup.innerHTML = mentionMatches.map((item, i) => {
      if (item.kind === "group") {
        return `
          <div class="mention-opt ${i === mentionActiveIdx ? "active" : ""}" data-idx="${i}" style="display: flex; gap: 8px; align-items: center;">
            <span class="switcher-icon plain" style="width: 18px; height: 18px;">👥</span>
            <span>${escapeHTML(item.name)} <span style="font-size: 10px; color: var(--fg-dim);">· group of ${item.count}</span></span>
          </div>
        `;
      }
      return `
        <div class="mention-opt ${i === mentionActiveIdx ? "active" : ""}" data-idx="${i}">
          <div class="avatar" style="width: 18px; height: 18px; font-size: 9px; background: ${avatarColorFor(item.id)}">${escapeHTML(initials(item.name))}</div>
          <span>${escapeHTML(item.name)}</span>
        </div>
      `;
    }).join("");
    mentionPopup.querySelectorAll(".mention-opt").forEach(el => {
      el.onmousedown = (ev) => {
        ev.preventDefault();   // keep composer focus
        mentionActiveIdx = Number(el.getAttribute("data-idx"));
        acceptMention();
      };
    });
    // Position the popup just above the composer, aligned to its left.
    const rect = $composer.getBoundingClientRect();
    mentionPopup.style.top = (rect.top - mentionPopup.offsetHeight - 4) + "px";
    mentionPopup.style.left = rect.left + "px";
  };
  const acceptMention = () => {
    const pick = mentionMatches[mentionActiveIdx];
    if (!pick) return;
    const pos = $composer.selectionStart;
    const before = $composer.value.slice(0, pos);
    const after  = $composer.value.slice(pos);
    // Replace the trailing `@word` with `@<full name> `.
    const replaced = before.replace(/@([\p{L}\p{N}_-]*)$/u, "@" + pick.name + " ");
    $composer.value = replaced + after;
    // Move caret to just after the inserted name + space.
    const newPos = replaced.length;
    $composer.setSelectionRange(newPos, newPos);
    closeMentionPopup();
  };

  // Slice S1: slash-command autocomplete. Triggers only when the composer
  // value starts with "/" and the caret is inside the command word
  // (before the first space). Mirrors the mention autocomplete pattern.
  let slashPopup = null;
  let slashActiveIdx = 0;
  let slashMatches = [];
  const closeSlashPopup = () => {
    if (slashPopup) { slashPopup.remove(); slashPopup = null; }
    slashMatches = [];
    slashActiveIdx = 0;
  };
  const updateSlashPopup = () => {
    const val = $composer.value;
    const pos = $composer.selectionStart;
    // Must start with "/" at column 0 and caret must be before the first space.
    if (!val.startsWith("/")) { closeSlashPopup(); return; }
    const firstSpace = val.indexOf(" ");
    if (firstSpace >= 0 && pos > firstSpace) { closeSlashPopup(); return; }
    const prefix = val.slice(1, firstSpace < 0 ? val.length : firstSpace).toLowerCase();
    // Dedupe aliases pointing at the same def (call/huddle).
    const seen = new Set();
    slashMatches = [];
    for (const [name, def] of Object.entries(SLASH)) {
      if (!name.startsWith(prefix)) continue;
      if (seen.has(def)) continue;
      seen.add(def);
      slashMatches.push({ name, def });
      if (slashMatches.length >= 10) break;
    }
    if (slashMatches.length === 0) { closeSlashPopup(); return; }
    if (slashActiveIdx >= slashMatches.length) slashActiveIdx = 0;
    if (!slashPopup) {
      slashPopup = document.createElement("div");
      slashPopup.className = "mention-autocomplete slash-autocomplete";
      document.body.appendChild(slashPopup);
    }
    slashPopup.innerHTML = slashMatches.map((m, i) => `
      <div class="mention-opt ${i === slashActiveIdx ? "active" : ""}" data-idx="${i}" style="display: flex; gap: 8px; align-items: baseline;">
        <code style="font-size: 12px; color: var(--accent);">${escapeHTML(m.def.usage)}</code>
        <span style="font-size: 11px; color: var(--fg-dim); flex: 1;">${escapeHTML(m.def.summary)}</span>
      </div>
    `).join("");
    slashPopup.querySelectorAll(".mention-opt").forEach(el => {
      el.onmousedown = (ev) => {
        ev.preventDefault();
        slashActiveIdx = Number(el.getAttribute("data-idx"));
        acceptSlash();
      };
    });
    const rect = $composer.getBoundingClientRect();
    slashPopup.style.top = (rect.top - slashPopup.offsetHeight - 4) + "px";
    slashPopup.style.left = rect.left + "px";
  };
  const acceptSlash = () => {
    const pick = slashMatches[slashActiveIdx];
    if (!pick) return;
    // Replace only the command word, preserve any args already typed.
    const val = $composer.value;
    const firstSpace = val.indexOf(" ");
    const rest = firstSpace < 0 ? "" : val.slice(firstSpace);
    // Commands that take args get a trailing space; commands that don't stay tight.
    const needsArgs = pick.def.usage.includes("<") || pick.def.usage.includes("[");
    $composer.value = "/" + pick.name + (needsArgs && !rest ? " " : rest);
    const caret = ("/" + pick.name + " ").length;
    $composer.setSelectionRange(caret, caret);
    closeSlashPopup();
  };

  $composer.oninput = () => {
    updateMentionPopup();
    updateSlashPopup();
    // Typing indicator — debounced sender inside TypingMgr.
    TypingMgr.notify(State.current, currentChannel);
  };
  $composer.onclick = () => { updateMentionPopup(); updateSlashPopup(); };
  $composer.onkeydown = async (e) => {
    if (slashPopup && slashMatches.length > 0) {
      if (e.key === "ArrowDown") { e.preventDefault(); slashActiveIdx = (slashActiveIdx + 1) % slashMatches.length; updateSlashPopup(); return; }
      if (e.key === "ArrowUp")   { e.preventDefault(); slashActiveIdx = (slashActiveIdx - 1 + slashMatches.length) % slashMatches.length; updateSlashPopup(); return; }
      if (e.key === "Tab")       { e.preventDefault(); acceptSlash(); return; }
      if (e.key === "Escape")    { e.preventDefault(); closeSlashPopup(); return; }
      // Enter falls through so the composer can execute the command.
    }
    if (mentionPopup && mentionMatches.length > 0) {
      if (e.key === "ArrowDown") { e.preventDefault(); mentionActiveIdx = (mentionActiveIdx + 1) % mentionMatches.length; updateMentionPopup(); return; }
      if (e.key === "ArrowUp")   { e.preventDefault(); mentionActiveIdx = (mentionActiveIdx - 1 + mentionMatches.length) % mentionMatches.length; updateMentionPopup(); return; }
      if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); acceptMention(); return; }
      if (e.key === "Escape")    { e.preventDefault(); closeMentionPopup(); return; }
    }
    // Slice K1: ↑ in an empty composer — edit my last own message in this channel.
    if (e.key === "ArrowUp" && !e.metaKey && !e.ctrlKey && !e.altKey && !e.shiftKey && $composer.value === "") {
      const myUid = bytesToB64Url(State.identity.pubkey);
      const mine = current.messages
        .filter(m => m.ch === currentChannel && m.from === myUid && !m.deleted && !m.attachment && !m.thread)
        .sort((a, b) => b.ts - a.ts);
      if (mine.length > 0) {
        e.preventDefault();
        beginInlineEdit(mine[0].id);
        return;
      }
    }
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      const body = $composer.value;
      if (!body.trim()) return;
      // Slice S1: slash-command interception. Unknown commands flash
      // an inline error and restore the composer text; known commands
      // run their handler and clear the composer like a normal send.
      const slashMatch = body.match(/^\/(\S+)(?:\s+([\s\S]*))?$/);
      if (slashMatch) {
        const cmdName = slashMatch[1].toLowerCase();
        const cmd = SLASH[cmdName];
        if (!cmd) {
          flashComposerError($composer, `Unknown command: /${cmdName}  —  type /help`);
          return;
        }
        $composer.value = "";
        await clearDraft(currentChannel);
        $composer.disabled = true;
        try {
          await cmd.run({ current: State.current, args: slashMatch[2] || "", name: cmdName });
        } catch (err) {
          $composer.value = body;
          flashComposerError($composer, err.message);
        } finally {
          $composer.disabled = false;
          $composer.focus();
        }
        return;
      }
      $composer.value = "";
      await clearDraft(currentChannel);
      $composer.disabled = true;
      try {
        await sendMessageNow(body);
      } finally {
        $composer.disabled = false;
        $composer.focus();
      }
    }
  };
  // Save draft on blur so nothing is lost on accidental navigation.
  $composer.onblur = () => {
    persistDraft(currentChannel, $composer.value);
    // Close the popups on blur — but with a short delay so a mousedown
    // on a popup entry (which accepted via onmousedown above) completes
    // first.
    setTimeout(() => { closeMentionPopup(); closeSlashPopup(); }, 150);
  };

  // Attachment: paperclip button → file picker.
  const $attachInput = document.getElementById("attach-input");
  document.getElementById("btn-attach").onclick = () => $attachInput.click();
  $attachInput.onchange = async () => {
    const file = $attachInput.files[0];
    if (!file) return;
    try {
      await sendAttachment(State.current, currentChannel, file);
      render();
    } catch (e) {
      alert("Couldn't attach: " + e.message);
    }
    $attachInput.value = "";   // allow re-selecting the same file
  };

  // v1.1: voice + video capture buttons. Click toggles between start and stop.
  const wireMediaBtn = (btnId, kind) => {
    const $btn = document.getElementById(btnId);
    if (!$btn) return;
    const $status = document.getElementById("record-status");
    $btn.onclick = async () => {
      if (MediaCapture.isActive() && MediaCapture.kind() === kind) {
        $btn.classList.remove("recording");
        $btn.title = kind === "audio" ? "Record a voice message" : "Record a screen clip";
        if ($status) $status.style.display = "none";
        try {
          const file = await MediaCapture.stop();
          if (file) await sendAttachment(State.current, currentChannel, file);
          render();
        } catch (e) { alert("Couldn't send clip: " + e.message); }
      } else if (MediaCapture.isActive()) {
        alert("Another recording is in progress. Stop that one first.");
      } else {
        try {
          if (kind === "audio") await MediaCapture.startAudio();
          else                  await MediaCapture.startVideo();
          $btn.classList.add("recording");
          $btn.title = "Click to stop + send";
          if ($status) {
            $status.style.display = "";
            $status.className = "record-status";
            $status.textContent = kind === "audio" ? "🔴 Recording audio… click 🎙 to stop + send" : "🔴 Recording screen… click 🎬 to stop + send";
          }
        } catch (e) {
          // Permission denied or no device
          if (e.name === "NotAllowedError") alert("Permission denied — allow " + kind + " access.");
          else if (e.name === "NotFoundError") alert("No " + kind + " device found.");
          else alert("Couldn't start: " + e.message);
        }
      }
    };
  };
  wireMediaBtn("btn-record-audio", "audio");
  wireMediaBtn("btn-record-video", "video");

  // Drag-and-drop onto the main pane.
  const $main = document.querySelector(".main");
  $main.ondragover = (e) => { e.preventDefault(); $main.classList.add("drop-active"); };
  $main.ondragleave = (e) => { if (e.target === $main) $main.classList.remove("drop-active"); };
  $main.ondrop = async (e) => {
    e.preventDefault();
    $main.classList.remove("drop-active");
    const file = e.dataTransfer.files[0];
    if (!file) return;
    try {
      await sendAttachment(State.current, currentChannel, file);
      render();
    } catch (err) {
      alert("Couldn't attach: " + err.message);
    }
  };
  }   // end if ($composer) — Slice F1-B read-only composer guard

  // Click-to-download handlers for attachments we don't have yet.
  // Triggers a BlobTransfer request to any attached peer. The UI
  // transitions to "downloading" state immediately and to the final
  // rendered state when BlobTransfer.receiveChunk assembles the file.
  document.querySelectorAll("[data-fetch-blob]").forEach(el => {
    el.onclick = async () => {
      const msgId = el.getAttribute("data-fetch-blob");
      const msg = current.messages.find(m => m.id === msgId);
      if (!msg || !msg.attachment) return;
      try {
        await BlobTransfer.requestBlob(current.meta.id, msg.attachment.blob_id);
        render();   // show the downloading spinner
      } catch (e) {
        alert("Couldn't request the file: " + e.message);
      }
    };
  });

  // Attachment rendering — decrypt blobs and hand them to the right DOM
  // element. Images get their src set via an object URL; file cards
  // become click-to-download links. We do this AFTER the HTML is in the
  // DOM so the URLs land on real elements.
  document.querySelectorAll("[data-attach]").forEach(async (el) => {
    const msgId = el.getAttribute("data-attach");
    const msg = current.messages.find(m => m.id === msgId);
    if (!msg || !msg.attachment || !msg.attachment.available) return;
    const a = msg.attachment;
    // M6: render() re-runs on every state change, and this used to mint a new
    // object URL for the same blob each time, none of them revoked — they
    // accumulated for the life of the page. Cache one URL per blob_id and reuse
    // it across renders, so a message with an attachment costs exactly one URL.
    let url = _attachmentUrlCache.get(a.blob_id);
    if (!url) {
      const bytes = await BlobStore.get(current.meta.id, a.blob_id, a.key, a.iv);
      if (!bytes) return;
      url = URL.createObjectURL(new Blob([bytes], { type: a.mime }));
      _attachmentUrlCache.set(a.blob_id, url);
    }
    if (el.tagName === "IMG") {
      el.src = url;
      // noopener,noreferrer severs window.opener so an SVG (or any image)
      // opened in a new tab can't reach back into this page.
      el.onclick = () => window.open(url, "_blank", "noopener,noreferrer");
    } else if (el.tagName === "AUDIO" || el.tagName === "VIDEO") {
      // v1.1: inline media players (voice messages + video clips).
      el.src = url;
    } else {
      el.onclick = () => {
        const link = document.createElement("a");
        link.href = url;
        link.download = a.name;
        link.click();
      };
    }
    // The cached URL stays valid for the life of the view (reused across
    // renders via _attachmentUrlCache); released on page unload. Underlying
    // blobs are LRU-evicted via BlobStore._checkQuota.
  });

  // Message actions (edit / delete / react / thread / pin) — hover-revealed buttons.
  document.querySelectorAll(".msg-action").forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      const act = btn.getAttribute("data-act");
      const id = btn.getAttribute("data-msg");
      if (act === "delete") {
        try { await sendMessageDelete(State.current, id); render(); }
        catch (err) { console.error(err); }
      } else if (act === "edit") {
        beginInlineEdit(id);
      } else if (act === "react") {
        openReactionPicker(btn, id);
      } else if (act === "thread") {
        setState({ threadOpen: id });
      } else if (act === "pin") {
        const msg = State.current.messages.find(mm => mm.id === id);
        if (!msg) return;
        btn.disabled = true;
        try { await togglePin(State.current, msg.ch, id); render(); }
        catch (err) { alert("Couldn't pin: " + err.message); btn.disabled = false; }
      } else if (act === "forward") {
        State._forwardMsgId = id;
        setState({ modal: "forward" });
      } else if (act === "bookmark") {
        try { await toggleBookmark(State.current, id); render(); }
        catch (err) { alert("Couldn't bookmark: " + err.message); }
      }
    };
  });

  // Slice P1: channel-header "📌 N pinned" pill wiring.
  const $pinsPill = document.getElementById("btn-open-pins");
  if ($pinsPill) $pinsPill.onclick = () => setState({ modal: "pins" });

  // Slice CV1: canvas editor binding + preview toggle.
  if (channel.canvas) {
    const $editor  = document.getElementById("canvas-editor");
    const $preview = document.getElementById("canvas-preview");
    const $toggle  = document.getElementById("btn-canvas-toggle");
    if ($editor) {
      CanvasMgr.bind(State.current, currentChannel, $editor);
    } else {
      CanvasMgr.dispose();
    }
    if ($preview) CanvasMgr.renderPreview(State.current, currentChannel, $preview);
    if ($toggle) $toggle.onclick = () => {
      State._canvasPreview = !State._canvasPreview;
      render();
    };
  } else {
    CanvasMgr.dispose();
  }

  // Slice Q1: clickable timestamps → copy permalink.
  document.querySelectorAll("[data-copy-permalink]").forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const msgId = el.getAttribute("data-copy-permalink");
      copyPermalink(el, msgId);
    };
  });

  // Reply-count pill — click to open the thread panel for this parent.
  document.querySelectorAll("[data-open-thread]").forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      setState({ threadOpen: el.getAttribute("data-open-thread") });
    };
  });

  // Thread panel: close button and reply composer wiring.
  const $closeThread = document.getElementById("btn-close-thread");
  if ($closeThread) {
    $closeThread.onclick = () => setState({ threadOpen: null });
  }
  const $threadComposer = document.getElementById("thread-composer");
  if ($threadComposer) {
    $threadComposer.onkeydown = async (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        const body = $threadComposer.value;
        if (!body.trim()) return;
        $threadComposer.value = "";
        $threadComposer.disabled = true;
        try {
          // The thread composer explicitly passes the parent id; this
          // works even if State.threadOpen somehow changes mid-send.
          await sendMessageNow(body, { threadId: State.threadOpen });
        } finally {
          $threadComposer.disabled = false;
          $threadComposer.focus();
        }
      }
    };
    // Focus the thread composer on open so typing lands there.
    $threadComposer.focus();
  }

  // Checklist item toggles.
  document.querySelectorAll("[data-checklist]").forEach(cb => {
    cb.onchange = async () => {
      const mid = cb.getAttribute("data-checklist");
      const idx = parseInt(cb.getAttribute("data-item-idx"), 10);
      try { await toggleChecklistItem(State.current, mid, idx); render(); }
      catch (err) { alert("Couldn't toggle: " + err.message); }
    };
  });

  // Poll option clicks — vote / re-vote / clear.
  document.querySelectorAll("[data-poll-vote]").forEach(opt => {
    opt.onclick = async (e) => {
      e.stopPropagation();
      const mid = opt.getAttribute("data-poll-vote");
      const idx = parseInt(opt.getAttribute("data-poll-idx"), 10);
      try { await sendPollVote(State.current, mid, idx); render(); }
      catch (err) { alert("Couldn't vote: " + err.message); }
    };
  });

  // Reaction pills — click to toggle your own reaction.
  document.querySelectorAll("[data-react-toggle]").forEach(pill => {
    pill.onclick = async (e) => {
      e.stopPropagation();
      const id = pill.getAttribute("data-react-toggle");
      const emoji = pill.getAttribute("data-emoji");
      try {
        await toggleReaction(State.current, id, emoji);
        render();
      } catch (err) { console.error(err); }
    };
  });

  // Empty state hint wiring
  const $self = document.getElementById("link-self-msg");
  if ($self) {
    $self.onclick = async () => {
      await sendMessageNow("👋 hello, this is me talking to me");
    };
  }
  const $inviteLink = document.getElementById("link-invite");
  if ($inviteLink) {
    $inviteLink.onclick = openInviteModal;
  }

  // Render any pending banner (e.g. backup nag).
  if (State.backupNag === "banner") {
    document.getElementById("banner-slot").innerHTML = renderBackupBanner();
    document.getElementById("nag-backup").onclick = () => openBackupModal();
    document.getElementById("nag-later").onclick = async () => {
      await Identity.dismissBackup(State.globalDB);
      setState({ backupNag: "dot", backupNagShownThisSession: true });
    };
  }

  if (State.backupNag === "dot") {
    const dot = document.createElement("div");
    dot.className = "corner-warn";
    dot.title = "Back up your identity — click to open";
    dot.onclick = openBackupModal;
    document.body.appendChild(dot);
  }
  if (State.backupNag === "done") {
    const ok = document.createElement("div");
    ok.className = "corner-ok";
    ok.textContent = "✓";
    ok.title = "Identity backed up";
    document.body.appendChild(ok);
  }

  // Modal
  if (State.modal === "backup")   renderBackupModal();
  if (State.modal === "settings") renderSettingsModal();
  if (State.modal === "invite")   renderInviteModal();
  if (State.modal === "pins")     renderPinsModal();
  if (State.modal === "slash-help") renderSlashHelpModal();
  if (State.modal === "shortcuts") renderShortcutsModal();
  if (State.modal === "forward")   renderForwardModal();
  if (State.modal === "status")    renderStatusModal();
  if (State.modal === "all-threads") renderAllThreadsModal();
  if (State.modal === "saved")       renderSavedModal();
  if (State.modal === "drafts")      renderDraftsModal();
  if (State.modal === "scheduled")   renderScheduledModal();

  // Scroll to bottom — main channel messages, and the thread panel
  // scroller if it's open. Slice U1: if an unread divider is present
  // and this is a fresh channel open (not a same-channel re-render),
  // scroll the divider into view instead so the user lands at the
  // first unread message.
  const $list = document.getElementById("messages-list");
  const $divider = document.getElementById("unread-divider");
  if ($list) {
    if ($divider && State._lastRenderedChannel !== currentChannel) {
      $divider.scrollIntoView({ block: "start" });
    } else {
      $list.scrollTop = $list.scrollHeight;
    }
  }
  State._lastRenderedChannel = currentChannel;
  const $threadScroll = document.getElementById("thread-scroll");
  if ($threadScroll) $threadScroll.scrollTop = $threadScroll.scrollHeight;

  // Lazy syntax highlighting for code blocks with a language tag.
  // Safe to await off-thread; first hit triggers the import.
  HighlightMgr.applyAll().catch(() => {});
}

function computeBadge(peerStatus, memberCount, relayStatus, bridgeStatus, offlineMesh) {
  if (memberCount === 1) {
    return { cls: "local", label: "Local only", title: "You're the only member — invite someone to connect", dotStyle: "" };
  }
  if (peerStatus === "connected") {
    // Offline-mesh spec §6: connected peers with no internet uplink are on
    // a local hotspot via host-only ICE — surface that distinctly so the
    // user knows the mesh is live even though nothing can reach the wire.
    if (offlineMesh || isOffline()) {
      return { cls: "offlinemesh", label: "Offline mesh", title: "Connected over local hotspot — host-only ICE, no internet uplink", dotStyle: "background: #3b82f6" };
    }
    return { cls: "live", label: "Live", title: "Connected via WebRTC", dotStyle: "background: var(--ok)" };
  }
  if (peerStatus === "connecting") {
    return { cls: "connecting", label: "Connecting…", title: "Establishing WebRTC connection", dotStyle: "background: var(--warn)" };
  }
  // §7: relay fallback — WebRTC is down but relay is reachable.
  if (relayStatus === "connected") {
    return { cls: "relay", label: "Via relay", title: "WebRTC unavailable — delivering via relay", dotStyle: "" };
  }
  if (relayStatus === "connecting") {
    return { cls: "connecting", label: "Relay connecting…", title: "Connecting to relay server", dotStyle: "background: var(--warn)" };
  }
  // §37: bridge fallback — relay also down but LAN bridge reachable.
  if (bridgeStatus === "connected") {
    return { cls: "relay", label: "Via bridge", title: "Delivering via LAN bridge", dotStyle: "" };
  }
  if (bridgeStatus === "connecting") {
    return { cls: "connecting", label: "Bridge connecting…", title: "Connecting to LAN bridge", dotStyle: "background: var(--warn)" };
  }
  return { cls: "offline", label: "Offline", title: "No peers reachable — messages will queue", dotStyle: "background: var(--danger)" };
}

/**
 * §6 Tier: member-count density.
 *   Tier 1 (≤5):  verbose — full hints, explanatory tooltips, invite nudges.
 *   Tier 3 (6-10): medium — brief copy, tooltips on hover.
 *   Tier 4 (11+):  minimal — spare copy, suppress passive hints.
 */
function memberTier(current) {
  const n = (current?.members || []).length;
  if (n <= 5)  return 1;
  if (n <= 10) return 3;
  return 4;
}

/**
 * §6 Compose placeholder — tier-1 solo nudge.
 */
/**
 * H6: normalise a channel name arriving from a peer.
 *
 * The `/^[a-z0-9][a-z0-9-]{0,39}$/i` rule is enforced in the create modal,
 * but that only constrains *our own* client — a crafted `channel.create`
 * from a peer carried any string straight into the projection, and from
 * there into the composer placeholder attribute.
 *
 * Sanitises rather than rejects, deliberately: dropping the envelope would
 * leave some members with the channel and some without, and a projection
 * that diverges per-peer is a worse failure than a renamed channel. Every
 * peer applies the same deterministic transform, so they still converge.
 *
 * Group DM names are exempt from the slug rule — they're built from member
 * display names ("Ada, Grace"), so they only get control chars stripped
 * and a length bound. Escaping at the sinks is what makes them safe.
 */
function sanitizeChannelName(name, isDm) {
  // `typeof` rather than String(): MP.decode builds maps with a null
  // prototype, and String() on one THROWS. That throw would escape into the
  // dispatch loop and leave `hwm` un-advanced, so every later envelope from
  // that sender buffers forever — one packet silently mutes a peer.
  const raw = (typeof name === "string" ? name : "").replace(/[\u0000-\u001F\u007F]/g, "");
  if (isDm) return raw.slice(0, 120) || "Direct message";
  const slug = raw.replace(/[^a-zA-Z0-9-]/g, "").replace(/^-+/, "").slice(0, 40);
  return slug || "channel";
}

/**
 * H6: normalise a member display name arriving from a peer.
 *
 * Display names are free text (no slug rule), but they are not inert: a DM
 * channel takes its name straight from the other member's name, so an
 * unvalidated name is a second, indirect way to control a channel name.
 * Strip control characters and bound the length; escaping at the sinks does
 * the rest. `typeof` guard for the same null-prototype reason as above.
 */
function sanitizeDisplayName(name) {
  const raw = (typeof name === "string" ? name : "").replace(/[\u0000-\u001F\u007F]/g, "").trim();
  // slice AFTER trim can leave a trailing space at the cut; trim again.
  return raw.slice(0, 60).trim() || "Member";
}

function composePlaceholder(channel, current) {
  const name = channel.dm ? channel.name : '#' + channel.name;
  if (current.members.length === 1) return `Message ${name} — or invite someone first`;
  return `Message ${name}`;
}

/**
 * §6 Tier escalation banner (WT-10).
 * Shown once a workspace reaches tier 3 (6+ members) and has no relay
 * configured. Dismissible for 7 days. Clicking "Set up" opens the relay
 * tab of Settings.
 */
/**
 * v2: rekey-due banner. Shown when the configured rekey schedule has
 * elapsed since `meta.last_rekey_at`. Admin-only; dismissable for 7
 * days. `meta.rekey_schedule` values:
 *   off       — no banner (default)
 *   quarterly — 90 days
 *   yearly    — 365 days
 */
const REKEY_SCHEDULE_DAYS = { off: 0, quarterly: 90, yearly: 365 };
function renderRekeyBanner(current, me) {
  const isAdm = me && (me.role === "owner" || me.role === "admin");
  if (!isAdm) return "";
  const schedule = current.meta.rekey_schedule || "off";
  const days = REKEY_SCHEDULE_DAYS[schedule] || 0;
  if (!days) return "";
  const last = current.meta.last_rekey_at || current.meta.created_at || Date.now();
  const age = Date.now() - last;
  if (age < days * 86400_000) return "";
  const dismissed = current.meta.rekey_banner_dismissed || 0;
  if (dismissed && (Date.now() - dismissed) < 7 * 86400_000) return "";
  return `
    <div class="tier-banner">
      <div class="tier-banner-text">
        <strong>Time for a key rotation.</strong> Your workspace's ${schedule} rekey schedule is due. Rotating refreshes every channel and workspace key — past history stays decryptable to current members, future traffic uses new keys.
      </div>
      <div class="tier-banner-actions">
        <button class="primary" id="btn-rekey-now" style="font-size: 12px; padding: 5px 12px;">Rekey now</button>
        <button id="btn-dismiss-rekey" style="font-size: 12px; padding: 5px 10px;">Dismiss</button>
      </div>
    </div>
  `;
}

function renderTierEscalationBanner(current) {
  const n = current.members.length;
  if (n < 6) return "";
  if ((current.relays || []).length > 0 || (current.bridges || []).length > 0) return "";
  const dismissed = current.meta.tier_banner_dismissed || 0;
  if (dismissed && (Date.now() - dismissed) < 7 * 24 * 3600 * 1000) return "";
  return `
    <div class="tier-banner" id="tier-escalation-banner">
      <div class="tier-banner-text">
        <strong>Your workspace is growing</strong> — with ${escapeHTML(String(n))} members,
        a relay ensures nobody misses messages when devices are offline.
      </div>
      <div class="tier-banner-actions">
        <button class="primary" id="btn-setup-relay" style="font-size: 12px; padding: 5px 12px;">Set up relay</button>
        <button id="btn-dismiss-tier-banner" style="font-size: 12px; padding: 5px 10px;">Dismiss</button>
      </div>
    </div>
  `;
}

/**
 * §6 Flush stored (undelivered) messages to the newly-connected peer.
 * Called from PeerMgr.attach whenever a new peer connects. Reads the
 * raw envelope objects from the envelopes store and re-broadcasts them
 * so no messages are silently dropped while offline.
 */
async function flushStoredMessages(current, workspaceId) {
  const stored = (current.messages || []).filter(m => m.delivery === "stored" && !m.deleted);
  if (stored.length === 0) return;
  // Build a quick lookup id → envelope from IDB.
  const ids = new Set(stored.map(m => m.id));
  let envs;
  try { envs = await idbGetAll(current.wsDB, "envelopes"); }
  catch { return; }
  let flushed = 0;
  for (const env of envs) {
    if (!ids.has(env.id)) continue;
    try {
      await PeerMgr.sendEnvelope(workspaceId, env);
      // Update in-memory delivery flag so the check icon updates.
      const msg = current.messages.find(m => m.id === env.id);
      if (msg) { msg.delivery = "sent"; flushed++; }
    } catch (e) {
      console.warn("flush stored failed for", env.id, e);
    }
  }
  if (flushed > 0 && State.view === "workspace") setState({});
}

function renderMessage(m, members, myUserId, opts = {}) {
  const member = members.find(x => x.id === m.from) || { name: "?" };
  const color = avatarColorFor(m.from);
  const isMine = m.from === myUserId;

  // Tombstoned message — render a subdued placeholder instead of content.
  if (m.deleted) {
    return `
      <div class="msg msg-deleted">
        <div class="avatar" style="background: ${color}">${escapeHTML(initials(member.name))}</div>
        <div class="msg-body">
          <div class="msg-meta">
            <span class="msg-author">${escapeHTML(member.name)}</span>
            <span class="msg-time">${formatTime(m.ts)}</span>
          </div>
          <div class="msg-text" style="color: var(--fg-dim); font-style: italic;">(deleted)</div>
        </div>
      </div>
    `;
  }

  let check = "";
  if (isMine) {
    if (m.delivery === "delivered") check = `<span class="msg-check delivered" title="Delivered">✓✓</span>`;
    else if (m.delivery === "sent") check = `<span class="msg-check sent" title="Sent">✓</span>`;
    else if (m.delivery === "stored") check = `<span class="msg-check stored" title="Stored locally — no peer yet">◷</span>`;
  }
  const editedMark = m.edited ? `<span class="msg-edited" title="Edited ${formatTime(m.edited_at)}">(edited)</span>` : "";
  // Edit action is hidden for attachment-only messages (nothing to edit).
  // Reactions are available to everyone (not just the author).
  const canEdit = !m.attachment && isMine;
  const canDelete = isMine;
  const attachmentHtml = m.attachment ? renderAttachment(m) : "";
  const pollHtml = m.poll ? renderPoll(m, myUserId) : "";
  const checklistHtml = m.checklist ? renderChecklist(m) : "";
  // Slice S1: /me rendering — body is stored with `/me ` prefix on the
  // wire so every peer renders the same action layout. The author's name
  // is already shown in msg-meta above, so we just render the action
  // text italic below (mentions still processed).
  const isAction = typeof m.body === "string" && m.body.startsWith("/me ");
  // Slice F1-C: pass the current group list so group mentions render as pills.
  const groups = State.current?.doc ? WorkspaceDoc.getGroups(State.current.doc) : [];
  const bodyHtml = isAction
    ? `<div class="msg-text msg-action-body" data-msg-text="${escapeHTML(m.id)}"><em>${renderMessageBody(m.body.slice(4), m.mentions, members, groups)}</em></div>`
    : (m.body
        ? `<div class="msg-text" data-msg-text="${escapeHTML(m.id)}">${renderMessageBody(m.body, m.mentions, members, groups)}</div>`
        : "");
  const reactionsHtml = renderReactionPills(m, members, myUserId);

  // Reply count pill (main channel view only). Shown on parent messages
  // that have at least one reply. Clicking opens the thread panel. The
  // thread panel itself doesn't show reply-count pills on its own
  // entries — replies can't have replies in this slice.
  const replyCount = opts.replyCount || 0;
  const replyPill = replyCount > 0 ? `
    <div class="thread-pill" data-open-thread="${escapeHTML(m.id)}">
      💬 ${replyCount} ${replyCount === 1 ? "reply" : "replies"}
    </div>
  ` : "";

  // "Reply in thread" action is available for every message in the main
  // channel view. Hidden for messages that are themselves already inside
  // a thread (replies) — this enforces flat threading (no reply-to-reply
  // tree). Also hidden in the thread panel view itself (where the panel's
  // composer serves the same purpose).
  const canReply = !m.thread && !opts.inThreadPanel;
  // Slice P1: any member can pin/unpin; the action is always available.
  const pinned = isPinned(State.current, m.ch, m.id);
  const canPin = !opts.inThreadPanel;
  const pinMark = pinned
    ? `<span class="pin-mark" title="Pinned">📌</span>`
    : "";
  const actions2 = `
    <div class="msg-actions">
      <button class="icon-btn msg-action" data-act="react" data-msg="${escapeHTML(m.id)}" title="Add reaction">😊</button>
      ${canReply ? `<button class="icon-btn msg-action" data-act="thread" data-msg="${escapeHTML(m.id)}" title="Reply in thread">💬</button>` : ""}
      ${canPin ? `<button class="icon-btn msg-action${pinned ? " active-pin" : ""}" data-act="pin" data-msg="${escapeHTML(m.id)}" title="${pinned ? "Unpin" : "Pin to channel"}">📌</button>` : ""}
      <button class="icon-btn msg-action${isBookmarked(State.current, m.id) ? " active-pin" : ""}" data-act="bookmark" data-msg="${escapeHTML(m.id)}" title="${isBookmarked(State.current, m.id) ? "Remove bookmark" : "Save for later"}">🔖</button>
      <button class="icon-btn msg-action" data-act="forward" data-msg="${escapeHTML(m.id)}" title="Forward to another channel">📨</button>
      ${canEdit ? `<button class="icon-btn msg-action" data-act="edit" data-msg="${escapeHTML(m.id)}" title="Edit">✎</button>` : ""}
      ${canDelete ? `<button class="icon-btn msg-action" data-act="delete" data-msg="${escapeHTML(m.id)}" title="Delete">🗑</button>` : ""}
    </div>
  `;

  return `
    <div class="msg${pinned ? " is-pinned" : ""}" data-msg-row="${escapeHTML(m.id)}">
      <div class="avatar" style="background: ${color}">${escapeHTML(initials(member.name))}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-author">${escapeHTML(member.name)}</span>
          <span class="msg-time" data-copy-permalink="${escapeHTML(m.id)}" title="${escapeHTML(timestampTooltip(m.ts, member))} — click to copy link">${formatTime(m.ts)}</span>
          ${pinMark}
          ${editedMark}
          ${check}
        </div>
        ${bodyHtml}
        ${attachmentHtml}
        ${pollHtml}
        ${checklistHtml}
        ${reactionsHtml}
        ${replyPill}
      </div>
      ${actions2}
    </div>
  `;
}

/**
 * Render reaction pills under a message body. Click handlers are wired
 * in renderWorkspace after the innerHTML lands.
 */
/**
 * Render the thread side panel. Shows the parent message at the top,
 * then all replies (sorted by ts), then a dedicated composer that sends
 * new messages with `thread: <parent_id>` set.
 *
 * `allChannelMessages` is the unfiltered list for the current channel —
 * we need access to both the parent and the replies, which are scattered
 * across the same channel.
 */
function renderThreadPanel(current, allChannelMessages, myUserId) {
  const parentId = State.threadOpen;
  const parent = allChannelMessages.find(m => m.id === parentId);
  const replies = allChannelMessages
    .filter(m => m.thread === parentId)
    .sort((a, b) => a.ts - b.ts);

  // Parent may be absent if it arrived out of order or was deleted in
  // a way that removed the projection entry. Render a stub so the reply
  // list is still usable.
  const parentHtml = parent
    ? renderMessage(parent, current.members, myUserId, { inThreadPanel: true })
    : `<div class="msg-deleted" style="padding: 12px; color: var(--fg-dim); font-style: italic;">(parent message not available)</div>`;

  const repliesHtml = replies
    .map(m => renderMessage(m, current.members, myUserId, { inThreadPanel: true }))
    .join("");

  return `
    <aside class="thread-panel">
      <div class="thread-panel-head">
        <div class="thread-panel-title">Thread</div>
        <button class="icon-btn" id="btn-close-thread" title="Close thread">✕</button>
      </div>
      <div class="thread-panel-scroll" id="thread-scroll">
        <div class="thread-parent">${parentHtml}</div>
        ${replies.length > 0 ? `<div class="thread-divider">${replies.length} ${replies.length === 1 ? "reply" : "replies"}</div>` : ""}
        <div class="thread-replies">${repliesHtml}</div>
      </div>
      <div class="composer thread-composer-wrap">
        <div class="composer-box">
          <textarea id="thread-composer" rows="2" placeholder="Reply to thread…"></textarea>
        </div>
      </div>
    </aside>
  `;
}

function renderReactionPills(m, members, myUserId) {
  if (!m.reactions || Object.keys(m.reactions).length === 0) return "";
  const pills = Object.entries(m.reactions).map(([emoji, userIds]) => {
    if (!userIds || userIds.length === 0) return "";
    const mine = userIds.includes(myUserId);
    const names = userIds.map(uid => {
      const member = members.find(x => x.id === uid);
      return member ? member.name : "?";
    }).join(", ");
    return `
      <span class="reaction-pill ${mine ? "mine" : ""}" data-react-toggle="${escapeHTML(m.id)}" data-emoji="${escapeHTML(emoji)}" title="${escapeHTML(names)}">
        <span class="reaction-emoji">${escapeHTML(emoji)}</span>
        <span class="reaction-count">${userIds.length}</span>
      </span>
    `;
  }).join("");
  return `<div class="reactions">${pills}</div>`;
}

/**
 * Render a message body with @mentions highlighted. The `mentions` field
 * (if present) lists the canonical user_ids the author intended to tag;
 * we rescan the body text for `@name` patterns and, if the matched name
 * corresponds to a member whose id is in `mentions`, wrap it in a styled
 * span colored with the member's avatar color.
 *
 * Every other character goes through escapeHTML. The span itself is
 * constructed from pre-escaped substrings so no raw HTML ever hits the
 * output — XSS-safe (spec §15.2 "XSS via message rendering").
 */
function renderMessageBody(body, mentions, members, groups = []) {
  // Split the body into plain-text and fenced-code segments. `\`\`\``
  // starts a code fence; an optional language tag follows on the same
  // line; `\`\`\`` on its own ends the fence. Fenced content is NOT
  // processed for mentions or inline formatting — it's literal.
  const codeOut = [];
  const parts = [];
  {
    const lines = body.split("\n");
    let inFence = false;
    let buf = [];
    let lang = "";
    const flushText = (s) => { if (s.length) parts.push({ kind: "text", s }); };
    let plain = "";
    for (const line of lines) {
      const fence = line.match(/^```(\w*)\s*$/);
      if (fence && !inFence) {
        if (plain.length) { flushText(plain); plain = ""; }
        inFence = true;
        lang = fence[1] || "";
        buf = [];
        continue;
      }
      if (fence && inFence) {
        parts.push({ kind: "code", s: buf.join("\n"), lang });
        inFence = false;
        lang = "";
        continue;
      }
      if (inFence) { buf.push(line); continue; }
      plain += (plain ? "\n" : "") + line;
    }
    if (inFence) {
      // unterminated fence — treat the rest as code so the user doesn't lose content
      parts.push({ kind: "code", s: buf.join("\n"), lang });
    }
    if (plain.length) flushText(plain);
  }
  // If the whole body was a single plain segment with no mentions/groups,
  // short-circuit to the original fast path.
  const groupByName = new Map();
  for (const g of groups) groupByName.set(g.name, g);
  const noHighlights = (!mentions || mentions.length === 0) && groupByName.size === 0;
  if (parts.length === 1 && parts[0].kind === "text" && noHighlights) {
    return escapeHTML(body);
  }
  // Helper: render a text segment with mention + group highlighting.
  const renderTextSeg = (seg) => renderInlineHighlights(seg, mentions, members, groups);
  return parts.map(p => {
    if (p.kind === "code") {
      const langCls = p.lang ? ` class="lang-${escapeHTML(p.lang)}"` : "";
      return `<pre class="msg-code"><code${langCls}>${escapeHTML(p.s)}</code></pre>`;
    }
    return renderTextSeg(p.s);
  }).join("");
}

// Split out the mention + group highlighting logic so it's reusable for
// each plain-text segment between code fences.
function renderInlineHighlights(body, mentions, members, groups = []) {
  const groupByName = new Map();
  for (const g of groups) groupByName.set(g.name, g);
  if ((!mentions || mentions.length === 0) && groupByName.size === 0) {
    return escapeHTML(body);
  }
  // Resolve each mention id to a member record (keeps the rendering fast
  // even with dozens of members in scope).
  const mentionById = new Map();
  for (const mid of (mentions || [])) {
    const member = members.find(m => m.id === mid);
    if (member) mentionById.set(mid, member);
  }
  const myUid = bytesToB64Url(State.identity.pubkey);
  const iAmInGroup = (g) => (g.memberIds || []).includes(myUid);
  // Regex: @ followed by word chars (letters, digits, _, -, .) up to
  // whatever the longest member name needs. Unicode letters are handled
  // via the 'u' flag. We deliberately don't match trailing punctuation
  // so "@alice." marks up "alice" and leaves the period in the body.
  const re = /@([\p{L}\p{N}_-]+)/gu;
  let out = "";
  let last = 0;
  let match;
  while ((match = re.exec(body)) !== null) {
    const name = match[1];
    const start = match.index;
    const end   = start + match[0].length;
    // Append the text before this match, escaped.
    out += escapeHTML(body.slice(last, start));
    // Slice F1-C: group mention — render with group-pill styling. Highlights
    // when the viewer is a member of the group.
    const group = groupByName.get(name);
    if (group) {
      out += `<span class="mention mention-group${iAmInGroup(group) ? " mention-self" : ""}" title="Group · ${(group.memberIds||[]).length} members">@${escapeHTML(name)}</span>`;
      last = end;
      continue;
    }
    // Is this mention in the signed mentions list?
    const member = [...mentionById.values()].find(mem => mem.name === name);
    if (member) {
      out += `<span class="mention" style="background: ${member.id === myUid ? "var(--accent)" : "transparent"}; color: ${member.id === myUid ? "var(--accent-fg)" : avatarColorFor(member.id)};">@${escapeHTML(name)}</span>`;
    } else {
      // Not a validated mention — render as literal text.
      out += escapeHTML(match[0]);
    }
    last = end;
  }
  out += escapeHTML(body.slice(last));
  return out;
}

function renderAttachment(m) {
  const a = m.attachment;
  // SVG is excluded from inline rendering — it's treated as a file download.
  // Opening SVG as a same-origin blob: URL lets embedded <script> access
  // window.opener; even with noopener it can run JS in the page context.
  const isImage = (a.mime || "").startsWith("image/") && a.mime !== "image/svg+xml";
  const size = formatBytes(a.size);
  // If `available === null` we haven't checked OPFS yet — render a
  // placeholder and kick off a lazy check that re-renders when done.
  if (a.available === null) {
    maybeCheckAttachmentAvailable(m);
  }

  // In-flight blob transfer → downloading state with progress
  if (!a.available && BlobTransfer.isInFlight(a.blob_id)) {
    const progress = BlobTransfer.progressOf(a.blob_id);
    const pct = progress === null ? "" : ` · ${Math.round(progress * 100)}%`;
    return `
      <div class="msg-attachment">
        <div class="file-card downloading">
          <div class="file-icon">⏳</div>
          <div class="file-meta">
            <div class="file-name">${escapeHTML(a.name)}</div>
            <div class="file-size">${escapeHTML(size)}</div>
            <div class="file-unavailable">Downloading${pct}…</div>
          </div>
        </div>
      </div>
    `;
  }

  // Not available, not in flight — offer a click-to-download card
  // if a peer is attached, otherwise the "sender needs to be online"
  // placeholder from Slice 3c.
  if (!a.available) {
    const peerAttached = State.current && PeerMgr.hasPeers(State.current.meta.id);
    if (peerAttached) {
      return `
        <div class="msg-attachment">
          <div class="file-card" data-fetch-blob="${escapeHTML(m.id)}" style="cursor: pointer;">
            <div class="file-icon">⬇</div>
            <div class="file-meta">
              <div class="file-name">${escapeHTML(a.name)}</div>
              <div class="file-size">${escapeHTML(size)} · click to download</div>
            </div>
          </div>
        </div>
      `;
    }
    return `
      <div class="msg-attachment">
        <div class="file-card">
          <div class="file-icon">📎</div>
          <div class="file-meta">
            <div class="file-name">${escapeHTML(a.name)}</div>
            <div class="file-size">${escapeHTML(size)}</div>
            <div class="file-unavailable">Not downloaded — sender needs to be online</div>
          </div>
        </div>
      </div>
    `;
  }

  if (isImage) {
    return `
      <div class="msg-attachment">
        <img data-attach="${escapeHTML(m.id)}" alt="${escapeHTML(a.name)}" src="">
      </div>
    `;
  }
  // v1.1: inline audio + video clips.
  const isAudio = (a.mime || "").startsWith("audio/");
  const isVideo = (a.mime || "").startsWith("video/");
  if (isAudio) {
    return `
      <div class="msg-attachment">
        <audio data-attach="${escapeHTML(m.id)}" controls preload="metadata" style="max-width: 320px; display: block;"></audio>
        <div style="font-size: 11px; color: var(--fg-dim); margin-top: 4px;">🎙 ${escapeHTML(a.name)} · ${escapeHTML(size)}</div>
      </div>
    `;
  }
  if (isVideo) {
    return `
      <div class="msg-attachment">
        <video data-attach="${escapeHTML(m.id)}" controls preload="metadata" style="max-width: 420px; max-height: 280px; display: block; border-radius: 6px; background: #000;"></video>
        <div style="font-size: 11px; color: var(--fg-dim); margin-top: 4px;">🎬 ${escapeHTML(a.name)} · ${escapeHTML(size)}</div>
      </div>
    `;
  }
  return `
    <div class="msg-attachment">
      <div class="file-card" data-attach="${escapeHTML(m.id)}" style="cursor: pointer;">
        <div class="file-icon">📄</div>
        <div class="file-meta">
          <div class="file-name">${escapeHTML(a.name)}</div>
          <div class="file-size">${escapeHTML(size)} · click to download</div>
        </div>
      </div>
    </div>
  `;
}

function formatBytes(n) {
  if (n < 1024) return n + " B";
  if (n < 1024*1024) return (n/1024).toFixed(1) + " KB";
  return (n/1024/1024).toFixed(1) + " MB";
}

// Lazy OPFS check: called from render for attachments with unknown
// availability (replayed from envelopes store). Sets `available` on
// the in-memory message record + re-renders if the workspace view
// is still active. Idempotent + self-deduplicating.
const _attachmentCheckInflight = new Set();
// M6: object URL per attachment blob_id, reused across renders so we don't
// leak a fresh one every render. Bounded by the number of distinct attachments
// the user has viewed this session; the underlying blobs are LRU-evicted by
// BlobStore, and all URLs are released when the page unloads.
const _attachmentUrlCache = new Map();
async function maybeCheckAttachmentAvailable(msg) {
  if (!msg.attachment || msg.attachment.available !== null) return;
  if (_attachmentCheckInflight.has(msg.id)) return;
  _attachmentCheckInflight.add(msg.id);
  try {
    const has = await BlobStore.has(State.current.meta.id, msg.attachment.blob_id);
    msg.attachment.available = has;
    if (State.view === "workspace") render();
  } finally {
    _attachmentCheckInflight.delete(msg.id);
  }
}

/**
 * Slice 4c: render the gap detection banner. Reads bundle.gaps
 * via GapTracker.allGaps() and produces an inline banner above
 * the message list. Empty string when there are no gaps.
 */
function renderGapBanner(current) {
  const gaps = GapTracker.allGaps(current);
  if (gaps.length === 0) return "";
  // Build a sentence from the gaps. We list up to 3 senders by
  // name; more than 3 collapses to "Alice, Bose, and 2 others".
  const named = gaps.map(g => {
    const member = current.members.find(m => m.id === g.senderId);
    const name = member ? member.name : g.senderId.slice(0, 6);
    return { name, missing: g.missing, senderId: g.senderId };
  });
  let summary;
  if (named.length === 1) {
    const g = named[0];
    summary = `Missing ${g.missing} ${g.missing === 1 ? "message" : "messages"} from ${escapeHTML(g.name)}`;
  } else if (named.length <= 3) {
    summary = `Missing messages from ${named.map(g => escapeHTML(g.name)).join(", ")}`;
  } else {
    summary = `Missing messages from ${named.slice(0,2).map(g => escapeHTML(g.name)).join(", ")} and ${named.length - 2} others`;
  }
  // data attribute carries a comma-separated list of sender ids so
  // the click handler can fire one resync request per sender.
  const senderIds = named.map(g => g.senderId).join(",");
  return `
    <div class="gap-banner" data-gap-senders="${escapeHTML(senderIds)}">
      <div class="gap-text">⚠ ${summary}</div>
      <button id="btn-fetch-gap" class="primary" style="padding: 6px 12px; font-size: 12px;">Try to fetch</button>
    </div>
  `;
}

function renderEmptyState() {
  return `
    <div class="empty">
      <h2>You're the only one here</h2>
      <p>Mehfil is built for groups, but you can warm up alone first.</p>
      <p>
        <a id="link-invite">Invite someone</a>
        &nbsp;·&nbsp;
        <a id="link-self-msg">Try sending yourself a message</a>
      </p>
    </div>
  `;
}

function renderBackupBanner() {
  return `
    <div class="banner warn">
      <div class="banner-text">
        <strong>Back up your identity now.</strong>
        Mehfil has no recovery — if you lose this browser, you lose access.
      </div>
      <div class="banner-actions">
        <button id="nag-later">Later</button>
        <button class="primary" id="nag-backup">Back up</button>
      </div>
    </div>
  `;
}

/* ------------------------------------------------------------
 *  §9  Sending a message + backup nag trigger
 * ------------------------------------------------------------ */
async function sendMessageNow(body, opts = {}) {
  const { current } = State;
  const ch = current.channels.find(c => c.id === State.currentChannel);
  const _myId = bytesToB64Url(State.identity.pubkey);
  // Slice F1-B: gate sends to announcement channels to admin/owner.
  // This is a local UX guard — receivers also drop non-admin messages
  // on announce channels (see message.create case in EnvelopeDispatch).
  if (ch && ch.announce) {
    const me = current.members.find(m => m.id === _myId);
    if (!(me?.role === "owner" || me?.role === "admin")) {
      throw new Error("Only admins can post in this channel.");
    }
  }
  // For group DMs (dm:true, no dm_with) use our own per-sender key when
  // available (sender-keys pattern). Fall back to the shared channel key
  // for older group DMs or channels that are not group DMs.
  const _isGroupDm = ch.dm && !ch.dm_with;
  const channelKey = (_isGroupDm && current.channelKeys[ch.id + ":" + _myId])
    ? current.channelKeys[ch.id + ":" + _myId]
    : current.channelKeys[ch.id];

  // Parse @mentions out of the body so the envelope carries a canonical
  // list of tagged user_ids. The body text itself is unchanged.
  // Slice F1-C: include groups so @groupname tokens expand to their
  // member ids in the signed mentions list.
  const _groupsForMentions = current.doc ? WorkspaceDoc.getGroups(current.doc) : [];
  const mentions = parseMentions(body, current.members, _groupsForMentions);

  // Thread reply? Callers can pass an explicit threadId; otherwise we
  // default to State.threadOpen so the thread-panel composer calls the
  // same function with no extra plumbing. `null` / `undefined` means
  // "not a thread reply" — the message goes into the main channel flow.
  const threadId = opts.threadId !== undefined ? opts.threadId : State.threadOpen;

  // Vector clock — each sender per device gets their own counter.
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const userId = bytesToB64Url(State.identity.pubkey);
  const vectorClock = [[userId, meta.lc_counter]];

  const env = await Workspace.sendMessage({
    wsDB: current.wsDB,
    meta,
    identity: State.identity,
    channelId: ch.id,
    channelKey,
    body,
    vectorClock,
    mentions,
    threadId,
    poll: opts.poll,
    checklist: opts.checklist
  });

  // Update in-memory projection without re-replaying everything.
  // delivery starts "sent" (✓); becomes "delivered" (✓✓) when the peer acks.
  const peerAttached = PeerMgr.hasPeers(current.meta.id);
  current.messages.push({
    id: env.id, ch: env.ch, from: env.from, ts: env.ts, body,
    mentions: mentions.length > 0 ? mentions : undefined,
    thread: threadId || undefined,
    poll: opts.poll || undefined,
    votes: opts.poll ? {} : undefined,
    checklist: opts.checklist ? JSON.parse(JSON.stringify(opts.checklist)) : undefined,
    delivery: peerAttached ? "sent" : "stored"
  });

  // Broadcast to any connected peer.
  if (peerAttached) {
    PeerMgr.sendEnvelope(current.meta.id, env).catch(e => console.warn(e));
  }

  // Trigger the backup nag the first time.
  const isFirstMessage = !State.identity.backed_up &&
                         State.backupNag === "hidden" &&
                         current.messages.length === 1;
  render();

  if (isFirstMessage) {
    setTimeout(() => {
      // Only fire if user hasn't backed up in the meantime.
      if (!State.identity.backed_up && State.backupNag === "hidden") {
        setState({ backupNag: "banner", backupNagShownThisSession: true });
      }
    }, 3000);
  }
}

/* ------------------------------------------------------------
 *  §10  Backup flow
 * ------------------------------------------------------------ */
function openBackupModal() {
  setState({ modal: "backup" });
}
function closeModal() {
  setState({ modal: null });
}

/* ------------------------------------------------------------
 *  Slice P1  Pins modal
 *  Lists pinned messages for the current channel with "Jump to"
 *  and "Unpin" actions per entry. Pin data is read fresh from the
 *  Yjs doc on open — handles the concurrent-edit case where a
 *  peer pinned/unpinned while the modal was queued.
 * ------------------------------------------------------------ */
function renderPinsModal() {
  if (document.querySelector('.modal-bg[data-pins]')) return;
  const current = State.current;
  const chId = State.currentChannel;
  const channel = current.channels.find(c => c.id === chId);
  const pins = current.doc ? WorkspaceDoc.getPins(current.doc, chId) : [];
  // Newest pins first — more useful than preserving insertion order.
  const sorted = [...pins].sort((a, b) => (b.at || 0) - (a.at || 0));

  const rowHtml = (pin) => {
    const msg = current.messages.find(m => m.id === pin.msgId);
    const pinner = current.members.find(m => m.id === pin.by);
    const pinnerName = pinner?.name || "?";
    if (!msg) {
      return `
        <div class="pin-row" style="padding: 10px; border-bottom: 1px solid var(--line); color: var(--fg-dim); font-style: italic; font-size: 13px;">
