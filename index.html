          ${current.channels.filter(c => !c.dm).map(c => `
            <div class="ch-item ${c.id === currentChannel ? "active" : ""}" data-ch="${escapeHTML(c.id)}">
              <span class="hash">${c.private ? "🔒" : "#"}</span>${escapeHTML(c.name)}
            </div>
          `).join("")}
        </div>
        ${current.channels.filter(c => c.dm).length > 0 ? `
          <div class="sidebar-section">
            <h3>Direct Messages</h3>
            ${current.channels.filter(c => c.dm).map(c => {
              if (c.dm_with) {
                // 1:1 DM — show the other person's avatar + name
                const other = current.members.find(m => m.id === c.dm_with);
                return `
                  <div class="ch-item ${c.id === currentChannel ? "active" : ""}" data-ch="${escapeHTML(c.id)}" style="display: flex; align-items: center; gap: 8px;">
                    <div class="avatar" style="width: 18px; height: 18px; font-size: 9px; background: ${avatarColorFor(c.dm_with)}">${escapeHTML(initials(other?.name || "?"))}</div>
                    <span>${escapeHTML(other?.name || c.name)}</span>
                  </div>
                `;
              } else {
                // Group DM — stacked avatars + comma-joined name
                const others = (c.members || []).filter(id => id !== myUserId).slice(0, 3);
                return `
                  <div class="ch-item ${c.id === currentChannel ? "active" : ""}" data-ch="${escapeHTML(c.id)}" style="display: flex; align-items: center; gap: 8px;">
                    <div style="display: flex; width: 22px;">
                      ${others.map((id, i) => `<div class="avatar" style="width: 14px; height: 14px; font-size: 7px; background: ${avatarColorFor(id)}; margin-left: ${i === 0 ? 0 : -4}px; border: 1px solid var(--bg-sunken);"></div>`).join("")}
                    </div>
                    <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHTML(c.name)}</span>
                  </div>
                `;
              }
            }).join("")}
          </div>
        ` : ""}
        <div class="sidebar-section">
          <h3>People</h3>
          ${current.members.map(m => {
            // Presence state: unknown members default to "offline".
            // Status dot classes match the CSS colors defined for
            // .presence-dot.{online,away,offline}.
            const p = (current.presence || {})[m.id];
            // §6: presence entries older than 90s are treated as stale → offline.
            const stale = p && (Date.now() - p.updated_at) > 90_000;
            const status = (p && !stale) ? p.status : "offline";
            const title = p?.updated_at
              ? (status === "online" ? "Online" : status === "away" ? "Away" : `Offline (last seen ${formatRelative(p.updated_at)})`)
              : "Offline";
            return `
            <div class="ch-item ${m.id === myUserId ? "" : "people-clickable"}" data-pmember="${m.id === myUserId ? "" : escapeHTML(m.id)}" title="${escapeHTML(title)}" style="display: flex; align-items: center; gap: 8px;">
              <div class="avatar-with-status">
                <div class="avatar" style="width: 20px; height: 20px; font-size: 10px; background: ${avatarColorFor(m.id)}">${escapeHTML(initials(m.name))}</div>
                <span class="presence-dot ${status}"></span>
              </div>
              <span>${escapeHTML(m.name)}${m.id === myUserId ? " <span style='color: var(--fg-dim); font-size: 11px;'>(you)</span>" : ""}</span>
            </div>
          `;}).join("")}
          ${current.members.length >= 3 ? `
            <div class="ch-item" id="btn-group-dm" style="color: var(--accent); margin-top: 4px;">
              + Start group DM
            </div>
          ` : ""}
          <div class="ch-item" id="btn-invite" style="color: var(--accent); margin-top: 4px;"
               title="${memberTier(current) === 1 ? 'Share a link to bring others into this workspace' : ''}">
            + Invite someone${current.members.length === 1 ? ` <span style="color: var(--fg-dim); font-size: 11px;">— get started</span>` : ""}
          </div>
        </div>
        <div class="sidebar-foot">
          <div class="avatar" style="background: ${avatarColorFor(me.id)}">${escapeHTML(initials(me.name))}</div>
          <div class="me-info">
            <div class="me-name">${escapeHTML(me.name)}</div>
            <div class="me-fp" title="${escapeHTML(fp)}">${escapeHTML(fp)}</div>
          </div>
          <button class="icon-btn" id="btn-settings" title="Settings">⚙</button>
        </div>
      </aside>
      <main class="main">
        <div class="main-head">
          <div class="ch-title"><span style="color: var(--fg-dim)">#</span> ${escapeHTML(channel.name)}</div>
          <div class="badge ${badge.cls}" title="${escapeHTML(badge.title)}">
            <span class="dot" style="${badge.dotStyle}"></span>${escapeHTML(badge.label)}
          </div>
        </div>
        ${renderGapBanner(current)}
        ${renderTierEscalationBanner(current)}
        <div class="messages" id="messages-list">
          ${channelMessages.length === 0 && isOnlyMember ? renderEmptyState() : ""}
          ${channelMessages.map(m => renderMessage(m, current.members, myUserId, { replyCount: replyCounts.get(m.id) || 0 })).join("")}
        </div>
        <div class="composer">
          <div class="composer-box" id="composer-box">
            <textarea id="composer" rows="2" placeholder="${composePlaceholder(channel, current)}" autofocus></textarea>
            <div class="composer-actions">
              <input type="file" id="attach-input" style="display:none">
              <button class="icon-btn" id="btn-attach" title="Attach a file">📎</button>
            </div>
          </div>
          <div id="drop-hint" class="drop-hint" style="display:none">Drop the file to attach</div>
        </div>
      </main>
      ${State.threadOpen ? renderThreadPanel(current, allChannelMessages, myUserId) : ""}
    </div>
  `;

  // Channel switch. Saves the current composer into drafts before switching
  // and restores the target channel's draft on arrival. Closes any open
  // thread panel — threads are scoped to a single channel.
  document.querySelectorAll("[data-ch]").forEach(el => {
    el.onclick = async () => {
      const newChId = el.getAttribute("data-ch");
      if (newChId === State.currentChannel) return;
      await persistDraft(State.currentChannel, document.getElementById("composer").value);
      setState({ currentChannel: newChId, threadOpen: null });
    };
  });

  document.getElementById("btn-settings").onclick = () => openSettings();
  document.getElementById("btn-invite").onclick = openInviteModal;
  document.getElementById("btn-new-channel").onclick = openCreateChannelModal;

  // Slice 4c: gap banner "Try to fetch" button. Walks the visible
  // gap list and broadcasts one resync.request per sender, asking
  // for the missing range. Replies arrive as normal envelopes
  // through the dispatch path; the seen-set drops dupes.
  const $fetchGap = document.getElementById("btn-fetch-gap");
  if ($fetchGap) {
    $fetchGap.onclick = async () => {
      const banner = $fetchGap.closest(".gap-banner");
      const senderIds = banner.getAttribute("data-gap-senders").split(",");
      $fetchGap.disabled = true;
      $fetchGap.textContent = "Fetching…";
      for (const senderId of senderIds) {
        // Compute the missing range from hwm + lc-peek max.
        const inner = current.gaps.get(senderId);
        const peeked = inner?.get("lc_peek") || 0;
        const hwmDevices = current.hwm.get(senderId);
        const hwmMax = hwmDevices ? Math.max(0, ...hwmDevices.values()) : 0;
        if (peeked <= hwmMax) continue;
        await PeerMgr.sendResyncRequest(current.meta.id, senderId, hwmMax + 1, peeked);
      }
      // The banner will disappear naturally on the next render
      // when the dispatched envelopes advance hwm past peeked.
      // Re-enable in case nothing was returned (peers offline).
      setTimeout(() => {
        if ($fetchGap.parentElement) {
          $fetchGap.disabled = false;
          $fetchGap.textContent = "Try to fetch";
        }
      }, 3000);
    };
  }
  // §6 Tier escalation banner wiring.
  const $setupRelay = document.getElementById("btn-setup-relay");
  if ($setupRelay) $setupRelay.onclick = () => openSettings("workspace");
  const $dismissTier = document.getElementById("btn-dismiss-tier-banner");
  if ($dismissTier) $dismissTier.onclick = async () => {
    current.meta.tier_banner_dismissed = Date.now();
    await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
    setState({});
  };

  const $groupDm = document.getElementById("btn-group-dm");
  if ($groupDm) $groupDm.onclick = openGroupDmModal;

  // "People" entries: click to start a DM.
  document.querySelectorAll("[data-pmember]").forEach(el => {
    const mid = el.getAttribute("data-pmember");
    if (!mid) return;  // skip self
    el.style.cursor = "pointer";
    el.onclick = async () => {
      const member = current.members.find(m => m.id === mid);
      if (!member) return;
      try {
        const dmCh = await ensureDmChannel(current, member);
        setState({ currentChannel: dmCh.id });
      } catch (e) {
        alert(e.message);
      }
    };
  });

  // Composer wiring
  const $composer = document.getElementById("composer");
  // Restore draft for this channel (if any).
  loadDraft(currentChannel).then(draft => {
    if (draft && !$composer.value) {
      $composer.value = draft;
    }
  });

  // @mention autocomplete state — scoped to this composer instance so
  // re-rendering clears it naturally.
  let mentionPopup = null;
  let mentionActiveIdx = 0;
  let mentionMatches = [];
  const closeMentionPopup = () => {
    if (mentionPopup) { mentionPopup.remove(); mentionPopup = null; }
    mentionMatches = [];
    mentionActiveIdx = 0;
  };
  const updateMentionPopup = () => {
    // Detect an `@word` token ending at the caret.
    const pos = $composer.selectionStart;
    const upTo = $composer.value.slice(0, pos);
    const m = upTo.match(/@([\p{L}\p{N}_-]*)$/u);
    if (!m) { closeMentionPopup(); return; }
    const prefix = m[1].toLowerCase();
    // Filter members whose name starts with the prefix (case-insensitive).
    // Include self so users can tag themselves (e.g. in a reminder to
    // themselves); the UI doesn't forbid it.
    mentionMatches = current.members.filter(mem =>
      mem.name.toLowerCase().startsWith(prefix)
    ).slice(0, 6);
    if (mentionMatches.length === 0) { closeMentionPopup(); return; }
    if (mentionActiveIdx >= mentionMatches.length) mentionActiveIdx = 0;
    if (!mentionPopup) {
      mentionPopup = document.createElement("div");
      mentionPopup.className = "mention-autocomplete";
      document.body.appendChild(mentionPopup);
    }
    mentionPopup.innerHTML = mentionMatches.map((mem, i) => `
      <div class="mention-opt ${i === mentionActiveIdx ? "active" : ""}" data-idx="${i}">
        <div class="avatar" style="width: 18px; height: 18px; font-size: 9px; background: ${avatarColorFor(mem.id)}">${escapeHTML(initials(mem.name))}</div>
        <span>${escapeHTML(mem.name)}</span>
      </div>
    `).join("");
    mentionPopup.querySelectorAll(".mention-opt").forEach(el => {
      el.onmousedown = (ev) => {
        ev.preventDefault();   // keep composer focus
        mentionActiveIdx = Number(el.getAttribute("data-idx"));
        acceptMention();
      };
    });
    // Position the popup just above the composer, aligned to its left.
    const rect = $composer.getBoundingClientRect();
    mentionPopup.style.top = (rect.top - mentionPopup.offsetHeight - 4) + "px";
    mentionPopup.style.left = rect.left + "px";
  };
  const acceptMention = () => {
    const pick = mentionMatches[mentionActiveIdx];
    if (!pick) return;
    const pos = $composer.selectionStart;
    const before = $composer.value.slice(0, pos);
    const after  = $composer.value.slice(pos);
    // Replace the trailing `@word` with `@<full name> `.
    const replaced = before.replace(/@([\p{L}\p{N}_-]*)$/u, "@" + pick.name + " ");
    $composer.value = replaced + after;
    // Move caret to just after the inserted name + space.
    const newPos = replaced.length;
    $composer.setSelectionRange(newPos, newPos);
    closeMentionPopup();
  };

  $composer.oninput = () => { updateMentionPopup(); };
  $composer.onclick = () => { updateMentionPopup(); };
  $composer.onkeydown = async (e) => {
    if (mentionPopup && mentionMatches.length > 0) {
      if (e.key === "ArrowDown") { e.preventDefault(); mentionActiveIdx = (mentionActiveIdx + 1) % mentionMatches.length; updateMentionPopup(); return; }
      if (e.key === "ArrowUp")   { e.preventDefault(); mentionActiveIdx = (mentionActiveIdx - 1 + mentionMatches.length) % mentionMatches.length; updateMentionPopup(); return; }
      if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); acceptMention(); return; }
      if (e.key === "Escape")    { e.preventDefault(); closeMentionPopup(); return; }
    }
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      const body = $composer.value;
      if (!body.trim()) return;
      $composer.value = "";
      await clearDraft(currentChannel);
      $composer.disabled = true;
      try {
        await sendMessageNow(body);
      } finally {
        $composer.disabled = false;
        $composer.focus();
      }
    }
  };
  // Save draft on blur so nothing is lost on accidental navigation.
  $composer.onblur = () => {
    persistDraft(currentChannel, $composer.value);
    // Close the mention popup on blur — but with a short delay so a
    // mousedown on a popup entry (which accepted via onmousedown above)
    // completes first.
    setTimeout(closeMentionPopup, 150);
  };

  // Attachment: paperclip button → file picker.
  const $attachInput = document.getElementById("attach-input");
  document.getElementById("btn-attach").onclick = () => $attachInput.click();
  $attachInput.onchange = async () => {
    const file = $attachInput.files[0];
    if (!file) return;
    try {
      await sendAttachment(State.current, currentChannel, file);
      render();
    } catch (e) {
      alert("Couldn't attach: " + e.message);
    }
    $attachInput.value = "";   // allow re-selecting the same file
  };

  // Drag-and-drop onto the main pane.
  const $main = document.querySelector(".main");
  $main.ondragover = (e) => { e.preventDefault(); $main.classList.add("drop-active"); };
  $main.ondragleave = (e) => { if (e.target === $main) $main.classList.remove("drop-active"); };
  $main.ondrop = async (e) => {
    e.preventDefault();
    $main.classList.remove("drop-active");
    const file = e.dataTransfer.files[0];
    if (!file) return;
    try {
      await sendAttachment(State.current, currentChannel, file);
      render();
    } catch (err) {
      alert("Couldn't attach: " + err.message);
    }
  };

  // Click-to-download handlers for attachments we don't have yet.
  // Triggers a BlobTransfer request to any attached peer. The UI
  // transitions to "downloading" state immediately and to the final
  // rendered state when BlobTransfer.receiveChunk assembles the file.
  document.querySelectorAll("[data-fetch-blob]").forEach(el => {
    el.onclick = async () => {
      const msgId = el.getAttribute("data-fetch-blob");
      const msg = current.messages.find(m => m.id === msgId);
      if (!msg || !msg.attachment) return;
      try {
        await BlobTransfer.requestBlob(current.meta.id, msg.attachment.blob_id);
        render();   // show the downloading spinner
      } catch (e) {
        alert("Couldn't request the file: " + e.message);
      }
    };
  });

  // Attachment rendering — decrypt blobs and hand them to the right DOM
  // element. Images get their src set via an object URL; file cards
  // become click-to-download links. We do this AFTER the HTML is in the
  // DOM so the URLs land on real elements.
  document.querySelectorAll("[data-attach]").forEach(async (el) => {
    const msgId = el.getAttribute("data-attach");
    const msg = current.messages.find(m => m.id === msgId);
    if (!msg || !msg.attachment || !msg.attachment.available) return;
    const a = msg.attachment;
    const bytes = await BlobStore.get(current.meta.id, a.blob_id, a.key, a.iv);
    if (!bytes) return;
    const blob = new Blob([bytes], { type: a.mime });
    const url = URL.createObjectURL(blob);
    if (el.tagName === "IMG") {
      el.src = url;
      el.onclick = () => window.open(url, "_blank");
    } else {
      el.onclick = () => {
        const link = document.createElement("a");
        link.href = url;
        link.download = a.name;
        link.click();
      };
    }
    // Note: we deliberately don't revokeObjectURL because the image needs
    // to stay rendered for the lifetime of the view. These get GC'd when
    // the page unloads. Slice 5 may add an LRU eviction pass.
  });

  // Message actions (edit / delete / react / thread) — hover-revealed buttons.
  document.querySelectorAll(".msg-action").forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      const act = btn.getAttribute("data-act");
      const id = btn.getAttribute("data-msg");
      if (act === "delete") {
        try { await sendMessageDelete(State.current, id); render(); }
        catch (err) { console.error(err); }
      } else if (act === "edit") {
        beginInlineEdit(id);
      } else if (act === "react") {
        openReactionPicker(btn, id);
      } else if (act === "thread") {
        setState({ threadOpen: id });
      }
    };
  });

  // Reply-count pill — click to open the thread panel for this parent.
  document.querySelectorAll("[data-open-thread]").forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      setState({ threadOpen: el.getAttribute("data-open-thread") });
    };
  });

  // Thread panel: close button and reply composer wiring.
  const $closeThread = document.getElementById("btn-close-thread");
  if ($closeThread) {
    $closeThread.onclick = () => setState({ threadOpen: null });
  }
  const $threadComposer = document.getElementById("thread-composer");
  if ($threadComposer) {
    $threadComposer.onkeydown = async (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        const body = $threadComposer.value;
        if (!body.trim()) return;
        $threadComposer.value = "";
        $threadComposer.disabled = true;
        try {
          // The thread composer explicitly passes the parent id; this
          // works even if State.threadOpen somehow changes mid-send.
          await sendMessageNow(body, { threadId: State.threadOpen });
        } finally {
          $threadComposer.disabled = false;
          $threadComposer.focus();
        }
      }
    };
    // Focus the thread composer on open so typing lands there.
    $threadComposer.focus();
  }

  // Reaction pills — click to toggle your own reaction.
  document.querySelectorAll("[data-react-toggle]").forEach(pill => {
    pill.onclick = async (e) => {
      e.stopPropagation();
      const id = pill.getAttribute("data-react-toggle");
      const emoji = pill.getAttribute("data-emoji");
      try {
        await toggleReaction(State.current, id, emoji);
        render();
      } catch (err) { console.error(err); }
    };
  });

  // Empty state hint wiring
  const $self = document.getElementById("link-self-msg");
  if ($self) {
    $self.onclick = async () => {
      await sendMessageNow("👋 hello, this is me talking to me");
    };
  }
  const $inviteLink = document.getElementById("link-invite");
  if ($inviteLink) {
    $inviteLink.onclick = openInviteModal;
  }

  // Render any pending banner (e.g. backup nag).
  if (State.backupNag === "banner") {
    document.getElementById("banner-slot").innerHTML = renderBackupBanner();
    document.getElementById("nag-backup").onclick = () => openBackupModal();
    document.getElementById("nag-later").onclick = async () => {
      await Identity.dismissBackup(State.globalDB);
      setState({ backupNag: "dot", backupNagShownThisSession: true });
    };
  }

  if (State.backupNag === "dot") {
    const dot = document.createElement("div");
    dot.className = "corner-warn";
    dot.title = "Back up your identity — click to open";
    dot.onclick = openBackupModal;
    document.body.appendChild(dot);
  }
  if (State.backupNag === "done") {
    const ok = document.createElement("div");
    ok.className = "corner-ok";
    ok.textContent = "✓";
    ok.title = "Identity backed up";
    document.body.appendChild(ok);
  }

  // Modal
  if (State.modal === "backup")   renderBackupModal();
  if (State.modal === "settings") renderSettingsModal();
  if (State.modal === "invite")   renderInviteModal();

  // Scroll to bottom — main channel messages, and the thread panel
  // scroller if it's open.
  const $list = document.getElementById("messages-list");
  $list.scrollTop = $list.scrollHeight;
  const $threadScroll = document.getElementById("thread-scroll");
  if ($threadScroll) $threadScroll.scrollTop = $threadScroll.scrollHeight;
}

function computeBadge(peerStatus, memberCount, relayStatus, bridgeStatus) {
  if (memberCount === 1) {
    return { cls: "local", label: "Local only", title: "You're the only member — invite someone to connect", dotStyle: "" };
  }
  if (peerStatus === "connected") {
    return { cls: "live", label: "Live", title: "Connected via WebRTC", dotStyle: "background: var(--ok)" };
  }
  if (peerStatus === "connecting") {
    return { cls: "connecting", label: "Connecting…", title: "Establishing WebRTC connection", dotStyle: "background: var(--warn)" };
  }
  // §7: relay fallback — WebRTC is down but relay is reachable.
  if (relayStatus === "connected") {
    return { cls: "relay", label: "Via relay", title: "WebRTC unavailable — delivering via relay", dotStyle: "" };
  }
  if (relayStatus === "connecting") {
    return { cls: "connecting", label: "Relay connecting…", title: "Connecting to relay server", dotStyle: "background: var(--warn)" };
  }
  // §37: bridge fallback — relay also down but LAN bridge reachable.
  if (bridgeStatus === "connected") {
    return { cls: "relay", label: "Via bridge", title: "Delivering via LAN bridge", dotStyle: "" };
  }
  if (bridgeStatus === "connecting") {
    return { cls: "connecting", label: "Bridge connecting…", title: "Connecting to LAN bridge", dotStyle: "background: var(--warn)" };
  }
  return { cls: "offline", label: "Offline", title: "No peers reachable — messages will queue", dotStyle: "background: var(--danger)" };
}

/**
 * §6 Tier: member-count density.
 *   Tier 1 (≤5):  verbose — full hints, explanatory tooltips, invite nudges.
 *   Tier 3 (6-10): medium — brief copy, tooltips on hover.
 *   Tier 4 (11+):  minimal — spare copy, suppress passive hints.
 */
function memberTier(current) {
  const n = (current?.members || []).length;
  if (n <= 5)  return 1;
  if (n <= 10) return 3;
  return 4;
}

/**
 * §6 Compose placeholder — tier-1 solo nudge.
 */
function composePlaceholder(channel, current) {
  const name = channel.dm ? channel.name : '#' + channel.name;
  if (current.members.length === 1) return `Message ${name} — or invite someone first`;
  return `Message ${name}`;
}

/**
 * §6 Tier escalation banner (WT-10).
 * Shown once a workspace reaches tier 3 (6+ members) and has no relay
 * configured. Dismissible for 7 days. Clicking "Set up" opens the relay
 * tab of Settings.
 */
function renderTierEscalationBanner(current) {
  const n = current.members.length;
  if (n < 6) return "";
  if ((current.relays || []).length > 0 || (current.bridges || []).length > 0) return "";
  const dismissed = current.meta.tier_banner_dismissed || 0;
  if (dismissed && (Date.now() - dismissed) < 7 * 24 * 3600 * 1000) return "";
  return `
    <div class="tier-banner" id="tier-escalation-banner">
      <div class="tier-banner-text">
        <strong>Your workspace is growing</strong> — with ${escapeHTML(String(n))} members,
        a relay ensures nobody misses messages when devices are offline.
      </div>
      <div class="tier-banner-actions">
        <button class="primary" id="btn-setup-relay" style="font-size: 12px; padding: 5px 12px;">Set up relay</button>
        <button id="btn-dismiss-tier-banner" style="font-size: 12px; padding: 5px 10px;">Dismiss</button>
      </div>
    </div>
  `;
}

/**
 * §6 Flush stored (undelivered) messages to the newly-connected peer.
 * Called from PeerMgr.attach whenever a new peer connects. Reads the
 * raw envelope objects from the envelopes store and re-broadcasts them
 * so no messages are silently dropped while offline.
 */
async function flushStoredMessages(current, workspaceId) {
  const stored = (current.messages || []).filter(m => m.delivery === "stored" && !m.deleted);
  if (stored.length === 0) return;
  // Build a quick lookup id → envelope from IDB.
  const ids = new Set(stored.map(m => m.id));
  let envs;
  try { envs = await idbGetAll(current.wsDB, "envelopes"); }
  catch { return; }
  let flushed = 0;
  for (const env of envs) {
    if (!ids.has(env.id)) continue;
    try {
      await PeerMgr.sendEnvelope(workspaceId, env);
      // Update in-memory delivery flag so the check icon updates.
      const msg = current.messages.find(m => m.id === env.id);
      if (msg) { msg.delivery = "sent"; flushed++; }
    } catch (e) {
      console.warn("flush stored failed for", env.id, e);
    }
  }
  if (flushed > 0 && State.view === "workspace") setState({});
}

function renderMessage(m, members, myUserId, opts = {}) {
  const member = members.find(x => x.id === m.from) || { name: "?" };
  const color = avatarColorFor(m.from);
  const isMine = m.from === myUserId;

  // Tombstoned message — render a subdued placeholder instead of content.
  if (m.deleted) {
    return `
      <div class="msg msg-deleted">
        <div class="avatar" style="background: ${color}">${escapeHTML(initials(member.name))}</div>
        <div class="msg-body">
          <div class="msg-meta">
            <span class="msg-author">${escapeHTML(member.name)}</span>
            <span class="msg-time">${formatTime(m.ts)}</span>
          </div>
          <div class="msg-text" style="color: var(--fg-dim); font-style: italic;">(deleted)</div>
        </div>
      </div>
    `;
  }

  let check = "";
  if (isMine) {
    if (m.delivery === "delivered") check = `<span class="msg-check delivered" title="Delivered">✓✓</span>`;
    else if (m.delivery === "sent") check = `<span class="msg-check sent" title="Sent">✓</span>`;
    else if (m.delivery === "stored") check = `<span class="msg-check stored" title="Stored locally — no peer yet">◷</span>`;
  }
  const editedMark = m.edited ? `<span class="msg-edited" title="Edited ${formatTime(m.edited_at)}">(edited)</span>` : "";
  // Edit action is hidden for attachment-only messages (nothing to edit).
  // Reactions are available to everyone (not just the author).
  const canEdit = !m.attachment && isMine;
  const canDelete = isMine;
  const attachmentHtml = m.attachment ? renderAttachment(m) : "";
  const bodyHtml = m.body
    ? `<div class="msg-text" data-msg-text="${escapeHTML(m.id)}">${renderMessageBody(m.body, m.mentions, members)}</div>`
    : "";
  const reactionsHtml = renderReactionPills(m, members, myUserId);

  // Reply count pill (main channel view only). Shown on parent messages
  // that have at least one reply. Clicking opens the thread panel. The
  // thread panel itself doesn't show reply-count pills on its own
  // entries — replies can't have replies in this slice.
  const replyCount = opts.replyCount || 0;
  const replyPill = replyCount > 0 ? `
    <div class="thread-pill" data-open-thread="${escapeHTML(m.id)}">
      💬 ${replyCount} ${replyCount === 1 ? "reply" : "replies"}
    </div>
  ` : "";

  // "Reply in thread" action is available for every message in the main
  // channel view. Hidden for messages that are themselves already inside
  // a thread (replies) — this enforces flat threading (no reply-to-reply
  // tree). Also hidden in the thread panel view itself (where the panel's
  // composer serves the same purpose).
  const canReply = !m.thread && !opts.inThreadPanel;
  const actions2 = isMine || canReply ? `
    <div class="msg-actions">
      <button class="icon-btn msg-action" data-act="react" data-msg="${escapeHTML(m.id)}" title="Add reaction">😊</button>
      ${canReply ? `<button class="icon-btn msg-action" data-act="thread" data-msg="${escapeHTML(m.id)}" title="Reply in thread">💬</button>` : ""}
      ${canEdit ? `<button class="icon-btn msg-action" data-act="edit" data-msg="${escapeHTML(m.id)}" title="Edit">✎</button>` : ""}
      ${canDelete ? `<button class="icon-btn msg-action" data-act="delete" data-msg="${escapeHTML(m.id)}" title="Delete">🗑</button>` : ""}
    </div>
  ` : "";

  return `
    <div class="msg">
      <div class="avatar" style="background: ${color}">${escapeHTML(initials(member.name))}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-author">${escapeHTML(member.name)}</span>
          <span class="msg-time">${formatTime(m.ts)}</span>
          ${editedMark}
          ${check}
        </div>
        ${bodyHtml}
        ${attachmentHtml}
        ${reactionsHtml}
        ${replyPill}
      </div>
      ${actions2}
    </div>
  `;
}

/**
 * Render reaction pills under a message body. Click handlers are wired
 * in renderWorkspace after the innerHTML lands.
 */
/**
 * Render the thread side panel. Shows the parent message at the top,
 * then all replies (sorted by ts), then a dedicated composer that sends
 * new messages with `thread: <parent_id>` set.
 *
 * `allChannelMessages` is the unfiltered list for the current channel —
 * we need access to both the parent and the replies, which are scattered
 * across the same channel.
 */
function renderThreadPanel(current, allChannelMessages, myUserId) {
  const parentId = State.threadOpen;
  const parent = allChannelMessages.find(m => m.id === parentId);
  const replies = allChannelMessages
    .filter(m => m.thread === parentId)
    .sort((a, b) => a.ts - b.ts);

  // Parent may be absent if it arrived out of order or was deleted in
  // a way that removed the projection entry. Render a stub so the reply
  // list is still usable.
  const parentHtml = parent
    ? renderMessage(parent, current.members, myUserId, { inThreadPanel: true })
    : `<div class="msg-deleted" style="padding: 12px; color: var(--fg-dim); font-style: italic;">(parent message not available)</div>`;

  const repliesHtml = replies
    .map(m => renderMessage(m, current.members, myUserId, { inThreadPanel: true }))
    .join("");

  return `
    <aside class="thread-panel">
      <div class="thread-panel-head">
        <div class="thread-panel-title">Thread</div>
        <button class="icon-btn" id="btn-close-thread" title="Close thread">✕</button>
      </div>
      <div class="thread-panel-scroll" id="thread-scroll">
        <div class="thread-parent">${parentHtml}</div>
        ${replies.length > 0 ? `<div class="thread-divider">${replies.length} ${replies.length === 1 ? "reply" : "replies"}</div>` : ""}
        <div class="thread-replies">${repliesHtml}</div>
      </div>
      <div class="composer thread-composer-wrap">
        <div class="composer-box">
          <textarea id="thread-composer" rows="2" placeholder="Reply to thread…"></textarea>
        </div>
      </div>
    </aside>
  `;
}

function renderReactionPills(m, members, myUserId) {
  if (!m.reactions || Object.keys(m.reactions).length === 0) return "";
  const pills = Object.entries(m.reactions).map(([emoji, userIds]) => {
    if (!userIds || userIds.length === 0) return "";
    const mine = userIds.includes(myUserId);
    const names = userIds.map(uid => {
      const member = members.find(x => x.id === uid);
      return member ? member.name : "?";
    }).join(", ");
    return `
      <span class="reaction-pill ${mine ? "mine" : ""}" data-react-toggle="${escapeHTML(m.id)}" data-emoji="${escapeHTML(emoji)}" title="${escapeHTML(names)}">
        <span class="reaction-emoji">${escapeHTML(emoji)}</span>
        <span class="reaction-count">${userIds.length}</span>
      </span>
    `;
  }).join("");
  return `<div class="reactions">${pills}</div>`;
}

/**
 * Render a message body with @mentions highlighted. The `mentions` field
 * (if present) lists the canonical user_ids the author intended to tag;
 * we rescan the body text for `@name` patterns and, if the matched name
 * corresponds to a member whose id is in `mentions`, wrap it in a styled
 * span colored with the member's avatar color.
 *
 * Every other character goes through escapeHTML. The span itself is
 * constructed from pre-escaped substrings so no raw HTML ever hits the
 * output — XSS-safe (spec §15.2 "XSS via message rendering").
 */
function renderMessageBody(body, mentions, members) {
  if (!mentions || mentions.length === 0) return escapeHTML(body);
  // Resolve each mention id to a member record (keeps the rendering fast
  // even with dozens of members in scope).
  const mentionById = new Map();
  for (const mid of mentions) {
    const member = members.find(m => m.id === mid);
    if (member) mentionById.set(mid, member);
  }
  // Regex: @ followed by word chars (letters, digits, _, -, .) up to
  // whatever the longest member name needs. Unicode letters are handled
  // via the 'u' flag. We deliberately don't match trailing punctuation
  // so "@alice." marks up "alice" and leaves the period in the body.
  const re = /@([\p{L}\p{N}_-]+)/gu;
  let out = "";
  let last = 0;
  let match;
  while ((match = re.exec(body)) !== null) {
    const name = match[1];
    const start = match.index;
    const end   = start + match[0].length;
    // Append the text before this match, escaped.
    out += escapeHTML(body.slice(last, start));
    // Is this mention in the signed mentions list?
    const member = [...mentionById.values()].find(mem => mem.name === name);
    if (member) {
      out += `<span class="mention" style="background: ${member.id === bytesToB64Url(State.identity.pubkey) ? "var(--accent)" : "transparent"}; color: ${member.id === bytesToB64Url(State.identity.pubkey) ? "var(--accent-fg)" : avatarColorFor(member.id)};">@${escapeHTML(name)}</span>`;
    } else {
      // Not a validated mention — render as literal text.
      out += escapeHTML(match[0]);
    }
    last = end;
  }
  out += escapeHTML(body.slice(last));
  return out;
}

function renderAttachment(m) {
  const a = m.attachment;
  const isImage = (a.mime || "").startsWith("image/");
  const size = formatBytes(a.size);
  // If `available === null` we haven't checked OPFS yet — render a
  // placeholder and kick off a lazy check that re-renders when done.
  if (a.available === null) {
    maybeCheckAttachmentAvailable(m);
  }

  // In-flight blob transfer → downloading state with progress
  if (!a.available && BlobTransfer.isInFlight(a.blob_id)) {
    const progress = BlobTransfer.progressOf(a.blob_id);
    const pct = progress === null ? "" : ` · ${Math.round(progress * 100)}%`;
    return `
      <div class="msg-attachment">
        <div class="file-card downloading">
          <div class="file-icon">⏳</div>
          <div class="file-meta">
            <div class="file-name">${escapeHTML(a.name)}</div>
            <div class="file-size">${escapeHTML(size)}</div>
            <div class="file-unavailable">Downloading${pct}…</div>
          </div>
        </div>
      </div>
    `;
  }

  // Not available, not in flight — offer a click-to-download card
  // if a peer is attached, otherwise the "sender needs to be online"
  // placeholder from Slice 3c.
  if (!a.available) {
    const peerAttached = State.current && PeerMgr.hasPeers(State.current.meta.id);
    if (peerAttached) {
      return `
        <div class="msg-attachment">
          <div class="file-card" data-fetch-blob="${escapeHTML(m.id)}" style="cursor: pointer;">
            <div class="file-icon">⬇</div>
            <div class="file-meta">
              <div class="file-name">${escapeHTML(a.name)}</div>
              <div class="file-size">${escapeHTML(size)} · click to download</div>
            </div>
          </div>
        </div>
      `;
    }
    return `
      <div class="msg-attachment">
        <div class="file-card">
          <div class="file-icon">📎</div>
          <div class="file-meta">
            <div class="file-name">${escapeHTML(a.name)}</div>
            <div class="file-size">${escapeHTML(size)}</div>
            <div class="file-unavailable">Not downloaded — sender needs to be online</div>
          </div>
        </div>
      </div>
    `;
  }

  if (isImage) {
    return `
      <div class="msg-attachment">
        <img data-attach="${escapeHTML(m.id)}" alt="${escapeHTML(a.name)}" src="">
      </div>
    `;
  }
  return `
    <div class="msg-attachment">
      <div class="file-card" data-attach="${escapeHTML(m.id)}" style="cursor: pointer;">
        <div class="file-icon">📄</div>
        <div class="file-meta">
          <div class="file-name">${escapeHTML(a.name)}</div>
          <div class="file-size">${escapeHTML(size)} · click to download</div>
        </div>
      </div>
    </div>
  `;
}

function formatBytes(n) {
  if (n < 1024) return n + " B";
  if (n < 1024*1024) return (n/1024).toFixed(1) + " KB";
  return (n/1024/1024).toFixed(1) + " MB";
}

// Lazy OPFS check: called from render for attachments with unknown
// availability (replayed from envelopes store). Sets `available` on
// the in-memory message record + re-renders if the workspace view
// is still active. Idempotent + self-deduplicating.
const _attachmentCheckInflight = new Set();
async function maybeCheckAttachmentAvailable(msg) {
  if (!msg.attachment || msg.attachment.available !== null) return;
  if (_attachmentCheckInflight.has(msg.id)) return;
  _attachmentCheckInflight.add(msg.id);
  try {
    const has = await BlobStore.has(State.current.meta.id, msg.attachment.blob_id);
    msg.attachment.available = has;
    if (State.view === "workspace") render();
  } finally {
    _attachmentCheckInflight.delete(msg.id);
  }
}

/**
 * Slice 4c: render the gap detection banner. Reads bundle.gaps
 * via GapTracker.allGaps() and produces an inline banner above
 * the message list. Empty string when there are no gaps.
 */
function renderGapBanner(current) {
  const gaps = GapTracker.allGaps(current);
  if (gaps.length === 0) return "";
  // Build a sentence from the gaps. We list up to 3 senders by
  // name; more than 3 collapses to "Alice, Bose, and 2 others".
  const named = gaps.map(g => {
    const member = current.members.find(m => m.id === g.senderId);
    const name = member ? member.name : g.senderId.slice(0, 6);
    return { name, missing: g.missing, senderId: g.senderId };
  });
  let summary;
  if (named.length === 1) {
    const g = named[0];
    summary = `Missing ${g.missing} ${g.missing === 1 ? "message" : "messages"} from ${escapeHTML(g.name)}`;
  } else if (named.length <= 3) {
    summary = `Missing messages from ${named.map(g => escapeHTML(g.name)).join(", ")}`;
  } else {
    summary = `Missing messages from ${named.slice(0,2).map(g => escapeHTML(g.name)).join(", ")} and ${named.length - 2} others`;
  }
  // data attribute carries a comma-separated list of sender ids so
  // the click handler can fire one resync request per sender.
  const senderIds = named.map(g => g.senderId).join(",");
  return `
    <div class="gap-banner" data-gap-senders="${escapeHTML(senderIds)}">
      <div class="gap-text">⚠ ${summary}</div>
      <button id="btn-fetch-gap" class="primary" style="padding: 6px 12px; font-size: 12px;">Try to fetch</button>
    </div>
  `;
}

function renderEmptyState() {
  return `
    <div class="empty">
      <h2>You're the only one here</h2>
      <p>Mehfil is built for groups, but you can warm up alone first.</p>
      <p>
        <a id="link-invite">Invite someone</a>
        &nbsp;·&nbsp;
        <a id="link-self-msg">Try sending yourself a message</a>
      </p>
    </div>
  `;
}

function renderBackupBanner() {

    <div class="banner warn">
      <div class="banner-text">
        <strong>Back up your identity now.</strong>
        Mehfil has no recovery — if you lose this browser, you lose access.
      </div>
      <div class="banner-actions">

      </div>
    </div>
  `;

/* ------------------------------------------------------------
 *  §9  Sending a message + backup nag trigger
 * ------------------------------------------------------------ */
async function sendMessageNow(body, opts = {}) {
  const { current } = State;
  const ch = current.channels.find(c => c.id === State.currentChannel);
  const channelKey = current.channelKeys[ch.id];

  // Parse @mentions out of the body so the envelope carries a canonical
  // list of tagged user_ids. The body text itself is unchanged.
  const mentions = parseMentions(body, current.members);

  // Thread reply? Callers can pass an explicit threadId; otherwise we
  // default to State.threadOpen so the thread-panel composer calls the
  // same function with no extra plumbing. `null` / `undefined` means
  // "not a thread reply" — the message goes into the main channel flow.
  const threadId = opts.threadId !== undefined ? opts.threadId : State.threadOpen;

  // Vector clock — each sender per device gets their own counter.
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const userId = bytesToB64Url(State.identity.pubkey);
  const vectorClock = [[userId, meta.lc_counter]];

  const env = await Workspace.sendMessage({
    wsDB: current.wsDB,
    meta,
    identity: State.identity,
    channelId: ch.id,
    channelKey,
    body,
    vectorClock,
    mentions,
    threadId
  });

  // Update in-memory projection without re-replaying everything.
  // delivery starts "sent" (✓); becomes "delivered" (✓✓) when the peer acks.
  const peerAttached = PeerMgr.hasPeers(current.meta.id);
  current.messages.push({
    id: env.id, ch: env.ch, from: env.from, ts: env.ts, body,
    mentions: mentions.length > 0 ? mentions : undefined,
    thread: threadId || undefined,
    delivery: peerAttached ? "sent" : "stored"
  });

  // Broadcast to any connected peer.
  if (peerAttached) {
    PeerMgr.sendEnvelope(current.meta.id, env).catch(e => console.warn(e));
  }

  // Trigger the backup nag the first time.
  const isFirstMessage = !State.identity.backed_up &&
                         State.backupNag === "hidden" &&
                         current.messages.length === 1;
  render();

  if (isFirstMessage) {
    setTimeout(() => {
      // Only fire if user hasn't backed up in the meantime.
      if (!State.identity.backed_up && State.backupNag === "hidden") {
        setState({ backupNag: "banner", backupNagShownThisSession: true });
      }
    }, 3000);
  }
}

/* ------------------------------------------------------------
 *  §10  Backup flow
 * ------------------------------------------------------------ */
function openBackupModal() {
  setState({ modal: "backup" });
}
function closeModal() {
  setState({ modal: null });
}

function renderBackupModal() {
  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  wrap.innerHTML = `
    <div class="card" style="max-width: 440px;">
      <h1>Back up your identity</h1>
      <p class="sub">
        Pick a passphrase. We'll encrypt your private key with it and download
        a small file. Without this file (and the passphrase), there is no way
        to recover your identity.
      </p>
      <div class="field">
        <label>Passphrase</label>
        <input type="password" id="pass1" autofocus>
      </div>
      <div class="field">
        <label>Confirm passphrase</label>
        <input type="password" id="pass2">
        <div class="err" id="pass-err"></div>
      </div>
      <div class="row">
        <button id="cancel-backup">Cancel</button>
        <div class="grow"></div>
        <button class="primary" id="do-backup">Download backup file</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);

  const $p1 = wrap.querySelector("#pass1");
  const $p2 = wrap.querySelector("#pass2");
  const $err = wrap.querySelector("#pass-err");
  const $do = wrap.querySelector("#do-backup");
  const $cancel = wrap.querySelector("#cancel-backup");

  function close() { wrap.remove(); closeModal(); }

  $cancel.onclick = close;
  $do.onclick = async () => {
    $err.textContent = "";
    if (!$p1.value || $p1.value.length < 6) {
      $err.textContent = "Pick at least 6 characters."; return;
    }
    if ($p1.value !== $p2.value) {
      $err.textContent = "Passphrases don't match."; return;
    }
    $do.disabled = true;
    try {
      // v2 file: the wrapped ciphertext is a canonical msgpack-encoded
      // object carrying BOTH the Ed25519 PKCS8 and the X25519 PKCS8.
      // Older v1 files carried only the Ed25519 PKCS8 as raw bytes; the
      // loader handles both shapes.
      const bundle = MP.encode({
        ed25519: State.identity.privkey_pkcs8,
        x25519:  State.identity.x25519_priv_pkcs8
      });
      const wrapped = await Crypto.pbkdf2Wrap($p1.value, bundle);
      const file = {
        magic: "mehfil-key",
        v: 2,
        created_at: Date.now(),
        kdf: wrapped.kdf,
        wrap: wrapped.wrap,
        pubkey_b64: bytesToB64(State.identity.pubkey),
        x25519_pubkey_b64: bytesToB64(State.identity.x25519_pub)
      };
      const blob = new Blob([JSON.stringify(file, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `mehfil-${file.pubkey_b64.slice(0,8)}.mehfil-key`;
      a.click();
      URL.revokeObjectURL(url);

      const updated = await Identity.markBackedUp(State.globalDB);
      // Refresh in-memory identity record without losing the loaded private key bytes.
      State.identity = { ...State.identity, backed_up: true };
      wrap.remove();
      // Strip the dot/banner if present
      document.querySelectorAll(".corner-warn, .corner-ok").forEach(el => el.remove());
      setState({ modal: null, backupNag: "done" });
      // After 4 seconds, fade the checkmark away
      setTimeout(() => {
        document.querySelectorAll(".corner-ok").forEach(el => el.remove());
      }, 4000);
    } catch (e) {
      $err.textContent = e.message;
      $do.disabled = false;
    }
  };
}

/* ------------------------------------------------------------
 *  §10b  Restore from .mehfil-key file (Slice 3b)
 *
 *  Accepts both v1 (Ed25519 only — legacy, loses X25519) and v2
 *  (Ed25519 + X25519) backup files. For v1, a fresh X25519 keypair
 *  is generated on restore — past DMs / private channels are NOT
 *  recoverable. This is documented in PENDING.md and in the modal
 *  copy so the user understands the trade-off.
 *
 *  Restore replaces the current identity in the global DB. Any
 *  existing workspaces stay where they are but only the restored
 *  identity can access envelopes encrypted to it.
 * ------------------------------------------------------------ */
function openRestoreModal() {
  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  wrap.innerHTML = `
    <div class="card" style="max-width: 460px;">
      <h1>Restore identity</h1>
      <p class="sub">Pick the <code>.mehfil-key</code> file you saved earlier and enter its passphrase. Your current identity on this device will be replaced.</p>
      <div class="field">
        <label>Backup file</label>
        <input type="file" id="restore-file" accept=".mehfil-key,application/json">
      </div>
      <div class="field">
        <label>Passphrase</label>
        <input type="password" id="restore-pass">
        <div class="err" id="restore-err"></div>
      </div>
      <div class="row">
        <button id="restore-cancel">Cancel</button>
        <div class="grow"></div>
        <button class="primary" id="restore-do">Restore</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  const close = () => wrap.remove();
  wrap.querySelector("#restore-cancel").onclick = close;
  wrap.querySelector("#restore-do").onclick = async () => {
    const $err = wrap.querySelector("#restore-err");
    $err.textContent = "";
    const $file = wrap.querySelector("#restore-file");
    const pass = wrap.querySelector("#restore-pass").value;
    if (!$file.files[0]) { $err.textContent = "Pick a backup file first."; return; }
    if (!pass) { $err.textContent = "Enter your passphrase."; return; }
    wrap.querySelector("#restore-do").disabled = true;
    try {
      const text = await $file.files[0].text();
      const file = JSON.parse(text);
      if (file.magic !== "mehfil-key") throw new Error("That's not a Mehfil backup file.");
      if (file.v !== 1 && file.v !== 2) throw new Error("Unknown backup file version: " + file.v);
      const plaintext = await Crypto.pbkdf2Unwrap(pass, { kdf: file.kdf, wrap: file.wrap });
      let edPkcs8, xPkcs8, xPub;
      if (file.v === 2) {
        const bundle = MP.decode(plaintext);
        edPkcs8 = bundle.ed25519;
        xPkcs8  = bundle.x25519;
        xPub    = b64ToBytes(file.x25519_pubkey_b64);
      } else {
        // v1: plaintext is the raw PKCS8 Ed25519 key. X25519 is lost —
        // generate a fresh keypair.
        edPkcs8 = plaintext;
        const x = await Crypto.genX25519();
        xPkcs8 = x.x25519_priv_pkcs8;
        xPub   = x.x25519_pub;
      }
      const edPub = b64ToBytes(file.pubkey_b64);
      // Sanity check: signing key + public key must agree. Generate a test
      // signature and verify with the public key.
      const signKey = await Crypto.importSignKey(edPkcs8);
      const testBytes = new TextEncoder().encode("mehfil-restore-check");
      const sig = await Crypto.sign(signKey, testBytes);
      const verifyKey = await Crypto.importVerifyKey(edPub);
      const ok = await Crypto.verify(verifyKey, sig, testBytes);
      if (!ok) throw new Error("Passphrase decrypted but the key didn't match its public half — file corrupted?");

      const rec = {
        pubkey: edPub,
        privkey_pkcs8: edPkcs8,
        x25519_pub: xPub,
        x25519_priv_pkcs8: xPkcs8,
        created_at: Date.now(),
        backed_up: true,
        backup_dismissed_at: null
      };
      await Identity.save(State.globalDB, rec);
      State.identity = rec;
      close();
      setState({ view: "landing", workspaces: await idbGetAll(State.globalDB, "workspaces") });
      alert(file.v === 1
        ? "Identity restored. This was a v1 backup so a fresh X25519 keypair was generated — past direct messages and private channels will not be readable."
        : "Identity restored.");
    } catch (e) {
      $err.textContent = e.message;
      wrap.querySelector("#restore-do").disabled = false;
    }
  };
}

/* ------------------------------------------------------------

  const isAdminUser = me && (me.role === "owner" || me.role === "admin");

function renderSettingsAdminTab(current, me) {
  const myUserId = me.id;
  const pendingPromos = current.doc
    ? WorkspaceDoc.getPendingPromotions(current.doc)
    : [];

  const memberRows = current.members.map(m => {
    const badgeClass = m.role === "owner" ? "owner" : m.role === "admin" ? "admin" : "";
    const canRemove = (me.role === "owner" || me.role === "admin") && m.id !== myUserId && m.role !== "owner";
    const canPromote = (me.role === "owner" || me.role === "admin") && m.id !== myUserId && m.role === "member";
    return `
      <div class="member-row">
        <div class="avatar" style="background: ${avatarColorFor(m.id)}; width: 28px; height: 28px; font-size: 11px;">${escapeHTML(initials(m.name))}</div>
        <div class="member-row-info">
          <div class="member-row-name">${escapeHTML(m.name)}${m.id === myUserId ? " <span style='color:var(--fg-dim);font-size:11px;'>(you)</span>" : ""}</div>
          <div class="member-row-fp">${escapeHTML(m.fp || "")}</div>
        </div>
        <span class="role-badge ${badgeClass}">${escapeHTML(m.role)}</span>
        ${canPromote ? `<button class="icon-btn" data-draft-promo="${escapeHTML(m.id)}" title="Propose promotion to admin" style="font-size: 12px; padding: 3px 8px;">Promote…</button>` : ""}
        ${canRemove ? `<button class="danger icon-btn" data-remove-member="${escapeHTML(m.id)}" title="Remove from workspace" style="font-size: 12px; padding: 3px 8px;">Remove</button>` : ""}
      </div>
    `;
  }).join("");

  const promoCards = pendingPromos.map(pp => {
    const target = current.members.find(m => m.id === pp.target_id);
    const drafter = current.members.find(m => m.id === pp.drafter_id);
    const supporters = pp.cosigs || [];
    const alreadySupported = supporters.some(s => s.user_id === myUserId);
    const threshold = 2;
    const canCosign = !alreadySupported && pp.target_id !== myUserId;
    const canFinalize = supporters.length >= threshold;
    const expiresIn = Math.max(0, Math.round((pp.expires_at - Date.now()) / 86400000));
    return `
      <div class="promo-card">
        <div class="promo-card-title">Promote ${escapeHTML(target?.name || pp.target_id)} to admin</div>
        <div class="promo-card-sub">
          Proposed by ${escapeHTML(drafter?.name || pp.drafter_id)} · ${supporters.length}/${threshold} supporters · expires in ${expiresIn}d
        </div>
        <div class="promo-card-actions">
          ${canCosign ? `<button class="primary" data-cosign="${escapeHTML(pp.id)}" style="font-size: 12px; padding: 5px 12px;">Support this promotion</button>` : ""}
          ${canFinalize ? `<button class="primary" data-finalize-promo="${escapeHTML(pp.id)}" style="font-size: 12px; padding: 5px 12px; background: var(--ok); border-color: var(--ok);">Activate promotion</button>` : ""}
          ${alreadySupported ? `<span style="color: var(--ok); font-size: 12px;">✓ You supported this</span>` : ""}
        </div>
      </div>
    `;
  }).join("");

  return `
    <div class="field">
      <label>Members</label>
      <div id="admin-member-list">${memberRows}</div>
    </div>
    ${pendingPromos.length > 0 ? `
      <div class="field">
        <label>Pending promotions</label>
        <div id="admin-promo-list">${promoCards}</div>
      </div>
    ` : ""}
    <div class="err" id="admin-err"></div>
  `;
}

function wireSettingsTab(tab, wrap, current, me, wsName) {
  if (tab === "identity") {
    const btn = wrap.querySelector("#s-backup-btn");
    if (btn) btn.onclick = () => { wrap.remove(); openBackupModal(); };

  } else if (tab === "workspace") {
    const $err = wrap.querySelector("#rename-err");
    wrap.querySelector("#settings-rename").onclick = async () => {
      $err.textContent = "";
      const newName = wrap.querySelector("#ws-rename").value.trim();
      if (!newName) { $err.textContent = "Name is required."; return; }
      if (newName === wsName) { $err.textContent = "Same as current name."; return; }
      wrap.querySelector("#settings-rename").disabled = true;
      try {
        const update = WorkspaceDoc.setName(current.doc, newName);
        await sendWorkspacePatch(current, update);
        wrap.remove();
        setState({ modal: null });
      } catch (e) {
        $err.textContent = e.message;
        wrap.querySelector("#settings-rename").disabled = false;
      }
    };

    // Relay management
    const $addBtn = wrap.querySelector("#btn-add-relay");
    const $relayForm = wrap.querySelector("#relay-form");
    $addBtn.onclick = () => {
      $relayForm.style.display = "block";
      $addBtn.style.display = "none";
    };
    wrap.querySelector("#relay-cancel").onclick = () => {
      $relayForm.style.display = "none";
      $addBtn.style.display = "";
    };
    wrap.querySelector("#relay-test").onclick = async () => {
      const $re = wrap.querySelector("#relay-err");
      $re.textContent = "";
      const url = wrap.querySelector("#relay-url").value.trim();
      const token = wrap.querySelector("#relay-token").value.trim();
      if (!url) { $re.textContent = "URL required."; return; }
      try {
        const probe = new URL(`/ws/${encodeURIComponent(current.meta.id)}/cursor`, url);
        const resp = await fetch(probe.href, {
          headers: token ? { "Authorization": "Bearer " + token } : {}
        });
        if (resp.ok || resp.status === 404) {
          $re.style.color = "var(--ok)";
          $re.textContent = "✓ Relay reachable (status " + resp.status + ")";
          $re.style.color = "var(--ok)";
        } else {
          $re.textContent = "Relay returned " + resp.status;
        }
      } catch (e) {
        $re.textContent = "Connection failed: " + e.message;
      }
    };
    wrap.querySelector("#relay-save").onclick = async () => {
      const $re = wrap.querySelector("#relay-err");
      $re.textContent = "";
      const url = wrap.querySelector("#relay-url").value.trim();
      const token = wrap.querySelector("#relay-token").value.trim();
      const type = wrap.querySelector("#relay-type").value;
      if (!url) { $re.textContent = "URL required."; return; }
      try { new URL(url); } catch (_) { $re.textContent = "Invalid URL."; return; }
      const relay = { type, url, token, added_at: Date.now() };
      if (!current.relays) current.relays = [];
      current.relays.push(relay);
      // Persist relay config in workspace meta
      current.meta.relays = current.relays;
      await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
      // §35: start relay transport immediately.
      RelayMgr.startForWorkspace(current);
      wrap.remove();
      setState({ modal: null });
    };
    wrap.querySelectorAll("[data-remove-relay]").forEach(btn => {
      btn.onclick = async () => {
        const idx = parseInt(btn.dataset.removeRelay, 10);
        if (!isNaN(idx)) {
          current.relays.splice(idx, 1);
          current.meta.relays = current.relays;
          await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
          // §35: restart (or stop) relay transport after removal.
          RelayMgr.startForWorkspace(current);
          wrap.remove();
          setState({ modal: null });
        }
      };
    });

    // §37: Bridge wiring
    const $addBridge   = wrap.querySelector("#btn-add-bridge");
    const $bridgeForm  = wrap.querySelector("#bridge-form");
    $addBridge.onclick = () => { $bridgeForm.style.display = "block"; $addBridge.style.display = "none"; };
    wrap.querySelector("#bridge-cancel").onclick = () => {
      $bridgeForm.style.display = "none"; $addBridge.style.display = "";
    };
    wrap.querySelector("#bridge-autodetect").onclick = async () => {
      const $be = wrap.querySelector("#bridge-err");
      $be.textContent = "Detecting bridge…";
      try {
        const found = await detectBridge();
        if (found) {
          wrap.querySelector("#bridge-url").value = found.url;
          $be.textContent = `Found bridge at ${found.url} — fp: ${found.fp}`;
        } else {
          $be.textContent = "No bridge found. Is mehfil-bridge running on this machine or LAN?";
        }
      } catch (e) {
        $be.textContent = "Detection failed: " + e.message;
      }
    };
    wrap.querySelector("#bridge-save").onclick = async () => {
      const $be = wrap.querySelector("#bridge-err");
      $be.textContent = "";
      const url = wrap.querySelector("#bridge-url").value.trim();
      if (!url) { $be.textContent = "URL required."; return; }
      try { new URL(url); } catch (_) { $be.textContent = "Invalid URL."; return; }
      const bridge = { url, fp: null, added_at: Date.now() };
      if (!current.bridges) current.bridges = [];
      current.bridges.push(bridge);
      current.meta.bridges = current.bridges;
      await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
      // §37: start bridge transport (will prompt for fp on first connect).
      BridgeMgr.startForWorkspace(current);
      wrap.remove();
      setState({ modal: null });
    };
    wrap.querySelectorAll("[data-remove-bridge]").forEach(btn => {
      btn.onclick = async () => {
        const idx = parseInt(btn.dataset.removeBridge, 10);
        if (!isNaN(idx)) {
          if (!current.bridges) current.bridges = [];
          current.bridges.splice(idx, 1);
          current.meta.bridges = current.bridges;
          await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
          BridgeMgr.stop(current.meta.id);
          wrap.remove();
          setState({ modal: null });
        }
      };
    });

    // Export / import
    // §36: Invite by code (only wired when relay configured → button exists)
    const $invByCode = wrap.querySelector("#btn-invite-by-code");
    if ($invByCode) $invByCode.onclick = () => { wrap.remove(); openPairingCodeSendModal(current); };
    wrap.querySelector("#btn-export-ws").onclick = () => { wrap.remove(); openExportModal(); };
    wrap.querySelector("#btn-import-ws").onclick = () => { wrap.remove(); openImportModal(); };

  } else if (tab === "admin") {
    const $err = wrap.querySelector("#admin-err");

    // Remove member
    wrap.querySelectorAll("[data-remove-member]").forEach(btn => {
      btn.onclick = async () => {
        const targetId = btn.dataset.removeMember;
        const target = current.members.find(m => m.id === targetId);
        if (!target) return;
        const confirmed = confirm(
          `Remove ${target.name} from this workspace?\n\n` +
          `They'll keep any messages they've already received. ` +
          `New keys will be distributed to remaining members so they can't read future messages.`
        );
        if (!confirmed) return;
        btn.disabled = true;
        try {
          await sendMemberRemove(current, targetId);
          wrap.remove();
          setState({ modal: null });
        } catch (e) {
          $err.textContent = e.message;
          btn.disabled = false;
        }
      };
    });

    // Draft promotion
    wrap.querySelectorAll("[data-draft-promo]").forEach(btn => {
      btn.onclick = async () => {
        const targetId = btn.dataset.draftPromo;
        const target = current.members.find(m => m.id === targetId);
        if (!target) return;
        btn.disabled = true;
        try {
          await draftPromotion(current, targetId);
          wrap.remove();
          openSettings("admin");
        } catch (e) {
          $err.textContent = e.message;
          btn.disabled = false;
        }
      };
    });

    // Co-sign promotion
    wrap.querySelectorAll("[data-cosign]").forEach(btn => {
      btn.onclick = async () => {
        const proposalId = btn.dataset.cosign;
        btn.disabled = true;
        try {
          await addCoSignPromotion(current, proposalId);
          wrap.remove();
          openSettings("admin");
        } catch (e) {
          $err.textContent = e.message;
          btn.disabled = false;
        }
      };
    });

    // Finalize promotion
    wrap.querySelectorAll("[data-finalize-promo]").forEach(btn => {
      btn.onclick = async () => {
        const proposalId = btn.dataset.finalizePromo;
        btn.disabled = true;
        try {
          await finalizePromotion(current, proposalId);
          wrap.remove();
          setState({ modal: null });
        } catch (e) {
          $err.textContent = e.message;
          btn.disabled = false;
        }
      };
    });
  }
}

/* ------------------------------------------------------------
 *  §23  Invite modal (inviter side — WT-04, WT-05)
 *
 *  Flow:
 *    1. Modal opens → spin up WebRTC transport as inviter
 *       (ICE gathering runs in background ~1-2s).
 *    2. Once gathered, build invite payload and render QR + URL.
 *    3. User copies URL / QR, sends OOB.
 *    4. Modal also shows a "paste their reply here" field.
 *    5. On paste + submit, decode reply, accept answer, attach
 *       transport to PeerMgr. Data channel opens, member.join
 *       arrives from the joiner, welcome is sent back, sidebar
 *       updates with the new member.
 * ------------------------------------------------------------ */
async function openInviteModal() {
  setState({ modal: "invite" });
  // Kick off the WebRTC gather + payload prep asynchronously.
  if (!State.invite) {
    State.invite = { phase: "gathering" };
    try {
      const transport = await WebRTCTransport.asInviter();
      const current = State.current;
      const myRaw = await idbGet(current.wsDB, "keys", "root");
      const gchKey = await idbGet(current.wsDB, "keys", "ch:" + current.meta.general_channel_id);
      const me = current.members.find(m => m.id === bytesToB64Url(State.identity.pubkey));
      const fpHash = await Crypto.sha256(State.identity.pubkey);
      const frag = await InvitePayload.encode({
        ws: current.meta.id,
        name: current.meta.name,
        wrk: myRaw,
        inviter: bytesToB64Url(State.identity.pubkey),
        inviter_fp_bytes: fpHash.slice(0, 16),
        inviter_name: me.name,
        general_channel_id: current.meta.general_channel_id,
        general_channel_key: gchKey,
        offer_sdp: transport.localSdp(),
        expires: Date.now() + 24 * 3600 * 1000
      });
      const url = `${location.origin}${location.pathname}#join=${frag}`;
      State.invite = { phase: "ready", transport, url, frag };
      if (State.modal === "invite") renderInviteModal();
    } catch (e) {
      State.invite = { phase: "error", error: e.message };
      if (State.modal === "invite") renderInviteModal();
    }
  }
}

function renderInviteModal() {
  // Remove any existing modal layer first (idempotent re-render).
  document.querySelectorAll(".modal-bg").forEach(el => el.remove());

  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  const card = document.createElement("div");
  card.className = "card invite-panel";
  wrap.appendChild(card);
  document.body.appendChild(wrap);

  const inv = State.invite;
  if (!inv || inv.phase === "gathering") {
    card.innerHTML = `
      <h1>Invite someone</h1>
      <p class="sub">Setting up a direct peer connection… (this takes a second)</p>
      <div class="row">
        <button id="invite-close">Close</button>
      </div>
    `;
    card.querySelector("#invite-close").onclick = closeInviteModal;
    return;
  }
  if (inv.phase === "error") {
    card.innerHTML = `
      <h1>Invite</h1>
      <p class="sub" style="color: var(--danger);">${escapeHTML(inv.error)}</p>
      <button id="invite-close">Close</button>
    `;
    card.querySelector("#invite-close").onclick = closeInviteModal;
    return;
  }

  // Ready — render tabs, QR/URL, reply paste area.
  const tab = inv.tab || "remote";
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const me = State.current.members.find(m => m.id === myUserId);
  const fpHex = me.fp;   // pre-computed during Workspace.open
  card.innerHTML = `
    <h1>Invite someone</h1>
    <div class="invite-tabs">
      <button class="invite-tab ${tab === 'remote' ? 'active' : ''}" data-tab="remote">They're remote</button>
      <button class="invite-tab ${tab === 'room'   ? 'active' : ''}" data-tab="room">They're in the room</button>
    </div>
    <div id="invite-body"></div>
    <div class="fp-block" style="margin-top: 18px;">
      <div id="invite-trust-card"></div>
      <div class="fp-meta">
        <div class="fp-label">Your fingerprint</div>
        <div class="fp-hex">${escapeHTML(fpHex)}</div>
      </div>
    </div>
    <div class="field" style="margin-top: 14px;">
      <label>When they've sent you their reply URL, paste it here:</label>
      <input type="text" id="reply-url" placeholder="https://…#join-reply=…">
      <div class="err" id="reply-err"></div>
    </div>
    <div class="row">
      <button id="invite-close">Cancel</button>
      <div class="grow"></div>
      <button class="primary" id="invite-accept">Accept reply</button>
    </div>
  `;

  const renderBody = async () => {
    const $body = card.querySelector("#invite-body");
    if (inv.tab === "room") {
      $body.innerHTML = `<div class="qr-box" id="qr-holder"><span class="sub">loading QR…</span></div>`;
      try {
        const svg = await QR.toSVG(inv.url);
        card.querySelector("#qr-holder").innerHTML = svg;
      } catch (e) {
        card.querySelector("#qr-holder").innerHTML = `<span class="sub" style="color: var(--danger);">${escapeHTML(e.message)}</span>`;
      }
    } else {
      $body.innerHTML = `
        <p class="sub">Copy this link and send it however you normally do (WhatsApp, Signal, email). Then verify your fingerprint with them out of band — read it aloud, compare on video, something you both trust.</p>
        <div class="url-box" id="invite-url">${escapeHTML(inv.url)}</div>
        <div class="row">
          <button id="copy-url">Copy link</button>
        </div>
      `;
      card.querySelector("#copy-url").onclick = async () => {
        try {
          await navigator.clipboard.writeText(inv.url);
          card.querySelector("#copy-url").textContent = "Copied ✓";
        } catch {
          // fall back: select the text so user can cmd-c
          const range = document.createRange();
          range.selectNode(card.querySelector("#invite-url"));
          getSelection().removeAllRanges();
          getSelection().addRange(range);
        }
      };
    }
  };
  renderBody();

  // Trust card
  TrustCard.renderFromPubkey(State.identity.pubkey, 80).then(svg => {
    const el = card.querySelector("#invite-trust-card");
    if (el) el.innerHTML = svg;
  });

  // Tab switching
  card.querySelectorAll(".invite-tab").forEach(btn => {
    btn.onclick = () => {
      inv.tab = btn.getAttribute("data-tab");
      renderInviteModal();
    };
  });

  card.querySelector("#invite-close").onclick = closeInviteModal;
  card.querySelector("#invite-accept").onclick = async () => {
    const $err = card.querySelector("#reply-err");
    const raw = card.querySelector("#reply-url").value.trim();
    $err.textContent = "";
    try {
      const m = raw.match(/#join-reply=([A-Za-z0-9_-]+)/);
      if (!m) throw new Error("That doesn't look like a reply URL.");
      const reply = await InvitePayload.decodeReply(m[1]);
      if (reply.ws !== State.current.meta.id) throw new Error("That reply is for a different workspace.");
      await inv.transport.acceptAnswer(reply.answer_sdp);
      // Attach transport; peer user id becomes known when we receive member.join.
      PeerMgr.attach(State.current.meta.id, inv.transport, reply.joiner_user_id);
      State.invite = null;
      closeInviteModal();
      render();
    } catch (e) {
      $err.textContent = e.message;
    }
  };
}

function closeInviteModal() {
  document.querySelectorAll(".modal-bg").forEach(el => el.remove());
  // Don't tear down the transport if it was just accepted — only if
  // we're really canceling the invite flow entirely.
  if (State.invite && State.invite.phase === "ready" && !PeerMgr.hasPeers(State.current?.meta?.id)) {
    try { State.invite.transport.close(); } catch {}
    State.invite = null;
  }
  setState({ modal: null });
}

/* ------------------------------------------------------------
 *  §26  Drafts — per-channel composer state persisted to the
 *       `drafts` IndexedDB store so refresh / channel switch
 *       doesn't lose typed-but-unsent text.
 * ------------------------------------------------------------ */
async function loadDraft(channelId) {
  if (!State.current || !channelId) return "";
  return (await idbGet(State.current.wsDB, "drafts", channelId)) || "";
}

async function persistDraft(channelId, body) {
  if (!State.current || !channelId) return;
  if (body && body.trim()) {
    await idbPut(State.current.wsDB, "drafts", body, channelId);
  } else {
    await idbDelete(State.current.wsDB, "drafts", channelId);
  }
}

async function clearDraft(channelId) {
  if (!State.current || !channelId) return;
  await idbDelete(State.current.wsDB, "drafts", channelId);
}

/**
 * Turn a message-text div into an editable field in place. Enter commits,
 * Escape cancels. No separate modal — matches the spec's "calm by default"
 * tone and avoids covering the surrounding conversation.
 */
/* ------------------------------------------------------------
 *  §28c  Reaction picker popup — Slice 3d.1
 *
 *  8 curated emoji for the happy path. No full keyboard picker in
 *  v1 — too much code for too little value. Users can toggle an
 *  existing reaction by clicking its pill (which reuses whatever
 *  emoji someone else already sent), so the 8-emoji limit only
 *  affects first-reacts.
 * ------------------------------------------------------------ */
const REACTION_EMOJI = ["👍", "❤️", "😂", "😮", "😢", "🙏", "👀", "✅"];

function openReactionPicker(anchorEl, messageId) {
  // Close any existing picker first.
  document.querySelectorAll(".reaction-picker").forEach(el => el.remove());

  const picker = document.createElement("div");
  picker.className = "reaction-picker";
  picker.innerHTML = REACTION_EMOJI.map(e =>
    `<button data-emoji="${escapeHTML(e)}">${e}</button>`
  ).join("");
  document.body.appendChild(picker);

  // Position just above the anchor button, right-aligned to it.
  const rect = anchorEl.getBoundingClientRect();
  picker.style.top = (rect.top - picker.offsetHeight - 6) + "px";
  picker.style.left = (rect.right - picker.offsetWidth) + "px";

  picker.querySelectorAll("button").forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      const emoji = btn.getAttribute("data-emoji");
      picker.remove();
      try {
        await toggleReaction(State.current, messageId, emoji);
        render();
      } catch (err) { console.error(err); }
    };
  });

  // Dismiss on next outside click.
  setTimeout(() => {
    const dismiss = (e) => {
      if (!picker.contains(e.target)) {
        picker.remove();
        document.removeEventListener("click", dismiss);
      }
    };
    document.addEventListener("click", dismiss);
  }, 0);
}

function beginInlineEdit(messageId) {
  const el = document.querySelector(`[data-msg-text="${CSS.escape(messageId)}"]`);
  if (!el) return;
  const msg = State.current.messages.find(m => m.id === messageId);
  if (!msg || msg.deleted) return;
  const original = msg.body;
  // Reset the content to plain text. The render path may have injected
  // styled spans (@mention highlighting) which the user shouldn't have
  // to navigate around while editing.
  el.textContent = original;
  el.classList.add("editing");
  el.contentEditable = "true";
  el.focus();
  // Put the cursor at the end.
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  const finish = async (commit) => {
    el.contentEditable = "false";
    el.classList.remove("editing");
    const newBody = el.innerText;
    if (commit && newBody.trim() && newBody !== original) {
      try {
        await sendMessageEdit(State.current, messageId, newBody);
      } catch (err) {
        console.error(err);
      }
    }
    render();
  };

  el.onkeydown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); finish(true); }
    else if (e.key === "Escape")          { e.preventDefault(); finish(false); }
  };
  // Paste sanitization: strip any HTML from clipboard content and insert
  // as plain text. Prevents styled paste from leaking markup into the
  // contenteditable div, which would end up in the new message body
  // as-is once innerText is read.
  el.onpaste = (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData("text/plain");
    // document.execCommand is deprecated but still the only way to do an
    // "insert plain text at caret" that updates the contenteditable's
    // internal selection model correctly. The modern alternative is
    // Selection.collapse + Range.insertNode which is verbose and fiddly.
    document.execCommand("insertText", false, text);
  };
  el.onblur = () => finish(true);
}

  const myUserId = bytesToB64Url(State.identity.pubkey);

      <p class="sub">Public channels are visible to everyone in the workspace. Private channels are invisible to non-members.</p>
      <div class="field">
        <label>Name</label>
        <input type="text" id="ch-name" placeholder="e.g. design-review" autofocus maxlength="40">
        <div class="err" id="ch-err"></div>
      </div>
      <div class="field">
        <label>Topic (optional)</label>
        <input type="text" id="ch-topic" placeholder="What's this channel for?" maxlength="140">
      </div>
      <div class="field">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" id="ch-private">

        </label>
      </div>
      <div class="field" id="ch-members-field" style="display: none;">
        <label>Who's in it?</label>
        ${others.length === 0 ? `<div class="sub">No other members yet — invite someone first.</div>` : others.map(m => `
          <label style="display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer;">
            <input type="checkbox" class="ch-member-cb" data-mid="${escapeHTML(m.id)}">
            <div class="avatar" style="width: 20px; height: 20px; font-size: 10px; background: ${avatarColorFor(m.id)}">${escapeHTML(initials(m.name))}</div>
            <span>${escapeHTML(m.name)}</span>
          </label>

      </div>
      <div class="row">
        <button id="ch-cancel">Cancel</button>
        <div class="grow"></div>
        <button class="primary" id="ch-create">Create</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  const close = () => wrap.remove();
  wrap.querySelector("#ch-cancel").onclick = close;

  // Toggle the members field when private is checked.
  const $private = wrap.querySelector("#ch-private");
  const $membersField = wrap.querySelector("#ch-members-field");
  $private.onchange = () => {
    $membersField.style.display = $private.checked ? "" : "none";
  };

  const submit = async () => {
    const $err = wrap.querySelector("#ch-err");
    $err.textContent = "";
    const name = wrap.querySelector("#ch-name").value.trim();
    const topic = wrap.querySelector("#ch-topic").value.trim();
    const isPrivate = $private.checked;
    if (!name) { $err.textContent = "Name is required."; return; }
    if (!/^[a-z0-9][a-z0-9-]{0,39}$/i.test(name)) {
      $err.textContent = "Letters, digits, and hyphens only.";
      return;
    }
    if (State.current.channels.find(c => c.name === name)) {
      $err.textContent = "A channel with this name already exists.";
      return;
    }

    let memberIds = null;
    if (isPrivate) {
      const picked = [...wrap.querySelectorAll(".ch-member-cb:checked")].map(cb => cb.getAttribute("data-mid"));
      if (picked.length === 0) {

        return;
      }
      memberIds = [myUserId, ...picked];
    }

    wrap.querySelector("#ch-create").disabled = true;
    try {
      const ch = await sendChannelCreate(State.current, name, topic, { isPrivate, memberIds });
      close();
      setState({ currentChannel: ch.id });
    } catch (e) {
      $err.textContent = e.message;
      wrap.querySelector("#ch-create").disabled = false;
    }
  };
  wrap.querySelector("#ch-create").onclick = submit;
  wrap.querySelector("#ch-name").onkeydown = (e) => { if (e.key === "Enter") submit(); };
  wrap.querySelector("#ch-topic").onkeydown = (e) => { if (e.key === "Enter") submit(); };
