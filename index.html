      encFloat(v, out); return;
    }
    if (typeof v === "string") { encStr(v, out); return; }
    if (v instanceof Uint8Array) { encBin(v, out); return; }
    if (Array.isArray(v)) { encArr(v, out); return; }
    if (typeof v === "object") { encMap(v, out); return; }
    throw new Error("MP encode: unsupported type " + typeof v);
  }

  function encInt(n, out) {
    if (!Number.isSafeInteger(n)) throw new Error("MP encode: int out of safe range");
    if (n >= 0) {
      if (n <= 0x7f)       { out.push(u8(n)); return; }
      if (n <= 0xff)       { out.push(new Uint8Array([0xcc, n])); return; }
      if (n <= 0xffff)     { const b = new Uint8Array(3); b[0]=0xcd; new DataView(b.buffer).setUint16(1,n,false); out.push(b); return; }
      if (n <= 0xffffffff) { const b = new Uint8Array(5); b[0]=0xce; new DataView(b.buffer).setUint32(1,n,false); out.push(b); return; }
      // uint64 — split as two uint32s
      const b = new Uint8Array(9); b[0]=0xcf;
      const dv = new DataView(b.buffer);
      const hi = Math.floor(n / 0x100000000);
      const lo = n >>> 0;
      dv.setUint32(1, hi, false); dv.setUint32(5, lo, false);
      out.push(b); return;
    }
    // negative
    if (n >= -32) { out.push(u8(0xe0 | (n + 32))); return; }
    if (n >= -0x80)       { const b = new Uint8Array(2); b[0]=0xd0; new DataView(b.buffer).setInt8(1,n);  out.push(b); return; }
    if (n >= -0x8000)     { const b = new Uint8Array(3); b[0]=0xd1; new DataView(b.buffer).setInt16(1,n,false); out.push(b); return; }
    if (n >= -0x80000000) { const b = new Uint8Array(5); b[0]=0xd2; new DataView(b.buffer).setInt32(1,n,false); out.push(b); return; }
    // int64
    const b = new Uint8Array(9); b[0]=0xd3;
    const dv = new DataView(b.buffer);
    // Two's complement of |n| in 64 bits
    const an = -n;
    const hi = Math.floor(an / 0x100000000);
    const lo = an >>> 0;
    // ~x + 1 in 64 bit
    let nlo = (~lo + 1) >>> 0;
    let nhi = (~hi + (nlo === 0 ? 1 : 0)) >>> 0;
    dv.setUint32(1, nhi, false); dv.setUint32(5, nlo, false);
    out.push(b);
  }

  function encFloat(n, out) {
    const b = new Uint8Array(9); b[0] = 0xcb;
    new DataView(b.buffer).setFloat64(1, n, false);
    out.push(b);
  }

  function encStr(s, out) {
    const bytes = utf8enc.encode(s);
    const L = bytes.length;
    if (L <= 31)        { out.push(u8(0xa0 | L)); }
    else if (L <= 0xff) { out.push(new Uint8Array([0xd9, L])); }
    else if (L <= 0xffff) { const h = new Uint8Array(3); h[0]=0xda; new DataView(h.buffer).setUint16(1,L,false); out.push(h); }
    else if (L <= 0xffffffff) { const h = new Uint8Array(5); h[0]=0xdb; new DataView(h.buffer).setUint32(1,L,false); out.push(h); }
    else throw new Error("MP encode: string too long");
    out.push(bytes);
  }

  function encBin(b, out) {
    const L = b.length;
    if (L <= 0xff)      { out.push(new Uint8Array([0xc4, L])); }
    else if (L <= 0xffff) { const h = new Uint8Array(3); h[0]=0xc5; new DataView(h.buffer).setUint16(1,L,false); out.push(h); }
    else if (L <= 0xffffffff) { const h = new Uint8Array(5); h[0]=0xc6; new DataView(h.buffer).setUint32(1,L,false); out.push(h); }
    else throw new Error("MP encode: bin too long");
    out.push(b);
  }

  function encArr(a, out) {
    const L = a.length;
    if (L <= 15)         { out.push(u8(0x90 | L)); }
    else if (L <= 0xffff){ const h = new Uint8Array(3); h[0]=0xdc; new DataView(h.buffer).setUint16(1,L,false); out.push(h); }
    else if (L <= 0xffffffff) { const h = new Uint8Array(5); h[0]=0xdd; new DataView(h.buffer).setUint32(1,L,false); out.push(h); }
    else throw new Error("MP encode: array too long");
    for (let i = 0; i < L; i++) encVal(a[i], out);
  }

  function encMap(o, out) {
    // Pre-encode each key, sort by key bytes lexicographically.
    const keys = Object.keys(o);
    const entries = keys.map(k => {
      const kbytes = encode(k);                   // canonical encoding of the key alone
      return { k, kbytes };
    });
    entries.sort((a, b) => cmpBytes(a.kbytes, b.kbytes));
    // Reject duplicate keys (impossible from a JS object literal but cheap to assert).
    for (let i = 1; i < entries.length; i++) {
      if (cmpBytes(entries[i-1].kbytes, entries[i].kbytes) === 0) throw new Error("MP encode: duplicate map key");
    }
    const L = entries.length;
    if (L <= 15)         { out.push(u8(0x80 | L)); }
    else if (L <= 0xffff){ const h = new Uint8Array(3); h[0]=0xde; new DataView(h.buffer).setUint16(1,L,false); out.push(h); }
    else if (L <= 0xffffffff) { const h = new Uint8Array(5); h[0]=0xdf; new DataView(h.buffer).setUint32(1,L,false); out.push(h); }
    else throw new Error("MP encode: map too large");
    for (const e of entries) {
      out.push(e.kbytes);
      encVal(o[e.k], out);
    }
  }

  /* ---- decode ---- */

  // M4: bound untrusted input. Two DoS vectors on a decoder fed peer/relay
  // bytes: unbounded nesting (decVal → decMap/decArr → decVal → …) blows the
  // stack, and a large declared length runs `new Array(n)` / a big slice with
  // n up to 2^32. MP_MAX_DEPTH caps nesting; the per-collection check below
  // rejects any length that exceeds the bytes actually remaining — a valid
  // msgpack can never declare more elements/bytes than it carries, so this
  // costs legitimate envelopes nothing.
  const MP_MAX_DEPTH = 64;
  function mpRemaining(st) { return st.b.length - st.p; }
  function mpBoundLen(st, n) {
    if (n > mpRemaining(st)) throw new Error("MP decode: declared length exceeds input");
    return n;
  }

  function decode(bytes) {
    const st = { b: bytes, p: 0 };
    const v = decVal(st, 0);
    if (st.p !== bytes.length) throw new Error("MP decode: trailing bytes");
    return v;
  }

  function decVal(st, depth = 0) {
    if (depth > MP_MAX_DEPTH) throw new Error("MP decode: max nesting depth exceeded");
    const c = st.b[st.p++];
    // positive fixint
    if (c <= 0x7f) return c;
    // fixmap
    if (c >= 0x80 && c <= 0x8f) return decMap(st, c & 0x0f, depth);
    // fixarray
    if (c >= 0x90 && c <= 0x9f) return decArr(st, c & 0x0f, depth);
    // fixstr
    if (c >= 0xa0 && c <= 0xbf) return decStr(st, c & 0x1f);
    // negative fixint
    if (c >= 0xe0) return c - 0x100;

    switch (c) {
      case 0xc0: return null;
      case 0xc2: return false;
      case 0xc3: return true;
      case 0xc4: return decBin(st, readU8(st));
      case 0xc5: return decBin(st, readU16(st));
      case 0xc6: return decBin(st, readU32(st));
      case 0xca: { const v = readF32(st); return v; }
      case 0xcb: { const v = readF64(st); return v; }
      case 0xcc: return readU8(st);
      case 0xcd: return readU16(st);
      case 0xce: return readU32(st);
      case 0xcf: return readU64(st);
      case 0xd0: return readI8(st);
      case 0xd1: return readI16(st);
      case 0xd2: return readI32(st);
      case 0xd3: return readI64(st);
      case 0xd9: return decStr(st, readU8(st));
      case 0xda: return decStr(st, readU16(st));
      case 0xdb: return decStr(st, readU32(st));
      case 0xdc: return decArr(st, readU16(st), depth);
      case 0xdd: return decArr(st, readU32(st), depth);
      case 0xde: return decMap(st, readU16(st), depth);
      case 0xdf: return decMap(st, readU32(st), depth);
      default: throw new Error("MP decode: unknown type 0x" + c.toString(16));
    }
  }

  function decStr(st, n) {
    mpBoundLen(st, n);
    const s = utf8dec.decode(st.b.subarray(st.p, st.p + n));
    st.p += n;
    return s;
  }
  function decBin(st, n) {
    mpBoundLen(st, n);
    const b = st.b.slice(st.p, st.p + n);
    st.p += n;
    return b;
  }
  function decArr(st, n, depth) {
    mpBoundLen(st, n);   // n elements need ≥ n bytes remaining
    const a = new Array(n);
    for (let i = 0; i < n; i++) a[i] = decVal(st, depth + 1);
    return a;
  }
  function decMap(st, n, depth) {
    mpBoundLen(st, n);   // n entries need ≥ n bytes remaining
    // Use Object.create(null) so there is no prototype to pollute.
    // A msgpack map with key "__proto__" would otherwise change the
    // decoded object's prototype chain via o["__proto__"] = value,
    // allowing a peer to control property lookups on missing own keys.
    const o = Object.create(null);
    for (let i = 0; i < n; i++) {
      const k = decVal(st, depth + 1);
      if (typeof k !== "string") throw new Error("MP decode: non-string map key");
      // Explicitly block dangerous prototype keys even with null prototype,
      // as a defense-in-depth measure for any downstream JSON.parse paths.
      if (k === "__proto__" || k === "constructor" || k === "prototype") {
        throw new Error("MP decode: forbidden map key: " + k);
      }
      if (Object.prototype.hasOwnProperty.call(o, k)) throw new Error("MP decode: duplicate map key " + k);
      o[k] = decVal(st, depth + 1);
    }
    return o;
  }

  function readU8(st)  { return st.b[st.p++]; }
  function readU16(st) { const v = (st.b[st.p]<<8) | st.b[st.p+1]; st.p += 2; return v >>> 0; }
  function readU32(st) {
    const v = (st.b[st.p]*0x1000000) + ((st.b[st.p+1]<<16) | (st.b[st.p+2]<<8) | st.b[st.p+3]);
    st.p += 4; return v;
  }
  function readU64(st) {
    const hi = readU32(st), lo = readU32(st);
    const v = hi * 0x100000000 + lo;
    if (!Number.isSafeInteger(v)) throw new Error("MP decode: u64 exceeds safe int");
    return v;
  }
  function readI8(st)  { const v = new DataView(st.b.buffer, st.b.byteOffset + st.p, 1).getInt8(0); st.p += 1; return v; }
  function readI16(st) { const v = new DataView(st.b.buffer, st.b.byteOffset + st.p, 2).getInt16(0,false); st.p += 2; return v; }
  function readI32(st) { const v = new DataView(st.b.buffer, st.b.byteOffset + st.p, 4).getInt32(0,false); st.p += 4; return v; }
  function readI64(st) {
    const hi = new DataView(st.b.buffer, st.b.byteOffset + st.p, 4).getInt32(0,false);
    const lo = new DataView(st.b.buffer, st.b.byteOffset + st.p + 4, 4).getUint32(0,false);
    st.p += 8;
    const v = hi * 0x100000000 + lo;
    if (!Number.isSafeInteger(v)) throw new Error("MP decode: i64 exceeds safe int");
    return v;
  }
  function readF32(st) { const v = new DataView(st.b.buffer, st.b.byteOffset + st.p, 4).getFloat32(0,false); st.p += 4; return v; }
  function readF64(st) { const v = new DataView(st.b.buffer, st.b.byteOffset + st.p, 8).getFloat64(0,false); st.p += 8; return v; }

  function u8(b) { return new Uint8Array([b]); }
  function concat(chunks) {
    let n = 0;
    for (const c of chunks) n += c.length;
    const out = new Uint8Array(n);
    let p = 0;
    for (const c of chunks) { out.set(c, p); p += c.length; }
    return out;
  }
  function cmpBytes(a, b) {
    const L = Math.min(a.length, b.length);
    for (let i = 0; i < L; i++) {
      if (a[i] !== b[i]) return a[i] - b[i];
    }
    return a.length - b.length;
  }

  return { encode, decode };
})();

/* ------------------------------------------------------------
 *  §2  Self-test (msgpack vectors from PROTOCOL.md §1)
 *  Runs on every boot. Failure refuses to start the app.
 * ------------------------------------------------------------ */
function selfTest() {
  const cases = [
    [null, "c0"],
    [false, "c2"],
    [true, "c3"],
    [0, "00"],
    [127, "7f"],
    [128, "cc80"],
    [255, "ccff"],
    [256, "cd0100"],
    [-1, "ff"],
    [-32, "e0"],
    [-33, "d0df"],
    ["", "a0"],
    ["hi", "a26869"],
    [[], "90"],
    [[1, 2], "920102"],
    [{}, "80"],
    // Canonical encoding sorts keys: a before b → 82 a161 01 a162 02.
    [{ b: 2, a: 1 }, "82a16101a16202"],
    [new Uint8Array([1,2,3]), "c403010203"],
  ];

  for (const [v, hex] of cases) {
    const got = bytesToHex(MP.encode(v));
    if (got !== hex) throw new Error(`MP selftest fail: ${JSON.stringify(v)} → ${got} expected ${hex}`);
  }

  // Round-trip nested structure
  const nested = { foo: "bar", n: 42, arr: [true, null, -7], bin: new Uint8Array([0xde,0xad]) };
  const enc = MP.encode(nested);
  const dec = MP.decode(enc);
  if (dec.foo !== "bar" || dec.n !== 42 || dec.arr.length !== 3 || dec.arr[2] !== -7) {
    throw new Error("MP roundtrip failed");
  }
  if (!(dec.bin instanceof Uint8Array) || dec.bin[0] !== 0xde || dec.bin[1] !== 0xad) {
    throw new Error("MP bin roundtrip failed");
  }
}

/* ------------------------------------------------------------
 *  §3  Crypto helpers (Web Crypto only — no external libs)
 * ------------------------------------------------------------ */
const Crypto = {
  rand(n) {
    const b = new Uint8Array(n);
    crypto.getRandomValues(b);
    return b;
  },

  async sha256(bytes) {
    const h = await crypto.subtle.digest("SHA-256", bytes);
    return new Uint8Array(h);
  },

  /** SHA-256 of a string or Uint8Array, returned as 64-char lowercase hex. */
  async sha256Hex(input) {
    const data = typeof input === "string" ? new TextEncoder().encode(input) : input;
    const buf  = await crypto.subtle.digest("SHA-256", data);
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
  },

  async genIdentity() {
    // Ed25519 keypair. Web Crypto support is now wide; we throw a clean
    // error if missing so the user gets a real message instead of a stack.
    let kp;
    try {
      kp = await crypto.subtle.generateKey({ name: "Ed25519" }, true, ["sign", "verify"]);
    } catch (e) {
      throw new Error("Your browser doesn't support Ed25519 in Web Crypto. Try a recent Chrome, Firefox, or Safari.");
    }
    const pubRaw = new Uint8Array(await crypto.subtle.exportKey("raw", kp.publicKey));
    const privPkcs8 = new Uint8Array(await crypto.subtle.exportKey("pkcs8", kp.privateKey));
    return { pubkey: pubRaw, privkey_pkcs8: privPkcs8 };
  },

  async importSignKey(pkcs8) {
    return crypto.subtle.importKey("pkcs8", pkcs8, { name: "Ed25519" }, false, ["sign"]);
  },

  // Canonical bytes of a device certificate: the identity key attests that a
  // subordinate device key (and its device_id) is allowed to sign on its
  // behalf. Signed by the identity key; verified against it. `identityB64` is
  // the signer's user_id so a cert can't be lifted onto a different identity.
  deviceCertBytes(identityB64, deviceId, devicePub, ts) {
    return MP.encode({ t: "device-cert", id: identityB64, device_id: deviceId, device_pub: devicePub, ts });
  },
  // Mint a device keypair and a self-cert signed by the identity key.
  async genDeviceCert(identityPub, identityPrivPkcs8) {
    const kp = await Crypto.genIdentity();          // a plain Ed25519 keypair
    const deviceId = bytesToB64Url(Crypto.rand(8));
    const ts = Date.now();
    const identityB64 = bytesToB64Url(identityPub);
    const signKey = await Crypto.importSignKey(identityPrivPkcs8);
    const sig = await Crypto.sign(signKey, Crypto.deviceCertBytes(identityB64, deviceId, kp.pubkey, ts));
    return {
      device_id: deviceId,
      device_pub: kp.pubkey,
      device_privkey_pkcs8: kp.privkey_pkcs8,
      device_cert: { device_id: deviceId, device_pub: kp.pubkey, ts, sig },
    };
  },

  async importVerifyKey(rawPub) {
    return crypto.subtle.importKey("raw", rawPub, { name: "Ed25519" }, false, ["verify"]);
  },

  async sign(privKey, bytes) {
    const sig = await crypto.subtle.sign("Ed25519", privKey, bytes);
    return new Uint8Array(sig);
  },

  async verify(pubKey, sig, bytes) {
    return crypto.subtle.verify("Ed25519", pubKey, sig, bytes);
  },

  async genAesKey() {
    return crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
  },

  async exportAesRaw(key) {
    return new Uint8Array(await crypto.subtle.exportKey("raw", key));
  },

  async importAesRaw(raw) {
    return crypto.subtle.importKey("raw", raw, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
  },

  async aesEncrypt(key, plaintext) {
    const iv = Crypto.rand(12);
    const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, plaintext);
    return { iv, ct: new Uint8Array(ct) };
  },

  async aesDecrypt(key, iv, ct) {
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
    return new Uint8Array(pt);
  },

  // X25519 — used for ECDH key agreement: deriving per-member key-wrapping
  // keys for private channels (§5.2) and deriving symmetric keys for 1:1
  // DMs (§5.2). Native in Web Crypto as of Chrome 133 / Firefox 130 /
  // Safari 18. Throws a clean error on older browsers.
  async genX25519() {
    let kp;
    try {
      kp = await crypto.subtle.generateKey({ name: "X25519" }, true, ["deriveKey", "deriveBits"]);
    } catch (e) {
      throw new Error("Your browser doesn't support X25519 in Web Crypto. Needs Chrome 133+, Firefox 130+, or Safari 18+.");
    }
    const pubRaw  = new Uint8Array(await crypto.subtle.exportKey("raw",   kp.publicKey));
    const privPk8 = new Uint8Array(await crypto.subtle.exportKey("pkcs8", kp.privateKey));
    return { x25519_pub: pubRaw, x25519_priv_pkcs8: privPk8 };
  },

  async importX25519Pub(raw) {
    return crypto.subtle.importKey("raw", raw, { name: "X25519" }, false, []);
  },

  async importX25519Priv(pkcs8) {
    return crypto.subtle.importKey("pkcs8", pkcs8, { name: "X25519" }, false, ["deriveKey", "deriveBits"]);
  },

  /**
   * Derive an AES-256-GCM key from an X25519 ECDH agreement. Used as the
   * key-encryption-key (KEK) when wrapping a private channel key per-member,
   * and as the direct DM key for 1:1 messaging.
   *
   * Note: AES-GCM key reuse is safe here as long as each encrypt call uses
   * a unique 96-bit IV. We generate fresh IVs for every wrap/message.
   */
  async deriveX25519AesKey(myPrivKey, theirPubKey) {
    return crypto.subtle.deriveKey(
      { name: "X25519", public: theirPubKey },
      myPrivKey,
      { name: "AES-GCM", length: 256 },
      true, ["encrypt", "decrypt"]
    );
  },

  async pbkdf2Wrap(passphrase, plaintext) {
    const salt = Crypto.rand(16);
    const baseKey = await crypto.subtle.importKey(
      "raw", new TextEncoder().encode(passphrase),
      "PBKDF2", false, ["deriveKey"]
    );
    const aesKey = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: 600000, hash: "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },
      false, ["encrypt"]
    );
    const iv = Crypto.rand(12);
    const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, aesKey, plaintext));
    return {
      kdf:  { name: "PBKDF2", hash: "SHA-256", iters: 600000, salt_b64: bytesToB64(salt) },
      wrap: { name: "AES-GCM", iv_b64: bytesToB64(iv), ct_b64: bytesToB64(ct) }
    };
  },

  async pbkdf2Unwrap(passphrase, blob) {
    const salt = b64ToBytes(blob.kdf.salt_b64);
    const iv   = b64ToBytes(blob.wrap.iv_b64);
    const ct   = b64ToBytes(blob.wrap.ct_b64);
    const baseKey = await crypto.subtle.importKey(
      "raw", new TextEncoder().encode(passphrase),
      "PBKDF2", false, ["deriveKey"]
    );
    const aesKey = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: blob.kdf.iters, hash: "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },
      false, ["decrypt"]
    );
    return new Uint8Array(await crypto.subtle.decrypt({ name: "AES-GCM", iv }, aesKey, ct));
  }
};

/* ------------------------------------------------------------
 *  §3b  Blob storage — OPFS + per-blob encryption
 *
 *  File attachments (spec §9.2) live in the Origin Private File
 *  System at paths of the form `<workspace_id>/<blob_id>`. Each
 *  blob gets a fresh AES-256-GCM key, generated client-side, and
 *  the raw file bytes are encrypted under that key with a random
 *  12-byte IV before being written to OPFS. Nothing in OPFS is
 *  ever in the clear.
 *
 *  The per-blob key travels alongside the `attachment.ref`
 *  envelope's inner payload, which is itself encrypted under the
 *  channel key. So:
 *    - Only channel members can decrypt the envelope → get the
 *      per-blob key + blob_id.
 *    - Only someone with the blob bytes (from OPFS or a future
 *      relay upload) can decrypt the actual file.
 *
 *  25MB hard cap per attachment (spec §14.1).
 *  500MB per-workspace quota with LRU eviction (Slice 5 — shipped).
 *  LRU is tracked in-memory per session; unknown-age blobs (post-
 *  reload) are treated as oldest so they evict first.
 * ------------------------------------------------------------ */
const MAX_ATTACHMENT_SIZE = 25 * 1024 * 1024;
const BLOB_QUOTA_BYTES    = 500 * 1024 * 1024; // 500 MB per workspace

const BlobStore = {
  _lru: new Map(), // Map<wsId, Map<blobId, lastAccessTs>>

  _lruFor(wsId) {
    if (!this._lru.has(wsId)) this._lru.set(wsId, new Map());
    return this._lru.get(wsId);
  },

  _touch(wsId, blobId) {
    this._lruFor(wsId).set(blobId, Date.now());
  },

  async _getWorkspaceDir(workspaceId) {
    const root = await navigator.storage.getDirectory();
    return root.getDirectoryHandle("mehfil_" + workspaceId, { create: true });
  },

  /** Total ciphertext bytes stored for this workspace in OPFS. */
  async usage(workspaceId) {
    const dir = await this._getWorkspaceDir(workspaceId);
    let total = 0;
    for await (const [, handle] of dir.entries()) {
      if (handle.kind !== "file") continue;
      const file = await handle.getFile();
      total += file.size;
    }
    return total;
  },

  /**
   * Evict least-recently-used blobs until usage is ≤80% of quota.
   * Blobs with no in-memory access record (i.e. accessed in a prior
   * session) get ts=0 so they are first in line.
   */
  async evictLRU(workspaceId) {
    const dir    = await this._getWorkspaceDir(workspaceId);
    const lru    = this._lruFor(workspaceId);
    const target = Math.floor(BLOB_QUOTA_BYTES * 0.8);

    // Snapshot all blobs with sizes and access timestamps.
    const entries = [];
    let used = 0;
    for await (const [name, handle] of dir.entries()) {
      if (handle.kind !== "file") continue;
      const file = await handle.getFile();
      entries.push({ name, size: file.size, ts: lru.get(name) ?? 0 });
      used += file.size;
    }

    if (used <= BLOB_QUOTA_BYTES) return; // nothing to do

    entries.sort((a, b) => a.ts - b.ts); // oldest first

    for (const entry of entries) {
      if (used <= target) break;
      try {
        await dir.removeEntry(entry.name);
        lru.delete(entry.name);
        used -= entry.size;
      } catch (e) {
        console.warn("[BlobStore] evict failed:", entry.name, e);
      }
    }
    console.info(`[BlobStore] eviction done — ws ${workspaceId} now ~${(used/1024/1024).toFixed(1)} MB`);
  },

  async _checkQuota(workspaceId) {
    const used = await this.usage(workspaceId);
    if (used > BLOB_QUOTA_BYTES) await this.evictLRU(workspaceId);
  },

  /**
   * Encrypt `plaintextBytes` with a fresh per-blob key, write the
   * ciphertext to OPFS, and return `{blob_id, key, iv}` for the
   * caller to stuff into an attachment.ref envelope.
   */
  async put(workspaceId, plaintextBytes) {
    if (plaintextBytes.length > MAX_ATTACHMENT_SIZE) {
      throw new Error(`Attachment too large (${(plaintextBytes.length/1024/1024).toFixed(1)}MB). Max is ${MAX_ATTACHMENT_SIZE/1024/1024}MB.`);
    }
    const aesKey = await Crypto.genAesKey();
    const rawKey = await Crypto.exportAesRaw(aesKey);
    const iv = Crypto.rand(12);
    const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, aesKey, plaintextBytes));
    const blobId = bytesToB64Url(Crypto.rand(16));

    const dir = await this._getWorkspaceDir(workspaceId);
    const handle = await dir.getFileHandle(blobId, { create: true });
    const writable = await handle.createWritable();
    await writable.write(ct);
    await writable.close();

    this._touch(workspaceId, blobId);
    this._checkQuota(workspaceId).catch(e => console.warn("[BlobStore] quota check:", e));

    return { blob_id: blobId, key: rawKey, iv, size: plaintextBytes.length };
  },

  /**
   * Read a blob from OPFS, decrypt with the per-blob key + IV.
   * Returns null if not stored locally.
   */
  async get(workspaceId, blobId, rawKey, iv) {
    const dir = await this._getWorkspaceDir(workspaceId);
    let handle;
    try {
      handle = await dir.getFileHandle(blobId, { create: false });
    } catch (e) {
      return null;
    }
    const file = await handle.getFile();
    const ct = new Uint8Array(await file.arrayBuffer());
    const aesKey = await Crypto.importAesRaw(rawKey);
    try {
      const pt = new Uint8Array(await crypto.subtle.decrypt({ name: "AES-GCM", iv }, aesKey, ct));
      this._touch(workspaceId, blobId);
      return pt;
    } catch (e) {
      console.warn("blob decrypt failed", blobId, e);
      return null;
    }
  },

  /** Does the local OPFS have the blob? */
  async has(workspaceId, blobId) {
    const dir = await this._getWorkspaceDir(workspaceId);
    try {
      await dir.getFileHandle(blobId, { create: false });
      return true;
    } catch {
      return false;
    }
  },

  /** Read raw ciphertext (no decrypt). Used by blob transfer sender. */
  async getCiphertext(workspaceId, blobId) {
    const dir = await this._getWorkspaceDir(workspaceId);
    let handle;
    try {
      handle = await dir.getFileHandle(blobId, { create: false });
    } catch {
      return null;
    }
    const file = await handle.getFile();
    this._touch(workspaceId, blobId);
    return new Uint8Array(await file.arrayBuffer());
  },

  /**
   * Write already-encrypted bytes to OPFS (blob transfer receiver).
   * Caller guarantees bytes are genuine ciphertext from a prior BlobStore.put.
   */
  async putCiphertext(workspaceId, blobId, ciphertextBytes) {
    const dir = await this._getWorkspaceDir(workspaceId);
    const handle = await dir.getFileHandle(blobId, { create: true });
    const writable = await handle.createWritable();
    await writable.write(ciphertextBytes);
    await writable.close();

    this._touch(workspaceId, blobId);
    this._checkQuota(workspaceId).catch(e => console.warn("[BlobStore] quota check:", e));
  }
};

/* ------------------------------------------------------------
 *  §4  Envelope build / verify
 *  See spec §4 and PROTOCOL.md §2.
 * ------------------------------------------------------------ */
const PROTOCOL_VERSION = 1;

/* The only presence values the protocol admits. Declared here (not beside the
 * presence code) because both the receive handler and the sidebar renderer
 * whitelist against it, and neither should be able to drift from the other.
 * Anything else on the wire is treated as "offline". */
const PRESENCE_STATUSES = ["online", "away", "offline"];

/* Promote-by-consensus (§33): how many distinct member signatures a promote
 * needs. Shared by the drafting side and the verifying side so they can't
 * drift apart. Replay resistance comes from burning the promote nonce, not
 * from an expiry window — see the member.promote handler for why. */
const PROMOTE_THRESHOLD = 2;

/* The only roles the projection admits. A member.welcome snapshot is
 * peer-supplied, so its `role` fields are clamped to this set (C2). */
const MEMBER_ROLES = ["owner", "admin", "member"];
const isAdminRole = (role) => role === "owner" || role === "admin";

/* Admission grants (2026-07-24). `member.join` used to be self-asserted — any
 * root-key holder could inject one and become a member. Now a joiner's
 * member.join must carry a grant signed by a CURRENT member (the inviter),
 * binding the joiner's identity key. The inviter issues it once it learns the
 * joiner's key from the reply (in PeerMgr.attach), delivers it over the data
 * channel as a `join.grant` envelope, and the joiner attaches it to
 * member.join for every peer to verify. Closes non-member / removed-member /
 * invite-interceptor joins. See plan/history.md. */
const ADMISSION_GRANT_TTL_MS = 60 * 60 * 1000;   // grants are short-lived
const ADMISSION_CLOCK_SKEW_MS = 5 * 60 * 1000;
function admissionGrantBytes(joiner, ws, nonce, ts, issuer) {
  return MP.encode({ t: "admission", joiner, ws, nonce, ts, issuer });
}
async function createAdmissionGrant(joinerUserId, ws) {
  const nonce = bytesToB64(Crypto.rand(16));
  const ts = Date.now();
  const issuer = bytesToB64Url(State.identity.pubkey);
  const sig = await Crypto.sign(
    await Crypto.importSignKey(State.identity.privkey_pkcs8),
    admissionGrantBytes(joinerUserId, ws, nonce, ts, issuer));
  return { joiner: joinerUserId, ws, nonce, ts, issuer, sig };
}
async function verifyAdmissionGrant(grant, joinerUserId, ws, members) {
  if (!grant || typeof grant.issuer !== "string" || typeof grant.joiner !== "string"
      || typeof grant.nonce !== "string" || typeof grant.ts !== "number"
      || !(grant.sig instanceof Uint8Array)) return false;
  if (canonUserId(grant.joiner) !== canonUserId(joinerUserId)) return false;   // binds THIS joiner
  if (grant.ws !== ws) return false;
  const age = Date.now() - grant.ts;
  if (age > ADMISSION_GRANT_TTL_MS || age < -ADMISSION_CLOCK_SKEW_MS) return false;
  // The issuer must be a current member — a non-member can't admit anyone.
  if (!members.some(m => canonUserId(m.id) === canonUserId(grant.issuer))) return false;
  try {
    const vk = await Crypto.importVerifyKey(b64UrlToBytes(grant.issuer));
    return await Crypto.verify(vk, grant.sig,
      admissionGrantBytes(grant.joiner, grant.ws, grant.nonce, grant.ts, grant.issuer));
  } catch { return false; }
}

/* Grace on the invite expiry check (C6/M8), so a joiner with a fast clock
 * doesn't reject a still-valid invite and blame the inviter. */
const INVITE_CLOCK_GRACE_MS = 5 * 60 * 1000;

const Envelope = {
  /**
   * Build a fully-formed envelope: encrypt the inner payload under the
   * channel key, sign the canonical bytes, pad to next 1KB boundary.
   *
   * @returns the envelope object (with `sig`, `ct`, `n`, `pad` populated).
   */
  async build({ workspaceId, channelId, channelKey, signKey, signerPubkey, deviceId, type, inner, vectorClock, deviceSigner }) {
    // Per-device signing: the envelope is signed by this install's DEVICE key,
    // and carries a cert (device_cert) that the identity key issued for that
    // device. `from` stays the identity pubkey (the user_id), so member ids and
    // vector clocks are unchanged — only the signer and the added cert are new.
    // Callers still pass the identity `signKey`; it is no longer used to sign
    // envelopes (it signs the cert once, at device creation). deviceSigner is an
    // override for tests / pairing; normally it's the current identity's.
    const ds = deviceSigner || await Identity.deviceSigner(State.identity);
    const ts = Date.now();
    const nonce = Crypto.rand(12);
    const innerBytes = MP.encode(inner);
    const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv: nonce }, channelKey, innerBytes));

    // message_id = first 16 bytes of SHA-256(sender ‖ ts_be64 ‖ nonce)
    const tsBe = u64BE(ts);
    const idIn = new Uint8Array(signerPubkey.length + 8 + nonce.length);
    idIn.set(signerPubkey, 0);
    idIn.set(tsBe, signerPubkey.length);
    idIn.set(nonce, signerPubkey.length + 8);
    const idHash = await Crypto.sha256(idIn);
    const id = bytesToB64Url(idHash.slice(0, 16));

    // Initial envelope without sig and pad. We compute the unpadded length,
    // then size pad so the final encoded length lands on the boundary.
    const userIdB64 = bytesToB64Url(signerPubkey);
    const env = {
      v:    PROTOCOL_VERSION,
      id,
      ws:   workspaceId,
      ch:   channelId,
      from: userIdB64,
      dev:  ds.deviceId,                 // this install's certified device_id
      cert: ds.cert,                     // identity's attestation of the device
      ts,
      lc:   vectorClock,                 // [[user_id, counter], ...]
      type,
      ct,
      n:    nonce,
      pad:  new Uint8Array(0),
      cosigs: null
      // sig added below
    };

    // Sign with empty pad first to get a valid sig over a stable shape,
    // then re-pad. Padding doesn't break verification because the verifier
    // strips sig+cosigs and re-encodes — pad is just bytes covered by sig.
    //
    // We do it in two passes:
    //   1) sign with pad = empty
    //   2) compute pad to round to next 1KB
    //   3) re-sign over the new canonical bytes (now including pad)
    //
    // Step 3 is mandatory because pad is part of the signed payload.
    let signedBytes = MP.encode(stripSig(env));
    let sig = await Crypto.sign(ds.signKey, signedBytes);   // device key, not identity
    env.sig = sig;

    // Pad to target length. Math (derivation in PROTOCOL.md §3):
    //
    //   empty-pad encoding contributes bin8(0) = 2 bytes (0xc4 0x00)
    //   populated-pad(P) contributes:
    //     P ≤ 255      : bin8  header(2) + P     = P+2 bytes
    //     P ≤ 65535    : bin16 header(3) + P     = P+3 bytes
    //     otherwise    : bin32 header(5) + P     = P+5 bytes
    //
    //   So if L is the length with empty pad and T is the target, we need
    //   T - L = delta bytes added. The replacement grows by:
    //     delta = P   + 0    when P ≤ 255       →  P = delta
    //     delta = P   + 1    when 255 < P ≤ 65535 →  P = delta - 1
    //     delta = P   + 3    when P > 65535       →  P = delta - 3
    //
    //   This is a closed-form calculation, no iteration needed.
    const L0 = MP.encode(env).length;
    let target = padTarget(L0);
    // H5: the pad-length prefix grows in steps — bin8 (≤255) then bin16 adds a
    // header byte — so some deltas are unrepresentable. delta=256 is the gap:
    // there is no padLen that grows the encoding by exactly 256 (bin8 tops out
    // at +255, bin16 starts at +257). Given padTarget's 1KB/16KB rounding it's
    // the only reachable gap, and it hit ~1/1024 of message sizes, firing the
    // assertion below and aborting the send. Nudge target past any gap so delta
    // is always representable; being 1 byte off the round boundary doesn't hurt
    // the length obfuscation.
    const padRepresentable = (d) =>
      d === 0 || (d >= 1 && d <= 255) || (d >= 257 && d <= 65536) || (d >= 65539);
    while (target > L0 && !padRepresentable(target - L0)) target += 1;
    if (target > L0) {
      const delta = target - L0;
      let padLen;
      if (delta <= 255)                 padLen = delta;         // bin8, same header
      else if (delta <= 65536)          padLen = delta - 1;     // bin16, header +1
      else                              padLen = delta - 3;     // bin32, header +3
      env.pad = new Uint8Array(padLen);
      // Re-sign over the canonical bytes including the populated pad.
      signedBytes = MP.encode(stripSig(env));
      env.sig = await Crypto.sign(ds.signKey, signedBytes);   // device key, not identity
      // Assertion: MP.encode(env).length === target.
      // If this ever fires the math above is wrong — fail loud rather than
      // silently ship mis-aligned envelopes.
      const actual = MP.encode(env).length;
      if (actual !== target) {
        throw new Error(`envelope pad math wrong: got ${actual}, want ${target} (delta=${delta}, padLen=${padLen})`);
      }
    }
    return env;
  },

  /**
   * Verify the signature of an envelope. Returns true on success.
   * Does NOT decrypt — call decrypt() separately.
   */
  async verify(env) {
    try {
      // M11: gate the protocol version. An envelope from an incompatible
      // version isn't something this build can reason about — reject rather
      // than attempt to verify a shape we don't define.
      if (env.v !== PROTOCOL_VERSION) return false;

      // M11: the id is SHA-256(from ‖ ts_be64 ‖ nonce)[:16] and is used for
      // dedup/SeenSet. It isn't covered by the signature, so recompute it and
      // reject a mismatch — otherwise a peer could pick an id to collide with
      // (and suppress) a different envelope in the SeenSet.
      if (typeof env.from !== "string" || typeof env.ts !== "number" || !(env.n instanceof Uint8Array)) return false;
      const fromB = b64UrlToBytes(env.from);
      const idIn = new Uint8Array(fromB.length + 8 + env.n.length);
      idIn.set(fromB, 0);
      idIn.set(u64BE(env.ts), fromB.length);
      idIn.set(env.n, fromB.length + 8);
      if (env.id !== bytesToB64Url((await Crypto.sha256(idIn)).slice(0, 16))) return false;

      const signedBytes = MP.encode(stripSig(env));

      // Per-device chain of trust:
      //   1. the identity key (env.from) certifies a device key (env.cert),
      //   2. that device key signed this envelope (env.sig),
      //   3. the cert is for the device that claims to have sent it (env.dev).
      // Whether that device is still *allowed* to act (revocation) is an authz
      // question the dispatch layer answers against the member's active-device
      // list — verify only proves the envelope is internally self-consistent.
      const cert = env.cert;
      if (!cert || !(cert.sig instanceof Uint8Array) || !(cert.device_pub instanceof Uint8Array)) return false;
      if (cert.device_id !== env.dev) return false;

      const identityKey = await Crypto.importVerifyKey(b64UrlToBytes(env.from));
      const certBytes = Crypto.deviceCertBytes(env.from, cert.device_id, cert.device_pub, cert.ts);
      if (!(await Crypto.verify(identityKey, cert.sig, certBytes))) return false;

      const deviceKey = await Crypto.importVerifyKey(cert.device_pub);
      if (!(await Crypto.verify(deviceKey, env.sig, signedBytes))) return false;

      // Cosigs (promote-by-consensus) are signed by each cosigner's IDENTITY
      // key over the same envelope bytes — a separate mechanism from the
      // per-device envelope sig, left as-is.
      if (env.cosigs) {
        for (const cs of env.cosigs) {
          const k = await Crypto.importVerifyKey(b64UrlToBytes(cs.from));
          if (!(await Crypto.verify(k, cs.sig, signedBytes))) return false;
        }
      }
      return true;
    } catch (_) {
      return false;
    }
  },

  /**
   * Decrypt the inner payload using the supplied channel key.
   */
  async decrypt(env, channelKey) {
    const innerBytes = await Crypto.aesDecrypt(channelKey, env.n, env.ct);
    return MP.decode(innerBytes);
  }
};

function stripSig(env) {
  const { sig, cosigs, ...rest } = env;
  // cosigs is intentionally excluded; the canonical signed object includes
  // every field except sig and cosigs (per spec §4.2).
  return rest;
}

function padTarget(currentLen) {
  // ≤16KB: round up to next 1KB. >16KB: round up to next 16KB.
  if (currentLen <= 16384) {
    return Math.ceil(currentLen / 1024) * 1024;
  }
  return Math.ceil(currentLen / 16384) * 16384;
}

/* ------------------------------------------------------------
 *  §5  IndexedDB helper + schemas
 * ------------------------------------------------------------ */
function openDB(name, version, upgrade) {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(name, version);
    req.onupgradeneeded = (e) => upgrade(req.result, e.oldVersion);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

function txStore(db, store, mode = "readonly") {
  return db.transaction(store, mode).objectStore(store);
}

function reqAsPromise(req) {
  return new Promise((resolve, reject) => {
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

async function idbPut(db, store, value, key) {
  const s = txStore(db, store, "readwrite");
  await reqAsPromise(key === undefined ? s.put(value) : s.put(value, key));
}
async function idbGet(db, store, key) {
  return reqAsPromise(txStore(db, store).get(key));
}
async function idbGetAll(db, store) {
  return reqAsPromise(txStore(db, store).getAll());
}
async function idbDelete(db, store, key) {
  await reqAsPromise(txStore(db, store, "readwrite").delete(key));
}
// Return [{key, value}] pairs from a store that uses out-of-line keys.
// Used by exportWorkspace to preserve the keys-store key names.
async function idbGetAllEntries(db, store) {
  // S13: read keys and values within ONE transaction so they come from the
  // same consistent snapshot. Two separate transactions could observe the
  // store at different states and mis-zip keys[i] to values[i].
  const s = txStore(db, store);
  const [keys, values] = await Promise.all([
    reqAsPromise(s.getAllKeys()),
    reqAsPromise(s.getAll()),
  ]);
  return keys.map((k, i) => ({ key: k, value: values[i] }));
}

// Dev-only multi-tab namespacing. When the URL carries `?as=<label>`, all
// IndexedDB databases (global + per-workspace) get prefixed so multiple tabs
// in the same browser can hold distinct identities at the same origin. This
// only exists so WT-04/05/07/08 can be driven end-to-end by a single test
// harness. Production paths (no query string) are unaffected.
const DB_PREFIX = (() => {
  const m = location.search.match(/[?&]as=([\w-]+)/);
  return m ? `as${m[1]}_` : "";
})();

const GLOBAL_DB = DB_PREFIX + "mehfil_global";
const GLOBAL_VERSION = 1;

async function openGlobalDB() {
  return openDB(GLOBAL_DB, GLOBAL_VERSION, (db) => {
    if (!db.objectStoreNames.contains("identity"))   db.createObjectStore("identity");
    if (!db.objectStoreNames.contains("workspaces")) db.createObjectStore("workspaces", { keyPath: "id" });
    if (!db.objectStoreNames.contains("settings"))   db.createObjectStore("settings");
  });
}

async function openWorkspaceDB(workspaceId) {
  return openDB(DB_PREFIX + "mehfil_" + workspaceId, 4, (db) => {
    if (!db.objectStoreNames.contains("envelopes")) {
      const env = db.createObjectStore("envelopes", { keyPath: "id" });
      env.createIndex("ch", "ch");
      env.createIndex("ts", "ts");
      env.createIndex("from", "from");
      env.createIndex("type", "type");
    }
    if (!db.objectStoreNames.contains("messages"))           db.createObjectStore("messages", { keyPath: "id" });
    if (!db.objectStoreNames.contains("channels"))           db.createObjectStore("channels", { keyPath: "id" });
    if (!db.objectStoreNames.contains("members"))            db.createObjectStore("members",  { keyPath: "id" });
    if (!db.objectStoreNames.contains("cursors"))            db.createObjectStore("cursors");
    if (!db.objectStoreNames.contains("keys"))               db.createObjectStore("keys");
    if (!db.objectStoreNames.contains("seen_set"))           db.createObjectStore("seen_set");
    if (!db.objectStoreNames.contains("quarantine"))         db.createObjectStore("quarantine");
    if (!db.objectStoreNames.contains("drafts"))             db.createObjectStore("drafts");
    if (!db.objectStoreNames.contains("pending_promotions")) db.createObjectStore("pending_promotions");
    if (!db.objectStoreNames.contains("search_index"))       db.createObjectStore("search_index");
    if (!db.objectStoreNames.contains("read_markers"))       db.createObjectStore("read_markers");
    if (!db.objectStoreNames.contains("bookmarks"))          db.createObjectStore("bookmarks");
    if (!db.objectStoreNames.contains("reminders"))          db.createObjectStore("reminders");
    if (!db.objectStoreNames.contains("scheduled_sends"))    db.createObjectStore("scheduled_sends");
  });
}

/* ------------------------------------------------------------
 *  §6  Identity store
 * ------------------------------------------------------------ */
const Identity = {
  async load(globalDB) {
    const rec = await idbGet(globalDB, "identity", "self");
    if (!rec) return null;
    return rec;
  },
  async save(globalDB, rec) {
    await idbPut(globalDB, "identity", rec, "self");
  },
  async ensure(globalDB) {
    let rec = await Identity.load(globalDB);
    if (rec) {
      // Slice 3b migration: attach an X25519 keypair if the record was
      // created before X25519 was part of identity (Slice 0/1/2/3a). The
      // Ed25519 identity root stays the same — X25519 is a subordinate
      // encryption key, not an identity replacement. Losing past DMs /
      // private channels on migration is acceptable because 3b adds them
      // for the first time, and any existing data is a dev-only test.
      let dirty = false;
      if (!rec.x25519_pub || !rec.x25519_priv_pkcs8) {
        const x = await Crypto.genX25519();
        rec.x25519_pub = x.x25519_pub;
        rec.x25519_priv_pkcs8 = x.x25519_priv_pkcs8;
        dirty = true;
      }
      // Device-cert migration: a record from before per-device keys has no
      // device keypair. Mint one now, certified by the identity key. This is
      // this browser install's device; it stays stable across workspaces.
      if (!rec.device_privkey_pkcs8 || !rec.device_cert) {
        const d = await Crypto.genDeviceCert(rec.pubkey, rec.privkey_pkcs8);
        Object.assign(rec, d);
        dirty = true;
      }
      if (dirty) await Identity.save(globalDB, rec);
      return rec;
    }
    const kp = await Crypto.genIdentity();
    const x  = await Crypto.genX25519();
    const d  = await Crypto.genDeviceCert(kp.pubkey, kp.privkey_pkcs8);
    rec = {
      pubkey: kp.pubkey,
      privkey_pkcs8: kp.privkey_pkcs8,
      x25519_pub: x.x25519_pub,
      x25519_priv_pkcs8: x.x25519_priv_pkcs8,
      // This install's device identity: its own keypair, certified by the
      // identity key. Envelopes are signed by the device key; the cert lets a
      // verifier confirm the device speaks for this identity.
      device_id: d.device_id,
      device_pub: d.device_pub,
      device_privkey_pkcs8: d.device_privkey_pkcs8,
      device_cert: d.device_cert,
      created_at: Date.now(),
      backed_up: false,
      backup_dismissed_at: null
    };
    await Identity.save(globalDB, rec);
    return rec;
  },

  // The device signer for the current identity: the device sign key + the
  // cert to embed on every envelope. Cached on the record so we don't re-import
  // the key on every send.
  async deviceSigner(rec) {
    if (!rec._deviceSignKey) {
      rec._deviceSignKey = await Crypto.importSignKey(rec.device_privkey_pkcs8);
    }
    return { signKey: rec._deviceSignKey, cert: rec.device_cert, deviceId: rec.device_id };
  },
  async markBackedUp(globalDB) {
    const rec = await Identity.load(globalDB);
    rec.backed_up = true;
    await Identity.save(globalDB, rec);
    return rec;
  },
  async dismissBackup(globalDB) {
    const rec = await Identity.load(globalDB);
    rec.backup_dismissed_at = Date.now();
    await Identity.save(globalDB, rec);
    return rec;
  }
};

/* ------------------------------------------------------------
 *  §7  Workspace lifecycle
 * ------------------------------------------------------------ */
const Workspace = {
  async create(globalDB, name, identity) {
    if (!name || !name.trim()) throw new Error("Workspace name required");
    const wsId = bytesToB64Url(Crypto.rand(16));
    const chId = bytesToB64Url(Crypto.rand(16));
    // This install's certified device id — stable across workspaces, so
    // env.dev matches the member's active-device list for revocation.
    const deviceId = State.identity.device_id;

    const wsDB = await openWorkspaceDB(wsId);

    // Workspace root key + general channel key. v1 stores the root key in
    // the local `keys` store; v1.1 wraps it per-member when there's >1.
    const rootKey = await Crypto.genAesKey();
    const rootRaw = await Crypto.exportAesRaw(rootKey);
    await idbPut(wsDB, "keys", rootRaw, "root");

    const generalKey = await Crypto.genAesKey();
    const generalRaw = await Crypto.exportAesRaw(generalKey);
    await idbPut(wsDB, "keys", generalRaw, "ch:" + chId);

    // Project the default channel and the creator-as-member.
    const userId = bytesToB64Url(identity.pubkey);
    const channel = {
      id: chId,
      name: "general",
      topic: "",
      private: false,
      members: [userId],
      created_at: Date.now()
    };
    await idbPut(wsDB, "channels", channel);

    const member = {
      id: userId,
      name: "You",
      color: avatarColorFor(userId),
      role: "owner",
      devices: [deviceId],
      joined_at: Date.now(),
      x25519_pub: identity.x25519_pub   // published to peers so they can
                                        // ECDH with us for private channels
                                        // and 1:1 DMs
    };
    await idbPut(wsDB, "members", member);

    // Workspace metadata stored in the keys store under "workspace_meta"
    // (we'll move this into a Yjs doc in Slice 3 — see PROTOCOL.md §7).
    await idbPut(wsDB, "keys", {
      id: wsId,
      name: name.trim(),
      created_at: Date.now(),
      member_count: 1,
      device_id: deviceId,
      general_channel_id: chId
    }, "workspace_meta");

    // Register the workspace in the global db.
    await idbPut(globalDB, "workspaces", {
      id: wsId,
      name: name.trim(),
      created_at: Date.now(),
      last_opened_at: Date.now()
    });

    wsDB.close();
    return wsId;
  },

  async open(workspaceId) {
    const wsDB = await openWorkspaceDB(workspaceId);
    const meta     = await idbGet(wsDB, "keys", "workspace_meta");
    const rootRaw  = await idbGet(wsDB, "keys", "root");
    const rootKey  = await Crypto.importAesRaw(rootRaw);
    const channels = await idbGetAll(wsDB, "channels");
    const members  = await idbGetAll(wsDB, "members");
    const envelopes= await idbGetAll(wsDB, "envelopes");

    // Pre-compute fingerprints so the render path can read them synchronously
    // without triggering async SHA-256 + re-render. Attaches `fp` (formatted
    // hex, 8 groups of 4) and `fpBytes` (16-byte buffer) to each member record
    // in memory only — not persisted, since the pubkey in `id` is authoritative.
    for (const m of members) await attachFingerprint(m);

    // Load channel keys.
    const channelKeys = {};
    for (const ch of channels) {
      const raw = await idbGet(wsDB, "keys", "ch:" + ch.id);
      if (raw) channelKeys[ch.id] = await Crypto.importAesRaw(raw);
    }

    // Load per-sender group DM keys (sender-keys pattern).
    // Stored as "sk:<channelId>:<senderId>" in the keys store.
    await new Promise((res, rej) => {
      const tx = wsDB.transaction("keys", "readonly");
      const req = tx.objectStore("keys").getAllKeys();
      req.onsuccess = async () => {
        for (const k of (req.result || [])) {
          if (!String(k).startsWith("sk:")) continue;
          const parts = String(k).split(":");
          if (parts.length < 3) continue;
          const channelId = parts[1];
          const senderId  = parts.slice(2).join(":");
          const raw = await idbGet(wsDB, "keys", k);
          if (raw) channelKeys[channelId + ":" + senderId] = await Crypto.importAesRaw(raw);
        }
        res();
      };
      req.onerror = rej;
    });

    // Replay envelopes to (re)build the message projection. Source of truth
    // is `envelopes`; `messages` is rebuilt on every open. Event sourcing.
    //
    // Envelopes arrive in the store in insertion order, which after gossip
    // backfill is NOT chronological. We sort by `ts` before replay so that
    // edits and deletes always land after the message.create they target.
    // Vector-clock-aware replay ordering comes in Slice 4.
    envelopes.sort((a, b) => a.ts - b.ts);

    const messages = [];
    const msgById = new Map();  // fast lookup during replay for edit/delete
    for (const env of envelopes) {
      const ok = await Envelope.verify(env);
      if (!ok) {
        console.warn("Quarantine: bad signature on", env.id);
        continue;
      }
      // Channel envelopes use the matching channel key; workspace-level
      // envelopes (ch === null — member.join / welcome / channel.create /
      // workspace.patch) use the workspace root key. DM envelopes may
      // reference a channel id we haven't materialized yet — derive it
      // from the sorted (me, other) pair if the ch id matches any known
      // member's DM with us.
      // For group DM envelopes, try the per-sender key first (sender-keys
      // pattern). Fall back to the shared channel key for older group DMs
      // that predate sender-keys, and for non-group-DM channels.
      let key = env.ch
        ? (channelKeys[env.ch + ":" + env.from] || channelKeys[env.ch])
        : rootKey;
      if (env.ch && !key) {
        // Try DM resolution against the members list loaded so far.
        const myUserId = bytesToB64Url(State.identity.pubkey);
        for (const m of members) {
          if (m.id === myUserId || !m.x25519_pub) continue;
          const maybeId = await dmChannelId(myUserId, m.id);
          if (maybeId === env.ch) {
            // Materialize the DM channel using the same logic as ensureDmChannel
            // but writing directly to the local variables (we're not in State).
            const myPriv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
            const theirPub = await Crypto.importX25519Pub(m.x25519_pub);
            const aesKey = await Crypto.deriveX25519AesKey(myPriv, theirPub);
            const rawKey = await Crypto.exportAesRaw(aesKey);
            await idbPut(wsDB, "keys", rawKey, "ch:" + env.ch);
            channelKeys[env.ch] = aesKey;
            const dmCh = {
              id: env.ch, name: m.name, topic: "",
              private: true, dm: true, dm_with: m.id,
              members: [myUserId, m.id], created_at: env.ts
            };
            channels.push(dmCh);
            await idbPut(wsDB, "channels", dmCh);
            key = aesKey;
            break;
          }
        }
      }
      if (!key) continue;
      try {
        const inner = await Envelope.decrypt(env, key);
        switch (env.type) {
          case "message.create": {
            // Security: re-parse mentions at replay time (same reason as
            // live dispatch — don't trust sender-asserted mentions). Groups
            // come from the persisted Yjs doc if available, otherwise an
            // empty list — the Yjs doc is loaded after the replay loop, so
            // replay-time mentions of a group will resolve on the next
            // workspace open once the doc has groups populated.
            const replayMentions = parseMentions(inner.body || "", members, []);
            const msg = {
              id: env.id, ch: env.ch, from: env.from, ts: env.ts,
              body: inner.body,
              mentions: replayMentions.length > 0 ? replayMentions : undefined,
              thread: inner.thread || undefined,
              poll: inner.poll || undefined,
              votes: inner.poll ? {} : undefined,
              checklist: inner.checklist ? JSON.parse(JSON.stringify(inner.checklist)) : undefined,
              delivery: "stored",
              edited: false, deleted: false, lc: env.lc
            };
            messages.push(msg);
            msgById.set(env.id, msg);
            break;
          }
          case "checklist.toggle": {
            const tgt = msgById.get(inner.target);
            if (!tgt || !tgt.checklist) break;
            const idx = inner.itemIdx;
            if (typeof idx === "number" && tgt.checklist.items[idx]) {
              tgt.checklist.items[idx].done = !!inner.done;
            }
            break;
          }
          case "poll.vote": {
            const target = msgById.get(inner.target);
            if (!target || !target.poll) break;
            if (!target.votes) target.votes = {};
            if (typeof inner.optionIdx === "number" && inner.optionIdx >= 0 && inner.optionIdx < target.poll.options.length) {
              target.votes[env.from] = inner.optionIdx;
            } else if (inner.optionIdx === null || inner.optionIdx === -1) {
              delete target.votes[env.from];
            }
            break;
          }
          case "attachment.ref": {
            const myUserId = bytesToB64Url(State.identity.pubkey);
            const mySelf = env.from === myUserId;
            // During replay we don't await BlobStore.has per message
            // because OPFS lookups serialize and a workspace with 100
            // attachments would stall on open. Instead we mark sender-
            // owned as available: true and recipient-side as `null`
            // (unknown — the render path can ask BlobStore lazily).
            const msg = {
              id: env.id, ch: env.ch, from: env.from, ts: env.ts,
              body: "",
              attachment: {
                blob_id: inner.blob_id,
                key: inner.key,
                iv: inner.iv,
                size: inner.size,
                mime: inner.mime,
                name: inner.name,
                available: mySelf ? true : null
              },
              delivery: "stored",
              edited: false, deleted: false, lc: env.lc
            };
            messages.push(msg);
            msgById.set(env.id, msg);
            break;
          }
          case "message.edit": {
            const target = msgById.get(inner.target);
            if (target && env.from === target.from && !target.deleted) {
              target.body = inner.body;
              target.edited = true;
              target.edited_at = env.ts;
            }
            break;
          }
          case "message.delete": {
            const target = msgById.get(inner.target);
            if (target && env.from === target.from) {
              target.deleted = true;
              target.deleted_at = env.ts;
              target.body = "";
            }
            break;
          }
          case "reaction.add": {
            const target = msgById.get(inner.target);
            if (!target) break;
            if (!target.reactions) target.reactions = {};
            if (!target.reactions[inner.emoji]) target.reactions[inner.emoji] = [];
            if (!target.reactions[inner.emoji].includes(env.from)) {
              target.reactions[inner.emoji].push(env.from);
            }
            break;
          }
          case "reaction.remove": {
            const target = msgById.get(inner.target);
            if (!target || !target.reactions || !target.reactions[inner.emoji]) break;
            target.reactions[inner.emoji] = target.reactions[inner.emoji].filter(uid => uid !== env.from);
            if (target.reactions[inner.emoji].length === 0) delete target.reactions[inner.emoji];
            if (Object.keys(target.reactions).length === 0) delete target.reactions;
            break;
          }
          case "channel.create": {
            // Only applied during replay if the channel isn't already in
            // the projected `channels` list (which it normally is, since
            // we persist channels eagerly). This handles the edge case of
            // a replay from a corrupted state where the channel record
            // was lost but the envelope is still in the log.
            //
            // Private channels during replay go through the same unwrap
            // path as the live dispatch — we look up our own wrapped entry
            // and ECDH with the wrapper's X25519 pubkey.
            if (channels.find(c => c.id === inner.id)) break;
            let rawKey;
            if (inner.private) {
              const myUserId = bytesToB64Url(State.identity.pubkey);
              const wrapped = inner.wrapped_keys && inner.wrapped_keys[myUserId];
              if (!wrapped) break;   // not a member, envelope invisible
              const wrapper = members.find(m => m.id === inner.wrapper);
              if (!wrapper || !wrapper.x25519_pub) break;
              try {
                const myPriv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
                const theirPub = await Crypto.importX25519Pub(wrapper.x25519_pub);
                const kek = await Crypto.deriveX25519AesKey(myPriv, theirPub);
                rawKey = new Uint8Array(await crypto.subtle.decrypt(
                  { name: "AES-GCM", iv: wrapped.iv }, kek, wrapped.ct
                ));
              } catch (e) {
                console.warn("replay: private channel unwrap failed", e);
                break;
              }
            } else {
              rawKey = inner.key;
            }
            // Slice F1-B / security: strip announce flag at replay time
            // if the channel creator isn't currently an admin/owner.
            let announceReplay = !!inner.announce;
            if (announceReplay) {
              const rcSender = members.find(m => m.id === env.from);
              if (!(rcSender?.role === "owner" || rcSender?.role === "admin")) {
                announceReplay = false;
              }
            }
            const chRec = {
              id: inner.id,
              name: sanitizeChannelName(inner.name, !!inner.dm),   // H6
              topic: inner.topic || "",
              private: !!inner.private, dm: !!inner.dm, dm_with: null,
              announce: announceReplay,
              canvas: !!inner.canvas && !inner.private,
              members: inner.members || [],
              created_at: env.ts
            };
            channels.push(chRec);
            await idbPut(wsDB, "channels", chRec);
            await idbPut(wsDB, "keys", rawKey, "ch:" + inner.id);
            channelKeys[inner.id] = await Crypto.importAesRaw(rawKey);
            break;
          }
          case "member.profile_update": {
            const pm = members.find(m => m.id === env.from);
            if (!pm) break;
            if (inner.timezone !== undefined) pm.timezone = inner.timezone || null;
            if (inner.pronouns !== undefined) pm.pronouns = inner.pronouns || null;
            if (inner.title    !== undefined) pm.title    = inner.title    || null;
            await idbPut(wsDB, "members", pm);
            break;
          }
          case "group_dm.sender_key": {
            // Store the per-sender key so future messages in this group DM
            // can be decrypted with the right key.
            const { group_id, sender_id, wrapped_keys } = inner;
            // M10: a sender may only publish its OWN sender key. The live
            // dispatch path enforces env.from === sender_id; the replay path
            // did not, so on reload a forged sender_key (claiming to be another
            // member's) would be projected. Mirror the check here.
            if (env.from !== sender_id) break;
            const myUserId2 = bytesToB64Url(State.identity.pubkey);
            const myEntry = wrapped_keys && wrapped_keys[myUserId2];
            if (!myEntry) break;
            const sender = members.find(m => m.id === sender_id);
            if (!sender || !sender.x25519_pub) break;
            try {
              const myPriv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
              const theirPub = await Crypto.importX25519Pub(sender.x25519_pub);
              const kek = await Crypto.deriveX25519AesKey(myPriv, theirPub);
              const rawKey = new Uint8Array(await crypto.subtle.decrypt(
                { name: "AES-GCM", iv: myEntry.iv }, kek, myEntry.ct
              ));
              await idbPut(wsDB, "keys", rawKey, "sk:" + group_id + ":" + sender_id);
              channelKeys[group_id + ":" + sender_id] = await Crypto.importAesRaw(rawKey);
            } catch (e) {
              console.warn("replay: group_dm.sender_key unwrap failed", e);
            }
            break;
          }
          // member.join / welcome are no-ops during replay: the `members`
          // store is already the source of truth for the member projection.
        }
      } catch (e) {
        console.warn("Decrypt failed for", env.id, e);
      }
    }

    // presence is ephemeral (§30) — always starts empty on workspace open.
    // The PresenceDriver will populate it with our own entry on first
    // heartbeat, and peers' entries as their envelopes arrive.
    const presence = {};

    // Hydrate the seen-set from the persisted IDB store. This is what
    // makes gossip dedupe survive page reloads — without hydration, a
    // restart of any peer in the mesh would re-broadcast the entire
    // history once it received it. Slice 4a §20a.
    await SeenSet.hydrate(wsDB);

    // Slice 4b.2: load or migrate the Yjs workspace doc. If a
    // persisted doc exists (written by a previous open or by a
    // previous save), use it. Otherwise run the one-time migration
    // from the legacy kv-projected state: builds an initial doc
    // from the current channels/members projections and the kv
    // `workspace_meta` record. After migration, `workspace_yjs`
    // becomes the authoritative source for metadata, though the
    // kv records stay in place for backward compat during 4b.2.
    let doc = await WorkspaceDoc.load(wsDB);
    if (!doc) {
      doc = await WorkspaceDoc.migrateFromLegacy(wsDB, meta, channels, members);
    }

    // Slice 4b.1: vector clock causal delivery state. `hwm` is the
    // per-sender-per-device high-water-mark — the highest `counter`
    // we've seen in any envelope's `lc` entry for that (user, device)
    // pair. `causalBuffer` holds envelopes waiting for their lc
    // dependencies to arrive. Both are derived from replay and not
    // persisted separately.
    const hwm = new Map();         // Map<user_id, Map<device_id, counter>>
    for (const env of envelopes) {
      // Only advance hwm for envelopes that passed signature +
      // decryption during replay. We track per (sender, device) pair
      // and the counter is the highest seen from that pair.
      if (!env.lc) continue;
      for (const entry of env.lc) {
        if (!Array.isArray(entry) || entry.length !== 2) continue;
        const [senderId, counter] = entry;
        if (typeof counter !== "number") continue;
        // Use env.dev as the device id since lc entries in v1 carry
        // only [user_id, counter] — per-device counters are projected
        // from `env.dev` on the outer envelope.
        const deviceId = env.from === senderId ? env.dev : "unknown";
        let inner = hwm.get(senderId);
        if (!inner) { inner = new Map(); hwm.set(senderId, inner); }
        const cur = inner.get(deviceId) || 0;
        if (counter > cur) inner.set(deviceId, counter);
      }
    }
    const causalBuffer = [];

    // Slice 4c: gaps map. For each (sender, device) pair, tracks
    // the highest counter we know exists (peeked from lc entries
    // in envelopes from other senders) but haven't yet received
    // ourselves. The gap UI uses this to surface "missing N
    // messages from Alice" banners.
    const gaps = new Map();   // Map<user_id, Map<device_id, max_known_counter>>

    // Load relay configs stored in meta (Slice 5 / WT-21).
    const relays = meta.relays || [];
    // §37: Load bridge configs (Slice 8).
    const bridges = meta.bridges || [];

    // Slice U1: per-channel read markers. A marker is `{lastReadTs}`
    // stored keyed by channel_id. Channels with no marker behave as
    // "never read" (lastReadTs = 0), so historical messages on a first
    // open after upgrade surface as unread — this is correct; the user
    // marks channels read by visiting them.
    const readMarkers = new Map();
    {
      const entries = await idbGetAllEntries(wsDB, "read_markers");
      for (const { key, value } of entries) readMarkers.set(key, value);
    }

    // Saved-for-later bookmarks (per-user, local-only). Keyed by msgId.
    const bookmarks = new Map();
    try {
      const entries = await idbGetAllEntries(wsDB, "bookmarks");
      for (const { key, value } of entries) bookmarks.set(key, value);
    } catch {}

    // Pending reminders (local only). Keyed by reminder id.
    const reminders = new Map();
    try {
      const entries = await idbGetAllEntries(wsDB, "reminders");
      for (const { key, value } of entries) reminders.set(key, value);
    } catch {}

    // Pending scheduled sends (local only). Keyed by send id.
    const scheduledSends = new Map();
    try {
      const entries = await idbGetAllEntries(wsDB, "scheduled_sends");
      for (const { key, value } of entries) scheduledSends.set(key, value);
    } catch {}

    return { wsDB, meta, channels, members, channelKeys, rootKey, messages, presence, hwm, causalBuffer, doc, gaps, relays, bridges, readMarkers, bookmarks, reminders, scheduledSends };
  },

  async sendMessage({ wsDB, meta, identity, channelId, channelKey, body, vectorClock, mentions, threadId, poll, checklist }) {
    const signKey = await Crypto.importSignKey(identity.privkey_pkcs8);
    // mentions is an optional array of user_ids extracted from @name tokens
    // in the body; we only include the field if non-empty to keep the wire
    // format identical to pre-3d.1 for plain messages.
    //
    // threadId is an optional parent message id. When set, the message is
    // a thread reply and appears in the thread panel instead of the main
    // channel flow. Spec §4.1 calls this field `thread`.
    const inner = { body, fmt: "text" };
    if (mentions && mentions.length > 0) inner.mentions = mentions;
    if (threadId) inner.thread = threadId;
    if (poll)      inner.poll = poll;
    if (checklist) inner.checklist = checklist;
    const env = await Envelope.build({
      workspaceId: meta.id,
      channelId,
      channelKey,
      signKey,
      signerPubkey: identity.pubkey,
      deviceId: meta.device_id,
      type: "message.create",
      inner,
      vectorClock
    });
    await idbPut(wsDB, "envelopes", env);
    return env;
  }
};

/**
 * Parse @mentions out of a plain-text message body. Returns an array
 * of user_ids for members whose name matches an `@name` token in the
 * body. Only members in the provided list are eligible — external or
 * typo'd names are silently ignored at send time (and the `@name`
 * text in the body renders as plain text on receive).
 *
 * Matching is case-sensitive and exact on the word portion. We don't
 * try to be clever about partial matches — the composer autocomplete
 * is the affordance that helps users type names correctly.
 */
function parseMentions(body, members, groups = []) {
  const re = /@([\p{L}\p{N}_-]+)/gu;
  const found = new Set();
  let m;
  while ((m = re.exec(body)) !== null) {
    const name = m[1];
    // Slice F1-C: group-name matches expand to the group's member ids.
    // Groups take precedence over same-named members because groups are
    // created intentionally and name collisions are the author's problem.
    const group = groups.find(g => g.name === name);
    if (group) {
      for (const uid of (group.memberIds || [])) found.add(uid);
      continue;
    }
    const member = members.find(mem => mem.name === name);
    if (member) found.add(member.id);
  }
  return [...found];
}

/**
 * Slice S1 helper. Briefly flashes a red border + tooltip on the composer
 * to surface a command error (unknown command, missing args, etc).
 */
function flashComposerError($composer, message) {
  $composer.classList.add("composer-err");
  let $tip = $composer.parentElement.querySelector(".composer-err-tip");
  if (!$tip) {
    $tip = document.createElement("div");
    $tip.className = "composer-err-tip";
    $composer.parentElement.appendChild($tip);
  }
  $tip.textContent = message;
  clearTimeout($composer._errTimer);
  $composer._errTimer = setTimeout(() => {
    $composer.classList.remove("composer-err");
    if ($tip && $tip.parentElement) $tip.remove();
  }, 2800);
}

/* ------------------------------------------------------------
 *  Slice N1  Browser notifications + per-channel DND
 *  Foreground-tab only (no service-worker push, no central
 *  notification service — spec §14.6). Permission is requested
 *  on explicit user action (Settings → Workspace → Notifications),
 *  not on page load. Muted channels and workspace-wide DND suppress
 *  non-mention notifications; @mentions always break through.
 * ------------------------------------------------------------ */
const Notifier = {
  supported() { return typeof Notification !== "undefined"; },

  permissionState() {
    if (!this.supported()) return "unsupported";
    return Notification.permission;   // "default" | "granted" | "denied"
  },

  async requestPermission() {
    if (!this.supported()) return "unsupported";
    if (Notification.permission === "granted") return "granted";
    if (Notification.permission === "denied") return "denied";
    try { return await Notification.requestPermission(); }
    catch { return "denied"; }
  },

  /**
   * Decide whether to fire a desktop notification for an incoming envelope.
   * Rules, in order:
   *   - Skip own messages.
   *   - Skip if user is already looking (focused tab + channel is current).
   *   - If workspace DND on: fire only for @mentions.
   *   - If channel muted:    fire only for @mentions.
   *   - Otherwise: fire.
   */
  shouldNotify(current, env, inner, myId) {
    if (!this.supported()) return false;
    if (Notification.permission !== "granted") return false;
    if (env.from === myId) return false;
    if (document.hasFocus() && env.ch === State.currentChannel) return false;
    const mentions = (inner && inner.mentions) || [];
    const isMention = mentions.includes(myId);
    const dnd = !!current.meta.dnd;
    const muted = (current.meta.muted_channels || []).includes(env.ch);
    if ((dnd || muted) && !isMention) return false;
    return true;
  },

  fire(env, inner, current, members) {
    try {
      const sender = members.find(m => m.id === env.from);
      const senderName = sender?.name || "Someone";
      const channel = current.channels.find(c => c.id === env.ch);
      const where = channel
        ? (channel.dm ? "" : ` in #${channel.name}`)
        : "";
      const title = `${senderName}${where}`;
      let body;
      if (env.type === "attachment.ref") body = `📎 ${inner.name || "attachment"}`;
      else body = (inner.body || "").slice(0, 200);
      const n = new Notification(title, {
        body,
        tag: env.ch || env.id,
        silent: false,
      });
      n.onclick = () => {
        window.focus();
        if (State.currentChannel !== env.ch && current.channels.find(c => c.id === env.ch)) {
          setState({ currentChannel: env.ch });
        }
        n.close();
      };
    } catch (e) {
      console.warn("notification:", e);
    }
  },
};

async function toggleChannelMute(current, channelId) {
  const cur = new Set(current.meta.muted_channels || []);
  if (cur.has(channelId)) cur.delete(channelId); else cur.add(channelId);
  current.meta.muted_channels = [...cur];
  await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
}

async function setWorkspaceDnd(current, enabled) {
  current.meta.dnd = !!enabled;
  await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
}

/* ------------------------------------------------------------
 *  Slice U1  Unread state
 *  Per-channel read markers drive sidebar badges + message-list
 *  unread divider. Local-only in v1; multi-device sync via a
 *  workspace.patch field is a follow-up slice.
 * ------------------------------------------------------------ */
function computeUnread(bundle, myUserId, channelId) {
  const marker = bundle.readMarkers && bundle.readMarkers.get(channelId);
  const lastReadTs = marker ? (marker.lastReadTs || 0) : 0;
  let count = 0, mentions = 0, firstUnreadId = null, firstUnreadTs = 0;
  for (const m of bundle.messages) {
    if (m.ch !== channelId) continue;
    if (m.thread) continue;     // thread replies don't contribute to channel unread
    if (m.deleted) continue;
    if (m.from === myUserId) continue;
    if (m.ts <= lastReadTs) continue;
    count++;
    if (m.mentions && m.mentions.includes(myUserId)) mentions++;
    if (!firstUnreadId || m.ts < firstUnreadTs) { firstUnreadId = m.id; firstUnreadTs = m.ts; }
  }
  return { count, mentions, firstUnreadId, lastReadTs };
}

async function markChannelRead(current, channelId, ts) {
  if (!current || !channelId) return;
  const now = ts || Date.now();
  const existing = current.readMarkers.get(channelId);
  if (existing && existing.lastReadTs >= now) return;
  const rec = { lastReadTs: now };
  current.readMarkers.set(channelId, rec);
  try { await idbPut(current.wsDB, "read_markers", rec, channelId); }
  catch (e) { console.warn("read_markers persist:", e); }
}

/**
 * Save this page's own HTML as a file so someone can hand Mehfil to the next
 * phone with no app store and no internet — AirDrop / Quick Share / USB the
 * file, open it, done. This is the honest fix for the "get the app onto the
 * next device" step of the offline-mesh flow (MEHFIL-OFFLINE-MESH-SPEC.md §5):
 * a browser still needs index.html before anything runs, so we let the people
 * who already have it pass it along. Works offline — the service worker serves
 * the cached index.html.
 */
async function downloadAppFile() {
  const link = document.getElementById("link-download");
  const label = link ? link.textContent : "";
  if (link) link.textContent = "Preparing…";
  let html = null;
  // Prefer the canonical file (a clean, unmutated copy); fall back to the
  // current URL, then to serializing the live document (all code is inline, so
  // even that is a working app) for the file:// case where fetch is blocked.
  for (const u of [new URL("index.html", location.href).href, location.href]) {
    try {
      const res = await fetch(u, { cache: "force-cache" });
      if (res.ok) { html = await res.text(); break; }
    } catch {}
  }
  if (!html) html = "<!doctype html>\n" + document.documentElement.outerHTML;
  try {
    const url = URL.createObjectURL(new Blob([html], { type: "text/html" }));
    const a = document.createElement("a");
    a.href = url;
    a.download = "mehfil.html";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  } catch (e) {
    alert("Couldn't prepare the download: " + (e.message || e));
  }
  if (link) link.textContent = label || "Download the app ↓";
}

async function openWorkspaceById(wsId) {
  const bundle = await Workspace.open(wsId);
  // Update last_opened_at
  const wsRec = await idbGet(State.globalDB, "workspaces", wsId);
  if (wsRec) {
    wsRec.last_opened_at = Date.now();
    await idbPut(State.globalDB, "workspaces", wsRec);
  }
  setState({
    view: "workspace",
    current: bundle,
    currentChannel: bundle.meta.general_channel_id,
    backupNag: "hidden",
    workspaces: await idbGetAll(State.globalDB, "workspaces")
  });
  // Kick off the presence heartbeat (§30). Tears down any prior driver
  // (e.g. from a previous workspace in the same session) and starts a
  // fresh one bound to this bundle.
  PresenceDriver.start(bundle);
  ReminderMgr.start();
  // §35: start relay transport if the workspace has a relay configured.
  RelayMgr.startForWorkspace(bundle);
  // §37: start bridge transport if one is configured.
  BridgeMgr.startForWorkspace(bundle);
}

function renderWorkspace() {
  // Clear any stray corner badges before re-rendering — fixes the Slice 1

  document.querySelectorAll(".corner-warn, .corner-ok").forEach(el => el.remove());

  const { current } = State;
  // Defensive: if `currentChannel` points to an id that's not in the current
  // bundle (e.g. after a rekey, removal, or a replay that rebuilt the
  // channels projection), fall back to the first available channel. This
  // mirrors what Slack does when a channel disappears from your sidebar.
  let currentChannel = State.currentChannel;
  let channel = current.channels.find(c => c.id === currentChannel);
  if (!channel) {
    channel = current.channels[0] || current.channels.find(c => c.id === current.meta.general_channel_id);
