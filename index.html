              await attachFingerprint(m);
              current.members.push(m);
              await idbPut(current.wsDB, "members", m);
            } else if (!existing.x25519_pub && m.x25519_pub) {
              // Backfill x25519_pub from the welcome snapshot onto a member
              // we'd seeded earlier (e.g. the inviter during join handshake).
              existing.x25519_pub = m.x25519_pub;
              await idbPut(current.wsDB, "members", existing);
            }
          }
          current.meta.member_count = current.members.length;
          await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
        }
        // After welcome, the joiner can finally enter the workspace shell.
        if (State.view === "join-waiting") {
          State.current = current;
          State.currentChannel = inner.snapshot.channels[0]?.id || current.meta.general_channel_id;
          setState({ view: "workspace" });
          // Kick off presence heartbeats for the newly-joined workspace.
          PresenceDriver.start(current);
        }
        break;
      }

      case "presence.update": {
        // Ephemeral — projected into bundle.presence, never persisted.
        // `updated_at` is local wall clock so the stale sweep (§30b
        // below) can flip this entry to "offline" after 90s without
        // depending on the peer's clock.
        if (!current.presence) current.presence = {};
        current.presence[env.from] = {
          status: inner.status,
          updated_at: Date.now()
        };
        break;
      }

      case "gossip.peer_announce": {
        // Slice 4a: a peer is announcing themselves to the mesh.
        // For 4a we just record their existence in `current.knownPeers`
        // — a Set of user_ids we've seen broadcast through gossip.
        // Slice 4d (or later) may use this to attempt direct WebRTC
        // connections via signaling-relayed-through-the-mesh.
        //
        // The current per-peer projection (members store) is the
        // authoritative member list; this set is just "peers we've
        // seen send a gossip envelope at least once". The two can
        // diverge: a member exists from member.join even if they're
        // currently offline, while knownPeers only has currently-
        // observed peers.
        if (!current.knownPeers) current.knownPeers = new Set();
        current.knownPeers.add(env.from);
        break;
      }

      case "workspace.patch": {
        // Slice 4b.2: apply an incremental Yjs update to the local
        // workspace doc. `inner.update` is a Uint8Array produced by
        // Y.encodeStateAsUpdate on the sender side. Y.applyUpdate
        // is commutative + idempotent — out-of-order arrival is
        // handled by Yjs itself, so we don't need the causal buffer
        // to block this type. (The receive path already did the
        // causal check before calling us, but Yjs would tolerate
        // arbitrary order anyway.)
        if (!current.doc || !inner.update) break;
        WorkspaceDoc.applyUpdate(current.doc, inner.update);
        // Persist the updated state as the new snapshot. This is
        // the simplest possible persistence strategy — every apply
        // writes the full state. For tiny workspaces this is fine;
        // Slice 5+ may switch to incremental persistence.
        await WorkspaceDoc.save(current.wsDB, current.doc);
        // Mirror to the kv `workspace_meta` record for paths that
        // still read from the legacy store (ws name in sidebar, etc.)
        // — this shim goes away when Slice 5 migrates those paths
        // to read from current.doc directly.
        const newName = WorkspaceDoc.getName(current.doc);
        if (newName && newName !== current.meta.name) {
          current.meta.name = newName;
          await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
          // Also update the global workspaces list so the launcher
          // reflects the rename.
          const gwsRec = await idbGet(State.globalDB, "workspaces", current.meta.id);
          if (gwsRec) {
            gwsRec.name = newName;
            await idbPut(State.globalDB, "workspaces", gwsRec);
          }
        }
        break;
      }

      case "member.remove": {
        // Admin op: remove a member from the workspace.
        // Sender must be admin/owner. After this envelope, workspace.rekey
        // and channel.rekey envelopes follow to revoke the removed member's
        // access to future messages.
        const myUserId = bytesToB64Url(State.identity.pubkey);
        const sender = current.members.find(m => m.id === env.from);
        if (!sender || (sender.role !== "owner" && sender.role !== "admin")) {
          console.warn("member.remove from non-admin, ignoring");
          break;
        }
        const removedId = inner.target;
        if (removedId === myUserId) {
          // We've been removed. Show a notice and close the workspace.
          const idx = current.members.findIndex(m => m.id === removedId);
          if (idx !== -1) current.members.splice(idx, 1);
          alert("You've been removed from this workspace.");
          setState({ view: "landing" });
          break;
        }
        const idxToRemove = current.members.findIndex(m => m.id === removedId);
        if (idxToRemove !== -1) {
          current.members.splice(idxToRemove, 1);
          // Remove from IDB projection.
          const tx = current.wsDB.transaction("members", "readwrite");
          tx.objectStore("members").delete(removedId);
          await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
          current.meta.member_count = current.members.length;
          await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
        }
        break;
      }

      case "workspace.rekey": {
        // A new workspace root key has been distributed. `inner.wrapped_keys`
        // is a map of user_id → {iv, ct} wrapped with X25519. Find our entry
        // and unwrap the new root key.
        const myUserId = bytesToB64Url(State.identity.pubkey);
        const myEntry = inner.wrapped_keys && inner.wrapped_keys[myUserId];
        if (!myEntry) {
          // We have no entry — we were removed. Ignore.
          break;
        }
        // Unwrap: ECDH(my_x25519_priv, sender_x25519_pub) → KEK → decrypt.
        const sender = current.members.find(m => m.id === env.from);
        if (!sender || !sender.x25519_pub) {
          console.warn("workspace.rekey: sender has no x25519_pub");
          break;
        }
        const myPriv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
        const theirPub = await Crypto.importX25519Pub(sender.x25519_pub);
        const kek = await Crypto.deriveX25519AesKey(myPriv, theirPub);
        const newRawKey = await Crypto.aesDecrypt(kek, myEntry.iv, myEntry.ct);
        await idbPut(current.wsDB, "keys", newRawKey, "root");
        current.rootKey = await Crypto.importAesRaw(newRawKey);
        break;
      }

      case "channel.rekey": {
        // A channel key has been rotated. For public channels the new raw key
        // is inside the envelope (encrypted under the workspace root key —
        // which is how we got here). For private channels, the key is wrapped
        // per-member in `inner.wrapped_keys`.
        const myUserId = bytesToB64Url(State.identity.pubkey);
        const chId = inner.channel_id;
        if (!chId) break;
        let newRawKey;
        if (inner.key) {
          // Public channel: raw key in the payload.
          newRawKey = inner.key;
        } else if (inner.wrapped_keys) {
          // Private channel: wrapped for us.
          const myEntry = inner.wrapped_keys[myUserId];
          if (!myEntry) break; // Not a member of this channel.
          const sender = current.members.find(m => m.id === env.from);
          if (!sender || !sender.x25519_pub) break;
          const myPriv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
          const theirPub = await Crypto.importX25519Pub(sender.x25519_pub);
          const kek = await Crypto.deriveX25519AesKey(myPriv, theirPub);
          newRawKey = await Crypto.aesDecrypt(kek, myEntry.iv, myEntry.ct);
        } else {
          break;
        }
        await idbPut(current.wsDB, "keys", newRawKey, "ch:" + chId);
        current.channelKeys[chId] = await Crypto.importAesRaw(newRawKey);
        break;
      }

      case "member.promote": {
        // Promote a member to admin via consensus (2+ distinct valid sigs).
        // `inner.signers` carries [{user_id, sig}] from the proposal — each
        // signed the canonical promote payload independently. Verify each sig
        // against the canonical bytes and count distinct valid signers.
        const targetId = inner.target;
        if (!targetId || !inner.ts || !inner.nonce || !Array.isArray(inner.signers)) break;

        const sigPayload = MP.encode({ type: "member.promote", target: targetId, ts: inner.ts, nonce: inner.nonce });

        let validSigners = new Set();
        for (const signer of inner.signers) {
          if (!signer.user_id || !signer.sig) continue;
          try {
            const pub = b64UrlToBytes(signer.user_id);
            const vk  = await Crypto.importVerifyKey(pub);
            if (await Crypto.verify(vk, signer.sig, sigPayload)) {
              validSigners.add(signer.user_id);
            }
          } catch (_) { /* bad sig — ignore */ }
        }

        if (validSigners.size < 2) {
          console.warn("member.promote: insufficient valid signers (" + validSigners.size + "), dropping");
          break;
        }

        const target = current.members.find(m => m.id === targetId);
        if (target && target.role === "member") {
          target.role = "admin";
          await idbPut(current.wsDB, "members", target);
        }
        // Remove from pending promotions if present.
        if (current.doc) {
          const promos = WorkspaceDoc.getPendingPromotions(current.doc);
          const pp = promos.find(p => p.target_id === targetId);
          if (pp) {
            WorkspaceDoc.removePendingPromotion(current.doc, pp.id);
            await WorkspaceDoc.save(current.wsDB, current.doc);
          }
        }
        break;
      }

      default:
        console.warn("Unhandled envelope type:", env.type);
    }
  },

  onAck(workspaceId, envelopeId) {
    const current = State.current;
    if (!current || current.meta.id !== workspaceId) return;
    const msg = current.messages.find(m => m.id === envelopeId);
    if (msg) {
      msg.delivery = "delivered";
      if (State.view === "workspace") render();
    }
  }
};

/* ------------------------------------------------------------
 *  §22  member.welcome + history replay helpers
 * ------------------------------------------------------------ */
async function sendWelcome(current, targetUserId) {
  // Build the snapshot: channels with their raw keys, current members.
  const snapshotChannels = [];
  for (const ch of current.channels) {
    const raw = await idbGet(current.wsDB, "keys", "ch:" + ch.id);
    snapshotChannels.push({
      id: ch.id,
      name: ch.name,
      topic: ch.topic,
      members: ch.members,
      created_at: ch.created_at,
      key: raw
    });
  }
  const snapshot = {
    channels: snapshotChannels,
    members: current.members.map(m => ({
      id: m.id, name: m.name, color: m.color, role: m.role,
      devices: m.devices, joined_at: m.joined_at,
      x25519_pub: m.x25519_pub || null      // Slice 3b
    }))
  };
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  const userId = bytesToB64Url(State.identity.pubkey);
  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: null,                 // workspace-level envelope
    channelKey: current.rootKey,     // encrypted under root key
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "member.welcome",
    inner: { target: targetUserId, snapshot },
    vectorClock: [[userId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  await idbPut(current.wsDB, "envelopes", env);
  await PeerMgr.sendEnvelope(meta.id, env);
}

async function replayHistory(current, targetUserId) {
  // Send every stored envelope except the ones that were just generated
  // as part of this handshake (member.join from target, member.welcome
  // we just emitted). The remote side will dedupe by id anyway.
  const all = await idbGetAll(current.wsDB, "envelopes");
  for (const env of all) {
    // Skip envelopes that originated from the target (they already have
    // them) and workspace-level handshake envelopes.
    if (env.from === targetUserId) continue;
    if (env.type === "member.welcome" && env.ts > Date.now() - 10000) continue;
    await PeerMgr.sendEnvelope(current.meta.id, env);
  }
}

/* ------------------------------------------------------------
 *  §25  Slice 3a envelope emitters — channel.create, message.edit,
 *       message.delete. Each builds a signed+encrypted envelope,
 *       persists it locally, applies the projection update, and
 *       broadcasts to any connected peer.
 * ------------------------------------------------------------ */
/**
 * Create a new channel.
 *
 * Public channels (`isPrivate=false`): the raw 32-byte channel key rides
 * in the envelope's inner payload as `key`. The envelope itself is
 * encrypted under the workspace root key, so all workspace members can
 * unwrap it automatically. Every member is added.
 *
 * Private channels (`isPrivate=true`): the channel key is wrapped
 * per-member using X25519 ECDH. For each listed member we derive an
 * AES-GCM KEK via `ECDH(my_priv, their_x25519_pub)`, then encrypt the
 * raw channel key under that KEK with a fresh 12-byte IV. The result
 * travels as `wrapped_keys: { user_id: {iv, ct}, ... }` in the inner
 * payload. Members NOT listed get no entry and can't decrypt — even
 * though they see the envelope, they have no way to recover the key.
 * The envelope is still encrypted under the workspace root key so
 * non-member workspace users can't even see the channel name or topic.
 */
async function sendChannelCreate(current, name, topic, { isPrivate = false, isDm = false, memberIds = null } = {}) {
  const aesKey = await Crypto.genAesKey();
  const rawKey = await Crypto.exportAesRaw(aesKey);
  const chId = bytesToB64Url(Crypto.rand(16));
  const chosenMembers = memberIds || current.members.map(m => m.id);
  const myUserId = bytesToB64Url(State.identity.pubkey);

  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");

  // Build inner payload — shape depends on public vs private.
  let inner;
  if (isPrivate) {
    // Private: wrap the raw channel key per-member via ECDH.
    const myX25519Priv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
    const wrapped_keys = {};
    for (const mid of chosenMembers) {
      const member = current.members.find(m => m.id === mid);
      if (!member) throw new Error("Unknown member: " + mid);
      if (!member.x25519_pub) {
        throw new Error(`Can't create private channel with ${member.name}: they joined before X25519 support. Ask them to rejoin.`);
      }
      const theirPub = await Crypto.importX25519Pub(member.x25519_pub);
      const kek = await Crypto.deriveX25519AesKey(myX25519Priv, theirPub);
      const iv = Crypto.rand(12);
      const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, kek, rawKey));
      wrapped_keys[mid] = { iv, ct };
    }
    inner = {
      id: chId, name, topic: topic || "",
      private: true,
      dm: isDm,
      members: chosenMembers,
      wrapped_keys,
      wrapper: myUserId   // needed on the receive side to pick the right
                          // X25519 pubkey for ECDH derivation
    };
  } else {
    // Public: raw key in the clear (the envelope itself is still
    // encrypted under the workspace root key).
    inner = {
      id: chId, name, topic: topic || "",
      private: false,
      dm: false,
      members: chosenMembers,
      key: rawKey
    };
  }

  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: null,                 // workspace-level envelope
    channelKey: current.rootKey,     // encrypted under root key
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "channel.create",
    inner,
    vectorClock: [[myUserId, meta.lc_counter]]
  });

  // Persist and apply locally.
  await idbPut(current.wsDB, "envelopes", env);
  const chRec = {
    id: chId, name, topic: topic || "",
    private: isPrivate, dm: isDm, dm_with: null,
    members: chosenMembers, created_at: env.ts
  };
  current.channels.push(chRec);
  await idbPut(current.wsDB, "channels", chRec);
  await idbPut(current.wsDB, "keys", rawKey, "ch:" + chId);
  current.channelKeys[chId] = aesKey;

  // Broadcast to any connected peer.
  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));

  return chRec;
}

async function sendMessageEdit(current, targetId, newBody) {
  const msg = current.messages.find(m => m.id === targetId);
  if (!msg) throw new Error("Message not found");
  const ch = current.channels.find(c => c.id === msg.ch);
  const channelKey = current.channelKeys[ch.id];
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const userId = bytesToB64Url(State.identity.pubkey);

  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: ch.id,
    channelKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "message.edit",
    inner: { target: targetId, body: newBody, fmt: "text" },
    vectorClock: [[userId, meta.lc_counter]]

/* ------------------------------------------------------------
 *  §28  1:1 DMs — WT-15
 *
 *  A DM between two parties has no `channel.create` envelope. Both
 *  sides derive:
 *    - `dm_channel_id` = SHA-256(sorted(user_a, user_b).join("|")).slice(0,16)
 *    - `dm_channel_key` = deriveKey(X25519, my_priv, their_pub) → AES-GCM
 *
 *  Because ECDH is symmetric, both parties compute the same key. The
 *  channel id is deterministic so both parties agree on it without
 *  any protocol roundtrip. This means DMs appear the *moment* the
 *  first message arrives — there's no "pending" state.
 *
 *  Local state: we persist the DM channel record + its raw derived key
 *  on first use (either when the user clicks "Start DM" or when the
 *  first incoming DM envelope lands). The `dm: true` flag + `dm_with`
 *  pointer let the sidebar render them under a separate DMs section.
 * ------------------------------------------------------------ */
async function dmChannelId(userA, userB) {
  const sorted = [userA, userB].sort();
  const bytes = new TextEncoder().encode(sorted.join("|"));
  const hash = await Crypto.sha256(bytes);
  return bytesToB64Url(hash.slice(0, 16));
}

async function ensureDmChannel(current, otherMember) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  if (otherMember.id === myUserId) {
    throw new Error("Can't DM yourself");
  }
  if (!otherMember.x25519_pub) {
    throw new Error(`${otherMember.name} doesn't have X25519 keys yet — they joined before Slice 3b.`);
  }
  const dmId = await dmChannelId(myUserId, otherMember.id);
  let ch = current.channels.find(c => c.id === dmId);
  if (ch) return ch;

  // Derive the DM key. We export raw and store it under keys → ch:<dmId>
  // so that `Workspace.open` replay can re-import it the same way every
  // other channel key is handled.
  const myPriv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);
  const theirPub = await Crypto.importX25519Pub(otherMember.x25519_pub);
  const aesKey = await Crypto.deriveX25519AesKey(myPriv, theirPub);
  const rawKey = await Crypto.exportAesRaw(aesKey);
  await idbPut(current.wsDB, "keys", rawKey, "ch:" + dmId);
  current.channelKeys[dmId] = aesKey;

  ch = {
    id: dmId,
    name: otherMember.name,
    topic: "",
    private: true,
    dm: true,
    dm_with: otherMember.id,
    members: [myUserId, otherMember.id],
    created_at: Date.now()
  };
  current.channels.push(ch);
  await idbPut(current.wsDB, "channels", ch);
  return ch;
}

/**
 * Given an envelope whose `ch` id doesn't match any known channel, see if
 * it matches a DM channel id derivable from any (me, member) pair. If yes,
 * materialize the DM channel on the fly and return it. Returns null if
 * this envelope isn't for a DM we know how to derive.
 */
async function tryResolveIncomingDm(current, envChId) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  for (const member of current.members) {
    if (member.id === myUserId) continue;
    if (!member.x25519_pub) continue;
    const maybeId = await dmChannelId(myUserId, member.id);
    if (maybeId === envChId) {
      return await ensureDmChannel(current, member);
    }
  }
  return null;
}

async function sendMessageDelete(current, targetId) {
  const msg = current.messages.find(m => m.id === targetId);
  if (!msg) throw new Error("Message not found");
  const ch = current.channels.find(c => c.id === msg.ch);
  const channelKey = current.channelKeys[ch.id];
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const userId = bytesToB64Url(State.identity.pubkey);

  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: ch.id,
    channelKey,

  });

/* ------------------------------------------------------------
 *  §28b  Reactions — Slice 3d.1 (WT-20 partial)
 *
 *  reaction.add and reaction.remove envelopes carry a target
 *  message id and an emoji string. The projected reaction state
 *  on each message is an OR-Set keyed by (user_id, emoji) — each
 *  user can add one copy of each emoji to a given message, and
 *  remove their own. Per spec §6.3.
 *
 *  Shape on the in-memory message record:
 *    msg.reactions = { [emoji]: [user_id, ...] }
 *
 *  The emoji keys are stored in insertion order — render path
 *  preserves that order so pills don't jitter as reactions arrive.
 * ------------------------------------------------------------ */
async function sendReactionAdd(current, targetId, emoji) {
  const msg = current.messages.find(m => m.id === targetId);
  if (!msg) throw new Error("Message not found");
  const ch = current.channels.find(c => c.id === msg.ch);
  const channelKey = current.channelKeys[ch.id];
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const userId = bytesToB64Url(State.identity.pubkey);

  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: ch.id,
    channelKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "reaction.add",
    inner: { target: targetId, emoji },
    vectorClock: [[userId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "envelopes", env);

  // Apply locally.
  if (!msg.reactions) msg.reactions = {};
  if (!msg.reactions[emoji]) msg.reactions[emoji] = [];
  if (!msg.reactions[emoji].includes(userId)) msg.reactions[emoji].push(userId);

  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));
}

async function sendReactionRemove(current, targetId, emoji) {
  const msg = current.messages.find(m => m.id === targetId);
  if (!msg) throw new Error("Message not found");
  const ch = current.channels.find(c => c.id === msg.ch);
  const channelKey = current.channelKeys[ch.id];
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const userId = bytesToB64Url(State.identity.pubkey);

  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: ch.id,
    channelKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "reaction.remove",
    inner: { target: targetId, emoji },
    vectorClock: [[userId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "envelopes", env);

  // Apply locally: remove only my own user_id from the emoji's list.
  if (msg.reactions && msg.reactions[emoji]) {
    msg.reactions[emoji] = msg.reactions[emoji].filter(uid => uid !== userId);
    if (msg.reactions[emoji].length === 0) delete msg.reactions[emoji];
    if (Object.keys(msg.reactions).length === 0) delete msg.reactions;
  }

  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));
}

/**
 * Toggle convenience: click a reaction pill to add/remove your own.
 * Used by the UI and also exported for the debug hook.
 */
async function toggleReaction(current, targetId, emoji) {
  const msg = current.messages.find(m => m.id === targetId);
  if (!msg) return;
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const mine = msg.reactions && msg.reactions[emoji] && msg.reactions[emoji].includes(myUserId);
  if (mine) await sendReactionRemove(current, targetId, emoji);
  else       await sendReactionAdd(current, targetId, emoji);
}

/* ------------------------------------------------------------
 *  §29  Attachments — Slice 3c
 *
 *  Sending path:
 *    1. Caller gives us a File (from input[type=file] or a drag
 *       event) and the target channel.
 *    2. We read it into a Uint8Array, enforce the 25MB cap.
 *    3. BlobStore.put encrypts with a fresh per-blob key, writes
 *       the ciphertext into OPFS, returns {blob_id, key, iv, size}.
 *    4. We build an `attachment.ref` envelope whose inner payload
 *       is {blob_id, key, iv, size, mime, name}. The envelope
 *       itself is encrypted under the channel key so the per-blob
 *       key never leaves the channel membership.
 *    5. Persist + broadcast. The attachment appears in the local
 *       projection as a message with `attachment` set instead of
 *       `body`.
 *
 *  Receiving path: handled in EnvelopeDispatch case "attachment.ref"
 *  below. Sender-side local playback is immediate (same OPFS).
 *  Remote peers see the envelope but need the raw blob bytes
 *  delivered separately — Slice 3c ships the envelope only; full
 *  blob transfer over the data channel is a Slice 3c follow-up
 *  tracked in PENDING.md.
 * ------------------------------------------------------------ */
async function sendAttachment(current, channelId, file) {
  if (!file) throw new Error("No file");
  if (file.size > MAX_ATTACHMENT_SIZE) {
    throw new Error(`Attachment too large (${(file.size/1024/1024).toFixed(1)}MB). Max is ${MAX_ATTACHMENT_SIZE/1024/1024}MB.`);
  }
  const bytes = new Uint8Array(await file.arrayBuffer());
  const stored = await BlobStore.put(current.meta.id, bytes);

  const ch = current.channels.find(c => c.id === channelId);
  const channelKey = current.channelKeys[ch.id];
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const userId = bytesToB64Url(State.identity.pubkey);

  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: ch.id,
    channelKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "attachment.ref",
    inner: {
      blob_id: stored.blob_id,
      key: stored.key,
      iv: stored.iv,
      size: stored.size,
      mime: file.type || "application/octet-stream",
      name: file.name
    },
    vectorClock: [[userId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "envelopes", env);

  // Project locally — attachment messages have `attachment` set.
  current.messages.push({
    id: env.id, ch: env.ch, from: env.from, ts: env.ts,
    body: "", attachment: {
      blob_id: stored.blob_id,
      key: stored.key,
      iv: stored.iv,
      size: stored.size,
      mime: file.type || "application/octet-stream",
      name: file.name,
      available: true   // sender always has the bytes
    },
    delivery: PeerMgr.hasPeers(current.meta.id) ? "sent" : "stored",
    edited: false, deleted: false, lc: env.lc
  });
  current.messages.sort((a, b) => a.ts - b.ts);

  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));
  return env;
}

/* ------------------------------------------------------------
 *  §30  Group DMs — Slice 3c
 *
 *  Simplified from the spec's sender-keys pattern (§5.2). For v1
 *  we treat group DMs as multi-member private channels with
 *  `dm: true`: one fresh AES channel key, wrapped per-member via
 *  ECDH, same envelope shape as private channels. This reuses all
 *  the existing machinery from §27 + 3b.2.
 *
 *  What's lost vs proper sender-keys:
 *    - No per-sender key rotation → removing a member from a
 *      group DM requires a full rekey (not just key retirement)
 *    - No forward secrecy improvements from chain key ratcheting
 *      (but v1 doesn't do FS anyway, so no regression)
 *
 *  These are v1.1 features — documented in PENDING.md.
 *
 *  What's preserved:
 *    - Non-members can't decrypt (per-member wrapping via ECDH)
 *    - Messages are signed → forgery resistance
 *    - Members without x25519_pub can't be added (pre-3b joiners)
 *
 *  A group DM has no deterministic channel id (unlike 1:1 DMs)
 *  because N! orderings get messy and because group membership
 *  is an intentional product of a "create" action, not a pure
 *  function of the parties.
 * ------------------------------------------------------------ */
async function createGroupDm(current, otherMembers) {
  if (otherMembers.length < 2) {
    throw new Error("Group DMs need at least 2 other people. Use a 1:1 DM instead.");
  }
  const myUserId = bytesToB64Url(State.identity.pubkey);
  for (const m of otherMembers) {
    if (!m.x25519_pub) {
      throw new Error(`${m.name} doesn't have X25519 keys yet — they joined before Slice 3b.`);
    }
  }
  // Compose a display name from the member names.
  const name = otherMembers.map(m => m.name).join(", ");
  const memberIds = [myUserId, ...otherMembers.map(m => m.id)];

  // Reuse sendChannelCreate with isPrivate + isDm. The isDm flag rides
  // inside the envelope's inner payload so every recipient's dispatch
  // handler projects the channel with dm: true.
  const ch = await sendChannelCreate(current, name, "", {
    isPrivate: true, isDm: true, memberIds
  });
  // Local projection needs the group-DM fields that the shared
  // sendChannelCreate doesn't set — it uses dm_with: null for group DMs
  // (1:1 DMs take the ensureDmChannel path and set dm_with to a user_id).
  ch.dm = true;
  ch.dm_with = null;
  await idbPut(current.wsDB, "channels", ch);
  return ch;
}

/* ------------------------------------------------------------
 *  §30  Presence — Slice 3d.3 (WT-24 partial, spec §4.1)
 *
 *  Ephemeral heartbeats. Every 30s while focused, the client
 *  broadcasts a `presence.update` envelope carrying its current
 *  status ("online" / "away" / "offline"). Recipients project
 *  into `bundle.presence[user_id] = {status, updated_at}` but
 *  never persist to IndexedDB. On reload, presence state resets.
 *
 *  Transitions:
 *    focus  → online
 *    blur   → away
 *    unload → offline (best-effort via beforeunload)
 *
 *  Stale sweep: a timer every 30s flips any entry >90s stale to
 *  "offline". Skipped for the local user's own entry, which is
 *  driven by window-focus events, not wall-clock age.
 *
 *  Own-presence is mirrored into the bundle immediately in
 *  `sendPresence` so the local sidebar reflects state changes
 *  without waiting for a network round trip (there isn't one
 *  for self-to-self).
 * ------------------------------------------------------------ */
const PRESENCE_INTERVAL_MS = 30_000;   // broadcast every 30s while focused
const PRESENCE_STALE_MS    = 90_000;   // peers silent >90s → marked offline

/**
 * Slice 4a: announce ourselves to the mesh. Broadcast to every
 * attached peer; rebroadcast logic ensures peers 2+ hops away
 * also learn about us. Workspace-level envelope encrypted under
 * the workspace root key. Fired by PeerMgr.attach so every new
 * connection results in fresh announcements flowing through the
 * mesh, and so peers who only joined recently learn about peers
 * who joined long ago.
 */
async function sendPeerAnnounce(current) {
  if (!current || !State.identity) return;
  if (!PeerMgr.hasPeers(current.meta.id)) return;
  try {
    const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
    const meta = current.meta;
    meta.lc_counter = (meta.lc_counter || 0) + 1;
    const myUserId = bytesToB64Url(State.identity.pubkey);
    const env = await Envelope.build({
      workspaceId: meta.id,
      channelId: null,
      channelKey: current.rootKey,
      signKey,
      signerPubkey: State.identity.pubkey,
      deviceId: meta.device_id,
      type: "gossip.peer_announce",
      inner: { peer: myUserId, devices: [meta.device_id] },
      vectorClock: [[myUserId, meta.lc_counter]]
    });
    // Mark seen immediately so the rebroadcast hop back to us is dropped.
    await SeenSet.add(meta.id, env.id);
    PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn("peer_announce send failed:", e));
  } catch (e) {
    console.warn("peer_announce build failed:", e);
  }
}

/**
 * Slice 4b.2: broadcast an incremental Yjs update as a `workspace.patch`
 * envelope. Called after any local `WorkspaceDoc.setName` / `addChannel`
 * / `addMember` / etc. mutation that produced an update blob.
 *
 * Also persists the updated doc to IDB and, for name changes, mirrors
 * into the legacy kv `workspace_meta` record + the global workspaces
 * list so pre-migration code paths continue to see the new name.
 */
async function sendWorkspacePatch(current, updateBytes) {
  if (!current || !State.identity) return;
  if (!updateBytes || updateBytes.length === 0) return;

  // Persist the updated local doc snapshot.
  await WorkspaceDoc.save(current.wsDB, current.doc);

  // Mirror name into legacy kv + global workspaces list.
  const newName = WorkspaceDoc.getName(current.doc);
  if (newName && newName !== current.meta.name) {
    current.meta.name = newName;
    await idbPut(current.wsDB, "keys", current.meta, "workspace_meta");
    const gwsRec = await idbGet(State.globalDB, "workspaces", current.meta.id);
    if (gwsRec) {
      gwsRec.name = newName;
      await idbPut(State.globalDB, "workspaces", gwsRec);
    }
    // Refresh the in-memory workspaces list so the launcher sees it.
    State.workspaces = await idbGetAll(State.globalDB, "workspaces");
  }

  // Build the envelope. workspace.patch is workspace-level
  // (ch: null), encrypted under the workspace root key like
  // every other admin-tier envelope.
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const myUserId = bytesToB64Url(State.identity.pubkey);

  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: null,
    channelKey: current.rootKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "workspace.patch",
    inner: { update: updateBytes },
    vectorClock: [[myUserId, meta.lc_counter]]
  });

  // Persist to the envelopes store (these are NOT ephemeral — they
  // should survive reload and replay so new peers catch up on any
  // workspace metadata changes they missed).
  await idbPut(current.wsDB, "envelopes", env);

  // Broadcast to all attached peers. sendEnvelope auto-marks in
  // SeenSet so rebroadcast-back-to-us gets dropped.
  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn("workspace.patch send failed:", e));
}

async function sendPresence(current, status) {
  if (!current || !State.identity) return;
  const myUserId = bytesToB64Url(State.identity.pubkey);

  // Mirror locally first — even if the broadcast fails (no peer attached),
  // the sidebar should still reflect our own state.
  if (!current.presence) current.presence = {};
  current.presence[myUserId] = { status, updated_at: Date.now() };

  // No peer → nothing to broadcast. The local update above is enough.
  if (!PeerMgr.hasPeers(current.meta.id)) {
    if (State.view === "workspace") render();
    return;
  }

  try {
    const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
    const meta = current.meta;
    meta.lc_counter = (meta.lc_counter || 0) + 1;
    // NOTE: we intentionally do NOT persist the updated meta for
    // presence counter bumps. The lc_counter is advisory here; since
    // presence envelopes don't go in the envelopes store, a stale
    // counter on reload is harmless (next real envelope will catch up).
    const env = await Envelope.build({
      workspaceId: meta.id,
      channelId: null,               // workspace-level envelope
      channelKey: current.rootKey,   // encrypted under root key
      signKey,
      signerPubkey: State.identity.pubkey,
      deviceId: meta.device_id,
      type: "presence.update",
      inner: { status },
      vectorClock: [[myUserId, meta.lc_counter]]
    });
    // NO idbPut — presence is ephemeral (§EPHEMERAL_TYPES).
    PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn("presence send failed:", e));
  } catch (e) {
    console.warn("presence build failed:", e);
  }
  if (State.view === "workspace") render();
}

// Module-level heartbeat state. Cleared on workspace close so a new
// workspace open gets a fresh driver tied to its own bundle.
const PresenceDriver = {
  _interval: null,
  _staleTimer: null,
  _focusHandler: null,
  _blurHandler: null,
  _unloadHandler: null,

  start(current) {
    this.stop();   // idempotent — tearing down any prior driver

    // Initial heartbeat — publish our current focus state.
    const initialStatus = document.hasFocus() ? "online" : "away";
    sendPresence(current, initialStatus);

    // Recurring heartbeat while focused. While blurred we still run the
    // interval (cheap) but send "away" each time, so peers don't wrongly
    // flip us to offline after 90s of inactivity.
    this._interval = setInterval(() => {
      const status = document.hasFocus() ? "online" : "away";
      sendPresence(current, status);
    }, PRESENCE_INTERVAL_MS);

    // Focus/blur transitions — immediate, not waiting for the next tick.
    this._focusHandler = () => sendPresence(current, "online");
    this._blurHandler  = () => sendPresence(current, "away");
    window.addEventListener("focus", this._focusHandler);
    window.addEventListener("blur",  this._blurHandler);

    // Best-effort final heartbeat on unload. beforeunload is unreliable
    // (mobile tab close doesn't fire it, background-killed tabs skip it),
    // but when it does fire the broadcast at least gives peers a chance
    // to transition us to "offline" before the 90s stale sweep catches us.
    this._unloadHandler = () => {
      try { sendPresence(current, "offline"); } catch {}
    };
    window.addEventListener("beforeunload", this._unloadHandler);

    // Stale sweep — every 30s, flip any peer whose updated_at is >90s
    // ago to "offline". Skip our own entry (focus-driven, not aged).
    this._staleTimer = setInterval(() => {
      const myUserId = bytesToB64Url(State.identity.pubkey);
      const now = Date.now();
      let changed = false;
      for (const [uid, entry] of Object.entries(current.presence || {})) {
        if (uid === myUserId) continue;
        if (entry.status === "offline") continue;
        if (now - entry.updated_at > PRESENCE_STALE_MS) {
          entry.status = "offline";
          changed = true;
        }
      }
      if (changed && State.view === "workspace") render();
    }, PRESENCE_INTERVAL_MS);
  },

  stop() {
    if (this._interval)    { clearInterval(this._interval);    this._interval = null; }
    if (this._staleTimer)  { clearInterval(this._staleTimer);  this._staleTimer = null; }
    if (this._focusHandler)  { window.removeEventListener("focus",  this._focusHandler);  this._focusHandler = null; }
    if (this._blurHandler)   { window.removeEventListener("blur",   this._blurHandler);   this._blurHandler = null; }
    if (this._unloadHandler) { window.removeEventListener("beforeunload", this._unloadHandler); this._unloadHandler = null; }
  }
};

/* ============================================================
 *  §31  Search — local + cross-workspace (Slice 5 / WT-18, WT-19)
 *
 *  MiniSearch is loaded lazily from esm.sh the first time the palette
 *  opens. The current workspace's messages are indexed in-memory each
 *  time the palette opens (fast — messages are already decrypted in
 *  State.current.messages). Other workspaces are indexed from their
 *  pre-built plaintext `search_index` IDB store (written as messages
 *  arrive). Results from all sources are merged and ranked by score.
 * ============================================================ */
let MiniSearch = null;

const SearchIndex = {
  /**
   * Add a single decrypted message record to a workspace's on-disk
   * plaintext index. Called by dispatch after each message.create +
   * attachment.ref projects. Non-blocking — failures are silently
   * swallowed so a search-index write never disrupts the message flow.
   */
  async addMessage(wsDB, msg) {
    if (!msg.body || msg.deleted) return;
    try {
      const rec = {
        id:   msg.id,
        body: msg.body,
        from: msg.from,
        ch:   msg.ch,
        ts:   msg.ts
      };
      await idbPut(wsDB, "search_index", rec, msg.id);
    } catch (_) { /* non-fatal */ }
  },

  /** Load all records from the on-disk index for one workspace. */
  async loadIndex(wsDB) {
    try { return await idbGetAll(wsDB, "search_index"); }
    catch (_) { return []; }
  }
};

/**
 * Open the search command palette (Cmd/Ctrl+K).
 * Builds an in-memory MiniSearch index from all available sources,
 * then renders an interactive overlay.
 */
async function openSearchPalette() {
  if (document.querySelector(".search-overlay")) return; // already open

  // Lazy-load MiniSearch.
  if (!MiniSearch) {
    try {
      const mod = await import("https://esm.sh/minisearch@7");
      MiniSearch = mod.default || mod;
    } catch (e) {
      console.warn("MiniSearch load failed:", e);
      alert("Search requires network access to load on first use. Try again when online.");
      return;
    }
  }

  // Build the combined index. Current workspace messages come from
  // State.current.messages (already in memory). Other workspaces are
  // loaded from their IDB search_index stores.
  const allDocs = [];
  const wsLabels = {};  // wsId → name

  // Current workspace.
  if (State.current) {
    const wsId = State.current.meta.id;
    wsLabels[wsId] = State.current.meta.name;
    for (const m of State.current.messages) {
      if (m.body && !m.deleted) {
        allDocs.push({ id: m.id, body: m.body, from: m.from, ch: m.ch, ts: m.ts, ws: wsId });
      }
    }
  }

  // Other workspaces (from disk index — already plaintext, safe to read).
  for (const ws of (State.workspaces || [])) {
    if (State.current && ws.id === State.current.meta.id) continue;
    wsLabels[ws.id] = ws.name;
    try {
      const wsDB = await openWorkspaceDB(ws.id);
      const recs = await SearchIndex.loadIndex(wsDB);
      wsDB.close();
      for (const r of recs) {
        allDocs.push({ id: ws.id + ":" + r.id, body: r.body, from: r.from, ch: r.ch, ts: r.ts, ws: ws.id, orig_id: r.id });
      }
    } catch (_) { /* skip unreadable workspace */ }
  }

  const ms = new MiniSearch({
    fields: ["body"],
    storeFields: ["body", "from", "ch", "ts", "ws", "orig_id"],
    searchOptions: { prefix: true, fuzzy: 0.15, boost: { body: 1 } }
  });
  ms.addAll(allDocs);

  // Render overlay.
  const overlay = document.createElement("div");
  overlay.className = "search-overlay";
  overlay.innerHTML = `
    <div class="search-palette">
      <div class="search-input-row">
        <span class="search-input-icon">⌕</span>
        <input id="search-input" type="text" placeholder="Search messages… (from:name, in:#channel)" autocomplete="off">
        <span class="search-kbd">Esc</span>
      </div>
      <div class="search-results" id="search-results">
        <div class="search-empty">Type to search across all messages</div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const $input = overlay.querySelector("#search-input");
  const $results = overlay.querySelector("#search-results");
  $input.focus();

  // Close on background click or Escape (Escape handled globally, but also here).
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) overlay.remove();
  });

  /**
   * §6 Search filter parser. Extracts `from:name` and `in:#channel`
   * tokens from the raw query, returning { baseQuery, fromFilter, inFilter }.
   * Both filters are lowercased for case-insensitive matching.
   */
  function parseSearchQuery(raw) {
    let q = raw;
    let fromFilter = null, inFilter = null;
    // from:name — match by display name (prefix)
    q = q.replace(/\bfrom:(\S+)/gi, (_, name) => { fromFilter = name.toLowerCase(); return ""; });
    // in:#channel or in:channel
    q = q.replace(/\bin:#?(\S+)/gi, (_, ch) => { inFilter = ch.toLowerCase(); return ""; });
    return { baseQuery: q.trim(), fromFilter, inFilter };
  }

  /** Apply from:/in: post-filters against already-scored MiniSearch hits. */
  function applySearchFilters(hits, fromFilter, inFilter, wsId, members, channels) {
    if (!fromFilter && !inFilter) return hits;
    return hits.filter(hit => {
      if (fromFilter) {
        const isCurrentWs = wsId && hit.ws === wsId;
        const memberName = isCurrentWs
          ? (members.find(m => m.id === hit.from)?.name || "")
          : hit.from;
        if (!memberName.toLowerCase().includes(fromFilter)) return false;
      }
      if (inFilter) {
        const isCurrentWs = wsId && hit.ws === wsId;
        const chName = isCurrentWs
          ? (channels.find(c => c.id === hit.ch)?.name || hit.ch || "")
          : (hit.ch || "");
        if (!chName.toLowerCase().includes(inFilter)) return false;
      }
      return true;
    });
  }

  // Live search.
  let debounceTimer = null;
  $input.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      const raw = $input.value.trim();
      if (!raw) {
        $results.innerHTML = `<div class="search-empty">Type to search across all messages</div>`;
        return;
      }
      const { baseQuery: q, fromFilter, inFilter } = parseSearchQuery(raw);
      const wsId = State.current?.meta?.id;
      const members = State.current?.members || [];
      const channels = State.current?.channels || [];
      // If only filters provided (no freetext), start from all indexed docs.
      const rawHits = q ? ms.search(q, { limit: 100 }) : allDocs;
      const hits = applySearchFilters(rawHits, fromFilter, inFilter, wsId, members, channels).slice(0, 40);
      if (hits.length === 0) {
        const filterDesc = [
          q ? `"${escapeHTML(q)}"` : "",
          fromFilter ? `from:${escapeHTML(fromFilter)}` : "",
          inFilter ? `in:#${escapeHTML(inFilter)}` : "",
        ].filter(Boolean).join(" ");
        $results.innerHTML = `<div class="search-empty">No results${filterDesc ? " for " + filterDesc : ""}</div>`;
        return;
      }
      // Group by workspace.
      const byWs = {};
      for (const hit of hits) {
        (byWs[hit.ws] = byWs[hit.ws] || []).push(hit);
      }
      let html = "";
      // Current workspace first.
      const orderedWs = State.current
        ? [State.current.meta.id, ...Object.keys(byWs).filter(w => w !== State.current.meta.id)]
        : Object.keys(byWs);
      for (const wsId of orderedWs) {
        const group = byWs[wsId];
        if (!group) continue;
        const wsName = wsLabels[wsId] || wsId;
        // Show workspace header if there are multiple workspaces with results.
        if (Object.keys(byWs).length > 1) {
          html += `<div class="search-ws-header">${escapeHTML(wsName)}</div>`;
        }
        for (const hit of group) {
          const current = State.current;
          const isCurrentWs = current && wsId === current.meta.id;
          const member = isCurrentWs
            ? current.members.find(m => m.id === hit.from)
            : null;
          const authorName = member ? member.name : hit.from.slice(0, 8) + "…";
          const ch = isCurrentWs
            ? current.channels.find(c => c.id === hit.ch)
            : null;
          const chName = ch ? ch.name : (hit.ch ? hit.ch.slice(0, 6) + "…" : "DM");
          const highlighted = highlightSearchResult(hit.body, hit.terms || [q]);
          html += `
            <div class="search-result" data-ws="${escapeHTML(wsId)}" data-msg="${escapeHTML(hit.orig_id || hit.id)}" data-ch="${escapeHTML(hit.ch || "")}">
              <div class="search-result-meta">
                <span>${escapeHTML(authorName)}</span>
                <span>·</span>
                <span>#${escapeHTML(chName)}</span>
                <span>·</span>
                <span>${formatDate(hit.ts)}</span>
              </div>
              <div class="search-result-body">${highlighted}</div>
            </div>
          `;
        }
      }
      $results.innerHTML = html;

      // Wire up result click: jump to the channel + message.
      $results.querySelectorAll(".search-result").forEach(el => {
        el.onclick = () => {
          const wsId = el.dataset.ws;
          const chId = el.dataset.ch;
          const msgId = el.dataset.msg;
          overlay.remove();
          if (State.current && wsId === State.current.meta.id) {
            if (chId && chId !== State.currentChannel) {
              State.currentChannel = chId;
            }
            setState({});  // re-render to show the channel
            // Scroll to message after render.
            setTimeout(() => {
              const el = document.querySelector(`[data-msg-text="${CSS.escape(msgId)}"]`);
              if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
            }, 80);
          } else {
            // Switch to a different workspace.
            openWorkspaceById(wsId).catch(console.warn);
          }
        };
      });
    }, 120);
  });

  // Keyboard navigation.
  $input.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { overlay.remove(); e.preventDefault(); }
    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
      const items = [...$results.querySelectorAll(".search-result")];
      if (!items.length) return;
      const focused = $results.querySelector(".search-result.focused");
      const idx = focused ? items.indexOf(focused) : -1;
      const next = e.key === "ArrowDown"
        ? Math.min(idx + 1, items.length - 1)
        : Math.max(idx - 1, 0);
      items.forEach(i => i.classList.remove("focused"));
      items[next].classList.add("focused");
      items[next].scrollIntoView({ block: "nearest" });
      e.preventDefault();
    }
    if (e.key === "Enter") {
      const focused = $results.querySelector(".search-result.focused");
      if (focused) focused.click();
    }
  });
}

/**
 * Wrap matched terms in `<mark>` for display. Simple word-boundary
 * highlighting — good enough without requiring DOMParser.
 */
function highlightSearchResult(body, terms) {
  const escaped = escapeHTML(body.slice(0, 200) + (body.length > 200 ? "…" : ""));
  if (!terms || terms.length === 0) return escaped;
  let out = escaped;
  for (const term of terms) {
    const re = new RegExp("(" + term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
    out = out.replace(re, "<mark>$1</mark>");
  }
  return out;
}

/* ============================================================
 *  §32  Admin operations — member removal + rekey (Slice 5 / WT-22)
 * ============================================================ */

/**
 * Convenience helper: is the current user an admin or owner of `current`?
 */
function isAdmin(current) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const me = current.members.find(m => m.id === myUserId);
  return me && (me.role === "owner" || me.role === "admin");
}

/**
 * Build and broadcast a `member.remove` envelope, then rotate the
 * workspace root key and all public channel keys so the removed member
 * can't read future messages.
 *
 * Flow:
 *  1. Send `member.remove` (target: removedUserId)
 *  2. Generate new workspace root key, wrap per remaining member
 *  3. Send `workspace.rekey` with the wrapped keys
 *  4. For each non-DM public channel: new key, send `channel.rekey`
 *  5. For each non-DM private channel where removed member was listed:
 *     new key, wrap per remaining channel members, send `channel.rekey`
 *  6. Update local projections
 */
async function sendMemberRemove(current, removedUserId) {
  if (!isAdmin(current)) throw new Error("Only admins can remove members.");
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const signKey  = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta     = current.meta;
  const remaining = current.members.filter(m => m.id !== removedUserId);

  // Helper to build, persist + broadcast a workspace-level envelope.
  const wsEnvelope = async (type, inner) => {
    meta.lc_counter = (meta.lc_counter || 0) + 1;
    const env = await Envelope.build({
      workspaceId: meta.id,
      channelId: null,
      channelKey: current.rootKey,
      signKey,
      signerPubkey: State.identity.pubkey,
      deviceId: meta.device_id,
      type,
      inner,
      vectorClock: [[myUserId, meta.lc_counter]]
    });
    await idbPut(current.wsDB, "envelopes", env);
    PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));
    return env;
  };

  // 1. member.remove envelope.
  await wsEnvelope("member.remove", { target: removedUserId, reason: "removed by admin" });

  // Apply locally before sending rekey so remaining.map works correctly.
  const removeIdx = current.members.findIndex(m => m.id === removedUserId);
  if (removeIdx !== -1) current.members.splice(removeIdx, 1);
  const removeTx = current.wsDB.transaction("members", "readwrite");
  removeTx.objectStore("members").delete(removedUserId);
  await new Promise((res, rej) => { removeTx.oncomplete = res; removeTx.onerror = rej; });

  // 2. New workspace root key.
  const newRootKey = await Crypto.genAesKey();
  const newRootRaw = await Crypto.exportAesRaw(newRootKey);
  const myPriv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);

  const wrapForMembers = async (members) => {
    const wrapped_keys = {};
    for (const m of members) {
      if (!m.x25519_pub) continue;
      const theirPub = await Crypto.importX25519Pub(m.x25519_pub);
      const kek = await Crypto.deriveX25519AesKey(myPriv, theirPub);
      const iv = Crypto.rand(12);
      const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, kek, newRootRaw));
      wrapped_keys[m.id] = { iv, ct };
    }
    return wrapped_keys;
  };

  // Include ourselves in the wrap so our own dispatch handler can load
  // the new key from the envelope on reload (not strictly needed since we
  // update in-memory below, but good for consistency).
  const membersForWrap = remaining;
  const rootWrapped = await wrapForMembers(membersForWrap);
  await wsEnvelope("workspace.rekey", { wrapped_keys: rootWrapped });

  // Update local root key immediately.
  await idbPut(current.wsDB, "keys", newRootRaw, "root");
  current.rootKey = newRootKey;

  // 3. Rekey channels.
  for (const ch of current.channels) {
    if (ch.dm) continue;  // DM keys are bilateral; can't rekey without the other party
    const newChKey = await Crypto.genAesKey();
    const newChRaw = await Crypto.exportAesRaw(newChKey);

    if (!ch.private) {
      // Public channel: raw key travels in the envelope encrypted under
      // the NEW root key (which we just set above).
      await wsEnvelope("channel.rekey", { channel_id: ch.id, key: newChRaw });
    } else {
      // Private channel: wrap per remaining member.
      const channelMembers = remaining.filter(m => (ch.members || []).includes(m.id));
      if (channelMembers.length === 0) continue;
      const wrapped_keys = {};
      for (const m of channelMembers) {
        if (!m.x25519_pub) continue;
        const theirPub = await Crypto.importX25519Pub(m.x25519_pub);
        const kek = await Crypto.deriveX25519AesKey(myPriv, theirPub);
        const iv = Crypto.rand(12);
        const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, kek, newChRaw));
        wrapped_keys[m.id] = { iv, ct };
      }
      await wsEnvelope("channel.rekey", { channel_id: ch.id, wrapped_keys });
    }

    // Update locally.
    await idbPut(current.wsDB, "keys", newChRaw, "ch:" + ch.id);
    current.channelKeys[ch.id] = newChKey;
  }

  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  current.meta.member_count = current.members.length;
}

/* ============================================================
 *  §33  Promote-by-consensus (Slice 5 / WT-23)
 *
 *  Any member can draft a promotion proposal. Others co-sign via
 *  the Admin settings tab. Once 2 distinct valid signatures are
 *  collected, any member can finalize by broadcasting the
 *  `member.promote` envelope with cosigs.
 *
 *  Signing payload (deterministic):
 *    msgpack({ type: "member.promote", target: target_id, ts, nonce })
 * ============================================================ */

/**
 * Create a new pending promotion proposal for `targetUserId`.
 * Signs the canonical payload with the drafter's identity key and
 * stores the proposal in the WorkspaceDoc (shared with peers via
 * workspace.patch).
 */
async function draftPromotion(current, targetUserId) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const signKey  = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const ts       = Date.now();
  const nonce    = Crypto.rand(12);
  const nonce_b64 = bytesToB64(nonce);

  const sigPayload = MP.encode({ type: "member.promote", target: targetUserId, ts, nonce });
  const sig = await Crypto.sign(signKey, sigPayload);

  const proposal = {
    id:         bytesToB64Url(Crypto.rand(12)),
    target_id:  targetUserId,
    drafter_id: myUserId,
    ts,
    nonce_b64,
    cosigs: [{ user_id: myUserId, sig_b64: bytesToB64(sig) }],
    expires_at: ts + 7 * 24 * 3600 * 1000  // 7 days
  };

  if (!current.doc) throw new Error("Workspace doc not loaded — cannot draft promotion.");
  const update = WorkspaceDoc.setPendingPromotion(current.doc, proposal);
  await WorkspaceDoc.save(current.wsDB, current.doc);
  await sendWorkspacePatch(current, update);
}

/**
 * Add the current user's co-signature to an existing proposal.
 * Signs the same payload (target_id + ts + nonce from proposal).
 */
async function addCoSignPromotion(current, proposalId) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const signKey  = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  if (!current.doc) throw new Error("Workspace doc not loaded.");

  const promos = WorkspaceDoc.getPendingPromotions(current.doc);
  const proposal = promos.find(p => p.id === proposalId);
  if (!proposal) throw new Error("Proposal not found.");
  if (proposal.cosigs.some(s => s.user_id === myUserId)) {
    throw new Error("You've already supported this proposal.");
  }

  const nonce    = b64ToBytes(proposal.nonce_b64);
  const sigPayload = MP.encode({ type: "member.promote", target: proposal.target_id, ts: proposal.ts, nonce });
  const sig = await Crypto.sign(signKey, sigPayload);

  proposal.cosigs.push({ user_id: myUserId, sig_b64: bytesToB64(sig) });
  const update = WorkspaceDoc.setPendingPromotion(current.doc, proposal);
  await WorkspaceDoc.save(current.wsDB, current.doc);
  await sendWorkspacePatch(current, update);
}

/**
 * Finalize a proposal once enough co-signatures are collected.
 * Builds the `member.promote` envelope with cosigs and broadcasts it.
 * The dispatch handler verifies the sigs and applies the promotion.
 */
async function finalizePromotion(current, proposalId) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const signKey  = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  if (!current.doc) throw new Error("Workspace doc not loaded.");

  const promos   = WorkspaceDoc.getPendingPromotions(current.doc);
  const proposal = promos.find(p => p.id === proposalId);
  if (!proposal) throw new Error("Proposal not found.");
  if (proposal.cosigs.length < 2) throw new Error("Need at least 2 supporters first.");

  const nonce      = b64ToBytes(proposal.nonce_b64);
  const sigPayload = MP.encode({ type: "member.promote", target: proposal.target_id, ts: proposal.ts, nonce });

  // The finalizer adds their own sig if not already present.
  let myEntry = proposal.cosigs.find(s => s.user_id === myUserId);
  if (!myEntry) {
    const sig = await Crypto.sign(signKey, sigPayload);
    myEntry = { user_id: myUserId, sig_b64: bytesToB64(sig) };
    proposal.cosigs.push(myEntry);
  }

  // Use the drafter's cosig as the primary signer on the envelope,
  // and the rest as cosigs.
  const drafterEntry = proposal.cosigs.find(s => s.user_id === proposal.drafter_id) || proposal.cosigs[0];
  const cosigsForEnv = proposal.cosigs
    .filter(s => s.user_id !== drafterEntry.user_id)
    .map(s => ({ from: s.user_id, sig: b64ToBytes(s.sig_b64) }));

  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;

  // Build envelope.  The envelope `sig` field is the primary signer's sig
  // (verified in dispatch against the canonical payload), so we need to use
  // the drafter's sig. We build the envelope normally (which computes a NEW
  // sig from our key), then swap the sig to the drafter's stored sig.
  // This works because the canonical bytes for sig verification are the same
  // regardless of who is sending the envelope wire message.
  //
  // NOTE: We still sign with our own key for the envelope wrapper; the
  // `member.promote` inner payload carries the proposal's stored sigs for
  // the dispatch handler to verify against the canonical promote payload.
  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: null,
    channelKey: current.rootKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "member.promote",
    inner: {
      target:  proposal.target_id,
      ts:      proposal.ts,
      nonce,
      signers: proposal.cosigs.map(s => ({ user_id: s.user_id, sig: b64ToBytes(s.sig_b64) }))
    },
    vectorClock: [[myUserId, meta.lc_counter]]
  });
  // Attach cosigs to the envelope for the spec §4.3 transport layer.
  env.cosigs = cosigsForEnv;

  await idbPut(current.wsDB, "envelopes", env);
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));

  // Remove from WorkspaceDoc.
  const update = WorkspaceDoc.removePendingPromotion(current.doc, proposalId);
  await WorkspaceDoc.save(current.wsDB, current.doc);
  await sendWorkspacePatch(current, update);
}

/* ============================================================
 *  §34  Workspace export / import (Slice 5 / WT-34)
 *
 *  Export format: a JSON file (`.workspace`) wrapping a PBKDF2-
 *  encrypted msgpack blob that contains:
 *    - meta: workspace metadata
 *    - envelopes: all stored envelopes (as raw msgpack bytes)
 *    - channels: projected channel records
 *    - members: projected member records
 *    - keys: all keys from the `keys` IDB store
 *
 *  Import replays the envelopes into a fresh local DB, re-projecting
 *  the workspace from first principles.
 *
 *  Identity is NOT included — identities live only in .mehfil-key.
 * ============================================================ */
function openExportModal() {
  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  wrap.innerHTML = `
    <div class="card" style="max-width: 440px;">
      <h1>Export workspace</h1>
      <p class="sub">
        Download an encrypted backup of this workspace — all messages, channels,
        members, and keys. Your identity is NOT included (use "Back up identity" for that).
      </p>
      <div class="field">
        <label>Passphrase (encrypts the file)</label>
        <input type="password" id="exp-pass1" autofocus>
      </div>
      <div class="field">
        <label>Confirm passphrase</label>
        <input type="password" id="exp-pass2">
        <div class="err" id="exp-err"></div>
      </div>
      <div class="row">
        <button id="exp-cancel">Cancel</button>
        <div class="grow"></div>
        <button class="primary" id="exp-go">Download backup</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);

  const close = () => { wrap.remove(); closeModal(); };
  wrap.querySelector("#exp-cancel").onclick = close;
  wrap.querySelector("#exp-go").onclick = async () => {
    const $err = wrap.querySelector("#exp-err");
    $err.textContent = "";
    const p1 = wrap.querySelector("#exp-pass1").value;
    const p2 = wrap.querySelector("#exp-pass2").value;
    if (!p1 || p1.length < 6) { $err.textContent = "Pick at least 6 characters."; return; }
    if (p1 !== p2) { $err.textContent = "Passphrases don't match."; return; }
    wrap.querySelector("#exp-go").disabled = true;
    try {
      await exportWorkspace(State.current, p1);
      close();
    } catch (e) {
      $err.textContent = e.message;
      wrap.querySelector("#exp-go").disabled = false;
    }
  };
}

async function exportWorkspace(current, passphrase) {
  const wsDB = current.wsDB;
  // Gather all stores.
  const [envelopes, channels, members] = await Promise.all([
    idbGetAll(wsDB, "envelopes"),
    idbGetAll(wsDB, "channels"),
    idbGetAll(wsDB, "members")
  ]);
  // The `keys` store uses out-of-line keys — we need {key, value} pairs.
  const keysStore = await idbGetAllEntries(wsDB, "keys");

  const payload = {
    meta: current.meta,
    envelopes,
    channels,
    members,
    keys: keysStore   // already raw byte arrays / plain objects from IDB
  };

  const plaintext = MP.encode(payload);
  const wrapped = await Crypto.pbkdf2Wrap(passphrase, plaintext);
  const file = {
    magic: "mehfil-workspace",
    v: 1,
    ws_id: current.meta.id,
    ws_name: current.meta.name,
    created_at: Date.now(),
    kdf: wrapped.kdf,
    wrap: wrapped.wrap
  };

  const blob = new Blob([JSON.stringify(file, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${current.meta.name.replace(/[^a-z0-9]/gi, "_")}.workspace`;
  a.click();
  URL.revokeObjectURL(url);
}

function openImportModal() {
  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  wrap.innerHTML = `
    <div class="card" style="max-width: 440px;">
      <h1>Import workspace</h1>
      <p class="sub">
        Restore a workspace from a <code>.workspace</code> backup file.
        A new local workspace will be created with all the messages and channels from the backup.
      </p>
      <div class="field">
        <label>Backup file</label>
        <input type="file" id="imp-file" accept=".workspace,.json">
      </div>
      <div class="field">
        <label>Passphrase</label>
        <input type="password" id="imp-pass">
        <div class="err" id="imp-err"></div>
      </div>
      <div id="imp-status" style="color: var(--fg-mute); font-size: 12px; min-height: 16px;"></div>
      <div class="row" style="margin-top: 14px;">
        <button id="imp-cancel">Cancel</button>
        <div class="grow"></div>
        <button class="primary" id="imp-go">Import</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);

  const close = () => { wrap.remove(); closeModal(); };
  wrap.querySelector("#imp-cancel").onclick = close;
  wrap.querySelector("#imp-go").onclick = async () => {
    const $err = wrap.querySelector("#imp-err");
    const $status = wrap.querySelector("#imp-status");
    $err.textContent = "";
    const fileInput = wrap.querySelector("#imp-file");
    const pass = wrap.querySelector("#imp-pass").value;
    if (!fileInput.files || !fileInput.files[0]) { $err.textContent = "Choose a file."; return; }
    if (!pass) { $err.textContent = "Passphrase required."; return; }
    wrap.querySelector("#imp-go").disabled = true;
    try {
      $status.textContent = "Decrypting…";
      await importWorkspace(fileInput.files[0], pass, (msg) => { $status.textContent = msg; });
      close();
      // Refresh landing page workspace list.
      const workspaces = await idbGetAll(State.globalDB, "workspaces");
      State.workspaces = workspaces;
      setState({ view: "landing" });
    } catch (e) {
      $err.textContent = e.message;
      wrap.querySelector("#imp-go").disabled = false;
      $status.textContent = "";
    }
  };
}

async function importWorkspace(file, passphrase, onProgress) {
  const text = await file.text();
  let fileObj;
  try { fileObj = JSON.parse(text); }
  catch (_) { throw new Error("Not a valid .workspace file."); }
  if (fileObj.magic !== "mehfil-workspace") throw new Error("Not a Mehfil workspace backup.");
  if (fileObj.v !== 1) throw new Error("Unsupported backup version: " + fileObj.v);

  onProgress && onProgress("Unwrapping keys…");
  let plaintext;
  try {
    plaintext = await Crypto.pbkdf2Unwrap(passphrase, fileObj);
  } catch (_) {
    throw new Error("Wrong passphrase or corrupted file.");
  }

  const payload = MP.decode(plaintext);
  const { meta, envelopes, channels, members, keys } = payload;
  if (!meta || !meta.id) throw new Error("Backup missing workspace metadata.");

  // Check for collision with existing workspace.
  const existing = State.workspaces.find(w => w.id === meta.id);
  if (existing) throw new Error(`Workspace "${existing.name}" is already on this device.`);

  onProgress && onProgress("Creating workspace DB…");
  const wsDB = await openWorkspaceDB(meta.id);

  // Restore keys store. Keys are [{key, value}] pairs from idbGetAllEntries.
  onProgress && onProgress("Restoring keys…");
  for (const entry of (keys || [])) {
    if (entry && entry.key !== undefined) {
      await idbPut(wsDB, "keys", entry.value, entry.key);
    }
  }

  // Restore channels, members.
  onProgress && onProgress("Restoring channels + members…");
  for (const ch of (channels || [])) await idbPut(wsDB, "channels", ch);
  for (const m of (members || [])) await idbPut(wsDB, "members", m);

  // Restore envelopes.
  onProgress && onProgress("Restoring messages…");
  for (const env of (envelopes || [])) await idbPut(wsDB, "envelopes", env);

  // Register in global workspaces list.
  await idbPut(State.globalDB, "workspaces", {
    id: meta.id,
    name: meta.name,
    created_at: meta.created_at || Date.now(),
    last_opened_at: Date.now()
  });

  onProgress && onProgress("Done.");
}

/* ============================================================
 *  §12  Helpers
 * ------------------------------------------------------------ */
function bytesToHex(b) {
  return Array.from(b).map(x => x.toString(16).padStart(2, "0")).join("");
}
function bytesToB64(b) {
  let s = "";
  for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]);
  return btoa(s);
}
function b64ToBytes(s) {
  const bin = atob(s);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
function bytesToB64Url(b) {
  return bytesToB64(b).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
function b64UrlToBytes(s) {
  const padded = s.replace(/-/g, "+").replace(/_/g, "/");
  const need = (4 - (padded.length % 4)) % 4;
  return b64ToBytes(padded + "=".repeat(need));
}
function u64BE(n) {
  const b = new Uint8Array(8);
  const dv = new DataView(b.buffer);
  dv.setUint32(0, Math.floor(n / 0x100000000), false);
  dv.setUint32(4, n >>> 0, false);
  return b;
}
function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  })[c]);
}
/**
 * Sanitize a URL before inserting into an href or src attribute.
 * Rejects javascript:, data:, and vbscript: URIs (WT-33 XSS hardening).
 */
function sanitizeUrl(url) {
  try {
    const parsed = new URL(url, location.href);
    if (["javascript:", "data:", "vbscript:"].includes(parsed.protocol)) return "#";
  } catch (_) { return "#"; }
  return url;
}
function initials(name) {
  return (name || "?").trim().split(/\s+/).slice(0,2).map(w => w[0] || "").join("").toUpperCase() || "?";
}
// Synchronous fingerprint formatter for places where we already have the
// 16 fp bytes (e.g. the join-verify screen, where they come from the invite
// payload, not from a member record).
function formatFpBytes(fpBytes) {
  return bytesToHex(fpBytes).match(/.{4}/g).join(" ");
}

// Compute a member's fingerprint from their pubkey (embedded in `id`) and
// attach `.fp` (8 groups of 4 hex) and `.fpBytes` (16-byte Uint8Array) to
// the record in place. Called when Workspace.open loads members, and each
// time a new member record is inserted via member.join / member.welcome.
async function attachFingerprint(member) {
  const pubBytes = b64UrlToBytes(member.id);
  const hash = await Crypto.sha256(pubBytes);
  member.fpBytes = hash.slice(0, 16);
  member.fp = formatFpBytes(member.fpBytes);
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}
function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString();
}

/**
 * Format a past timestamp as a short relative string for the presence
 * tooltip. "just now" | "5m ago" | "2h ago" | "3 days ago".
 */
function formatRelative(ts) {
  const now = Date.now();
  const deltaSec = Math.max(0, Math.floor((now - ts) / 1000));
  if (deltaSec < 60)     return "just now";
  const deltaMin = Math.floor(deltaSec / 60);
  if (deltaMin < 60)     return deltaMin + "m ago";
  const deltaHr = Math.floor(deltaMin / 60);
  if (deltaHr < 24)      return deltaHr + "h ago";
  const deltaDays = Math.floor(deltaHr / 24);
  return deltaDays + " day" + (deltaDays === 1 ? "" : "s") + " ago";
}

/* ------------------------------------------------------------
 *  §35  Relay transport — Cloudflare Worker adapter (Slice 7)
 *
 *  RelayTransport polls GET /ws/:id/envelopes for new envelopes and
 *  pushes outbound envelopes via PUT. Operates independently of PeerMgr
 *  (different transport model — polling vs WebRTC data channel).
 *
 *  RelayMgr is the workspace-level manager: one RelayTransport per
 *  workspace, started on Workspace.open and stopped on workspace close.
 *
 *  Received envelopes flow: RelayTransport → SeenSet dedup →
 *    EnvelopeDispatch.receive → PeerMgr.sendEnvelope (WebRTC rebroadcast).
 *
 *  Sent envelopes flow: PeerMgr.sendEnvelope (existing WebRTC path) +
 *    RelayMgr.send (relay push, fire-and-forget).
 * ------------------------------------------------------------ */

/**
 * RelayTransport — manages polling and pushing for one workspace + relay.
 *
 * Config: { url, token, workspaceId }
 * url   — base URL of the relay Worker (no trailing slash)
 * token — Bearer token for Authorization header (may be empty for open relay)
 */
class RelayTransport {
  constructor({ url, token, workspaceId }) {
    this.url         = url.replace(/\/$/, "");
    this.token       = token || "";
    this.workspaceId = workspaceId;
    this.cursor      = "";
    this.pollTimer   = null;
    this.status      = "connecting";
    this._closed     = false;
  }

  _headers(contentType) {
    const h = {};
    if (this.token) h["Authorization"] = "Bearer " + this.token;
    if (contentType) h["Content-Type"] = contentType;
    return h;
  }

  _wsUrl(path) {
    return `${this.url}/ws/${encodeURIComponent(this.workspaceId)}${path}`;
  }

  /** Fetch current cursor from relay (fast-forward on first connect). */
  async fetchCursor() {
    const resp = await fetch(this._wsUrl("/cursor"), {
      headers: this._headers(),
      signal: AbortSignal.timeout(8_000)
    });
    if (resp.ok) {
      const { cursor } = await resp.json();
      this.cursor = cursor || "";
      this.status = "connected";
    } else if (resp.status === 401) {
      this.status = "error";
      console.warn("Relay: auth failed — check token");
    }
  }

  /** Start polling. Call once after construction. */
  async start() {
    try { await this.fetchCursor(); } catch (e) {
      console.warn("Relay cursor fetch failed:", e.message);
      this.status = "offline";
    }
    this._schedulePoll(0);
  }

  _schedulePoll(delay = 5_000) {
    if (this._closed) return;
    this.pollTimer = setTimeout(() => this._poll(), delay);
  }

  async _poll() {
    if (this._closed) return;
    try {
      const url = new URL(this._wsUrl("/envelopes"));
      if (this.cursor) url.searchParams.set("since", this.cursor);
      url.searchParams.set("limit", "100");

      const resp = await fetch(url.href, {
        headers: this._headers(),
        signal: AbortSignal.timeout(10_000)
      });

      if (resp.ok) {
        const items = await resp.json(); // [{seq, data: base64}]
        this.status = "connected";
        for (const item of items) {
          if (this._closed) return;
          try {
            await this._ingest(item);
            this.cursor = item.seq; // advance cursor even on dispatch error
          } catch (e) {
            console.warn("Relay ingest error:", e);
          }
        }
      } else if (resp.status === 401) {
        this.status = "error";
        return; // stop polling — credentials are wrong
      } else {
        this.status = "offline";
      }
    } catch (e) {
      this.status = "offline";
      console.warn("Relay poll error:", e.message);
    }
    this._schedulePoll(5_000);
  }

  /** Decode and dispatch one relay item. */
  async _ingest({ data }) {
    // data is base64 of the raw msgpack envelope bytes.
    const bytes = b64ToBytes(data);
    const env   = MP.decode(bytes);
    if (!env || !env.id) return;

    // Seen-set deduplication (same logic as PeerMgr.handlePacket).
    const wsId = this.workspaceId;
    const known = await SeenSet.has(wsId, env.id);
    if (known) return;
    await SeenSet.add(wsId, env.id);

    // Dispatch locally — updates state, persists to IDB, re-renders.
    await EnvelopeDispatch.receive(wsId, env);

    // Rebroadcast to any connected WebRTC peers. Ephemeral envelopes
    // (presence, typing) are not rebroadcast — relay versions are stale.
    if (!EPHEMERAL_TYPES.has(env.type)) {
      await PeerMgr.sendEnvelope(wsId, env);
    }
  }

  /**
   * Push a raw msgpack envelope to the relay.
   * Called from PeerMgr.sendEnvelope (fire-and-forget).
   */
  async send(envBytes) {
