 * Builds an in-memory MiniSearch index from all available sources,
 * then renders an interactive overlay.
 */
async function openSearchPalette() {
  if (document.querySelector(".search-overlay")) return; // already open

  // Lazy-load MiniSearch.
  if (!MiniSearch) {
    try {
      const mod = await import("https://esm.sh/minisearch@7.2.0");
      MiniSearch = mod.default || mod;
    } catch (e) {
      console.warn("MiniSearch load failed:", e);
      alert("Search requires network access to load on first use. Try again when online.");
      return;
    }
  }

  // Build the combined index. Current workspace messages come from
  // State.current.messages (already in memory). Other workspaces are
  // loaded from their IDB search_index stores.
  const allDocs = [];
  const wsLabels = {};  // wsId → name

  // Current workspace.
  if (State.current) {
    const wsId = State.current.meta.id;
    wsLabels[wsId] = State.current.meta.name;
    for (const m of State.current.messages) {
      if (m.body && !m.deleted) {
        allDocs.push({ id: m.id, body: m.body, from: m.from, ch: m.ch, ts: m.ts, ws: wsId });
      }
    }
  }

  // Other workspaces (from disk index — already plaintext, safe to read).
  for (const ws of (State.workspaces || [])) {
    if (State.current && ws.id === State.current.meta.id) continue;
    wsLabels[ws.id] = ws.name;
    try {
      const wsDB = await openWorkspaceDB(ws.id);
      const recs = await SearchIndex.loadIndex(wsDB);
      wsDB.close();
      for (const r of recs) {
        allDocs.push({ id: ws.id + ":" + r.id, body: r.body, from: r.from, ch: r.ch, ts: r.ts, ws: ws.id, orig_id: r.id });
      }
    } catch (_) { /* skip unreadable workspace */ }
  }

  const ms = new MiniSearch({
    fields: ["body"],
    storeFields: ["body", "from", "ch", "ts", "ws", "orig_id"],
    searchOptions: { prefix: true, fuzzy: 0.15, boost: { body: 1 } }
  });
  ms.addAll(allDocs);

  // Render overlay.
  const overlay = document.createElement("div");
  overlay.className = "search-overlay";
  overlay.innerHTML = `
    <div class="search-palette">
      <div class="search-input-row">
        <span class="search-input-icon">⌕</span>
        <input id="search-input" type="text" placeholder="Search messages… (from:name, in:#channel)" autocomplete="off">
        <span class="search-kbd">Esc</span>
      </div>
      <div class="search-results" id="search-results">
        <div class="search-empty">Type to search across all messages</div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const $input = overlay.querySelector("#search-input");
  const $results = overlay.querySelector("#search-results");
  $input.focus();

  // Close on background click or Escape (Escape handled globally, but also here).
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) overlay.remove();
  });

  /**
   * §6 Search filter parser. Extracts `from:name` and `in:#channel`
   * tokens from the raw query, returning { baseQuery, fromFilter, inFilter }.
   * Both filters are lowercased for case-insensitive matching.
   */
  function parseSearchQuery(raw) {
    let q = raw;
    let fromFilter = null, inFilter = null;
    // from:name — match by display name (prefix)
    q = q.replace(/\bfrom:(\S+)/gi, (_, name) => { fromFilter = name.toLowerCase(); return ""; });
    // in:#channel or in:channel
    q = q.replace(/\bin:#?(\S+)/gi, (_, ch) => { inFilter = ch.toLowerCase(); return ""; });
    return { baseQuery: q.trim(), fromFilter, inFilter };
  }

  /** Apply from:/in: post-filters against already-scored MiniSearch hits. */
  function applySearchFilters(hits, fromFilter, inFilter, wsId, members, channels) {
    if (!fromFilter && !inFilter) return hits;
    return hits.filter(hit => {
      if (fromFilter) {
        const isCurrentWs = wsId && hit.ws === wsId;
        const memberName = isCurrentWs
          ? (members.find(m => m.id === hit.from)?.name || "")
          : hit.from;
        if (!memberName.toLowerCase().includes(fromFilter)) return false;
      }
      if (inFilter) {
        const isCurrentWs = wsId && hit.ws === wsId;
        const chName = isCurrentWs
          ? (channels.find(c => c.id === hit.ch)?.name || hit.ch || "")
          : (hit.ch || "");
        if (!chName.toLowerCase().includes(inFilter)) return false;
      }
      return true;
    });
  }

  // Live search.
  let debounceTimer = null;
  $input.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      const raw = $input.value.trim();
      if (!raw) {
        $results.innerHTML = `<div class="search-empty">Type to search across all messages</div>`;
        return;
      }
      const { baseQuery: q, fromFilter, inFilter } = parseSearchQuery(raw);
      const wsId = State.current?.meta?.id;
      const members = State.current?.members || [];
      const channels = State.current?.channels || [];
      // If only filters provided (no freetext), start from all indexed docs.
      const rawHits = q ? ms.search(q, { limit: 100 }) : allDocs;
      const hits = applySearchFilters(rawHits, fromFilter, inFilter, wsId, members, channels).slice(0, 40);
      if (hits.length === 0) {
        const filterDesc = [
          q ? `"${escapeHTML(q)}"` : "",
          fromFilter ? `from:${escapeHTML(fromFilter)}` : "",
          inFilter ? `in:#${escapeHTML(inFilter)}` : "",
        ].filter(Boolean).join(" ");
        $results.innerHTML = `<div class="search-empty">No results${filterDesc ? " for " + filterDesc : ""}</div>`;
        return;
      }
      // Group by workspace.
      const byWs = {};
      for (const hit of hits) {
        (byWs[hit.ws] = byWs[hit.ws] || []).push(hit);
      }
      let html = "";
      // Current workspace first.
      const orderedWs = State.current
        ? [State.current.meta.id, ...Object.keys(byWs).filter(w => w !== State.current.meta.id)]
        : Object.keys(byWs);
      for (const wsId of orderedWs) {
        const group = byWs[wsId];
        if (!group) continue;
        const wsName = wsLabels[wsId] || wsId;
        // Show workspace header if there are multiple workspaces with results.
        if (Object.keys(byWs).length > 1) {
          html += `<div class="search-ws-header">${escapeHTML(wsName)}</div>`;
        }
        for (const hit of group) {
          const current = State.current;
          const isCurrentWs = current && wsId === current.meta.id;
          const member = isCurrentWs
            ? current.members.find(m => m.id === hit.from)
            : null;
          const authorName = member ? member.name : hit.from.slice(0, 8) + "…";
          const ch = isCurrentWs
            ? current.channels.find(c => c.id === hit.ch)
            : null;
          const chName = ch ? ch.name : (hit.ch ? hit.ch.slice(0, 6) + "…" : "DM");
          const highlighted = highlightSearchResult(hit.body, hit.terms || [q]);
          html += `
            <div class="search-result" data-ws="${escapeHTML(wsId)}" data-msg="${escapeHTML(hit.orig_id || hit.id)}" data-ch="${escapeHTML(hit.ch || "")}">
              <div class="search-result-meta">
                <span>${escapeHTML(authorName)}</span>
                <span>·</span>
                <span>#${escapeHTML(chName)}</span>
                <span>·</span>
                <span>${formatDate(hit.ts)}</span>
              </div>
              <div class="search-result-body">${highlighted}</div>
            </div>
          `;
        }
      }
      $results.innerHTML = html;

      // Wire up result click: jump to the channel + message.
      $results.querySelectorAll(".search-result").forEach(el => {
        el.onclick = () => {
          const wsId = el.dataset.ws;
          const chId = el.dataset.ch;
          const msgId = el.dataset.msg;
          overlay.remove();
          if (State.current && wsId === State.current.meta.id) {
            if (chId && chId !== State.currentChannel) {
              State.currentChannel = chId;
            }
            setState({});  // re-render to show the channel
            // Scroll to message after render.
            setTimeout(() => {
              const el = document.querySelector(`[data-msg-text="${CSS.escape(msgId)}"]`);
              if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
            }, 80);
          } else {
            // Switch to a different workspace.
            openWorkspaceById(wsId).catch(console.warn);
          }
        };
      });
    }, 120);
  });

  // Keyboard navigation.
  $input.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { overlay.remove(); e.preventDefault(); }
    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
      const items = [...$results.querySelectorAll(".search-result")];
      if (!items.length) return;
      const focused = $results.querySelector(".search-result.focused");
      const idx = focused ? items.indexOf(focused) : -1;
      const next = e.key === "ArrowDown"
        ? Math.min(idx + 1, items.length - 1)
        : Math.max(idx - 1, 0);
      items.forEach(i => i.classList.remove("focused"));
      items[next].classList.add("focused");
      items[next].scrollIntoView({ block: "nearest" });
      e.preventDefault();
    }
    if (e.key === "Enter") {
      const focused = $results.querySelector(".search-result.focused");
      if (focused) focused.click();
    }
  });
}

/**
 * Wrap matched terms in `<mark>` for display. Simple word-boundary
 * highlighting — good enough without requiring DOMParser.
 */
function highlightSearchResult(body, terms) {
  const escaped = escapeHTML(body.slice(0, 200) + (body.length > 200 ? "…" : ""));
  if (!terms || terms.length === 0) return escaped;
  let out = escaped;
  for (const term of terms) {
    const re = new RegExp("(" + term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
    out = out.replace(re, "<mark>$1</mark>");
  }
  return out;
}

/* ============================================================
 *  §32  Admin operations — member removal + rekey (Slice 5 / WT-22)
 * ============================================================ */

/**
 * Convenience helper: is the current user an admin or owner of `current`?
 */
function isAdmin(current) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const me = current.members.find(m => m.id === myUserId);
  return me && (me.role === "owner" || me.role === "admin");
}

/**
 * Build and broadcast a `member.remove` envelope, then rotate the
 * workspace root key and all public channel keys so the removed member
 * can't read future messages.
 *
 * Flow:
 *  1. Send `member.remove` (target: removedUserId)
 *  2. Generate new workspace root key, wrap per remaining member
 *  3. Send `workspace.rekey` with the wrapped keys
 *  4. For each non-DM public channel: new key, send `channel.rekey`
 *  5. For each non-DM private channel where removed member was listed:
 *     new key, wrap per remaining channel members, send `channel.rekey`
 *  6. Update local projections
 */
/**
 * v2: scheduled workspace rekey — admin-initiated rotation that doesn't
 * remove a member. Same shape as sendMemberRemove's rekey steps, but with
 * the full current membership as the "remaining" set. Resets the
 * `last_rekey_at` marker on meta so the scheduled-rekey banner clears.
 */
async function sendScheduledRekey(current) {
  if (!isAdmin(current)) throw new Error("Only admins can trigger a rekey.");
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const signKey  = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta     = current.meta;
  const wsEnvelope = async (type, inner) => {
    meta.lc_counter = (meta.lc_counter || 0) + 1;
    const env = await Envelope.build({
      workspaceId: meta.id, channelId: null,
      channelKey: current.rootKey, signKey,
      signerPubkey: State.identity.pubkey,
      deviceId: meta.device_id,
      type, inner,
      vectorClock: [[myUserId, meta.lc_counter]]
    });
    await idbPut(current.wsDB, "envelopes", env);
    PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));
    return env;
  };

  const newRootKey = await Crypto.genAesKey();
  const newRootRaw = await Crypto.exportAesRaw(newRootKey);
  const myPriv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);

  const wrapped_keys = {};
  for (const m of current.members) {
    if (!m.x25519_pub) continue;
    const theirPub = await Crypto.importX25519Pub(m.x25519_pub);
    const kek = await Crypto.deriveX25519AesKey(myPriv, theirPub);
    const iv = Crypto.rand(12);
    const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, kek, newRootRaw));
    wrapped_keys[m.id] = { iv, ct };
  }
  await wsEnvelope("workspace.rekey", { wrapped_keys });
  await idbPut(current.wsDB, "keys", newRootRaw, "root");
  current.rootKey = newRootKey;

  for (const ch of current.channels) {
    if (ch.dm) continue;
    const newChKey = await Crypto.genAesKey();
    const newChRaw = await Crypto.exportAesRaw(newChKey);
    if (!ch.private) {
      await wsEnvelope("channel.rekey", { channel_id: ch.id, key: newChRaw });
    } else {
      const channelMembers = current.members.filter(m => (ch.members || []).includes(m.id));
      const chWrapped = {};
      for (const m of channelMembers) {
        if (!m.x25519_pub) continue;
        const theirPub = await Crypto.importX25519Pub(m.x25519_pub);
        const kek = await Crypto.deriveX25519AesKey(myPriv, theirPub);
        const iv = Crypto.rand(12);
        const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, kek, newChRaw));
        chWrapped[m.id] = { iv, ct };
      }
      await wsEnvelope("channel.rekey", { channel_id: ch.id, wrapped_keys: chWrapped });
    }
    await idbPut(current.wsDB, "keys", newChRaw, "ch:" + ch.id);
    current.channelKeys[ch.id] = await Crypto.importAesRaw(newChRaw);
  }

  meta.last_rekey_at = Date.now();
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
}

async function sendMemberRemove(current, removedUserId) {
  if (!isAdmin(current)) throw new Error("Only admins can remove members.");
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const signKey  = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta     = current.meta;
  const remaining = current.members.filter(m => m.id !== removedUserId);

  // Helper to build, persist + broadcast a workspace-level envelope.
  const wsEnvelope = async (type, inner) => {
    meta.lc_counter = (meta.lc_counter || 0) + 1;
    const env = await Envelope.build({
      workspaceId: meta.id,
      channelId: null,
      channelKey: current.rootKey,
      signKey,
      signerPubkey: State.identity.pubkey,
      deviceId: meta.device_id,
      type,
      inner,
      vectorClock: [[myUserId, meta.lc_counter]]
    });
    await idbPut(current.wsDB, "envelopes", env);
    PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));
    return env;
  };

  // 1. member.remove envelope.
  await wsEnvelope("member.remove", { target: removedUserId, reason: "removed by admin" });

  // Apply locally before sending rekey so remaining.map works correctly.
  const removeIdx = current.members.findIndex(m => m.id === removedUserId);
  if (removeIdx !== -1) current.members.splice(removeIdx, 1);
  const removeTx = current.wsDB.transaction("members", "readwrite");
  removeTx.objectStore("members").delete(removedUserId);
  await new Promise((res, rej) => { removeTx.oncomplete = res; removeTx.onerror = rej; });

  // 2. New workspace root key.
  const newRootKey = await Crypto.genAesKey();
  const newRootRaw = await Crypto.exportAesRaw(newRootKey);
  const myPriv = await Crypto.importX25519Priv(State.identity.x25519_priv_pkcs8);

  const wrapForMembers = async (members) => {
    const wrapped_keys = {};
    for (const m of members) {
      if (!m.x25519_pub) continue;
      const theirPub = await Crypto.importX25519Pub(m.x25519_pub);
      const kek = await Crypto.deriveX25519AesKey(myPriv, theirPub);
      const iv = Crypto.rand(12);
      const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, kek, newRootRaw));
      wrapped_keys[m.id] = { iv, ct };
    }
    return wrapped_keys;
  };

  // Include ourselves in the wrap so our own dispatch handler can load
  // the new key from the envelope on reload (not strictly needed since we
  // update in-memory below, but good for consistency).
  const membersForWrap = remaining;
  const rootWrapped = await wrapForMembers(membersForWrap);
  await wsEnvelope("workspace.rekey", { wrapped_keys: rootWrapped });

  // Update local root key immediately.
  await idbPut(current.wsDB, "keys", newRootRaw, "root");
  current.rootKey = newRootKey;

  // 3. Rekey channels.
  for (const ch of current.channels) {
    if (ch.dm) continue;  // DM keys are bilateral; can't rekey without the other party
    const newChKey = await Crypto.genAesKey();
    const newChRaw = await Crypto.exportAesRaw(newChKey);

    if (!ch.private) {
      // Public channel: raw key travels in the envelope encrypted under
      // the NEW root key (which we just set above).
      await wsEnvelope("channel.rekey", { channel_id: ch.id, key: newChRaw });
    } else {
      // Private channel: wrap per remaining member.
      const channelMembers = remaining.filter(m => (ch.members || []).includes(m.id));
      if (channelMembers.length === 0) continue;
      const wrapped_keys = {};
      for (const m of channelMembers) {
        if (!m.x25519_pub) continue;
        const theirPub = await Crypto.importX25519Pub(m.x25519_pub);
        const kek = await Crypto.deriveX25519AesKey(myPriv, theirPub);
        const iv = Crypto.rand(12);
        const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, kek, newChRaw));
        wrapped_keys[m.id] = { iv, ct };
      }
      await wsEnvelope("channel.rekey", { channel_id: ch.id, wrapped_keys });
    }

    // Update locally.
    await idbPut(current.wsDB, "keys", newChRaw, "ch:" + ch.id);
    current.channelKeys[ch.id] = newChKey;
  }

  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  current.meta.member_count = current.members.length;
}

/**
 * Called when we receive a device.revoke envelope that revokes our own current
 * device. Clears workspace keys from IDB so messages can't be decrypted, then
 * navigates to the revoked screen.
 */
async function handleSelfRevocation(wsId) {
  try {
    const wsDB = await openWorkspaceDB(wsId);
    const tx = wsDB.transaction("keys", "readwrite");
    const store = tx.objectStore("keys");
    const keysReq = store.getAllKeys();
    await new Promise(res => { keysReq.onsuccess = res; keysReq.onerror = res; });
    for (const k of (keysReq.result || [])) {
      if (k === "root" || String(k).startsWith("ch:") || String(k).startsWith("sk:")) store.delete(k);
    }
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
    wsDB.close();
  } catch (e) {
    console.warn("handleSelfRevocation: key wipe failed", e);
  }
  RelayMgr.stop(wsId);
  BridgeMgr.stop(wsId);
  PeerMgr.detach(wsId);
  if (HuddleMgr.wsId === wsId) HuddleMgr.leave().catch(() => {});
  setState({ view: "revoked" });
}

/**
 * Broadcast a device.add envelope so other workspace members learn about
 * a newly paired device. Called by Device A after confirming the pairing
 * and by Device B after importing the identity and seeding the workspace.
 */
async function sendDeviceAdd(current, newDeviceId) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const signKey  = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta     = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  const env = await Envelope.build({
    workspaceId:  meta.id,
    channelId:    null,
    channelKey:   current.rootKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId:     meta.device_id,
    type:         "device.add",
    inner:        { device_id: newDeviceId, ts: Date.now() },
    vectorClock:  [[myUserId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "envelopes", env);
  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn("device.add peer:", e));
  RelayMgr.send(meta.id, MP.encode(env)).catch(e => console.warn("device.add relay:", e));
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  // Apply locally so the Devices tab reflects the change immediately.
  const me = current.members.find(m => m.id === myUserId);
  if (me && !me.devices.includes(newDeviceId)) {
    me.devices.push(newDeviceId);
    await idbPut(current.wsDB, "members", me);
  }
}

/**
 * Revoke a specific device from this identity. Broadcasts device.revoke to all
 * workspace peers. Called from Settings → Devices.
 */
async function sendDeviceRevoke(current, targetDeviceId) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const me = current.members.find(m => m.id === myUserId);
  if (!me) throw new Error("Not a member of this workspace.");
  if (me.devices.length <= 1 && me.devices.includes(targetDeviceId)) {
    throw new Error("Cannot revoke your only device — you would lose access.");
  }
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta    = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  const env = await Envelope.build({
    workspaceId:  meta.id,
    channelId:    null,
    channelKey:   current.rootKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId:     meta.device_id,
    type:         "device.revoke",
    inner:        { device_id: targetDeviceId, ts: Date.now() },
    vectorClock:  [[myUserId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "envelopes", env);
  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn("device.revoke peer:", e));
  RelayMgr.send(meta.id, MP.encode(env)).catch(e => console.warn("device.revoke relay:", e));
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  // Apply locally. The device may belong to ANY member (an admin can revoke
  // someone else's device), so remove it from whoever actually owns it — not
  // from `me`. We never receive our own envelope, so this local apply is the
  // only thing that updates our projection.
  const owner = current.members.find(m => Array.isArray(m.devices) && m.devices.includes(targetDeviceId)) || me;
  owner.devices = owner.devices.filter(d => d !== targetDeviceId);
  await idbPut(current.wsDB, "members", owner);

  // C5: rotate the workspace + channel keys so the revoked device can't
  // decrypt content sent from here on. Only admins can rekey, and it's the
  // revoker (not every receiver) who performs it, so it happens exactly once.
  //
  // Bound, and stated honestly: this cuts the device off from FUTURE content
  // only to the extent it doesn't already hold the wrapping key. Today paired
  // devices share the identity's X25519 key, so revoking one *secondary*
  // device of a member who stays does NOT stop it reading (it can still
  // unwrap the new root as that member). What is fully cut off regardless is
  // SENDING — active-device enforcement drops its envelopes at ingest. Full
  // read-cutoff needs per-device X25519 wrapping (see plan/pending.md).
  if (isAdmin(current)) {
    try { await sendScheduledRekey(current); }
    catch (e) { console.warn("device.revoke: rekey failed", e); }
  }
}

/* ============================================================
 *  §33  Promote-by-consensus (Slice 5 / WT-23)
 *
 *  Any member can draft a promotion proposal. Others co-sign via
 *  the Admin settings tab. Once 2 distinct valid signatures are
 *  collected, any member can finalize by broadcasting the
 *  `member.promote` envelope with cosigs.
 *
 *  Signing payload (deterministic):
 *    msgpack({ type: "member.promote", target: target_id, ts, nonce })
 * ============================================================ */

/**
 * Create a new pending promotion proposal for `targetUserId`.
 * Signs the canonical payload with the drafter's identity key and
 * stores the proposal in the WorkspaceDoc (shared with peers via
 * workspace.patch).
 */
/**
 * v1.1: voluntary admin transfer. An existing owner/admin unilaterally
 * hands off admin rights to another member — the envelope is signed only
 * by the sender (no consensus needed, since you're only giving up your
 * own authority). On receive, the sender keeps their admin status too —
 * transfer means "grant to target", not "demote self". Use `/demote`
 * (v1.1 cluster) for consensus-based demote.
 */
/**
 * v1.1: voluntary step-down from admin. Unilateral — any admin can
 * demote themselves to member, provided at least one other admin
 * remains (otherwise the workspace is left without admin authority).
 * Owners can't step down via this path — they'd orphan the workspace;
 * they must first transfer admin to another member and let a new owner
 * emerge via promote-by-consensus.
 */
async function sendStepDown(current) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const me = current.members.find(m => m.id === myUserId);
  if (!me) throw new Error("Member record missing.");
  if (me.role === "owner") throw new Error("Owners can't step down — transfer admin first.");
  if (me.role !== "admin") throw new Error("You're not an admin.");
  const otherAdmins = current.members.filter(m =>
    m.id !== myUserId && (m.role === "owner" || m.role === "admin")
  );
  if (otherAdmins.length === 0) {
    throw new Error("You're the only admin — promote someone else first, or you'll lock yourself out.");
  }
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: null,
    channelKey: current.rootKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "member.step_down",
    inner: { ts: Date.now() },
    vectorClock: [[myUserId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "envelopes", env);
  me.role = "member";
  await idbPut(current.wsDB, "members", me);
  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));
}

async function sendTransferAdmin(current, targetUserId) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const me = current.members.find(m => m.id === myUserId);
  if (!(me?.role === "owner" || me?.role === "admin")) {
    throw new Error("Only admins can transfer admin status.");
  }
  const target = current.members.find(m => m.id === targetUserId);
  if (!target) throw new Error("Target is not a workspace member.");
  if (target.role === "owner" || target.role === "admin") {
    throw new Error(target.name + " is already an admin.");
  }
  const signKey = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: null,
    channelKey: current.rootKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "member.transfer_admin",
    inner: { target: targetUserId, ts: Date.now() },
    vectorClock: [[myUserId, meta.lc_counter]]
  });
  await idbPut(current.wsDB, "envelopes", env);
  // Apply locally immediately.
  target.role = "admin";
  await idbPut(current.wsDB, "members", target);
  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));
}

async function draftPromotion(current, targetUserId) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const signKey  = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  const ts       = Date.now();
  const nonce    = Crypto.rand(12);
  const nonce_b64 = bytesToB64(nonce);

  const sigPayload = MP.encode({ type: "member.promote", target: targetUserId, ts, nonce });
  const sig = await Crypto.sign(signKey, sigPayload);

  const proposal = {
    id:         bytesToB64Url(Crypto.rand(12)),
    target_id:  targetUserId,
    drafter_id: myUserId,
    ts,
    nonce_b64,
    cosigs: [{ user_id: myUserId, sig_b64: bytesToB64(sig) }],
    expires_at: ts + 7 * 24 * 3600 * 1000  // 7 days
  };

  if (!current.doc) throw new Error("Workspace doc not loaded — cannot draft promotion.");
  const update = WorkspaceDoc.setPendingPromotion(current.doc, proposal);
  await WorkspaceDoc.save(current.wsDB, current.doc);
  await sendWorkspacePatch(current, update);
}

/**
 * Add the current user's co-signature to an existing proposal.
 * Signs the same payload (target_id + ts + nonce from proposal).
 */
async function addCoSignPromotion(current, proposalId) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const signKey  = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  if (!current.doc) throw new Error("Workspace doc not loaded.");

  const promos = WorkspaceDoc.getPendingPromotions(current.doc);
  const proposal = promos.find(p => p.id === proposalId);
  if (!proposal) throw new Error("Proposal not found.");
  if (proposal.cosigs.some(s => s.user_id === myUserId)) {
    throw new Error("You've already supported this proposal.");
  }

  const nonce    = b64ToBytes(proposal.nonce_b64);
  const sigPayload = MP.encode({ type: "member.promote", target: proposal.target_id, ts: proposal.ts, nonce });
  const sig = await Crypto.sign(signKey, sigPayload);

  proposal.cosigs.push({ user_id: myUserId, sig_b64: bytesToB64(sig) });
  const update = WorkspaceDoc.setPendingPromotion(current.doc, proposal);
  await WorkspaceDoc.save(current.wsDB, current.doc);
  await sendWorkspacePatch(current, update);
}

/**
 * Finalize a proposal once enough co-signatures are collected.
 * Builds the `member.promote` envelope with cosigs and broadcasts it.
 * The dispatch handler verifies the sigs and applies the promotion.
 */
async function finalizePromotion(current, proposalId) {
  const myUserId = bytesToB64Url(State.identity.pubkey);
  const signKey  = await Crypto.importSignKey(State.identity.privkey_pkcs8);
  if (!current.doc) throw new Error("Workspace doc not loaded.");

  const promos   = WorkspaceDoc.getPendingPromotions(current.doc);
  const proposal = promos.find(p => p.id === proposalId);
  if (!proposal) throw new Error("Proposal not found.");
  // Sender-side pre-check mirroring the handler: need min(2, adminCount) admin
  // supporters, so a sole owner can bootstrap the first admin. The handler is
  // the authority; this is just so the UI fails early with a clear message.
  const adminCount = current.members.filter(
    m => isAdminRole(m.role) && m.id !== proposal.target_id).length;
  const needed = Math.min(PROMOTE_THRESHOLD, Math.max(1, adminCount));
  const adminCosigs = proposal.cosigs.filter(
    s => current.members.some(m => canonUserId(m.id) === canonUserId(s.user_id) && isAdminRole(m.role))).length;
  if (adminCosigs < needed) {
    throw new Error("Need " + needed + " admin supporter(s) first.");
  }

  const nonce      = b64ToBytes(proposal.nonce_b64);
  const sigPayload = MP.encode({ type: "member.promote", target: proposal.target_id, ts: proposal.ts, nonce });

  // The finalizer adds their own sig if not already present.
  let myEntry = proposal.cosigs.find(s => s.user_id === myUserId);
  if (!myEntry) {
    const sig = await Crypto.sign(signKey, sigPayload);
    myEntry = { user_id: myUserId, sig_b64: bytesToB64(sig) };
    proposal.cosigs.push(myEntry);
  }

  // Use the drafter's cosig as the primary signer on the envelope,
  // and the rest as cosigs.
  const drafterEntry = proposal.cosigs.find(s => s.user_id === proposal.drafter_id) || proposal.cosigs[0];
  const cosigsForEnv = proposal.cosigs
    .filter(s => s.user_id !== drafterEntry.user_id)
    .map(s => ({ from: s.user_id, sig: b64ToBytes(s.sig_b64) }));

  const meta = current.meta;
  meta.lc_counter = (meta.lc_counter || 0) + 1;

  // Build envelope.  The envelope `sig` field is the primary signer's sig
  // (verified in dispatch against the canonical payload), so we need to use
  // the drafter's sig. We build the envelope normally (which computes a NEW
  // sig from our key), then swap the sig to the drafter's stored sig.
  // This works because the canonical bytes for sig verification are the same
  // regardless of who is sending the envelope wire message.
  //
  // NOTE: We still sign with our own key for the envelope wrapper; the
  // `member.promote` inner payload carries the proposal's stored sigs for
  // the dispatch handler to verify against the canonical promote payload.
  const env = await Envelope.build({
    workspaceId: meta.id,
    channelId: null,
    channelKey: current.rootKey,
    signKey,
    signerPubkey: State.identity.pubkey,
    deviceId: meta.device_id,
    type: "member.promote",
    inner: {
      target:  proposal.target_id,
      ts:      proposal.ts,
      nonce,
      signers: proposal.cosigs.map(s => ({ user_id: s.user_id, sig: b64ToBytes(s.sig_b64) }))
    },
    vectorClock: [[myUserId, meta.lc_counter]]
  });
  // Attach cosigs to the envelope for the spec §4.3 transport layer.
  env.cosigs = cosigsForEnv;

  await idbPut(current.wsDB, "envelopes", env);
  await idbPut(current.wsDB, "keys", meta, "workspace_meta");
  PeerMgr.sendEnvelope(meta.id, env).catch(e => console.warn(e));

  // Remove from WorkspaceDoc.
  const update = WorkspaceDoc.removePendingPromotion(current.doc, proposalId);
  await WorkspaceDoc.save(current.wsDB, current.doc);
  await sendWorkspacePatch(current, update);
}

/* ============================================================
 *  §34  Workspace export / import (Slice 5 / WT-34)
 *
 *  Export format: a JSON file (`.workspace`) wrapping a PBKDF2-
 *  encrypted msgpack blob that contains:
 *    - meta: workspace metadata
 *    - envelopes: all stored envelopes (as raw msgpack bytes)
 *    - channels: projected channel records
 *    - members: projected member records
 *    - keys: all keys from the `keys` IDB store
 *
 *  Import replays the envelopes into a fresh local DB, re-projecting
 *  the workspace from first principles.
 *
 *  Identity is NOT included — identities live only in .mehfil-key.
 * ============================================================ */
function openExportModal() {
  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  wrap.innerHTML = `
    <div class="card" style="max-width: 440px;">
      <h1>Export workspace</h1>
      <p class="sub">
        Download an encrypted backup of this workspace — all messages, channels,
        members, and keys. Your identity is NOT included (use "Back up identity" for that).
      </p>
      <div class="field">
        <label>Passphrase (encrypts the file)</label>
        <input type="password" id="exp-pass1" autofocus>
      </div>
      <div class="field">
        <label>Confirm passphrase</label>
        <input type="password" id="exp-pass2">
        <div class="err" id="exp-err"></div>
      </div>
      <div class="row">
        <button id="exp-cancel">Cancel</button>
        <div class="grow"></div>
        <button class="primary" id="exp-go">Download backup</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);

  const close = () => { wrap.remove(); closeModal(); };
  wrap.querySelector("#exp-cancel").onclick = close;
  wrap.querySelector("#exp-go").onclick = async () => {
    const $err = wrap.querySelector("#exp-err");
    $err.textContent = "";
    const p1 = wrap.querySelector("#exp-pass1").value;
    const p2 = wrap.querySelector("#exp-pass2").value;
    if (!p1 || p1.length < 6) { $err.textContent = "Pick at least 6 characters."; return; }
    if (p1 !== p2) { $err.textContent = "Passphrases don't match."; return; }
    wrap.querySelector("#exp-go").disabled = true;
    try {
      await exportWorkspace(State.current, p1);
      close();
    } catch (e) {
      $err.textContent = e.message;
      wrap.querySelector("#exp-go").disabled = false;
    }
  };
}

async function exportWorkspace(current, passphrase) {
  const wsDB = current.wsDB;
  // Gather all stores.
  const [envelopes, channels, members] = await Promise.all([
    idbGetAll(wsDB, "envelopes"),
    idbGetAll(wsDB, "channels"),
    idbGetAll(wsDB, "members")
  ]);
  // The `keys` store uses out-of-line keys — we need {key, value} pairs.
  const keysStore = await idbGetAllEntries(wsDB, "keys");

  const payload = {
    meta: current.meta,
    envelopes,
    channels,
    members,
    keys: keysStore   // already raw byte arrays / plain objects from IDB
  };

  const plaintext = MP.encode(payload);
  const wrapped = await Crypto.pbkdf2Wrap(passphrase, plaintext);
  const file = {
    magic: "mehfil-workspace",
    v: 1,
    ws_id: current.meta.id,
    ws_name: current.meta.name,
    created_at: Date.now(),
    kdf: wrapped.kdf,
    wrap: wrapped.wrap
  };

  const blob = new Blob([JSON.stringify(file, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${current.meta.name.replace(/[^a-z0-9]/gi, "_")}.workspace`;
  a.click();
  URL.revokeObjectURL(url);
}

function openImportModal() {
  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  wrap.innerHTML = `
    <div class="card" style="max-width: 440px;">
      <h1>Import workspace</h1>
      <p class="sub">
        Restore a workspace from a <code>.workspace</code> backup file.
        A new local workspace will be created with all the messages and channels from the backup.
      </p>
      <div class="field">
        <label>Backup file</label>
        <input type="file" id="imp-file" accept=".workspace,.json">
      </div>
      <div class="field">
        <label>Passphrase</label>
        <input type="password" id="imp-pass">
        <div class="err" id="imp-err"></div>
      </div>
      <div id="imp-status" style="color: var(--fg-mute); font-size: 12px; min-height: 16px;"></div>
      <div class="row" style="margin-top: 14px;">
        <button id="imp-cancel">Cancel</button>
        <div class="grow"></div>
        <button class="primary" id="imp-go">Import</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);

  const close = () => { wrap.remove(); closeModal(); };
  wrap.querySelector("#imp-cancel").onclick = close;
  wrap.querySelector("#imp-go").onclick = async () => {
    const $err = wrap.querySelector("#imp-err");
    const $status = wrap.querySelector("#imp-status");
    $err.textContent = "";
    const fileInput = wrap.querySelector("#imp-file");
    const pass = wrap.querySelector("#imp-pass").value;
    if (!fileInput.files || !fileInput.files[0]) { $err.textContent = "Choose a file."; return; }
    if (!pass) { $err.textContent = "Passphrase required."; return; }
    wrap.querySelector("#imp-go").disabled = true;
    try {
      $status.textContent = "Decrypting…";
      await importWorkspace(fileInput.files[0], pass, (msg) => { $status.textContent = msg; });
      close();
      // Refresh landing page workspace list.
      const workspaces = await idbGetAll(State.globalDB, "workspaces");
      State.workspaces = workspaces;
      setState({ view: "landing" });
    } catch (e) {
      $err.textContent = e.message;
      wrap.querySelector("#imp-go").disabled = false;
      $status.textContent = "";
    }
  };
}

async function importWorkspace(file, passphrase, onProgress) {
  const text = await file.text();
  let fileObj;
  try { fileObj = JSON.parse(text); }
  catch (_) { throw new Error("Not a valid .workspace file."); }
  if (fileObj.magic !== "mehfil-workspace") throw new Error("Not a Mehfil workspace backup.");
  if (fileObj.v !== 1) throw new Error("Unsupported backup version: " + fileObj.v);

  onProgress && onProgress("Unwrapping keys…");
  let plaintext;
  try {
    plaintext = await Crypto.pbkdf2Unwrap(passphrase, fileObj);
  } catch (_) {
    throw new Error("Wrong passphrase or corrupted file.");
  }

  const payload = MP.decode(plaintext);
  const { meta, envelopes, channels, members, keys } = payload;
  if (!meta || !meta.id) throw new Error("Backup missing workspace metadata.");

  // Check for collision with existing workspace.
  const existing = State.workspaces.find(w => w.id === meta.id);
  if (existing) throw new Error(`Workspace "${existing.name}" is already on this device.`);

  onProgress && onProgress("Creating workspace DB…");
  const wsDB = await openWorkspaceDB(meta.id);

  // Restore keys store. Keys are [{key, value}] pairs from idbGetAllEntries.
  onProgress && onProgress("Restoring keys…");
  for (const entry of (keys || [])) {
    if (entry && entry.key !== undefined) {
      await idbPut(wsDB, "keys", entry.value, entry.key);
    }
  }

  // Restore channels, members.
  onProgress && onProgress("Restoring channels + members…");
  for (const ch of (channels || [])) await idbPut(wsDB, "channels", ch);
  for (const m of (members || [])) await idbPut(wsDB, "members", m);

  // Restore envelopes.
  onProgress && onProgress("Restoring messages…");
  for (const env of (envelopes || [])) await idbPut(wsDB, "envelopes", env);

  // Register in global workspaces list.
  await idbPut(State.globalDB, "workspaces", {
    id: meta.id,
    name: meta.name,
    created_at: meta.created_at || Date.now(),
    last_opened_at: Date.now()
  });

  onProgress && onProgress("Done.");
}

/* ============================================================
 *  §12  Helpers
 * ------------------------------------------------------------ */
function bytesToHex(b) {
  return Array.from(b).map(x => x.toString(16).padStart(2, "0")).join("");
}
function bytesToB64(b) {
  let s = "";
  for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]);
  return btoa(s);
}
function b64ToBytes(s) {
  const bin = atob(s);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
function bytesToB64Url(b) {
  return bytesToB64(b).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
function b64UrlToBytes(s) {
  const padded = s.replace(/-/g, "+").replace(/_/g, "/");
  const need = (4 - (padded.length % 4)) % 4;
  return b64ToBytes(padded + "=".repeat(need));
}
/**
 * C4: collapse a user_id to its one canonical spelling.
 *
 * `bytesToB64Url` emits unpadded, but `b64UrlToBytes` re-pads before atob,
 * so "X" and "X=" decode to the SAME pubkey while comparing as different
 * strings. Every identity check in the app is a string compare against
 * `members`, so one keypair could hold two member rows and cast two votes
 * toward the promote threshold. Round-trip through the decoder to get the
 * single spelling. Returns null if the id isn't decodable at all.
 */
function canonUserId(id) {
  if (typeof id !== "string" || !id) return null;
  try {
    const bytes = b64UrlToBytes(id);
    if (!bytes || bytes.length !== 32) return null;   // Ed25519 pubkeys only
    return bytesToB64Url(bytes);
  } catch (_) { return null; }
}
function u64BE(n) {
  const b = new Uint8Array(8);
  const dv = new DataView(b.buffer);
  dv.setUint32(0, Math.floor(n / 0x100000000), false);
  dv.setUint32(4, n >>> 0, false);
  return b;
}
function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  })[c]);
}
/**
 * Sanitize a URL before inserting into an href or src attribute.
 * Rejects javascript:, data:, and vbscript: URIs (WT-33 XSS hardening).
 */
function sanitizeUrl(url) {
  try {
    const parsed = new URL(url, location.href);
    if (["javascript:", "data:", "vbscript:"].includes(parsed.protocol)) return "#";
  } catch (_) { return "#"; }
  return url;
}
function initials(name) {
  return (name || "?").trim().split(/\s+/).slice(0,2).map(w => w[0] || "").join("").toUpperCase() || "?";
}
// Synchronous fingerprint formatter for places where we already have the
// 16 fp bytes (e.g. the join-verify screen, where they come from the invite
// payload, not from a member record).
function formatFpBytes(fpBytes) {
  return bytesToHex(fpBytes).match(/.{4}/g).join(" ");
}

// Compute a member's fingerprint from their pubkey (embedded in `id`) and
// attach `.fp` (8 groups of 4 hex) and `.fpBytes` (16-byte Uint8Array) to
// the record in place. Called when Workspace.open loads members, and each
// time a new member record is inserted via member.join / member.welcome.
async function attachFingerprint(member) {
  const pubBytes = b64UrlToBytes(member.id);
  const hash = await Crypto.sha256(pubBytes);
  member.fpBytes = hash.slice(0, 16);
  member.fp = formatFpBytes(member.fpBytes);
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}
function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString();
}

/**
 * Format a past timestamp as a short relative string for the presence
 * tooltip. "just now" | "5m ago" | "2h ago" | "3 days ago".
 */
function formatRelative(ts) {
  const now = Date.now();
  const deltaSec = Math.max(0, Math.floor((now - ts) / 1000));
  if (deltaSec < 60)     return "just now";
  const deltaMin = Math.floor(deltaSec / 60);
  if (deltaMin < 60)     return deltaMin + "m ago";
  const deltaHr = Math.floor(deltaMin / 60);
  if (deltaHr < 24)      return deltaHr + "h ago";
  const deltaDays = Math.floor(deltaHr / 24);
  return deltaDays + " day" + (deltaDays === 1 ? "" : "s") + " ago";
}

/* ------------------------------------------------------------
 *  §35  Relay transport — Cloudflare Worker adapter (Slice 7)
 *
 *  RelayTransport polls GET /ws/:id/envelopes for new envelopes and
 *  pushes outbound envelopes via PUT. Operates independently of PeerMgr
 *  (different transport model — polling vs WebRTC data channel).
 *
 *  RelayMgr is the workspace-level manager: one RelayTransport per
 *  workspace, started on Workspace.open and stopped on workspace close.
 *
 *  Received envelopes flow: RelayTransport → SeenSet dedup →
 *    EnvelopeDispatch.receive → PeerMgr.sendEnvelope (WebRTC rebroadcast).
 *
 *  Sent envelopes flow: PeerMgr.sendEnvelope (existing WebRTC path) +
 *    RelayMgr.send (relay push, fire-and-forget).
 * ------------------------------------------------------------ */

/**
 * RelayTransport — manages polling and pushing for one workspace + relay.
 *
 * Config: { url, token, workspaceId }
 * url   — base URL of the relay Worker (no trailing slash)
 * token — Bearer token for Authorization header (may be empty for open relay)
 */
class RelayTransport {
  constructor({ url, token, workspaceId }) {
    this.url         = url.replace(/\/$/, "");
    this.token       = token || "";
    this.workspaceId = workspaceId;
    this.cursor      = "";
    this.pollTimer   = null;
    this.status      = "connecting";
    this._closed     = false;
  }

  _headers(contentType) {
    const h = {};
    if (this.token) h["Authorization"] = "Bearer " + this.token;
    if (contentType) h["Content-Type"] = contentType;
    return h;
  }

  _wsUrl(path) {
    return `${this.url}/ws/${encodeURIComponent(this.workspaceId)}${path}`;
  }

  /** Fetch current cursor from relay (fast-forward on first connect). */
  async fetchCursor() {
    const resp = await fetch(this._wsUrl("/cursor"), {
      headers: this._headers(),
      signal: AbortSignal.timeout(8_000)
    });
    if (resp.ok) {
      const { cursor } = await resp.json();
      this.cursor = cursor || "";
      this.status = "connected";
    } else if (resp.status === 401) {
      this.status = "error";
      console.warn("Relay: auth failed — check token");
    }
  }

  /** Start polling. Call once after construction. */
  async start() {
    try { await this.fetchCursor(); } catch (e) {
      console.warn("Relay cursor fetch failed:", e.message);
      this.status = "offline";
    }
    this._schedulePoll(0);
  }

  _schedulePoll(delay = 5_000) {
    if (this._closed) return;
    this.pollTimer = setTimeout(() => this._poll(), delay);
  }

  async _poll() {
    if (this._closed) return;
    try {
      const url = new URL(this._wsUrl("/envelopes"));
      if (this.cursor) url.searchParams.set("since", this.cursor);
      url.searchParams.set("limit", "100");

      const resp = await fetch(url.href, {
        headers: this._headers(),
        signal: AbortSignal.timeout(10_000)
      });

      if (resp.ok) {
        const items = await resp.json(); // [{seq, data: base64}]
        this.status = "connected";
        for (const item of items) {
          if (this._closed) return;
          try {
            await this._ingest(item);
            this.cursor = item.seq; // advance cursor even on dispatch error
          } catch (e) {
            console.warn("Relay ingest error:", e);
          }
        }
      } else if (resp.status === 401) {
        this.status = "error";
        return; // stop polling — credentials are wrong
      } else {
        this.status = "offline";
      }
    } catch (e) {
      this.status = "offline";
      console.warn("Relay poll error:", e.message);
    }
    this._schedulePoll(5_000);
  }

  /** Decode and dispatch one relay item. */
  async _ingest({ data }) {
    // data is base64 of the raw msgpack envelope bytes.
    const bytes = b64ToBytes(data);
    const env   = MP.decode(bytes);
    if (!env || !env.id) return;

    // Seen-set deduplication (same logic as PeerMgr.handlePacket).
    const wsId = this.workspaceId;
    const known = await SeenSet.has(wsId, env.id);
    if (known) return;
    await SeenSet.add(wsId, env.id);

    // Dispatch locally — updates state, persists to IDB, re-renders.
    await EnvelopeDispatch.receive(wsId, env);

    // Rebroadcast to any connected WebRTC peers. Ephemeral envelopes
    // (presence, typing) are not rebroadcast — relay versions are stale.
    if (!EPHEMERAL_TYPES.has(env.type)) {
      await PeerMgr.sendEnvelope(wsId, env);
    }
  }

  /**
   * Push a raw msgpack envelope to the relay.
   * Called from PeerMgr.sendEnvelope (fire-and-forget).
   */
  async send(envBytes) {
    if (this.status === "error" || this._closed) return;
    const resp = await fetch(this._wsUrl("/envelopes"), {
      method:  "PUT",
      headers: this._headers("application/octet-stream"),
      body:    envBytes,
      signal:  AbortSignal.timeout(8_000)
    });
    if (!resp.ok && resp.status !== 204) {
      throw new Error(`Relay PUT ${resp.status}`);
    }
    this.status = "connected"; // at least one successful write
  }

  close() {
    this._closed = true;
    clearTimeout(this.pollTimer);
    this.status = "closed";
  }
}

/**
 * RelayMgr — workspace-level relay manager.
 * At most one RelayTransport per workspace (uses the first configured relay).
 */
const RelayMgr = {
  /** workspaceId → RelayTransport */
  _transports: new Map(),

  /**
   * Start the relay for a workspace if it has a relay configured.
   * Stops any existing transport first (idempotent on re-open).
   */
  startForWorkspace(current) {
    const wsId   = current.meta.id;
    const relays = current.relays || [];
    this.stop(wsId); // tear down any prior transport
    if (relays.length === 0) return;

    const cfg = relays[0]; // use first relay (multi-relay is a future feature)
    const t   = new RelayTransport({ url: cfg.url, token: cfg.token, workspaceId: wsId });
    this._transports.set(wsId, t);
    t.start().catch(e => console.warn("Relay start error:", e));
  },

  stop(wsId) {
    const t = this._transports.get(wsId);
    if (t) { t.close(); this._transports.delete(wsId); }
  },

  /**
   * Send raw msgpack envelope bytes to the relay for a workspace.
   * Fire-and-forget — caller should not await (returns void).
   */
  async send(wsId, envBytes) {
    const t = this._transports.get(wsId);
    if (!t || t.status === "error" || t.status === "closed") return;
    try { await t.send(envBytes); } catch (e) {
      console.warn("Relay send failed:", e.message);
    }
  },

  /** "connected" | "connecting" | "offline" | "error" | "none" */
  status(wsId) {
    const t = this._transports.get(wsId);
    return t ? t.status : "none";
  },
};

/* ------------------------------------------------------------
 *  §36  Pairing-by-code (WT-06)
 *
 *  6 random words → PBKDF2(300K, SHA-256) → AES-256-GCM key.
 *  The key encrypts a self-contained workspace invite bundle that is
 *  stored on the relay for 5 minutes under SHA-256(code) as the key.
 *  Single-use — the relay deletes the entry on first fetch.
 *
 *  Flow:
 *   Sender  — openPairingCodeSendModal → generate code → encrypt bundle
 *             → POST /pairing on relay → show 6 words
 *   Receiver — openPairingCodeJoinModal → enter words → derive key+hash
 *             → GET /pairing/:hash → decrypt bundle → join workspace
 *
 *  Requires a relay (tier 3+). Shown in Settings → Workspace when relay
 *  is configured.
 * ------------------------------------------------------------ */

/**
 * 256-word list: short, common English words chosen for phonetic clarity.
 * 8 bits per word × 6 words = 48 bits of entropy. With PBKDF2 at 300K
 * iterations this is effectively unguessable in any realistic timeframe.
 */
const PAIRING_WORDS = [
  "acid","aged","also","alto","arch","area","army","atom","aunt","axis",
  "back","band","base","bath","beam","bean","bear","beat","beef","bell",
  "belt","bend","best","bile","bird","bite","blue","boat","bold","bolt",
  "bond","bone","book","born","both","bowl","burn","buzz","byte","cage",
  "cake","calm","camp","cape","card","care","cart","case","cast","cave",
  "cell","cent","chain","chef","chin","chip","chop","cite","city","clam",
  "clan","clap","clay","clip","club","clue","coal","coat","code","coil",
  "coin","coke","cold","colt","come","cone","cook","cool","cope","core",
  "corn","cost","coup","crab","crew","crop","crow","cube","cure","curl",
  "damp","dare","dark","dart","dash","data","date","dawn","deal","dear",
  "deck","deed","deep","deer","dell","dent","desk","dial","dice","diet",
  "dine","dip","dire","dirt","disc","dish","disk","dome","door","dose",
  "dove","down","draw","dune","dusk","dust","duty","each","earl","earn",
  "ease","edge","emit","epic","even","ever","evil","exam","face","fact",
  "fade","fall","fame","farm","fast","fate","fear","feat","feed","feel",
  "felt","fern","file","fill","film","find","fine","fire","firm","fish",
  "fist","five","flag","flat","flaw","flea","flew","flex","flip","flow",
  "foam","fold","folk","fond","font","food","fool","ford","fork","form",
  "fray","free","frog","from","fuel","full","fume","fund","fuse","gale",
  "game","gear","gaze","gill","give","glad","glow","glue","goal","gold",
  "golf","gone","good","gown","grab","gram","gray","grew","grid","grin",
  "grip","grow","gulf","gull","gust","hail","half","hall","halt","hand",
  "hang","hard","harm","harp","hash","hate","hawk","heal","heat","heel",
  "helm","hemp","here","hero","hide","high","hill","hint","hire","hold",
  "hole","holy","home","hood","hook","hope","horn","host","hour","hull",
  "hunt","husk","icon","idea","inch","into","iris","isle","itch","item"
];

const PairingCode = {
  /**
   * Generate a fresh 6-word code.
   * Returns { words, codeStr, key (CryptoKey), codeHash (hex) }.
   */
  async generate() {
    const bytes = crypto.getRandomValues(new Uint8Array(6));
    const words = [...bytes].map(b => PAIRING_WORDS[b]); // 256-word list → 8 bits each
    const codeStr = words.join(" ");
    const { key, codeHash } = await this._deriveKey(codeStr);
    return { words, codeStr, key, codeHash };
  },

  /** Derive key + hash from a code string entered by the user. */
  async fromString(codeStr) {
    return this._deriveKey(codeStr.trim().toLowerCase().replace(/\s+/g, " "));
  },

  async _deriveKey(codeStr) {
    const enc  = new TextEncoder();
    const base = await crypto.subtle.importKey("raw", enc.encode(codeStr), "PBKDF2", false, ["deriveKey"]);
    const key  = await crypto.subtle.deriveKey(
      { name: "PBKDF2", hash: "SHA-256", salt: enc.encode("mehfil-pairing-v1"), iterations: 300_000 },
      base, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
    );
    const hashBuf  = await crypto.subtle.digest("SHA-256", enc.encode(codeStr));
    const codeHash = [...new Uint8Array(hashBuf)].map(b => b.toString(16).padStart(2, "0")).join("");
    return { key, codeHash };
  },

  async encrypt(key, obj) {
    const iv  = crypto.getRandomValues(new Uint8Array(12));
    const pt  = new TextEncoder().encode(JSON.stringify(obj));
    const ct  = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, pt);
    const out = new Uint8Array(12 + ct.byteLength);
    out.set(iv);
    out.set(new Uint8Array(ct), 12);
    return btoa(String.fromCharCode(...out));
  },

  async decrypt(key, b64) {
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const pt  = await crypto.subtle.decrypt({ name: "AES-GCM", iv: raw.slice(0, 12) }, key, raw.slice(12));
    return JSON.parse(new TextDecoder().decode(pt));
  }
};

/**
 * Open the "Invite by code" modal (sender side).
 * Called from Settings → Workspace (only when relay is configured).
 */
async function openPairingCodeSendModal(current) {
  const relay = (current.relays || [])[0];
  if (!relay) { alert("Add a relay first — Settings → Workspace → Relays."); return; }

  // Build a self-contained relay-join bundle (no SDP — relay delivers the join).
  const rootRaw  = await idbGet(current.wsDB, "keys", "root");
  const gchKey   = await idbGet(current.wsDB, "keys", "ch:" + current.meta.general_channel_id);
  const me       = current.members.find(m => m.id === bytesToB64Url(State.identity.pubkey));
  const fpHash   = await Crypto.sha256(State.identity.pubkey);
  const bundle   = {
    ws:                  current.meta.id,
    name:                current.meta.name,
    root_key:            bytesToB64(rootRaw),
    general_channel_id:  current.meta.general_channel_id,
    general_channel_key: bytesToB64(gchKey),
    inviter_id:          bytesToB64Url(State.identity.pubkey),
    inviter_name:        me?.name || "?",
    inviter_fp:          bytesToHex(fpHash.slice(0, 16)),
    relays:              current.relays,
    expires:             Date.now() + 5 * 60 * 1000
  };

  let words, codeStr, key, codeHash;
  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  wrap.innerHTML = `
    <div class="card" style="max-width: 420px; text-align: center;">
      <h1 style="font-size: 18px; margin-bottom: 8px;">Invite by code</h1>
      <p class="sub" style="margin-bottom: 16px;">Generating secure code…</p>
    </div>
  `;
  document.body.appendChild(wrap);

  try {
    ({ words, codeStr, key, codeHash } = await PairingCode.generate());
    const encrypted = await PairingCode.encrypt(key, bundle);

    const resp = await fetch(`${relay.url}/pairing`, {
      method:  "POST",
      headers: { "Content-Type": "application/json", ...(relay.token ? { "Authorization": "Bearer " + relay.token } : {}) },
      body:    JSON.stringify({ code_hash: codeHash, payload: encrypted, ttl_ms: 300_000 })
    });
    if (!resp.ok) throw new Error(`Relay returned ${resp.status}`);
  } catch (e) {
    wrap.remove();
    alert("Failed to generate pairing code: " + e.message);
    return;
  }

  wrap.querySelector(".card").innerHTML = `
    <h1 style="font-size: 18px; margin-bottom: 4px;">Invite by code</h1>
    <p class="sub" style="margin-bottom: 16px;">Read these 6 words to the person joining. Valid for 5 minutes.</p>
    <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px;">
      ${words.map((w, i) => `
        <div style="background: var(--bg-sunken); border-radius: 6px; padding: 8px 12px; min-width: 72px; text-align: center;">
          <div style="font-size: 10px; color: var(--fg-dim); margin-bottom: 2px;">${i + 1}</div>
          <div style="font-size: 15px; font-weight: 600;">${escapeHTML(w)}</div>
        </div>`).join("")}
    </div>
    <p class="sub" style="font-size: 11px; margin-bottom: 16px;">
      They'll click <strong>Join by code</strong> on the Mehfil landing page and type these words.
    </p>
    <button class="primary" id="pairing-done">Done</button>
  `;
  wrap.querySelector("#pairing-done").onclick = () => wrap.remove();
  wrap.addEventListener("click", e => { if (e.target === wrap) wrap.remove(); });
}

/**
 * Open the "Join by code" modal (receiver side).
 * Called from the landing page "Join by code" button.
 */
function openPairingCodeJoinModal() {
  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  wrap.innerHTML = `
    <div class="card" style="max-width: 420px;">
      <h1 style="font-size: 18px; margin-bottom: 8px;">Join by code</h1>
      <p class="sub" style="margin-bottom: 12px;">Enter the 6 words shared by your workspace admin.</p>
      <div class="field">
        <label>Code (6 words, space-separated)</label>
        <input id="pairing-code-input" type="text" placeholder="apple table river…"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
               style="font-size: 14px; letter-spacing: 0.03em;">
      </div>
      <div class="err" id="pairing-err"></div>
      <div class="row" style="margin-top: 16px; gap: 8px; justify-content: flex-end;">
        <button id="pairing-cancel">Cancel</button>
        <button class="primary" id="pairing-join">Join workspace</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);

  const $input = wrap.querySelector("#pairing-code-input");
  const $err   = wrap.querySelector("#pairing-err");
  const $btn   = wrap.querySelector("#pairing-join");
  $input.focus();
  wrap.querySelector("#pairing-cancel").onclick = () => wrap.remove();
  wrap.addEventListener("click", e => { if (e.target === wrap) wrap.remove(); });

  const join = async () => {
    const raw = $input.value.trim();
    const words = raw.toLowerCase().split(/\s+/).filter(Boolean);
    if (words.length !== 6) { $err.textContent = "Enter exactly 6 words."; return; }

    $btn.disabled = true;
    $btn.textContent = "Looking up…";
    $err.textContent = "";

    try {
      const { key, codeHash } = await PairingCode.fromString(words.join(" "));

      // Find any configured relay in existing workspaces to use for the lookup.
      // Fall back to prompting for the relay URL.
      let relayUrl = "", relayToken = "";
      for (const ws of (State.workspaces || [])) {
        try {
          const wsDB = await openWorkspaceDB(ws.id);
          const meta = await idbGet(wsDB, "keys", "workspace_meta");
          wsDB.close();
          if (meta?.relays?.length) { relayUrl = meta.relays[0].url; relayToken = meta.relays[0].token || ""; break; }
        } catch {}
      }
      if (!relayUrl) {
        relayUrl = prompt("Enter the relay URL (e.g. https://mehfil-relay.example.workers.dev):");
        if (!relayUrl) { $btn.disabled = false; $btn.textContent = "Join workspace"; return; }
        relayToken = prompt("Bearer token (leave blank if none):") || "";
      }

      const headers = relayToken ? { "Authorization": "Bearer " + relayToken } : {};
      const resp = await fetch(`${relayUrl.replace(/\/$/, "")}/pairing/${codeHash}`, { headers });
      if (resp.status === 404) throw new Error("Code not found or expired. Ask for a new code.");
      if (!resp.ok) throw new Error(`Relay error ${resp.status}`);
      const { payload } = await resp.json();

      const bundle = await PairingCode.decrypt(key, payload);
      if (Date.now() > bundle.expires) throw new Error("This code has expired. Ask for a fresh one.");

      wrap.remove();
      await joinWorkspaceFromBundle(bundle, relayUrl, relayToken);
    } catch (e) {
      $err.textContent = e.message;
      $btn.disabled = false;
      $btn.textContent = "Join workspace";
    }
  };

  $btn.onclick = join;
  $input.onkeydown = e => { if (e.key === "Enter") join(); };
}

/**
 * Join a workspace using a relay-delivered bundle (no WebRTC handshake).
 * The bundle carries all keys directly — no offer/answer needed.
 */
async function joinWorkspaceFromBundle(bundle, relayUrl, relayToken) {
  // Ensure identity exists.
  if (!State.identity) {
    await Identity.load(State.globalDB);
    State.identity = await idbGet(State.globalDB, "identity", "self");
    if (!State.identity) State.identity = await Identity.create(State.globalDB);
  }

  // Prompt for display name if not set.
  let myName = State.identity.name || "";
  if (!myName) {
    myName = prompt(`Joining "${bundle.name}". Enter your display name:`)?.trim();
    if (!myName) { alert("Display name required."); return; }
    State.identity.name = myName;
    await idbPut(State.globalDB, "identity", State.identity, "self");
  }

  // Check if already joined.
  const existing = await idbGet(State.globalDB, "workspaces", bundle.ws);
  if (existing) {
    await openWorkspaceById(bundle.ws);
    return;
  }

  // Decode keys from bundle.
  const rootKeyBytes = b64ToBytes(bundle.root_key);
  const gchKeyBytes  = b64ToBytes(bundle.general_channel_key);
  const relayConfig  = bundle.relays || [{ url: relayUrl, token: relayToken }];

  // Create workspace DB and populate keys.
  const wsDB = await openWorkspaceDB(bundle.ws);
  await idbPut(wsDB, "keys", {
    id: bundle.ws, name: bundle.name,
    general_channel_id: bundle.general_channel_id,
    relays: relayConfig,
    created_at: Date.now()
  }, "workspace_meta");
  await idbPut(wsDB, "keys", rootKeyBytes, "root");
  await idbPut(wsDB, "keys", gchKeyBytes, `ch:${bundle.general_channel_id}`);

  // Register identity public key — used to verify authorship of envelopes
  // written by this device. The private key is stored in the global identity
  // record (identity.privkey_pkcs8), never in the workspace DB.
  await idbPut(wsDB, "keys", State.identity.pubkey, "sign_pub");

  // Register in global workspace list.
  await idbPut(State.globalDB, "workspaces", {
    id: bundle.ws, name: bundle.name, created_at: Date.now(), last_opened_at: Date.now()
  });
  wsDB.close();

  // Send member.join envelope via relay so workspace members see us.
  await openWorkspaceById(bundle.ws);
  await sendMemberJoin(State.current);
}

/* ------------------------------------------------------------
 *  §36b  Device pairing (v1.1 — WT-26, 27, 28)
 *
 *  Three-message handshake over the relay's /pairing endpoint:
 *    codeHash            → challenge  (Device A posts, Device B fetches)
 *    SHA-256("resp:"+c)  → response   (Device B posts, Device A fetches)
 *    SHA-256("keys:"+c)  → key bundle (Device A posts, Device B fetches)
 *
 *  Key transport: ephemeral X25519 ECDH → AES-256-GCM over a msgpack bundle
 *  carrying the Ed25519+X25519 identity keys + workspace root/channel keys.
 *  The outer layer is additionally PairingCode.encrypt'd so the relay sees
 *  only opaque ciphertext.
 *
 *  Device B gets the relay bearer token from the challenge payload so it can
 *  post back without having an existing workspace configuration.
 * ------------------------------------------------------------ */

/**
 * Initiator side (Device A — has the identity).
 * Called from Settings → Devices → + Pair a new device.
 */
async function openDevicePairInitiatorModal(current) {
  const relay = (current.relays || [])[0];
  if (!relay) { alert("Add a relay first (Settings → Workspace → Relays)."); return; }

  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  wrap.innerHTML = `
    <div class="card" style="max-width:420px;text-align:center;">
      <h1 style="font-size:18px;margin-bottom:8px;">Pair a new device</h1>
      <p class="sub">Generating secure pairing code…</p>
    </div>
  `;
  document.body.appendChild(wrap);

  let pairingAesKey, codeHash, respHash, keysHash, words, ephemXPrivA, ephemXPubA;

  try {
    const generated = await PairingCode.generate();
    pairingAesKey = generated.key;
    codeHash      = generated.codeHash;
    words         = generated.words;
    const codeStr = generated.codeStr;

    // Derive additional relay slot hashes — still valid 64-char hex SHA-256.
    respHash = await Crypto.sha256Hex("resp:" + codeStr);
    keysHash = await Crypto.sha256Hex("keys:" + codeStr);

    const ephem = await Crypto.genX25519();
    ephemXPrivA = ephem.x25519_priv_pkcs8;
    ephemXPubA  = ephem.x25519_pub;

    const fpHash    = await Crypto.sha256(State.identity.pubkey);
    const challenge = {
      type:          "device.pair.challenge",
      ws:            current.meta.id,
      ws_name:       current.meta.name,
      initiator_fp:  bytesToHex(fpHash.slice(0, 16)),
      ephem_x_pub_A: bytesToB64(ephemXPubA),
      relay_url:     relay.url,
      relay_token:   relay.token || "",
      expires:       Date.now() + 5 * 60 * 1000
    };
    const encChallenge = await PairingCode.encrypt(pairingAesKey, challenge);
    const r = await fetch(`${relay.url.replace(/\/$/, "")}/pairing`, {
      method:  "POST",
      headers: { "Content-Type": "application/json",
                 ...(relay.token ? { "Authorization": "Bearer " + relay.token } : {}) },
      body:    JSON.stringify({ code_hash: codeHash, payload: encChallenge, ttl_ms: 300_000 })
    });
    if (!r.ok) throw new Error(`Relay returned ${r.status}`);
  } catch (e) {
    wrap.remove();
    alert("Failed to start device pairing: " + e.message);
    return;
  }

  const relayBase = relay.url.replace(/\/$/, "");
  const authHdr   = relay.token ? { "Authorization": "Bearer " + relay.token } : {};

  wrap.querySelector(".card").innerHTML = `
    <h1 style="font-size:18px;margin-bottom:4px;">Pair a new device</h1>
    <p class="sub" style="margin-bottom:16px;">On the new device, open Mehfil → <strong>Add this device to an existing identity</strong>, then enter these 6 words:</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;">
      ${words.map((w, i) => `
        <div style="background:var(--bg-sunken);border-radius:6px;padding:8px 12px;min-width:72px;text-align:center;">
          <div style="font-size:10px;color:var(--fg-dim);margin-bottom:2px;">${i + 1}</div>
          <div style="font-size:15px;font-weight:600;">${escapeHTML(w)}</div>
        </div>`).join("")}
    </div>
    <p class="sub" style="font-size:12px;" id="pair-status">Waiting for the new device to enter the code…</p>
    <button id="pair-cancel" style="margin-top:12px;">Cancel</button>
  `;
  const cancelFn = () => {
    clearInterval(State.pairingSession?.pollTimer);
    State.pairingSession = null;
    wrap.remove();
  };
  wrap.querySelector("#pair-cancel").onclick = cancelFn;
  wrap.addEventListener("click", e => { if (e.target === wrap) cancelFn(); });

  State.pairingSession = { pollTimer: null, pairingAesKey, ephemXPrivA, ephemXPubA, keysHash, current };

  // Poll for Device B's response.
  State.pairingSession.pollTimer = setInterval(async () => {
    try {
      const r = await fetch(`${relayBase}/pairing/${respHash}`, { headers: authHdr });
      if (r.status === 404) return;
      if (!r.ok) throw new Error(`Relay error ${r.status}`);
      const { payload } = await r.json();

      // M14: decrypt and validate BEFORE stopping the poll. The interval used
      // to be cleared here, so a single malformed payload (a decrypt failure,
      // or garbage written to the relay's pairing slot) killed the pairing
      // attempt permanently. Now a bad payload throws to the catch below with
      // the poll still running, and we keep waiting for a valid response.
      const response = await PairingCode.decrypt(pairingAesKey, payload);
      if (response.type !== "device.pair.response") throw new Error("Unexpected response type");
      clearInterval(State.pairingSession.pollTimer);

      const ephem_ed_pub_B = b64ToBytes(response.ephem_ed_pub_B);
      const fpB     = await Crypto.sha256(ephem_ed_pub_B);
      const fpHex   = bytesToHex(fpB.slice(0, 16));
      const fpFmt   = fpHex.match(/.{4}/g).join(" ");
      const trustSvg = await TrustCard.renderFromPubkey(ephem_ed_pub_B, 80);

      const $card = wrap.querySelector(".card");
      $card.innerHTML = `
        <h1 style="font-size:18px;margin-bottom:8px;">Confirm new device</h1>
        <p class="sub" style="margin-bottom:4px;">Device: <strong>${escapeHTML((response.device_label || "").slice(0, 60))}</strong></p>
        <p class="sub" style="margin-bottom:12px;">Confirm this fingerprint matches what the new device shows:</p>
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:16px;">
          ${trustSvg}
          <code style="font-size:13px;letter-spacing:0.08em;">${escapeHTML(fpFmt)}</code>
        </div>
        <div class="err" id="pair-confirm-err"></div>
        <div class="row" style="gap:8px;justify-content:flex-end;margin-top:8px;">
          <button id="pair-decline">Decline</button>
          <button class="primary" id="pair-confirm">Fingerprint matches — confirm</button>
        </div>
      `;
      $card.querySelector("#pair-decline").onclick = () => { State.pairingSession = null; wrap.remove(); };
      $card.querySelector("#pair-confirm").onclick = async () => {
        const $err = $card.querySelector("#pair-confirm-err");
        $card.querySelector("#pair-confirm").disabled = true;
        try {
          const privKey = await Crypto.importX25519Priv(State.pairingSession.ephemXPrivA);
          const pubKey  = await Crypto.importX25519Pub(b64ToBytes(response.ephem_x_pub_B));
          const kek     = await Crypto.deriveX25519AesKey(privKey, pubKey);

          const rootRaw = await idbGet(current.wsDB, "keys", "root");
          const gchRaw  = await idbGet(current.wsDB, "keys", "ch:" + current.meta.general_channel_id);
          const me      = current.members.find(m => m.id === bytesToB64Url(State.identity.pubkey));

          const keyBundle = MP.encode({
            ed_pkcs8:      State.identity.privkey_pkcs8,
            x_pkcs8:       State.identity.x25519_priv_pkcs8,
            ed_pub:        State.identity.pubkey,
            x_pub:         State.identity.x25519_pub,
            identity_name: me?.name || "",
            workspaces:    [{
              id:                  current.meta.id,
              name:                current.meta.name,
              root_key:            rootRaw,
              general_channel_id:  current.meta.general_channel_id,
              general_channel_key: gchRaw,
              relays:              current.relays || [],
              new_device_id:       response.new_device_id
            }]
          });

          const { iv, ct } = await Crypto.aesEncrypt(kek, keyBundle);
          const encKeys = await PairingCode.encrypt(pairingAesKey, {
            type:   "device.pair.keys",
            iv_b64: bytesToB64(iv),
            ct_b64: bytesToB64(ct)
          });
          const kr = await fetch(`${relayBase}/pairing`, {
            method:  "POST",
            headers: { "Content-Type": "application/json", ...authHdr },
            body:    JSON.stringify({ code_hash: State.pairingSession.keysHash,
                                      payload: encKeys, ttl_ms: 300_000 })
          });
          if (!kr.ok) throw new Error(`Relay returned ${kr.status}`);

          await sendDeviceAdd(current, response.new_device_id);
          State.pairingSession = null;

          $card.innerHTML = `
            <h1 style="font-size:18px;margin-bottom:8px;">Device paired ✓</h1>
            <p class="sub" style="margin-bottom:16px;">The new device has been added to your identity. It will sync workspace history via the relay.</p>
            <button class="primary" id="pair-done">Done</button>
          `;
          $card.querySelector("#pair-done").onclick = () => wrap.remove();
        } catch (e) {
          $err.textContent = e.message;
          $card.querySelector("#pair-confirm").disabled = false;
        }
      };
    } catch (e) {
      const $s = wrap.querySelector("#pair-status");
      if ($s) $s.textContent = "Polling error: " + e.message;
    }
  }, 3000);
}

/**
 * Joiner side (Device B — no identity yet).
 * Called from the landing page "Add this device to an existing identity" button.
 */
function openDevicePairJoinerModal() {
  const wrap = document.createElement("div");
  wrap.className = "modal-bg";
  wrap.innerHTML = `
    <div class="card" style="max-width:420px;">
      <h1 style="font-size:18px;margin-bottom:8px;">Add this device to an existing identity</h1>
      <p class="sub" style="margin-bottom:12px;">On your other device, go to Settings → Devices → Pair a new device. Enter the 6 words shown here.</p>
      <div class="field">
        <label>Pairing code (6 words)</label>
        <input id="dpair-code" type="text" placeholder="word1 word2 word3 word4 word5 word6"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
               style="font-size:14px;letter-spacing:0.03em;">
      </div>
      <div class="err" id="dpair-err"></div>
      <div class="row" style="margin-top:16px;gap:8px;justify-content:flex-end;">
        <button id="dpair-cancel">Cancel</button>
        <button class="primary" id="dpair-join">Continue</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);

  const $input = wrap.querySelector("#dpair-code");
  const $err   = wrap.querySelector("#dpair-err");
  const $btn   = wrap.querySelector("#dpair-join");
  $input.focus();

  const cancelFn = () => {
    clearInterval(State.pairingSession?.pollTimer);
    State.pairingSession = null;
    wrap.remove();
  };
  wrap.querySelector("#dpair-cancel").onclick = cancelFn;
  wrap.addEventListener("click", e => { if (e.target === wrap) cancelFn(); });

  const join = async () => {
    const raw   = $input.value.trim();
    const words = raw.toLowerCase().split(/\s+/).filter(Boolean);
    if (words.length !== 6) { $err.textContent = "Enter exactly 6 words."; return; }

    $btn.disabled = true;
    $btn.textContent = "Looking up…";
    $err.textContent = "";

    try {
      const codeStr = words.join(" ");
      const { key: pairingAesKey, codeHash } = await PairingCode.fromString(codeStr);
      const respHash = await Crypto.sha256Hex("resp:" + codeStr);
      const keysHash = await Crypto.sha256Hex("keys:" + codeStr);

      // Discover relay URL from existing workspaces or prompt.
      let relayUrl = "", relayToken = "";
      for (const ws of (State.workspaces || [])) {
        try {
          const wsDB = await openWorkspaceDB(ws.id);
          const meta = await idbGet(wsDB, "keys", "workspace_meta");
          wsDB.close();
          if (meta?.relays?.length) { relayUrl = meta.relays[0].url; relayToken = meta.relays[0].token || ""; break; }
        } catch {}
      }
      if (!relayUrl) {
        relayUrl = prompt("Enter the relay URL:");
        if (!relayUrl) { $btn.disabled = false; $btn.textContent = "Continue"; return; }
        relayToken = prompt("Bearer token (leave blank if none):") || "";
      }

      const relayBase = relayUrl.replace(/\/$/, "");
      const authHdr   = relayToken ? { "Authorization": "Bearer " + relayToken } : {};

      // Fetch challenge from relay.
      const cr = await fetch(`${relayBase}/pairing/${codeHash}`, { headers: authHdr });
      if (cr.status === 404) throw new Error("Code not found or expired. Ask for a fresh code.");
      if (!cr.ok) throw new Error(`Relay error ${cr.status}`);
      const { payload: chalPayload } = await cr.json();
      const challenge = await PairingCode.decrypt(pairingAesKey, chalPayload);
      if (challenge.type !== "device.pair.challenge") throw new Error("Unexpected challenge type");
